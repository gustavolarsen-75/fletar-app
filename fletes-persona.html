firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

function fbListen(path, cb) {
  const ref = db.ref(path);
  ref.on('value', snap => {
    const val = snap.val();
    cb(val ? Object.entries(val).map(([id, v]) => ({ id, ...v })) : []);
  });
  return () => ref.off();
}
function fbSet(path, data) { return db.ref(path).set(data); }
function fbUpdate(path, data) { return db.ref(path).update(data); }
function fbPush(path, data) { return db.ref(path).push(data); }
function fbRemove(path) { return db.ref(path).remove(); }
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── LOGO ─────────────────────────────────────────────────────────────────────

  const textW = size === "lg" ? 140 : 110;
  const textH = size === "lg" ? 46 : 36;
  const fontSize = size === "lg" ? 42 : 32;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: size === "lg" ? 12 : 8 }}>
      <svg width={iconSize} height={iconSize} viewBox="0 0 38 38">
        <rect width="38" height="38" rx="9" fill="#E85D20"/>
        <text fontFamily="Montserrat, sans-serif" fontSize="26" fontWeight="900" x="7" y="28" fill="white">F</text>
        <polygon points="28,24 34,19 28,14 28,18 22,18 22,20 28,20" fill="white" opacity="0.9"/>
      </svg>
      <svg width={textW} height={textH} viewBox={`0 0 ${textW} ${textH}`}>
        <defs>
          <clipPath id="fp-cl-left"><polygon points={`0,${textH} 0,0 ${textW * 0.58},0 ${textW * 0.36},${textH}`}/></clipPath>
          <clipPath id="fp-cl-right"><polygon points={`${textW * 0.58},0 ${textW},0 ${textW},${textH} ${textW * 0.36},${textH}`}/></clipPath>

        <text fontFamily="Montserrat, sans-serif" fontSize={fontSize} fontWeight="900" y={textH - 4} clipPath="url(#fp-cl-left)" fill="#E85D20">fletar</text>

}

const TIPOS = ['Muebles', 'Mudanza', 'Electrodomésticos', 'Ropa y cajas', 'Materiales', 'Otro'];

// ─── AUTH ───────────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [modo, setModo] = useState('login'); // 'login' | 'registro'
  const [form, setForm] = useState({ nombre: '', apellido: '', email: '', password: '', telefono: '', ciudad: '', direccion: '' });
  const [error, setError] = useState('');
  const [cargando, setCargando] = useState(false);
  const [verPass, setVerPass] = useState(false);

  function upd(k, v) { setForm(f => ({ ...f, [k]: v })); }

  function mensajeError(code) {
    if (code === 'auth/email-already-in-use') return 'Ya existe una cuenta con ese email.';
    if (code === 'auth/invalid-email') return 'El email no es válido.';
    if (code === 'auth/weak-password') return 'La contraseña debe tener al menos 6 caracteres.';
    if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') return 'Email o contraseña incorrectos.';
    if (code === 'auth/operation-not-allowed') return 'El acceso con email no está habilitado. Contactá al administrador.';
    if (code === 'auth/too-many-requests') return 'Demasiados intentos. Esperá unos minutos.';
    if (code === 'auth/network-request-failed') return 'Sin conexión. Revisá tu internet.';
    return 'Error: ' + code;
  }

  async function handleLogin(e) {
    e.preventDefault();
    if (!form.email || !form.password) { setError('Completá email y contraseña.'); return; }
    setCargando(true); setError('');
    try {
      const cred = await auth.signInWithEmailAndPassword(form.email, form.password);
      const snap = await db.ref('flocales/personas/' + cred.user.uid).once('value');
      if (snap.val()) onAuth(cred.user, snap.val());
      else setError('No encontramos tu perfil. ¿Ya te registraste?');
    } catch (err) {
      setError(mensajeError(err.code));
    }
    setCargando(false);
  }

  async function handleRegistro(e) {
    e.preventDefault();
    if (!form.nombre || !form.apellido || !form.email || !form.password || !form.telefono || !form.ciudad || !form.direccion) {
      setError('Completá todos los campos.'); return;
    }
    if (form.password.length < 6) { setError('La contraseña debe tener al menos 6 caracteres.'); return; }
    setCargando(true); setError('');
    try {
      const cred = await auth.createUserWithEmailAndPassword(form.email, form.password);
      const perfil = {
        nombre: form.nombre.trim(),
        apellido: form.apellido.trim(),
        email: form.email.trim(),
        telefono: form.telefono.trim(),
        ciudad: form.ciudad.trim(),
        direccion: form.direccion.trim(),
        creadoEn: Date.now(),
      };
      await fbSet('flocales/personas/' + cred.user.uid, perfil);
      onAuth(cred.user, perfil);
    } catch (err) {
      setError(mensajeError(err.code));
    }
    setCargando(false);
  }

  return (
    <div>
      <div style={{ background: "#2C2C2A", padding: "14px 18px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <FletarLogo />
          <span style={{ fontSize: 10, background: "#185FA5", color: "#fff", padding: "2px 7px", borderRadius: 5, fontWeight: 700 }}>PERSONA</span>
        </div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>{modo === 'login' ? 'Iniciá sesión' : 'Crear cuenta'}</div>
        <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 13, marginTop: 2 }}>{modo === 'login' ? 'Bienvenido de vuelta' : 'Registrate gratis en segundos'}</div>
      </div>
      <div className="screen">
        {modo === 'registro' && (
          <>
            <div className="g2">
              <div className="fg"><label>Nombre</label><input placeholder="María" value={form.nombre} onChange={e => upd('nombre', e.target.value)}/></div>
              <div className="fg"><label>Apellido</label><input placeholder="García" value={form.apellido} onChange={e => upd('apellido', e.target.value)}/></div>
            </div>
          </>
        )}
        <div className="fg"><label>Email</label><input type="email" placeholder="maria@email.com" value={form.email} onChange={e => upd('email', e.target.value)}/></div>
        <div className="fg">
          <label>Contraseña</label>
          <div style={{ position: 'relative' }}>
            <input type={verPass ? 'text' : 'password'} placeholder="Mínimo 6 caracteres" value={form.password} onChange={e => upd('password', e.target.value)} style={{ width: '100%', paddingRight: 40 }}/>
            <button type="button" onClick={() => setVerPass(v => !v)} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: 16, color: '#888', padding: 0 }}>
              {verPass ? '🙈' : '👁️'}
            </button>
          </div>
        </div>
        {modo === 'registro' && (
          <>
            <div className="fg"><label>Teléfono (WhatsApp)</label><input placeholder="+54 376 4000000" value={form.telefono} onChange={e => upd('telefono', e.target.value)}/></div>
            <div className="fg"><label>Ciudad</label><input placeholder="Posadas, Misiones" value={form.ciudad} onChange={e => upd('ciudad', e.target.value)}/></div>
            <div className="fg"><label>Dirección de retiro habitual</label><input placeholder="San Lorenzo 1234" value={form.direccion} onChange={e => upd('direccion', e.target.value)}/></div>
          </>
        )}
        {error && <div className="error-msg">{error}</div>}
        <div className="fg" style={{ marginTop: 4 }}>
          <button className="btn btn-primary" onClick={modo === 'login' ? handleLogin : handleRegistro} disabled={cargando}>
            {cargando ? 'Un momento...' : modo === 'login' ? 'Iniciar sesión' : 'Crear cuenta'}
          </button>
        </div>
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          {modo === 'login'
            ? <><span className="sm">¿No tenés cuenta? </span><button className="link-txt" onClick={() => { setModo('registro'); setError(''); }}>Registrate</button></>
            : <><span className="sm">¿Ya tenés cuenta? </span><button className="link-txt" onClick={() => { setModo('login'); setError(''); }}>Iniciá sesión</button></>
          }
        </div>
        <div style={{ marginTop: 20, textAlign: 'center' }}>
          <button className="link-txt sm" onClick={() => window.location.href = 'index.html'}>← Volver al inicio</button>
        </div>
      </div>
    </div>
  );
}

// ─── HACER PEDIDO ────────────────────────────────────────────────────────────
function HacerPedido({ perfil, uid, onVolver }) {
  const [form, setForm] = useState({
    tipo: 'Muebles',
    descripcion: '',
    direccionRetiro: perfil.direccion + ', ' + perfil.ciudad,
    mapsRetiro: '',
    direccionEntrega: '',
    mapsEntrega: '',
    fecha: '',
    hora: '',
  });
  const [enviando, setEnviando] = useState(false);
  const [ok, setOk] = useState(false);

  function upd(k, v) { setForm(f => ({ ...f, [k]: v })); }

  async function enviar() {
    if (!form.descripcion || !form.direccionEntrega || !form.fecha || !form.hora) {
      alert('Completá descripción, dirección de entrega, fecha y hora.'); return;
    }
    setEnviando(true);
    const pedido = {
      uid,
      nombrePersona: perfil.nombre + ' ' + perfil.apellido,
      telefonoPersona: perfil.telefono,
      ciudad: perfil.ciudad.toLowerCase().trim(),
      tipo: form.tipo,
      descripcion: form.descripcion.trim(),
      direccionRetiro: form.direccionRetiro.trim(),
      mapsRetiro: form.mapsRetiro.trim(),
      direccionEntrega: form.direccionEntrega.trim(),
      mapsEntrega: form.mapsEntrega.trim(),
      fecha: form.fecha,
      hora: form.hora,
      estado: 'nuevo',
      creadoEn: Date.now(),
    };
    await fbPush('flocales/pedidos', pedido);
    setEnviando(false);
    setOk(true);
  }

  if (ok) return (
    <div>
      <div className="navbar">
        <div className="navbar-title">¡Pedido enviado!</div>
      </div>
      <div className="screen" style={{ textAlign: 'center', paddingTop: 60 }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>✅</div>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Tu pedido fue publicado</div>
        <div className="sm" style={{ marginBottom: 32 }}>Los fleteros de {perfil.ciudad} van a recibir tu solicitud y cotizar. Te avisamos cuando lleguen propuestas.</div>
        <button className="btn btn-primary" onClick={onVolver}>Ver mis pedidos</button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="navbar">
        <button className="navbar-back" onClick={onVolver}>‹</button>
        <div className="navbar-title">Nuevo pedido</div>
      </div>
      <div className="screen">
        <div className="fg">
          <label>Tipo de carga</label>
          <select value={form.tipo} onChange={e => upd('tipo', e.target.value)}>
            {TIPOS.map(t => <option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="fg">
          <label>Descripción breve</label>
          <textarea placeholder="Ej: sofá 3 cuerpos + mesa ratona, 2 piso con ascensor..." value={form.descripcion} onChange={e => upd('descripcion', e.target.value)}/>
        </div>
        <div className="fg">
          <label>Dirección de retiro</label>
          <input value={form.direccionRetiro} onChange={e => upd('direccionRetiro', e.target.value)}/>
        </div>
        <div className="fg">
          <label>Link Google Maps del punto de retiro (opcional)</label>
          <input placeholder="Pegá el link de tu ubicación" value={form.mapsRetiro} onChange={e => upd('mapsRetiro', e.target.value)}/>
          <div className="sm" style={{ marginTop: 4 }}>Abrí Google Maps → compartir → copiar link</div>
        </div>
        <div className="fg">
          <label>Dirección de entrega</label>
          <input placeholder="Av. Mitre 540, Posadas" value={form.direccionEntrega} onChange={e => upd('direccionEntrega', e.target.value)}/>
        </div>
        <div className="fg">
          <label>Link Google Maps del destino (opcional)</label>
          <input placeholder="Pegá el link del destino" value={form.mapsEntrega} onChange={e => upd('mapsEntrega', e.target.value)}/>
        </div>
        <div className="g2">
          <div className="fg"><label>Fecha</label><input type="date" value={form.fecha} onChange={e => upd('fecha', e.target.value)}/></div>
          <div className="fg"><label>Hora preferida</label><input type="time" value={form.hora} onChange={e => upd('hora', e.target.value)}/></div>
        </div>
        <button className="btn btn-primary" onClick={enviar} disabled={enviando}>
          {enviando ? 'Enviando...' : 'Publicar pedido'}
        </button>
      </div>
    </div>
  );
}

// ─── VER COTIZACIONES ────────────────────────────────────────────────────────
function VerCotizaciones({ pedido, onVolver }) {
  const [cotizaciones, setCotizaciones] = useState([]);
  const [aceptando, setAceptando] = useState(false);
  const [aceptada, setAceptada] = useState(null);

  useEffect(() => {
    if (pedido.estado === 'confirmado' && pedido.fleteroAceptado) {
      setAceptada(pedido.fleteroAceptado);
    }
    const unsub = fbListen('flocales/cotizaciones', arr => {
      setCotizaciones(arr.filter(c => c.pedidoId === pedido.id));
    });
    return unsub;
  }, [pedido.id]);

  async function aceptar(cot) {
    if (aceptando) return;
    setAceptando(true);
    const fleteroData = {
      nombre: cot.nombreFletero,
      telefono: cot.telefonoFletero,
      vehiculo: cot.vehiculo,
      precio: cot.precio,
      cotizacionId: cot.id,
    };
    await fbUpdate('flocales/pedidos/' + pedido.id, {
      estado: 'confirmado',
      fleteroAceptado: fleteroData,
      aceptadoEn: Date.now(),
    });
    await fbUpdate('flocales/cotizaciones/' + cot.id, { estado: 'aceptada' });
    setAceptada(fleteroData);
    setAceptando(false);
  }

  function waLink(tel, nombre) {
    const num = tel.replace(/\D/g, '');
    const txt = encodeURIComponent(`Hola ${nombre}, soy ${pedido.nombrePersona}. Acepté tu cotización en Flete Ya para el pedido de ${pedido.tipo}. ¿Coordinamos?`);
    return `https://wa.me/${num}?text=${txt}`;
  }

  if (aceptada || pedido.estado === 'confirmado') {
    const f = aceptada || pedido.fleteroAceptado;
    return (
      <div>
        <div className="navbar">
          <button className="navbar-back" onClick={onVolver}>‹</button>
          <div className="navbar-title">Pedido confirmado</div>
        </div>
        <div className="screen">
          <div style={{ textAlign: 'center', padding: '30px 0 20px' }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🤝</div>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>¡Listo!</div>
            <div className="sm">Coordiná los detalles directamente con el fletero por WhatsApp</div>
          </div>
          <div className="card">
            <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 8 }}>{f?.nombre}</div>
            <div className="sm" style={{ marginBottom: 4 }}>{f?.vehiculo}</div>
            <div className="sm" style={{ marginBottom: 12 }}>Precio acordado: <strong style={{ color: '#185FA5' }}>${(f?.precio || 0).toLocaleString('es-AR')}</strong></div>
            <a href={waLink(f?.telefono || '', f?.nombre || '')} target="_blank" rel="noreferrer">
              <button className="btn btn-wa">💬 Hablar con {f?.nombre?.split(' ')[0]} por WhatsApp</button>
            </a>
          </div>
          <button className="btn btn-secondary" style={{ marginTop: 10 }} onClick={onVolver}>Volver a mis pedidos</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="navbar">
        <button className="navbar-back" onClick={onVolver}>‹</button>
        <div className="navbar-title">{cotizaciones.length} {cotizaciones.length === 1 ? 'cotización' : 'cotizaciones'}</div>
      </div>
      <div className="screen">
        <div className="card" style={{ marginBottom: 16, background: '#F8F7F4' }}>
          <div style={{ fontWeight: 600, fontSize: 14 }}>{pedido.tipo}</div>
          <div className="sm">{pedido.descripcion}</div>
          <div className="sm" style={{ marginTop: 4 }}>{pedido.fecha} · {pedido.hora} hs</div>
        </div>
        {cotizaciones.length === 0
          ? <div className="empty">Todavía no llegaron cotizaciones.<br/>Los fleteros de tu ciudad las verán en breve.</div>
          : cotizaciones.map(c => (
            <div key={c.id} className="cotiz-card">
              <div className="card-row" style={{ marginBottom: 8 }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{c.nombreFletero}</div>
                  <div className="sm">{c.vehiculo}</div>
                </div>
                <div className="precio">${(c.precio || 0).toLocaleString('es-AR')}</div>
              </div>
              {c.nota && <div className="sm" style={{ marginBottom: 10, fontStyle: 'italic' }}>"{c.nota}"</div>}
              <button className="btn btn-primary btn-sm" onClick={() => aceptar(c)} disabled={aceptando}>
                {aceptando ? 'Un momento...' : 'Aceptar esta cotización'}
              </button>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function Home({ uid, perfil, onLogout }) {
  const [pedidos, setPedidos] = useState([]);
  const [pantalla, setPantalla] = useState('home'); // 'home' | 'nuevo' | 'cotizaciones'
  const [pedidoSel, setPedidoSel] = useState(null);

  useEffect(() => {
    const unsub = fbListen('flocales/pedidos', arr => {
      setPedidos(arr.filter(p => p.uid === uid).sort((a, b) => b.creadoEn - a.creadoEn));
    });
    return unsub;
  }, [uid]);

  function badgeClass(estado) {
    if (estado === 'nuevo') return 'badge badge-nueva';
    if (estado === 'con-cotizaciones') return 'badge badge-cotiz';
    if (estado === 'confirmado') return 'badge badge-confirm';
    return 'badge badge-nueva';
  }
  function badgeLabel(estado) {
    if (estado === 'nuevo') return 'Sin cotizaciones aún';
    if (estado === 'con-cotizaciones') return 'Cotizaciones disponibles';
    if (estado === 'confirmado') return 'Confirmado';
    return estado;
  }

  if (pantalla === 'nuevo') return <HacerPedido perfil={perfil} uid={uid} onVolver={() => setPantalla('home')}/>;
  if (pantalla === 'cotizaciones' && pedidoSel) return (
    <VerCotizaciones pedido={pedidoSel} onVolver={() => { setPantalla('home'); setPedidoSel(null); }}/>
  );

  return (
    <div>
      <nav style={{ background: "#2C2C2A", padding: "0 14px", display: "flex", alignItems: "center", height: 52, position: "sticky", top: 0, zIndex: 100 }}>
        <FletarLogo />
        <span style={{ fontSize: 10, background: "#185FA5", color: "#fff", padding: "2px 7px", borderRadius: 5, fontWeight: 700, marginLeft: 10 }}>PERSONA</span>
        <div style={{ flex: 1 }} />
        <div style={{ width: 30, height: 30, borderRadius: "50%", background: "#185FA5", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700 }}>
          {(perfil.nombre || '?')[0].toUpperCase()}
        </div>
      </nav>
      <div style={{ padding: "12px 18px 10px", borderBottom: "1px solid #F0EEE9" }}>
        <div style={{ fontWeight: 700, fontSize: 16 }}>Hola, {perfil.nombre} 👋</div>
        <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{perfil.ciudad}</div>
      </div>
      <div className="screen">
        <button className="btn btn-primary" style={{ marginBottom: 24 }} onClick={() => setPantalla('nuevo')}>
          + Hacer pedido
        </button>
        <div className="section-title">Mis pedidos</div>
        {pedidos.length === 0
          ? <div className="empty">Todavía no publicaste ningún pedido.<br/>Presioná "Hacer pedido" para empezar.</div>
          : pedidos.map(p => (
            <div key={p.id} className="card" style={{ cursor: 'pointer' }} onClick={() => { setPedidoSel(p); setPantalla('cotizaciones'); }}>
              <div className="card-row" style={{ marginBottom: 6 }}>
                <span className={badgeClass(p.estado)}>{badgeLabel(p.estado)}</span>
                <span className="sm">{new Date(p.creadoEn).toLocaleDateString('es-AR')}</span>
              </div>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 3, color: '#1A1A1A' }}>{p.tipo} · {p.fecha} {p.hora && `· ${p.hora} hs`}</div>
              <div className="sm">{p.descripcion?.substring(0, 60)}{p.descripcion?.length > 60 ? '…' : ''}</div>
              {(p.estado === 'con-cotizaciones' || p.estado === 'confirmado') && (
                <button className="ver-cot-btn">
                  {p.estado === 'con-cotizaciones' ? 'Ver cotizaciones →' : 'Ver fletero →'}
                </button>
              )}
            </div>
          ))
        }
        <div className="divider"/>
        <div style={{ textAlign: 'center' }}>
          <button className="link-txt sm" onClick={onLogout}>Cerrar sesión</button>
          <span className="sm"> · </span>
          <button className="link-txt sm" onClick={() => window.location.href = 'index.html'}>Inicio</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('loading'); // 'loading' | 'out' | 'in'
  const [user, setUser]     = useState(null);
  const [perfil, setPerfil] = useState(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      if (u) {
        const snap = await db.ref('flocales/personas/' + u.uid).once('value');
        if (snap.val()) {
          setUser(u); setPerfil(snap.val()); setAuthState('in');
        } else {
          setAuthState('out');
        }
      } else {
        setAuthState('out');
      }
    });
    return unsub;
  }, []);

  function handleAuth(u, p) { setUser(u); setPerfil(p); setAuthState('in'); }
  function handleLogout() { auth.signOut(); setUser(null); setPerfil(null); setAuthState('out'); }

  if (authState === 'loading') return <div className="spinner">Cargando...</div>;
  if (authState === 'out')     return <AuthScreen onAuth={handleAuth}/>;
  return <Home uid={user.uid} perfil={perfil} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
