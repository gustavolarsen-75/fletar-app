        <p style="font-size:13px;color:#888;margin-bottom:28px;">${nDepositar > 0 ? 'Ingresá al depósito para descargar los paquetes retirados.' : 'No tenés entregas ni retiros para hoy'}</p>
        <button onclick="abrirDeposito()" style="background:#0F6E56;color:#fff;border:none;border-radius:14px;padding:16px 24px;font-size:17px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
          🏭 Depósito${nDepositar > 0 ? ` · ${nDepositar} para descargar` : ''}
        </button>
        <button onclick="abrirDepositoSucursal()" style="background:#7C3AED;color:#fff;border:none;border-radius:14px;padding:16px 24px;font-size:17px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
          🏢 Depósito sucursales
        </button>
        <button onclick="abrirRendirAuto()" style="background:#185FA5;color:#fff;border:none;border-radius:14px;padding:16px 24px;font-size:17px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
          💰 Rendir cobros al transportista
        </button>
        <p style="font-size:12px;color:#aaa;margin-top:12px;">Cargá paquetes para tu próxima ruta o descargá retiros</p>
        ${window._pwaInstallPrompt ? `
        <button onclick="instalarPWA()" style="background:#1A2E3B;color:#fff;border:none;border-radius:14px;padding:14px 24px;font-size:15px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px;">
          📲 Instalar app en este teléfono
        </button>` : ''}
      </div>`;
    if (rendirModalOpen) html += buildRendirModalHTML();
    app.innerHTML = html;
    return;
  }

  // Resumen
  html += `
    <div class="resumen">
      <div class="resumen-item">
        <div class="resumen-num">${retirosPendientes.length + entregas.length}</div>
        <div class="resumen-label">Pendientes</div>
      </div>
      <div class="resumen-item">
        <div class="resumen-num azul">${enCamino}</div>
        <div class="resumen-label">En camino</div>
      </div>
      <div class="resumen-item">
        <div class="resumen-num verde">${completados.length}</div>
        <div class="resumen-label">Completados</div>
      </div>
    </div>`;

  // ── 3 botones de acción principales ──────────────────────────────────────
  const _BS = 'color:#fff;border:none;border-radius:14px;padding:16px 24px;font-size:17px;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;';
  html += `
    <button onclick="abrirDeposito()" style="background:#0F6E56;${_BS}">🏭 Depósito</button>
    <button onclick="abrirDepositoSucursal()" style="background:#7C3AED;${_BS}">🏢 Depósito sucursales</button>
    <button onclick="abrirRendirAuto()" style="background:#185FA5;${_BS}">💰 Rendir cobros al transportista</button>`;

  // Botón global "Salir a ruta" cuando hay paquetes cargados esperando
  const enCargando = remitos.filter(r => r.estado === 'cargando-ruta').length;
  if (enCargando > 0) {
    html += `
      <button class="btn-ruta-global" onclick="salirARutaGlobal()">
        🚛 Salir a ruta — ${enCargando} paquete${enCargando !== 1 ? 's' : ''} cargado${enCargando !== 1 ? 's' : ''}
      </button>`;
  }

  // Botón cargar gasto — visible cuando hay viaje activo
  const tieneViajeActivo = remitos.some(r => r.viajeId && ['pendiente-retiro','retirado','en-camino','cargando-ruta'].includes(r.estado));
  if (tieneViajeActivo) {
    html += `
      <button onclick="abrirModalGasto()" style="width:100%;margin:4px 0 8px;padding:10px 14px;border-radius:10px;background:#FAEEDA;border:0.5px solid #FAC775;font-size:13px;font-weight:600;cursor:pointer;color:#633806;text-align:left;">
        🧾 + Cargar gasto del viaje
      </button>`;
  }

  // ── Sección: Retiros disponibles ───────────────────────────────────────────
  if (disponibles.length > 0) {
    const colDisp = secCollapsed.has('disponibles');
    html += `<div class="seccion">
      <div onclick="toggleSec('disponibles')" style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:#C44A0F;border-radius:10px;cursor:pointer;user-select:none;margin-bottom:${colDisp ? 0 : 8}px;">
        <span style="font-size:14px;">📬</span>
        <span style="font-size:14px;font-weight:700;color:#fff;flex:1;">Retiros disponibles</span>
        <span style="background:rgba(255,255,255,0.25);color:#fff;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;">${disponibles.length}</span>
        ${_badgeCount > 0 ? `<span style="background:#fff;color:#C44A0F;font-size:11px;font-weight:800;padding:2px 8px;border-radius:12px;">🔔 ${_badgeCount} nuevo${_badgeCount !== 1 ? 's' : ''}</span>` : ''}
        <span style="font-size:17px;color:rgba(255,255,255,0.8);margin-left:4px;">${colDisp ? '›' : '⌄'}</span>
      </div>`;
    if (!colDisp) {
      html += `<div style="font-size:12px;color:#9A3A0A;background:#FEF3EC;border-radius:8px;padding:8px 10px;margin-bottom:8px;line-height:1.4;">
        Estos paquetes esperan ser retirados del domicilio del remitente. Tomá uno para asignártelo a vos.
      </div>`;
      disponibles.forEach(r => {
        const nombre  = r.remitente?.nombre || r.envio?.descripcion || 'Paquete';
        const ciudad  = r.remitente?.ciudad || '—';
        const destino = r.destinatario?.ciudad || '';
        const kg      = parseRemitoKg(r);
        const kgTexto = kg > 0 ? kg.toLocaleString('es-AR') + ' kg' : (r.envio?.peso || '');
        const tel     = r.remitente?.telefono || '';
        const mapsUrl = r.remitente?.domicilio
          ? 'https://maps.google.com/?q=' + encodeURIComponent((r.remitente.domicilio || '') + ' ' + ciudad)
          : '';
        html += `
          <div style="background:#fff;border-radius:12px;border:1px solid #DDE3EA;border-left:4px solid #C44A0F;padding:14px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
              <span style="font-size:15px;font-weight:600;flex:1;margin-right:8px;">${nombre}</span>
              <span style="font-size:11px;background:#FEF3EC;color:#C44A0F;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap;">⏳ Sin asignar</span>
            </div>
            <div style="font-size:13px;color:#5A6A78;margin-bottom:2px;">📍 Retiro en: <strong>${ciudad}</strong></div>
            ${destino ? `<div style="font-size:12px;color:#5A6A78;margin-bottom:6px;">→ Destino: ${destino}</div>` : ''}
            ${kgTexto ? `<div style="font-size:12px;color:#5A6A78;margin-bottom:6px;">⚖️ ${kgTexto}</div>` : ''}
            <div style="display:flex;gap:8px;margin-top:4px;">
              <button onclick="tomarRetiro('${r.id}')" style="flex:1;background:#185FA5;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;">
                🙋 Tomarme este retiro
              </button>
              ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" style="background:#E6F1FB;color:#185FA5;border-radius:8px;padding:11px 13px;font-size:14px;text-decoration:none;display:flex;align-items:center;">📍</a>` : ''}
              ${tel ? `<a href="tel:${tel}" style="background:#E1F5EE;color:#0F6E56;border-radius:8px;padding:11px 13px;font-size:16px;text-decoration:none;display:flex;align-items:center;">📞</a>` : ''}
            </div>
          </div>`;
      });
    }
    html += `</div>`;
  }

  // ── Sección: Mis retiros ───────────────────────────────────────────────────
  if (retirosPendientes.length > 0) {
    const colRet = secCollapsed.has('retiros');
    html += `<div class="seccion">
      <div onclick="toggleSec('retiros')" style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:#185FA5;border-radius:10px;cursor:pointer;user-select:none;margin-bottom:${colRet ? 0 : 8}px;">
        <span style="font-size:14px;">📥</span>
        <span style="font-size:14px;font-weight:700;color:#fff;flex:1;">Mis retiros</span>
        <span style="background:rgba(255,255,255,0.25);color:#fff;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;">${retirosPendientes.length}</span>
        <span style="font-size:17px;color:rgba(255,255,255,0.8);margin-left:4px;">${colRet ? '›' : '⌄'}</span>
      </div>`;
    if (!colRet) {
      retirosPendientes.forEach((r, i) => { html += renderPaquete(r, i + 1, 'retiro'); });
    }
    html += `</div>`;
  }

  // ── Sección: A entregar ────────────────────────────────────────────────────
  if (entregas.length > 0) {
    const colEnt = secCollapsed.has('entregas');
    html += `<div class="seccion">
      <div onclick="toggleSec('entregas')" style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:#E85D20;border-radius:10px;cursor:pointer;user-select:none;margin-bottom:${colEnt ? 0 : 8}px;">
        <span style="font-size:14px;">📦</span>
        <span style="font-size:14px;font-weight:700;color:#fff;flex:1;">A entregar</span>
        <span style="background:rgba(255,255,255,0.25);color:#fff;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;">${entregas.length}</span>
        <span style="font-size:17px;color:rgba(255,255,255,0.8);margin-left:4px;">${colEnt ? '›' : '⌄'}</span>
      </div>`;
    if (!colEnt) {
      const rutasEnCamino = new Set(entregas.filter(r => r.estado === 'en-camino').map(r => r.rutaAsignada?.numero ?? '__sin__'));
      const hayRutasMezcladas = rutasEnCamino.size >= 2;
      entregas.forEach((r, i) => { html += renderPaquete(r, i + 1, 'entrega', { mostrarDevolver: hayRutasMezcladas }); });
    }
    html += `</div>`;
  }

  // ── Sección: Completados ───────────────────────────────────────────────────
  if (completados.length > 0) {
    const colComp = secCollapsed.has('completados');
    html += `<div class="seccion">
      <div onclick="toggleSec('completados')" style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:#5F5E5A;border-radius:10px;cursor:pointer;user-select:none;margin-bottom:${colComp ? 0 : 8}px;">
        <span style="font-size:14px;">✅</span>
        <span style="font-size:14px;font-weight:700;color:#fff;flex:1;">Completados</span>
        <span style="background:rgba(255,255,255,0.25);color:#fff;font-size:12px;font-weight:700;padding:2px 10px;border-radius:12px;">${completados.length}</span>
        <span style="font-size:17px;color:rgba(255,255,255,0.8);margin-left:4px;">${colComp ? '›' : '⌄'}</span>
      </div>`;
    if (!colComp) {
      completados.forEach((r, i) => { html += renderPaquete(r, i + 1, r.esRetiro ? 'retiro' : 'entrega'); });
    }
    html += `</div>`;
  }

  // Modal de confirmación
  if (modalAbierto) {
    const esRetiro = modalAbierto.tipo === 'retiro';
    const remitoModal = remitos.find(r => String(r.id) === String(modalAbierto.remitoId));
    const esFleteCobrar = !esRetiro && remitoModal?.quienPaga === 'destinatario';
    const esFleteCobrarRetiro = esRetiro && remitoModal?.quienPaga === 'remitente';
    const montoCobrar = (remitoModal?.flete || 0).toLocaleString('es-AR');
    const btnEfectivo = `border:${formaPago==='efectivo'?'2px solid #1D9E75':'1px solid #DDE3EA'};background:${formaPago==='efectivo'?'#E1F5EE':'#fff'};color:${formaPago==='efectivo'?'#0F6E56':'#5A6A78'};`;
    const btnDigital  = `border:${formaPago==='digital'?'2px solid #185FA5':'1px solid #DDE3EA'};background:${formaPago==='digital'?'#E6F1FB':'#fff'};color:${formaPago==='digital'?'#185FA5':'#5A6A78'};`;
    const selectorPago = `
      <div style="margin-top:12px;">
        <div style="font-size:12px;font-weight:600;color:#1A1A1A;margin-bottom:7px;">¿Cómo cobró?</div>
        <div style="display:flex;gap:8px;">
          <button onclick="formaPago='efectivo';render();" style="flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;${btnEfectivo}">💵 Efectivo</button>
          <button onclick="formaPago='digital';render();" style="flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;${btnDigital}">📲 MP / transf.</button>
        </div>
      </div>`;
    html += `
      <div class="modal-overlay" onclick="cerrarModal(event)">
        <div class="modal">
          <div class="modal-titulo">${esRetiro ? '📥 Confirmar retiro' : '✅ Confirmar entrega'}</div>
          ${esFleteCobrar ? `
          <div style="background:#FEF3EC;border:1.5px solid #E85D20;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
            <span style="font-size:22px;">💰</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:#C44A0F;">Flete a cobrar al destinatario</div>
              <div style="font-size:18px;font-weight:800;color:#E85D20;">$${montoCobrar}</div>
            </div>
          </div>` : ''}
          ${esFleteCobrarRetiro ? `
          <div style="background:#E6F1FB;border:1.5px solid #185FA5;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
            <span style="font-size:22px;">💰</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:#185FA5;">Flete a cobrar al remitente</div>
              <div style="font-size:18px;font-weight:800;color:#185FA5;">$${montoCobrar}</div>
            </div>
          </div>` : ''}
          <div class="modal-sub">Ingresá los datos de quien ${esRetiro ? 'entregó' : 'recibió'} el paquete</div>
          <label>Nombre completo *</label>
          <input id="inp-nombre" type="text" value="${formNombre}" placeholder="Ej: Juan García" oninput="formNombre=this.value" autocomplete="name" />
          <label>Número de DNI *</label>
          <input id="inp-dni" type="number" value="${formDni}" placeholder="Ej: 32456789" oninput="formDni=this.value" inputmode="numeric" />
          ${(esFleteCobrar || esFleteCobrarRetiro || cobrarEnRetiro) ? selectorPago : ''}
          ${esRetiro && !esFleteCobrarRetiro && remitoModal?.flete ? `
          <button onclick="cobrarEnRetiro=!cobrarEnRetiro;formaPago='';render();"
            style="width:100%;margin-top:12px;padding:11px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:${cobrarEnRetiro ? '2px solid #185FA5' : '1.5px dashed #A0ADB8'};background:${cobrarEnRetiro ? '#E6F1FB' : '#F8F9FA'};color:${cobrarEnRetiro ? '#185FA5' : '#5A6A78'};">
            ${cobrarEnRetiro ? '✓ Cobrando al remitente ($' + montoCobrar + ')' : '💰 Cobrar al remitente ahora'}
          </button>` : ''}
          <div class="modal-btns">
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-ok ${esRetiro ? 'retiro' : ''}" onclick="confirmar()">
              ${esRetiro ? 'Confirmar retiro' : 'Confirmar entrega'}
            </button>
          </div>
          ${!esRetiro ? `
          <button onclick="abrirModalSucursal('${modalAbierto.remitoId}')"
            style="width:100%;margin-top:10px;background:transparent;border:1.5px solid #8B5CF6;color:#6B21A8;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;">
            🏢 Dejé en sucursal
          </button>` : ''}
        </div>
      </div>`;
  }

  // ── Modal: autopickup paquete ajeno ────────────────────────────────────────
  if (modalAutopickup) {
    const r = modalAutopickup.remito;
    const origen  = r.remitente?.ciudad  || '—';
    const destino = r.destinatario?.ciudad || '—';
    const nombre  = r.remitente?.nombre  || r.envio?.descripcion || 'Paquete';
    const kg      = r.envio?.peso || '';
    const ubicacion = r.sucursalEntrega?.nombre || (r.estado === 'en-deposito' ? 'Depósito' : 'Sucursal');
    html += `
      <div class="modal-overlay" onclick="if(event.target===this){modalAutopickup=null;render();}">
        <div class="modal">
          <div class="modal-titulo">📦 Paquete disponible</div>
          <div class="modal-sub">Escaneaste un paquete que está en ${ubicacion}</div>
          <div style="background:#F0F4F8;border-radius:10px;padding:12px 14px;margin-bottom:16px;">
            <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${nombre}</div>
            <div style="font-size:13px;color:#5A6A78;">${origen} → ${destino}</div>
            ${kg ? `<div style="font-size:12px;color:#5A6A78;margin-top:2px;">⚖️ ${kg}</div>` : ''}
            <div style="font-size:11px;color:#185FA5;margin-top:6px;font-weight:500;">📍 Ubicación actual: ${ubicacion}</div>
          </div>
          <div style="font-size:12px;color:#5A6A78;margin-bottom:14px;">¿Cargás este paquete en tu móvil? Se va a agregar a tu manifiesto.</div>
          <div class="modal-btns">
            <button class="btn-cancelar" onclick="modalAutopickup=null;render()">Cancelar</button>
            <button class="btn-ok" onclick="confirmarAutopickup(modalAutopickup.remito)">📦 Cargar en mi móvil</button>
          </div>
        </div>
      </div>`;
  }

  // ── Modal: picker de sucursal ──────────────────────────────────────────────
  if (modalSucursalAbierto) {
    const rId = modalSucursalAbierto.remitoId;
    html += `
      <div class="modal-overlay" onclick="if(event.target===this){modalSucursalAbierto=null;render();}">
        <div class="modal">
          <div class="modal-titulo">🏢 Dejé en sucursal</div>
          <div class="modal-sub">Seleccioná en qué sucursal quedó el paquete</div>
          ${sucursales.length === 0
            ? `<div style="font-size:13px;color:#aaa;padding:12px 0 16px;text-align:center;">No hay sucursales registradas.<br><span style="font-size:11px;">La central debe crear al menos una sucursal.</span></div>`
            : sucursales.map(s => {
                const sid = s.id.replace(/'/g, "\\'");
                const snom = s.nombre.replace(/'/g, "\\'");
                return `
                <div onclick="confirmarEnSucursal('${rId}','${sid}','${snom}')"
                  style="border:1px solid #DDE3EA;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;background:#fff;active-background:#F3E8FF;">
                  <span style="font-size:20px;flex-shrink:0;">🏢</span>
                  <div>
                    <div style="font-weight:600;font-size:14px;color:#1A1A1A;">${s.nombre}</div>
                    <div style="font-size:11px;color:#5A6A78;margin-top:2px;">${(s.ciudades || []).slice(0,4).join(', ')}${(s.ciudades||[]).length > 4 ? '…' : ''}</div>
                  </div>
                </div>`;
              }).join('')
          }
          <button class="btn-cancelar" style="width:100%;margin-top:4px;" onclick="modalSucursalAbierto=null;render()">Cancelar</button>
        </div>
      </div>`;
  }

  // ── Modal: Cargar gasto ────────────────────────────────────────────────────
  if (modalGastoOpen) {
    const tiposHtml = GASTO_TIPOS.map(t => `
      <button onclick="setGastoTipo('${t}')" style="padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:${gastoTipo===t?'#FAEEDA':'#F0F4F8'};color:${gastoTipo===t?'#633806':'#5A6A78'};border:${gastoTipo===t?'1.5px solid #FAC775':'1px solid #DDE3EA'};">
        ${GASTO_ICONS[t]} ${GASTO_LABELS[t]}
      </button>`).join('');
    html += `
      <div onclick="if(event.target===this)cerrarModalGasto()" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;">
        <div style="background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;box-sizing:border-box;">
          <div style="font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:14px;">🧾 Cargar gasto del viaje</div>

          <div style="font-size:11px;font-weight:600;color:#5A6A78;margin-bottom:6px;">Tipo de gasto</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">${tiposHtml}</div>

          <div style="font-size:11px;font-weight:600;color:#5A6A78;margin-bottom:6px;">Monto ($)</div>
          <div style="position:relative;">
            <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888;font-weight:500;font-size:15px;">$</span>
            <input id="inp-gasto-monto" type="number" min="0" placeholder="0" value="${gastoMonto}"
              oninput="gastoMonto=this.value; const t=document.getElementById('gasto-total-preview'); if(t){const v=Number(this.value); t.style.display=v>0?'flex':'none'; document.getElementById('gasto-total-val').textContent='$'+v.toLocaleString('es-AR');}"
              style="width:100%;padding:10px 12px 10px 26px;border-radius:8px;border:1px solid #DDE3EA;font-size:16px;font-weight:600;box-sizing:border-box;" />
          </div>
          <div id="gasto-total-preview" style="display:${gastoMonto && Number(gastoMonto)>0?'flex':'none'};margin-top:8px;margin-bottom:4px;background:#E8F5E9;border-radius:8px;padding:9px 13px;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:#2E7D32;">Total gasto</span>
            <span id="gasto-total-val" style="font-size:18px;font-weight:700;color:#1B5E20;">${gastoMonto && Number(gastoMonto)>0 ? '$'+Number(gastoMonto).toLocaleString('es-AR') : ''}</span>
          </div>
          <div style="margin-bottom:12px;"></div>

          <div style="font-size:11px;font-weight:600;color:#5A6A78;margin-bottom:6px;">Descripción (opcional)</div>
          <input id="inp-gasto-desc" type="text" placeholder="Ej: Autopista Rosario-Córdoba" value="${gastoDesc}"
            oninput="gastoDesc=this.value"
            style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #DDE3EA;font-size:13px;box-sizing:border-box;margin-bottom:16px;" />

          <div style="display:flex;gap:8px;">
            <button onclick="cerrarModalGasto()" style="flex:1;padding:11px 0;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#F0F4F8;color:#5A6A78;border:1px solid #DDE3EA;">Cancelar</button>
            <button onclick="guardarGasto()" ${!gastoMonto || Number(gastoMonto)<=0 ? 'disabled' : ''}
              style="flex:2;padding:11px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:${!gastoMonto||Number(gastoMonto)<=0?'#C9D6E0':'#185FA5'};color:#fff;border:none;">
              Guardar gasto
            </button>
          </div>
        </div>
      </div>`;
  }

  app.innerHTML = html;

  // Focus en el primer input del modal
  if (modalAbierto) {
    const inp = document.getElementById('inp-nombre');
    if (inp) setTimeout(() => inp.focus(), 100);
  }
}

function renderPaquete(r, num, tipo, opts = {}) {
  const completado = r.estado === 'entregado' || r.estado === 'retirado' || r.estado === 'en-sucursal';
  const esRetiro = tipo === 'retiro';
  const dest = esRetiro ? r.remitente : r.destinatario;
  // Ruta siempre en dirección del paquete: remitente → destinatario
  const origen = r.remitente?.ciudad;
  const destino = r.destinatario?.ciudad;
  const ciudad = esRetiro ? r.remitente?.ciudad : r.destinatario?.ciudad;

  let estadoBadge = '';
  if (completado) {
    if (r.estado === 'en-sucursal') {
      const sNombre = r.sucursalEntrega?.nombre || 'Sucursal';
      estadoBadge = `<span class="paquete-estado" style="background:#F3E8FF;color:#6B21A8">🏢 En ${sNombre}</span>`;
    } else {
      estadoBadge = esRetiro
        ? `<span class="paquete-estado retirado-badge">✓ Retirado</span>`
        : `<span class="paquete-estado entregado-badge">✓ Entregado</span>`;
    }
  } else if (r.estado === 'cargando-ruta') {
    estadoBadge = `<span class="paquete-estado" style="background:#E6F1FB;color:#185FA5">📦 En depósito</span>`;
  } else if (r.estado === 'en-camino') {
    estadoBadge = `<span class="paquete-estado" style="background:#FFF8E1;color:#E65100">🚛 En camino</span>`;
  } else {
    estadoBadge = `<span class="paquete-estado pendiente">Pendiente</span>`;
  }

  const maps = dest?.domicilio
    ? `https://maps.google.com/?q=${encodeURIComponent((dest.domicilio || '') + ' ' + (ciudad || ''))}`
    : null;

  const tel = dest?.telefono ? `tel:${dest.telefono}` : null;

  return `
    <div class="paquete ${tipo} ${completado ? 'entregado' : ''}">
      <div class="paquete-header">
        <span class="paquete-num">${esRetiro ? 'RETIRO' : 'ENTREGA'} #${num}</span>
        <div style="display:flex;gap:5px;align-items:center;">
          ${esRetiro && r.vehiculoAsignado && r.estado === 'pendiente-retiro' ? '<span style="background:#185FA5;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;">NUEVO</span>' : ''}
          ${estadoBadge}
        </div>
      </div>
      <div class="paquete-empresa">${r.remitente?.nombre || r.envio?.descripcion || 'Paquete'}</div>
      <div class="paquete-ruta">${origen || '—'} → ${destino || '—'}</div>
      <div class="paquete-info">
        ${r.envio?.tipo ? `<span class="paquete-tag">📦 ${r.envio.tipo}</span>` : ''}
        ${r.envio?.peso ? `<span class="paquete-tag">⚖️ ${r.envio.peso}</span>` : ''}
        ${r.flete ? `<span class="paquete-tag">💰 $${r.flete.toLocaleString()}</span>` : ''}
        ${esRetiro && r.quienPaga === 'remitente' ? `<span class="paquete-tag" style="background:#E6F1FB;color:#185FA5;font-weight:700;">💳 Cobrar al retirar</span>` : ''}
        ${esRetiro && r.quienPaga === 'destinatario' ? `<span class="paquete-tag" style="background:#FFF8E1;color:#7B4500;">📦 Paga al recibir</span>` : ''}
        ${!esRetiro && r.quienPaga === 'destinatario' ? `<span class="paquete-tag" style="background:#FEF3EC;color:#C44A0F;font-weight:700;">💰 Cobrar al entregar</span>` : ''}
        ${!esRetiro && r.quienPaga === 'remitente' ? `<span class="paquete-tag" style="background:#E6F9F0;color:#0F6E56;">✓ Flete pagado</span>` : ''}
      </div>
      ${esRetiro && (r.horaRetiro || r.notaChofer) ? `
      <div style="background:#E6F1FB;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;color:#185FA5;">
        ${r.horaRetiro ? `<div>🕐 <strong>Retiro: ${r.horaRetiro} hs</strong></div>` : ''}
        ${r.notaChofer ? `<div style="margin-top:${r.horaRetiro?'4':'0'}px">📝 ${r.notaChofer}</div>` : ''}
      </div>` : ''}
      <div class="paquete-destinatario">
        <div class="paquete-destinatario-titulo">${esRetiro ? 'Retiro en' : 'Entregar a'}</div>
        <div class="paquete-destinatario-nombre">${dest?.nombre || '—'}</div>
        <div class="paquete-destinatario-dir">${dest?.domicilio || ''} ${ciudad ? '· ' + ciudad : ''}</div>
      </div>
      <div class="paquete-actions">
        ${maps ? `<a href="${maps}" target="_blank" class="btn-maps">📍 Ver en Maps</a>` : '<div style="flex:1"></div>'}
        ${tel ? `<a href="${tel}" class="btn-tel">📞</a>` : ''}
      </div>
      ${!completado && r.estado !== 'cargando-ruta' ? `
        <button class="btn-confirmar ${esRetiro ? 'retiro' : ''}" onclick="abrirModal('${r.id}','${tipo}')">
          ${esRetiro ? '📥 Confirmé el retiro' : '✅ Entregué el paquete'}
        </button>` : ''}
      ${opts.mostrarDevolver && r.estado === 'en-camino' ? `
        <button onclick="devolverADeposito('${r.id}')" style="width:100%;margin-top:6px;background:transparent;color:#888;border:1px solid #ccc;border-radius:8px;padding:9px;font-size:13px;cursor:pointer;">
          ↩ Devolver al depósito
        </button>` : ''}
      ${r.estado === 'cargando-ruta' ? `
        <div style="margin-top:8px;background:#E6F1FB;border-radius:8px;padding:8px 12px;font-size:12px;color:#185FA5;text-align:center;">
          📦 Cargado — usá el botón <strong>Salir a ruta</strong> para arrancar
        </div>` : ''}
      ${r.estado === 'entregado' && r.receptor ? `
        <div class="entregado-info">
          ✓ Recibido por <strong>${r.receptor.nombre}</strong> · DNI ${r.receptor.dni}<br>
          <span style="opacity:0.7">${r.entregadoEn || ''}</span>
        </div>` : ''}
      ${r.estado === 'retirado' && r.receptor ? `
        <div class="retirado-info">
          ✓ Entregado por <strong>${r.receptor.nombre}</strong> · DNI ${r.receptor.dni}<br>
          <span style="opacity:0.7">${r.retiradoEn || ''}</span>
        </div>` : ''}
    </div>`;
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
function abrirModalGasto() {
  modalGastoOpen = true;
  gastoTipo  = 'peaje';
  gastoMonto = '';
  gastoDesc  = '';
  render();
}
function cerrarModalGasto() {
  modalGastoOpen = false;
  render();
}
function setGastoTipo(t)  { gastoTipo  = t; render(); } // re-render necesario para actualizar botones seleccionados
function guardarGasto() {
  // Leer desde DOM para capturar el valor aunque no haya disparado oninput
  const inputMonto = document.getElementById('inp-gasto-monto');
  const inputDesc  = document.getElementById('inp-gasto-desc');
  if (inputMonto) gastoMonto = inputMonto.value;
  if (inputDesc)  gastoDesc  = inputDesc.value;
  const monto = Number(gastoMonto);
  if (!monto || monto <= 0) return;
  // Determinar viajeId activo: el más reciente con remito en estado activo
  const activos = remitos.filter(r => r.viajeId && ['pendiente-retiro','retirado','en-camino','cargando-ruta'].includes(r.estado));
  const viajeId = activos.length > 0 ? activos[activos.length - 1].viajeId : null;
  if (!viajeId) { mostrarToast('No hay viaje activo', 'error'); return; }
  db.ref('viajes/' + viajeId + '/gastos').push({
    tipo: gastoTipo,
    monto,
    desc: gastoDesc || null,
    cargadoPor: 'chofer',
    cargadoEn: new Date().toLocaleDateString('es-AR') + ' ' + new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
  });
  modalGastoOpen = false;
  mostrarToast('Gasto guardado', 'ok');
  render();
}

function abrirModal(remitoId, tipo) {
  modalAbierto = { remitoId, tipo };
  formNombre = '';
  formDni = '';
  formCobrado = false;
  formaPago = '';
  cobrarEnRetiro = false;
  render();
}

function cerrarModal(e) {
  if (e && e.target !== e.currentTarget) return;
  modalAbierto = null;
  render();
}

function confirmar() {
  if (!formNombre.trim()) { alert('Ingresá el nombre de quien recibió.'); return; }
  if (!formDni.trim()) { alert('Ingresá el DNI.'); return; }
  const remitoModal = remitos.find(r => String(r.id) === String(modalAbierto.remitoId));
  if (modalAbierto.tipo === 'retiro') {
    const esFleteCobrarRetiro = remitoModal?.quienPaga === 'remitente';
    confirmarRetiro(modalAbierto.remitoId, formNombre.trim(), formDni.trim());
    if (esFleteCobrarRetiro || cobrarEnRetiro) {
      db.ref('remitos/' + modalAbierto.remitoId).update({
        cobranzaRetiroConfirmada: formaPago !== '',
        montoCobradoRetiro: remitoModal?.flete || 0,
        formaPagoRetiro: formaPago || null,
        ...(cobrarEnRetiro ? { quienPagoCambio: 'remitente_al_retirar' } : {}),
      });
    }
  } else {
    const esFleteCobrar = remitoModal?.quienPaga === 'destinatario';
    if (esFleteCobrar && !formaPago) {
      if (!confirm('Este envío tiene flete a cobrar ($' + (remitoModal?.flete || 0).toLocaleString('es-AR') + '). ¿Confirmás que cobraste el flete?')) return;
    }
    confirmarEntrega(modalAbierto.remitoId, formNombre.trim(), formDni.trim());
    if (esFleteCobrar) {
      db.ref('remitos/' + modalAbierto.remitoId).update({
        cobranzaConfirmada: true,
        montoCobrado: remitoModal?.flete || 0,
        formaPago: formaPago || null,
      });
    }
  }
  modalAbierto = null;
  render();
}

// ─── INSTALACIÓN PWA ──────────────────────────────────────────────────────────
function instalarPWA() {
  if (!window._pwaInstallPrompt) return;
  window._pwaInstallPrompt.prompt();
  window._pwaInstallPrompt.userChoice.then(function(result) {
    if (result.outcome === 'accepted') {
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    }
    window._pwaInstallPrompt = null;
  });
}

// Cuando el prompt llega, re-renderizar para mostrar el botón
