<div id="app"></div>

<script>
// ─── PARÁMETROS DE URL + PERSISTENCIA PWA ────────────────────────────────────
const _LS_KEY = 'fletar-chofer-config';

function getParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const vehiculoId = urlParams.get('v') || null;

  if (vehiculoId) {
    // Vino desde link del transportista: guardar en localStorage para próxima apertura
    const config = {
      vehiculoId,
      vehiculoAlias: urlParams.get('alias') || '',
      transportista: urlParams.get('t') || '',
      chofer:        urlParams.get('chofer') || '',
      capacidadKg:   parseFloat(urlParams.get('kg')) || 0,
      capacidadM3:   parseFloat(urlParams.get('m3')) || 0,
    };
    try { localStorage.setItem(_LS_KEY, JSON.stringify(config)); } catch(e) {}
    return { ...config, fecha: urlParams.get('fecha') || new Date().toLocaleDateString('es-AR') };
  }

  // Sin params en URL: intentar recuperar de localStorage (apertura desde ícono PWA)
  try {
    const saved = localStorage.getItem(_LS_KEY);
    if (saved) {
      const config = JSON.parse(saved);
      return { ...config, fecha: new Date().toLocaleDateString('es-AR') };
    }
  } catch(e) {}

  // Sin nada guardado: params vacíos
  return {
    vehiculoId:    null,
    vehiculoAlias: '',
    transportista: '',
    chofer:        '',
    fecha:         new Date().toLocaleDateString('es-AR'),
    capacidadKg:   0,
    capacidadM3:   0,
  };
}

const params = getParams();

// Helpers: Firebase tiene prioridad sobre URL params (soporte link permanente)
function getAlias()  { return (vehiculoInfo && vehiculoInfo.alias)       || decodeURIComponent(params.vehiculoAlias || '') || ''; }
function getChofer() { return (vehiculoInfo && vehiculoInfo.chofer)       || params.chofer || params.transportista || 'Transportista'; }
function getCapKg()  { return (vehiculoInfo && vehiculoInfo.capacidadKg)  || params.capacidadKg || 0; }
function getCapM3()  { return (vehiculoInfo && vehiculoInfo.capacidadM3)  || params.capacidadM3 || 0; }
function getFecha()  { return params.fecha || new Date().toLocaleDateString('es-AR'); }

// ─── NOTIFICACIONES ──────────────────────────────────────────────────────────
const APP_START_TIME = Date.now();
const _sonidoChofer = new Howl({ src: ['/notif-cliente.wav'], volume: 1.0, preload: true });
let _retirosVistos = null; // null = primera carga todavía no procesada
let _badgeCount = 0;

function mostrarToastChofer(titulo, cuerpo) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:60px;left:10px;right:10px;z-index:9000;background:#1A1A1A;color:#fff;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,0.4);';
  toast.innerHTML = '<span style="font-size:22px">📥</span><div style="flex:1"><div style="font-weight:600;font-size:13px">' + titulo + '</div><div style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px">' + cuerpo + '</div></div><button onclick="this.parentNode.remove()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;padding:0;line-height:1">✕</button>';
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4500);
}

function notificarRetiroDisponible(remito) {
  _sonidoChofer.play();
  _badgeCount++;
  if ('setAppBadge' in navigator) navigator.setAppBadge(_badgeCount).catch(() => {});
  // Toast visual dentro de la app
  mostrarToastChofer('📥 Nuevo retiro disponible', remito.remitente?.nombre || 'Nuevo paquete para retirar');
  // Notificación del sistema (barra de Android)
  if ('serviceWorker' in navigator && Notification.permission === 'granted') {
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification('📥 Nuevo retiro disponible', {
        body: remito.remitente?.nombre || 'Nuevo paquete para retirar',
        icon: '/icon-chofer-192.png',
        badge: '/icon-chofer-192.png',
        silent: true,
      });
    }).catch(() => {});
  }
  render(); // actualizar header con nuevo contador
}

function pedirPermisoNotificacionesChofer() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(actualizarBannerNotif);
  }
  // Limpiar badge cuando el usuario vuelve a la app
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      _badgeCount = 0;
      if ('clearAppBadge' in navigator) navigator.clearAppBadge().catch(() => {});
    }
  });
}

function actualizarBannerNotif() {
  const bannerExistente = document.getElementById('notif-banner');
  if (bannerExistente) bannerExistente.remove();

// Rutas del transportista (cargadas desde Firebase via vehiculoInfo.transportistaId)
let rutasChofer        = [];   // Array de rutas ordenado

let asignandoRuta      = null; // remitoId del paquete al que se está asignando ruta manualmente

// ─── RUTAS DEL TRANSPORTISTA ─────────────────────────────────────────────────
// Las rutas se guardan en 'rutas/{nombre-sanitizado}' (mismo path que usa la app del transportista)
// Las ciudadesRuta se guardan en 'ciudadesRuta/{id}' (id = "trans-001")
function cargarRutasByUid(uid) {
  const nombre = vehiculoInfo?.transportistaNombre || params.transportista || '';
  const rutaKey = nombre.replace(/[.#$[\]]/g, '_');
  const rutasPath = rutaKey ? `rutas/${rutaKey}` : `transportistas/${uid}/rutas`;
  const ciudadesPath = uid ? `ciudadesRuta/${uid}` : `transportistas/${uid}/ciudadesRuta`;

  Promise.all([
    db.ref(rutasPath).get(),
    db.ref(ciudadesPath).get()
  ]).then(([rutasSnap, ciudadesSnap]) => {
    const rv = rutasSnap.val();
    if (rv) {
      const arr = Array.isArray(rv) ? rv
        : Object.entries(rv).sort((a, b) => parseInt(a[0]) - parseInt(b[0])).map(([, val]) => val);
      rutasChofer = arr.filter(r => r && r.ciudadDestino);
    }
    ciudadesRutaChofer = ciudadesSnap.val() || {};
    render();
  }).catch(() => {});
}

function intentarCargarRutas() {
  if (rutasChofer.length > 0) return; // ya cargado

  // Opción 1: transportistaId guardado en el vehiculo (nuevo)
  if (vehiculoInfo?.transportistaId) {
    cargarRutasByUid(vehiculoInfo.transportistaId);
    return;
  }

  // Opción 2: extraer transportistaId de los remitos ya cargados
  const uidDeRemito = remitos.find(r => r.transportistaId)?.transportistaId;
  if (uidDeRemito) {
    cargarRutasByUid(uidDeRemito);
    return;
  }

  // Opción 3: buscar transportista por nombre (vehículos viejos sin transportistaId)
  const nombre = vehiculoInfo?.transportistaNombre || params.transportista;
  if (nombre) {
    db.ref('transportistas').orderByChild('nombre').equalTo(nombre).limitToFirst(1).get()
      .then(snap => {
        if (!snap.exists()) return;
        const uid = Object.keys(snap.val())[0];
        cargarRutasByUid(uid);
      }).catch(() => {});
  }
}

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
function cargarRemitos() {
  // Cargar datos del vehículo desde Firebase (link permanente sin params de URL)
  if (params.vehiculoId) {
    db.ref(`vehiculos/${params.vehiculoId}`).get().then(snap => {
      const v = snap.val();
      if (!v) return;
      vehiculoInfo = v;
      render();
      intentarCargarRutas();
    }).catch(() => {});
  }

  // Cargar sucursales para el modal "Dejé en sucursal"
  db.ref('sucursales').on('value', snap => {
    const val = snap.val();
    sucursales = val ? Object.values(val) : [];
    render(); // refrescar para que el modal muestre la lista actualizada
  });

  db.ref('remitos').on('value', snap => {
    const val = snap.val();
    cargando = false;
    if (!val) { remitos = []; render(); return; }
    const todos = Object.values(val);

    // Helper: match por id O alias (fallback por si el id cambió pero el alias es el mismo)
    const matchVehiculo = v => v && (
      (params.vehiculoId && v.id == params.vehiculoId) ||
      (params.vehiculoAlias && v.alias === decodeURIComponent(params.vehiculoAlias))
    );

    remitos = todos
      .filter(r => {
        // Filtro por transportista
        // Excepción: paquetes en-sucursal pasan siempre (pueden ser de otras sucursales/transportistas)
        if (params.transportista && r.transportistaNombre !== params.transportista && r.estado !== 'en-sucursal') return false;
        if (!params.vehiculoId && !params.vehiculoAlias) return true;
        // Retiros: vehiculoAsignado para pickup (match por id O alias como fallback)
        const esRetiroVehiculo = matchVehiculo(r.vehiculoAsignado);
        // Entregas: vehiculoRuta para ruta de entrega
        const esEntregaVehiculo = matchVehiculo(r.vehiculoRuta);
        // Sistema anterior: vehiculoId directo
        const delViaje = r.vehiculoId == params.vehiculoId;
        // Tab 2 autónomo: el chofer puede ver y elegir cualquier paquete en depósito
        const esEnDeposito = r.estado === 'en-deposito';
        // Paquetes ya entregados en sucursales (visibles en sección Depósitos de sucursales)
        const esEnSucursal = r.estado === 'en-sucursal';
        // Opción B: retiros pendientes sin asignar de este transportista (visibles para tomar)
        const esDisponible = r.estado === 'pendiente-retiro' && !r.vehiculoAsignado;
        // Opción C: retirado sin vehiculoAsignado (confirmado antes del fix) — huérfano, igual hay que depositarlo
        const esRetiradoHuerfano = r.estado === 'retirado' && !r.vehiculoAsignado;
        return esRetiroVehiculo || esEntregaVehiculo || delViaje || esEnDeposito || esEnSucursal || esDisponible || esRetiradoHuerfano;
      })
      .map(r => {
        // Retiro: asignado a este vehículo para pickup.
        // Se marca esRetiro en pendiente-retiro Y en retirado para que
        // el paquete siga visible en el manifiesto y en "Para depositar".
        const esEsteVehiculo = (!params.vehiculoId && !params.vehiculoAlias) ||
          matchVehiculo(r.vehiculoAsignado) ||
          (!r.vehiculoAsignado && r.estado === 'retirado'); // huérfano: sin vehiculoAsignado
        if (esEsteVehiculo && (r.estado === 'pendiente-retiro' || r.estado === 'retirado')) {
          return { ...r, esRetiro: true };
        }
        // Entrega: asignado a este vehículo para ruta, en-camino o cargando
        if (matchVehiculo(r.vehiculoRuta) &&
            (r.estado === 'cargando-ruta' || r.estado === 'en-camino')) {
          return { ...r, esEntrega: true };
        }
        return r;
      });

    // Detectar nuevos retiros disponibles y notificar
    const disponiblesActuales = remitos.filter(r => r.estado === 'pendiente-retiro' && !r.vehiculoAsignado);
    if (_retirosVistos === null) {
      _retirosVistos = new Set(disponiblesActuales.map(r => r.id));
    } else {
      disponiblesActuales.forEach(r => {
        if (!_retirosVistos.has(r.id)) {
          _retirosVistos.add(r.id);
          notificarRetiroDisponible(r);
        }
      });
    }

    render();
    // Intentar cargar rutas si no están cargadas aún
    intentarCargarRutas();
  });
}

// ─── HELPERS CAPACIDAD ───────────────────────────────────────────────────────
// Usa pesoCobrable (del cotizador) si existe; si no, parsea el texto libre
function parseRemitoKg(r) {
  if (r.envio?.pesoCobrable) return parseFloat(r.envio.pesoCobrable) || 0;
  const peso = r.envio?.peso;
  if (typeof peso === 'number') return peso;
  const texto = String(peso ?? '0');
  const limpio = texto.replace(/\./g, '').replace(',', '.').replace(/[^\d.]/g, '');
  return parseFloat(limpio) || 0;
}

// Kg actualmente en el vehículo: retirados que NO están en aDepositar + en-camino
function kgEnVehiculo() {
  return remitos
    .filter(r => (r.estado === 'retirado' && !aDepositar.has(r.id)) || r.estado === 'en-camino')
    .reduce((sum, r) => sum + parseRemitoKg(r), 0);
}

// Kg extra que agregarían los paquetes seleccionados del depósito (Tab 2)
function kgSeleccionadosDepot() {
  return remitosEnDeposito()
    .filter(r => seleccionados.has(r.id))
    .reduce((sum, r) => sum + parseRemitoKg(r), 0);
}

// HTML: sección Depósitos de sucursales (paquetes en-sucursal agrupados por sucursal)
function renderSucDepSection() {
  const enSuc = remitos.filter(r => r.estado === 'en-sucursal');
  if (enSuc.length === 0) return `
    <div style="margin-bottom:10px;">
      <div style="font-size:13px;font-weight:700;color:#5B21B6;margin-bottom:6px;display:flex;align-items:center;gap:6px;">
        🏢 Depósitos de sucursales
        <span style="background:#E9D5FF;color:#5B21B6;font-size:11px;padding:1px 7px;border-radius:8px;font-weight:700;">0</span>
      </div>
      <div style="background:#F5F0FF;border:1px dashed #C4B5FD;border-radius:10px;padding:14px 16px;font-size:12px;color:#7C3AED;text-align:center;">
        No hay paquetes en sucursales · Usá <strong>🏢 Dejé en sucursal</strong> al confirmar una entrega
      </div>
    </div>`;

  // Agrupar por sucursalEntrega.id
  const grupos = {};
  enSuc.forEach(r => {
    const sid    = r.sucursalEntrega?.id     || 'sin-sucursal';
    const snomb  = r.sucursalEntrega?.nombre || 'Sin sucursal asignada';
    if (!grupos[sid]) grupos[sid] = { id: sid, nombre: snomb, paquetes: [] };
    grupos[sid].paquetes.push(r);
  });
  const lista = Object.values(grupos).sort((a, b) =>
    a.id === 'sin-sucursal' ? 1 : b.id === 'sin-sucursal' ? -1 : a.nombre.localeCompare(b.nombre)
  );

  let html = `<div style="margin-bottom:10px;">
    <div style="font-size:13px;font-weight:700;color:#5B21B6;margin-bottom:8px;display:flex;align-items:center;gap:6px;">
      🏢 Depósitos de sucursales
      <span style="background:#7C3AED;color:#fff;font-size:11px;padding:1px 7px;border-radius:8px;font-weight:700;">${enSuc.length}</span>
    </div>`;

  lista.forEach((g, gIdx) => {
    const c = sucDepColor(gIdx);
    const collapsed = collapsedSucDep.has(g.id);
    html += `
      <div style="border:2px solid ${c.dark};border-radius:10px;margin-bottom:8px;overflow:hidden;">
        <div style="background:${c.solid};padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;" onclick="toggleColSucDep('${g.id}')">
          <span style="flex:1;font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🏢 ${g.nombre}</span>
          <span style="background:rgba(255,255,255,0.22);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;">${g.paquetes.length} paq.</span>
          <span style="font-size:17px;color:#fff;opacity:0.85;margin-left:2px;">${collapsed ? '›' : '⌄'}</span>
        </div>`;

    if (!collapsed) {
      g.paquetes.forEach(r => {
        // Sentido ida/vuelta
        let sentido = null;
        const num = r.rutaAsignada?.numero;
        if (num) {
          const rutaMatch = rutasChofer.find((rt, i) => (rt.numero ?? i + 1) === num);
          if (rutaMatch) {
            const allStops = [rutaMatch.ciudadOrigen, ...(rutaMatch.waypoints||[]).map(w=>w.ciudad), rutaMatch.ciudadDestino]
              .map(cc => normStrC((cc||'').split(',')[0]));
            const oN = normStrC((r.remitente?.ciudad||'').split(',')[0]);
            const dN = normStrC((r.destinatario?.ciudad||'').split(',')[0]);
            const oI = allStops.findIndex(s => s === oN);
            const dI = allStops.findIndex(s => s === dN);
            if (oI !== -1 && dI !== -1) sentido = oI <= dI ? '→ Ida' : '← Vuelta';
          }
        }
        html += `
        <div style="border-top:1px solid #DDE3EA;background:#fff;padding:12px 14px;">
          <div style="display:flex;align-items:flex-start;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;">
                <span style="font-weight:600;font-size:13px;color:#1A1A1A;">${r.remitente?.ciudad||'—'} → ${r.destinatario?.ciudad||'—'}</span>
                ${sentido ? `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:${c.light};color:${c.dark};letter-spacing:.3px;">${sentido}</span>` : ''}
              </div>
              <div style="display:flex;gap:8px;font-size:11px;color:#5A6A78;flex-wrap:wrap;">
                <span>🔢 ${r.id}</span>
                ${r.destinatario?.nombre ? `<span>👤 ${r.destinatario.nombre}</span>` : ''}
                ${r.flete ? `<span style="color:#0F6E56;font-weight:500;">💵 $${r.flete.toLocaleString('es-AR')}</span>` : ''}
                ${r.entregadoEn ? `<span style="color:#aaa;">🕐 ${r.entregadoEn}</span>` : ''}
              </div>
            </div>
          </div>
        </div>`;
      });
    }

    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

function renderDepositoSucursal() {
  // ── Paquetes base ─────────────────────────────────────────────────────────
  const entregasDelViaje = remitos.filter(r =>
    !r.esRetiro && ['en-camino','entregado','en-sucursal','cargando-ruta'].includes(r.estado)
  );
  const enSuc = remitos.filter(r => r.estado === 'en-sucursal');

  // ── Ruta activa (necesaria para detectar dirección) ───────────────────────
  let ruta = rutasChofer[0]; // fallback
  if (rutasChofer.length > 1 && entregasDelViaje.length > 0) {
    const numerosRuta = entregasDelViaje
      .map(r => r.rutaAsignada?.numero)
      .filter(n => n != null);
    if (numerosRuta.length > 0) {
      const freq = {};
      numerosRuta.forEach(n => { freq[n] = (freq[n] || 0) + 1; });
      const numActivo = Number(Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0]);
      const match = rutasChofer.find((r, i) => (r.numero ?? i + 1) === numActivo);
      if (match) ruta = match;
    }
  }

  // ── Detectar ida vs vuelta por DIRECCIÓN de los paquetes ──────────────────
  // Si todos los paquetes en sucursales van hacia el origen de la ruta → vuelta
  const origenNorm = normStrC((ruta?.ciudadOrigen || '').split(',')[0]);
  const esVuelta = enSuc.length > 0 &&
    enSuc.every(r => {
      const dest = normStrC((r.rutaAsignada?.ciudadDestino || r.ciudadDestino || '').split(',')[0]);
      return dest === origenNorm;
    });
  let allStopsRaw = ruta
    ? [ruta.ciudadOrigen, ...(ruta.waypoints || []).map(w => w.ciudad), ruta.ciudadDestino].filter(Boolean)
    : [];
  if (esVuelta) allStopsRaw = [...allStopsRaw].reverse();
  const allStopsNorm = allStopsRaw.map(c => normStrC(c.split(',')[0]));

  // ── Agrupar paquetes por sucursal ─────────────────────────────────────────
  const grupos = {};
  enSuc.forEach(r => {
    const sid   = r.sucursalEntrega?.id     || 'sin-sucursal';
    const snomb = r.sucursalEntrega?.nombre || 'Sin sucursal asignada';
    if (!grupos[sid]) grupos[sid] = { id: sid, nombre: snomb, paquetes: [] };
    grupos[sid].paquetes.push(r);
  });

  // ── Construir lista: todas las sucursales de la ruta (con y sin paquetes) ─
  const sucEnRuta = sucursales
    .map(s => {
      const city = normStrC((s.ciudadPropia || s.nombre || '').split(',')[0]);
      const pos  = allStopsNorm.indexOf(city);
      return { s, pos };
    })
    .filter(({ pos }) => pos !== -1)
    .sort((a, b) => a.pos - b.pos)
    .map(({ s }) => ({
      id:       s.id,
      nombre:   s.nombre,
      paquetes: grupos[s.id]?.paquetes || []
    }));

  // Seguridad: grupos sin sucursal en ruta van al final
  Object.values(grupos).forEach(g => {
    if (!sucEnRuta.find(l => l.id === g.id))
      sucEnRuta.push({ id: g.id, nombre: g.nombre, paquetes: g.paquetes });
  });

  // ── Colores según dirección ───────────────────────────────────────────────
  const headerBg  = esVuelta ? '#7C3AED' : '#0F6E56';
  const bannerBg  = esVuelta ? '#3C3489' : '#085041';
  const confirmBg = esVuelta ? '#7C3AED' : '#0F6E56';
  const routeLabel = allStopsRaw.length >= 2
    ? `${allStopsRaw[0]} → ${allStopsRaw[allStopsRaw.length - 1]}`
    : 'Ruta activa';
  const dirLabel = esVuelta ? 'vuelta' : 'ida';

  let html = '<div class="dep-fullscreen">';

  // ── Header ────────────────────────────────────────────────────────────────
  html += `
    <div class="header" style="background:${headerBg};">
      <div class="header-top">
        <div class="header-logo">F</div>
        <div style="flex:1">
          <div class="header-title">Depósito sucursales</div>
          <div class="header-sub">Paquetes a levantar en la ${dirLabel}</div>
        </div>
        <button class="btn-deposito" onclick="vistaSucDep=false;selSucDep=new Set();render()">← Volver</button>
      </div>
    </div>`;

  // ── Banner de ruta ────────────────────────────────────────────────────────
  if (allStopsRaw.length >= 2) {
    html += `
      <div style="background:${bannerBg};padding:8px 14px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:15px;">${esVuelta ? '🔄' : '🟢'}</span>
        <span style="flex:1;color:#fff;font-size:13px;font-weight:700;">${routeLabel}</span>
        <span style="background:rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;">${enSuc.length} paquete${enSuc.length !== 1 ? 's' : ''}</span>
      </div>`;
  }

  html += `<div class="dep-body-scroll">`;

  // ── Estado vacío ──────────────────────────────────────────────────────────
  if (enSuc.length === 0) {
    html += `

        <div style="font-size:48px;margin-bottom:12px;">🏢</div>

    html += `<p style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:6px 2px 10px;font-weight:600;">Sucursales en orden de ${dirLabel}</p>`;

    sucEnRuta.forEach((g, gIdx) => {
      const hasPkgs   = g.paquetes.length > 0;
      const c         = sucDepColor(gIdx);
      const collapsed = collapsedSucDepView.has(g.id);

        html += `

            <div style="background:#F8F9FA;padding:11px 14px;display:flex;align-items:center;gap:10px;">

            <span style="flex:1;font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🏢 ${g.nombre}</span>

function renderCapacidadBar(kgOcupado, kgTotal, titulo) {
  if (kgTotal <= 0) return '';
  const sobrepasa = kgOcupado > kgTotal;
  const pct = Math.min((kgOcupado / kgTotal) * 100, 100);
  const color = sobrepasa ? '#C0392B' : pct > 70 ? '#E85D20' : '#0F6E56';
  const libre = Math.max(kgTotal - kgOcupado, 0);
  const exceso = Math.round(kgOcupado - kgTotal);
  return `
    <div class="cap-bar-card">
      <div class="cap-bar-title">⚖️ ${titulo}</div>
      <div class="cap-bar-row">
        <span style="color:#888;">Proyectado</span>
        <span style="font-weight:600;color:${color};">${Math.round(kgOcupado).toLocaleString('es-AR')} / ${kgTotal.toLocaleString('es-AR')} kg${sobrepasa ? ' ⚠️' : ''}</span>
      </div>
      <div class="cap-bar-track">
        <div class="cap-bar-fill" style="width:${pct}%;background:${color};"></div>
      </div>
      ${sobrepasa
        ? `<div style="color:#C0392B;font-weight:600;font-size:11px;margin-bottom:4px;">⚠️ Exceso: ${exceso.toLocaleString('es-AR')} kg sobre capacidad</div>
           <div style="background:#FEF3EC;color:#712B13;border-radius:6px;padding:6px 9px;font-size:11px;">Igual podés confirmar si tenés espacio extra (portaequipaje u otro).</div>`

      }

}

// ─── AGRUPACIÓN POR RUTA ─────────────────────────────────────────────────────
// ─── LOOKUP DE RUTA POR CIUDAD (mismo algoritmo que app del transportista) ────
function normStrC(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}
function encontrarRutaChofer(destino) {
  if (!destino || rutasChofer.length === 0) return null;
  // 0. Mapa guardado por el transportista (precedencia absoluta)
  if (ciudadesRutaChofer) {
    const ck = normStrC(destino.split(',')[0] || '');
    const saved = ciudadesRutaChofer[ck];
    if (saved) {
      const ruta = rutasChofer.find(r => r.id === saved.rutaId);
      const origenNorm = normStrC((ruta?.ciudadOrigen || '').split(',')[0]);
      if (ruta && ck !== origenNorm) return { ...ruta, numero: saved.rutaNumero };
    }
  }
  const partes = destino.split(',').map(s => s.trim().toLowerCase());
  const ciudadDest = normStrC(partes[0] || '');
  const provDest   = normStrC(partes[1] || '');
  const cMatch  = c => { if (!c) return false; const n = normStrC(c); return n === ciudadDest || (provDest && n === provDest); };
  const cPartial= c => { if (!c) return false; const n = normStrC(c); return ciudadDest.includes(n) || n.includes(ciudadDest); };
  // 1. Match exacto ciudad/waypoint
  for (const [i, r] of rutasChofer.entries()) {
    const num = r.numero ?? i + 1;
    if (cMatch(r.ciudadDestino)) return { ...r, numero: num };
    if ((r.paradas   || []).some(p => cMatch(p.ciudad)))   return { ...r, numero: num };
    if ((r.waypoints || []).some(w => cMatch(w.ciudad)))   return { ...r, numero: num };
  }
  // 2. Match parcial
  for (const [i, r] of rutasChofer.entries()) {
    const num = r.numero ?? i + 1;
    if (cPartial(r.ciudadDestino)) return { ...r, numero: num };
    if ((r.paradas   || []).some(p => cPartial(p.ciudad))) return { ...r, numero: num };
    if ((r.waypoints || []).some(w => cPartial(w.ciudad))) return { ...r, numero: num };
  }
  // 3. Match por provincia (campo explícito o extraída de ciudadDestino "Ciudad, Provincia")
  if (provDest) {
    const pMatch = c => { if (!c) return false; const n = normStrC(c); return n === provDest || n.includes(provDest) || provDest.includes(n); };
    const provFromCity = c => { if (!c) return ''; const p = c.split(','); return normStrC(p[1]?.trim() || ''); };
    for (const [i, r] of rutasChofer.entries()) {
      const num = r.numero ?? i + 1;
      if (pMatch(r.provinciaDestino)) return { ...r, numero: num };
      if ((r.paradas   || []).some(p => pMatch(p.provincia))) return { ...r, numero: num };
      if ((r.waypoints || []).some(w => pMatch(w.provincia))) return { ...r, numero: num };
      // Extraer provincia de ciudadDestino / paradas / waypoints si no hay campo explícito
      if (pMatch(provFromCity(r.ciudadDestino))) return { ...r, numero: num };
      if ((r.paradas   || []).some(p => pMatch(provFromCity(p.ciudad)))) return { ...r, numero: num };
      if ((r.waypoints || []).some(w => pMatch(provFromCity(w.ciudad)))) return { ...r, numero: num };
    }
  }
  return null;
}

function agruparPorRuta(lista) {
  const grupos = {};
  lista.forEach(r => {
    // Orden de precedencia:
    // 1. Usuario marcó explícitamente "sin ruta" → siempre sin ruta
    // 2. rutaAsignada con número → usar ese número
    // 3. Detectar por ciudad (solo display, no escribe a Firebase)
    let match;
    if (r.rutaAsignada?.sinRuta) {
      match = null; // forzado sin ruta por el usuario
    } else if (r.rutaAsignada?.numero != null) {
      match = r.rutaAsignada;
    } else {
      match = encontrarRutaChofer(r.destinatario?.ciudad || '');
    }
    const num     = match?.numero ?? null;
    const origen  = match?.ciudadOrigen  || null;
    const destino = match?.ciudadDestino || null;
    const key = num != null ? 'ruta-' + num : 'sin-ruta';
    if (!grupos[key]) grupos[key] = { key, num, label: num != null ? 'Ruta ' + num : 'Sin ruta', origen, destino, paquetes: [] };
    grupos[key].paquetes.push(r);
  });
  return Object.values(grupos).sort((a, b) => {
    if (a.num != null && b.num != null) return a.num - b.num;
    if (a.num != null) return -1;
    if (b.num != null) return 1;
    return 0;
  });
}

function depositarSeleccionados() {
  if (aDepositar.size === 0) {
    mostrarToast('Seleccioná al menos un paquete para depositar', 'error');
    return;
  }
  const ids = [...aDepositar];
  const updates = {};
  const ahora = new Date();
  const fechaStr = ahora.toISOString().slice(0, 10).replace(/-/g, '');
  ids.forEach(id => {
    updates['remitos/' + id + '/estado'] = 'en-deposito';
    // Safety net: asignar viajeId si el paquete no lo tiene (ej: transportista marcó retirado sin generar viaje)
    const r = remitos.find(r => String(r.id) === String(id));
    if (r && !r.viajeId && params.vehiculoId) {
      if (!activeRetiroViajeId) {
        activeRetiroViajeId = `ret-${params.vehiculoId}-${Date.now().toString(36)}`;
      }
      const vInfo = { id: params.vehiculoId, alias: vehiculoInfo?.alias || params.vehiculoAlias || '', chofer: vehiculoInfo?.chofer || '' };
      updates['remitos/' + id + '/viajeId']     = activeRetiroViajeId;
      updates['remitos/' + id + '/vehiculoRuta'] = vInfo;
      if (!r.vehiculoAsignado) updates['remitos/' + id + '/vehiculoAsignado'] = vInfo;
    }
  });
  db.ref().update(updates).then(() => {
    const n = ids.length;
    mostrarToast('✓ ' + n + ' paquete' + (n > 1 ? 's' : '') + ' depositado' + (n > 1 ? 's' : ''), 'ok');
    aDepositar = new Set();
    tabDeposito = 'cargar';
    activeRetiroViajeId = null; // Próximos retiros empiezan sesión nueva
    render();
  });
}

function getParaRendir(modo) {
  if (modo === 'ruta') {
    return remitos.filter(r =>
      r.estado === 'entregado' && r.viajeId && !r.rendicionVerificada &&
      String(r.vehiculoRuta?.id || r.vehiculoAsignado?.id) === String(params.vehiculoId)
    );
  }
  return remitos.filter(r =>
    r.estado === 'en-deposito' && !r.rendicionVerificada &&
    String(r.vehiculoAsignado?.id) === String(params.vehiculoId)
  );
}

function abrirRendirAuto() {
  if (getParaRendir('retiro').length > 0) return abrirRendirModal('retiro');
  if (getParaRendir('ruta').length   > 0) return abrirRendirModal('ruta');
  mostrarToast('No hay cobros pendientes de rendir', 'error');
}

async function abrirRendirModal(modo = 'retiro') {
  const paraRendir = getParaRendir(modo);
  if (paraRendir.length === 0) { mostrarToast('No hay paquetes para rendir', 'error'); return; }
  rendirModo = modo;
  rendirModalOpen = true;
  rendirGastos = [];
  render();
  const viajeId = (modo === 'retiro' ? activeRetiroViajeId : null) || paraRendir.find(r => r.viajeId)?.viajeId;
  if (viajeId) {
    const snap = await db.ref('viajes/' + viajeId + '/gastos').get();
    if (snap.val()) rendirGastos = Object.values(snap.val());
    render();
  }
}

function confirmarRendicion() {
  const paraRendir = getParaRendir(rendirModo);
  if (paraRendir.length === 0) return;

  let viajeId = (rendirModo === 'retiro' ? activeRetiroViajeId : null) || paraRendir.find(r => r.viajeId)?.viajeId;
  if (!viajeId) viajeId = `ret-${params.vehiculoId}-${Date.now().toString(36)}`;

  const ahora = new Date();
  const montoEfectivo = paraRendir.reduce((s, r) => s + (
    rendirModo === 'retiro'
      ? (r.formaPagoRetiro === 'efectivo' ? Number(r.montoCobradoRetiro || 0) : 0)
      : (r.formaPago === 'efectivo' ? Number(r.montoCobrado || 0) : 0)
  ), 0);
  const montoDigital  = paraRendir.reduce((s, r) => s + (
    rendirModo === 'retiro'
      ? (r.formaPagoRetiro === 'digital' ? Number(r.montoCobradoRetiro || 0) : 0)
      : (r.formaPago === 'digital' ? Number(r.montoCobrado || 0) : 0)
  ), 0);
  const totalGastos   = rendirGastos.reduce((s, g) => s + Number(g.monto || 0), 0);

  const vInfo = { id: params.vehiculoId, alias: vehiculoInfo?.alias || '', chofer: vehiculoInfo?.chofer || '' };
  const updates = {};
  paraRendir.forEach(r => {
    // En modo retiro: unificar TODOS bajo el mismo viajeId aunque ya tengan uno diferente,
    // para evitar viajes huérfanos que aparecen como cards fantasma.
    if (rendirModo === 'retiro' || !r.viajeId) {
      updates['remitos/' + r.id + '/viajeId'] = viajeId;
      updates['remitos/' + r.id + '/vehiculoRuta'] = vInfo;
    }
  });
  updates['viajes/' + viajeId + '/rendicion'] = {
    fecha: ahora.toLocaleDateString('es-AR'),
    hora:  ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
    montoEfectivo,
    montoDigital,
    totalGastos,
    gastos: rendirGastos,
    creadaPorChofer: true,
    paquetes: paraRendir.length,
  };

  db.ref().update(updates).then(() => {
    if (rendirModo === 'retiro') activeRetiroViajeId = null;
    rendirModalOpen = false;
    rendirGastos = [];
    mostrarToast('✓ Rendición enviada al transportista', 'ok');
    render();
  });
}

function salirARutaSeleccionados() {
  if (seleccionados.size === 0) return;
  const updates = {};
  seleccionados.forEach(id => { updates['remitos/' + id + '/estado'] = 'cargando-ruta'; });
  db.ref().update(updates).then(() => {
    mostrarToast('✓ ' + seleccionados.size + ' paquetes cargados — ¡Buen viaje!', 'ok');
    seleccionados = new Set();
    vistaDeposito = false;
    verManifiesto = false;
    render();
  });
}

function toggleSeleccion(id) {
  if (seleccionados.has(id)) { seleccionados.delete(id); } else { seleccionados.add(id); }
  render();
}

// Salir a ruta global: todos los cargando-ruta → en-camino de una vez
function salirARutaGlobal() {
  const paraRuta = remitos.filter(r => r.estado === 'cargando-ruta');
  if (paraRuta.length === 0) return;
  const viajeId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const updates = {};
  paraRuta.forEach(r => {
    updates['remitos/' + r.id + '/estado'] = 'en-camino';
    updates['remitos/' + r.id + '/viajeId'] = viajeId;
  });
  db.ref().update(updates).then(() => {
    const n = paraRuta.length;
    mostrarToast('¡Buen viaje! ' + n + ' paquete' + (n > 1 ? 's' : '') + ' en camino', 'ok');
    vistaDeposito = false;
    seleccionados = new Set();
    render();
  });
}

// ─── MODO VUELTA ─────────────────────────────────────────────────────────────
function renderModoVuelta(nEntregas) {
  const enDep    = remitosEnDeposito();
  const kgBase   = kgEnVehiculo();
  const kgConSel = kgBase + kgSeleccionadosDepot();

  let html = `
    <div class="header">
      <div class="header-top">
        <div class="header-logo">F</div>
        <div style="flex:1">
          <div class="header-title">Vuelta a central</div>
          <div class="header-sub">${getFecha()} · ${getChofer()}</div>
        </div>
        <button class="btn-deposito" onclick="verManifiesto=true;render()">← Manifiesto</button>
      </div>
      ${getAlias() ? `
      <div class="header-vehiculo">
        <div class="header-vehiculo-nombre">🚛 ${getAlias()}</div>
        <div class="header-vehiculo-info" style="color:#5DD9B5;">✓ ${nEntregas} entrega${nEntregas !== 1 ? 's' : ''} completada${nEntregas !== 1 ? 's' : ''}</div>
      </div>` : ''}
    </div>
    <div class="dep-body">
      <div style="background:#E1F5EE;border-left:3px solid #0F6E56;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#085041;line-height:1.5;">
        <strong>¡Ruta completada!</strong> Cargá los paquetes del depósito para el retorno a central.
      </div>`;

  html += renderCapacidadBar(kgConSel, getCapKg(), 'Carga proyectada al salir');

  html += `
      <div class="dep-scan-row">
        <div style="font-size:13px;font-weight:600;color:#1A1A1A;">
          Para cargar
          <span style="background:#185FA5;color:#fff;font-size:11px;padding:1px 7px;border-radius:8px;font-weight:700;margin-left:4px;">${enDep.length}</span>
        </div>
        <button class="dep-scan-btn" onclick="abrirScanner()">📷 Escanear QR</button>
      </div>`;

  if (enDep.length === 0) {
    html += `
      <div class="vacio">
        <div class="vacio-icon">✅</div>
        <p style="font-weight:500">Sin paquetes pendientes</p>
        <p style="font-size:12px;margin-top:4px;color:#aaa;">No hay paquetes en depósito para tu vehículo.</p>
      </div>`;
  } else {
    // Agrupar por ciudad del remitente (= sucursal de origen)
    const porCiudad = {};
    enDep.forEach(r => {
      const ciudad = r.remitente?.ciudad || 'Sin sucursal';
      if (!porCiudad[ciudad]) porCiudad[ciudad] = [];
      porCiudad[ciudad].push(r);
    });

    Object.entries(porCiudad).forEach(([ciudad, paquetes]) => {
      const nCiudad = paquetes.length;
      html += `
        <div style="display:flex;align-items:center;gap:6px;margin:14px 0 6px;padding:0 2px;">
          <span style="font-size:13px;font-weight:700;color:#185FA5;">📍 ${ciudad}</span>
          <span style="background:#185FA5;color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;">${nCiudad} paquete${nCiudad !== 1 ? 's' : ''}</span>
        </div>`;

      paquetes.forEach(r => {
        const sel     = seleccionados.has(r.id);
        const kg      = parseRemitoKg(r);
        const kgTexto = kg > 0 ? kg.toLocaleString('es-AR') + ' kg' : (r.envio?.peso || '');
        const noCabe  = !sel && getCapKg() > 0 && (kgBase + kgSeleccionadosDepot() + kg) > getCapKg();
        const onclick = noCabe
          ? "mostrarToast('Sin espacio en el vehiculo','error')"
          : "toggleSeleccion('" + r.id + "')";
        html += `
          <div class="pkg-dep ${sel ? 'seleccionado' : ''} ${noCabe ? 'no-cabe' : ''}" onclick="${onclick}">
            <div class="pkg-dep-check">${sel ? '✓' : noCabe ? '✗' : ''}</div>
            <div class="pkg-dep-info">
              <div class="pkg-dep-nombre">${r.remitente?.nombre || r.envio?.descripcion || 'Paquete'}</div>
              <div class="pkg-dep-ruta">${r.remitente?.ciudad || '—'} → ${r.destinatario?.ciudad || '—'}${kgTexto ? ' · ' + kgTexto : ''}</div>
            </div>
            <span class="pkg-dep-tag" style="background:${noCabe ? '#FDEDEC' : sel ? '#E1F5EE' : '#E6F1FB'};color:${noCabe ? '#C0392B' : sel ? '#0F6E56' : '#185FA5'};">
              ${noCabe ? '⛔ No cabe' : sel ? '✓ Cargado' : 'En depósito'}
            </span>
          </div>`;
      });
    });

    const nSel = seleccionados.size;
    html += `
      <button class="btn-dep-grande verde" ${nSel === 0 ? 'disabled' : ''} onclick="salirARutaSeleccionados()">
        🚛 Cargar ${nSel} paquete${nSel !== 1 ? 's' : ''} para vuelta
      </button>
      <div class="dep-hint">Los paquetes no seleccionados quedan en depósito</div>`;
  }

  html += `</div>`;
  if (rendirModalOpen) html += buildRendirModalHTML();
  return html;
}

function confirmarRetiro(remitoId, nombre, dni) {
  const ahora = new Date();
  const updates = {
    estado: 'retirado',
    receptor: { nombre, dni },
    retiradoEn: ahora.toLocaleDateString('es-AR') + ' ' + ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
  };
  // Registrar qué vehículo hizo el retiro (para que remitosParaDepositar() lo encuentre)
  if (params.vehiculoId) {
    const vInfo = {
      id: params.vehiculoId,
      alias: vehiculoInfo?.alias || params.alias || '',
      chofer: vehiculoInfo?.chofer || params.chofer || ''
    };
    updates.vehiculoAsignado = vInfo;
    // Asignar viajeId de sesión único para que aparezca en Rendiciones
    const remito = remitos.find(r => String(r.id) === String(remitoId));
    if (!remito?.viajeId) {
      if (!activeRetiroViajeId) {
        activeRetiroViajeId = `ret-${params.vehiculoId}-${Date.now().toString(36)}`;
      }
      updates.viajeId = activeRetiroViajeId;
      updates.vehiculoRuta = vInfo;
    }
  }
  db.ref('remitos/' + remitoId).update(updates);
}

// ─── QR SCANNER ───────────────────────────────────────────────────────────────
function abrirScanner() {
  scannerActivo = true;
  render();
  // Espera a que el DOM tenga el viewport
  setTimeout(() => {
    html5QrScanner = new Html5Qrcode("scanner-viewport");
    html5QrScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      onQrLeido,
      () => {}
    ).catch(err => {
      mostrarToast('No se pudo acceder a la cámara', 'error');
      cerrarScanner();
    });
  }, 100);
}

function cerrarScanner() {
  if (html5QrScanner) {
    html5QrScanner.stop().catch(() => {}).finally(() => {
      html5QrScanner = null;
      scannerActivo = false;
      render();
    });
  } else {
    scannerActivo = false;
    render();
  }
}

function onQrLeido(texto) {
  // Extraer remito ID del URL escaneado: ?remito=FL-XXXXXX
  let remitoId = null;
  try {
    const match = texto.match(/[?&]remito=([^&]+)/);
    if (match) remitoId = decodeURIComponent(match[1]);
  } catch(e) {}

  cerrarScanner();

  if (!remitoId) {
    mostrarToast('QR no reconocido — no es un remito Fletar', 'error');
    return;
  }

  // MODO DEPÓSITO — Tab cargar: QR selecciona/deselecciona paquete para ruta
  if (vistaDeposito && tabDeposito === 'cargar') {
    const enDep = remitosEnDeposito();
    const remito = enDep.find(r => r.id === remitoId);
    if (!remito) {
      // Puede ser paquete de otra sucursal — consultar Firebase
      db.ref('remitos/' + remitoId).once('value', snap => {
        const r = snap.val();
        if (!r) { mostrarToast('Remito ' + remitoId + ' no encontrado', 'error'); return; }
        if (r.estado === 'en-sucursal' || r.estado === 'en-deposito') {
          modalAutopickup = { remito: { ...r, id: remitoId } };
          render();
        } else {
          mostrarToast(remitoId + ' no está disponible para carga', 'error');
        }
      });
      return;
    }
    if (seleccionados.has(remitoId)) {
      seleccionados.delete(remitoId);
      mostrarToast(`${remitoId} quitado de la carga`, 'ok');
    } else {
      seleccionados.add(remitoId);
      mostrarToast(`✓ ${remitoId} agregado para ruta`, 'ok');
    }
    render();
    return;
  }

  // MODO MANIFIESTO — QR abre modal de confirmación
  const remito = remitos.find(r => r.id === remitoId);
  if (!remito) {
    // Paquete no está en este manifiesto: consultar Firebase por si es claimable
    db.ref('remitos/' + remitoId).once('value', snap => {
      const r = snap.val();
      if (!r) {
        mostrarToast('Remito ' + remitoId + ' no encontrado', 'error');
        return;
      }
      if (r.estado === 'en-sucursal' || r.estado === 'en-deposito') {
        modalAutopickup = { remito: { ...r, id: remitoId } };
        render();
      } else if (r.estado === 'cargando-ruta' || r.estado === 'en-camino') {
        mostrarToast(remitoId + ' ya está asignado a otro vehículo', 'error');
      } else if (r.estado === 'entregado' || r.estado === 'retirado') {
        mostrarToast(remitoId + ' ya fue completado ✓', 'ok');
      } else {
        mostrarToast(remitoId + ' no está disponible', 'error');
      }
    });
    return;
  }
  if (remito.estado === 'entregado' || remito.estado === 'retirado') {
    mostrarToast(`${remitoId} ya fue ${remito.estado === 'entregado' ? 'entregado' : 'retirado'} ✓`, 'ok');
    return;
  }
  if (remito.estado === 'en-deposito' || remito.estado === 'cargando-ruta') {
    mostrarToast(`${remitoId} está en depósito — cargalo desde la sección Depósito primero`, 'error');
    return;
  }
  if (remito.estado !== 'en-camino' && remito.estado !== 'pendiente-retiro') {
    mostrarToast(`${remitoId} no está listo para operar (estado: ${remito.estado})`, 'error');
    return;
  }
  // pendiente-retiro = el chofer va a buscar al remitente → siempre "retiro"
  // en-camino con esRetiro = retiro en ciudad; sin esRetiro = entrega al destinatario
  const tipo = (remito.estado === 'pendiente-retiro' || remito.esRetiro) ? 'retiro' : 'entrega';
  abrirModal(remitoId, tipo);
}

function mostrarToast(msg, tipo) {
  const t = document.createElement('div');
  t.className = `toast ${tipo}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─── DEPÓSITO HELPERS ────────────────────────────────────────────────────────
function remitosParaDepositar() {
  // Mis retiros que aún no fueron depositados
  // Si no hay vehiculoId en URL, mostrar todos los retirados del transportista
  if (!params.vehiculoId) return remitos.filter(r => r.estado === 'retirado');
  return remitos.filter(r => r.esRetiro && r.estado === 'retirado');
}

function remitosEnDeposito() {
  // Paquetes en depósito asignados a este vehículo (para pickup ad-hoc vía QR)
  return remitos.filter(r =>
    r.estado === 'en-deposito' && (
      !params.vehiculoId ||
      (r.vehiculoAsignado && r.vehiculoAsignado.id == params.vehiculoId) ||
      (r.vehiculoRuta     && r.vehiculoRuta.id     == params.vehiculoId)
    )
  );
}

function remitosPreAsignados() {
  // Paquetes ya confirmados para este vehículo (cargando-ruta)
  return remitos.filter(r =>
    r.estado === 'cargando-ruta' && (
      !params.vehiculoId ||
      (r.vehiculoRuta && r.vehiculoRuta.id == params.vehiculoId)
    )
  );
}

function remitosEnDepositoLibres() {
  // Todos los paquetes en depósito de este transportista (sin filtro de vehículo)
  // Para que el chofer elija autónomamente cuáles cargar
  return remitos.filter(r => r.estado === 'en-deposito');
}

function remitosDisponibles() {
  // Paquetes pendiente-retiro sin vehículo asignado — disponibles para que cualquier chofer los tome
  return remitos.filter(r => r.estado === 'pendiente-retiro' && !r.vehiculoAsignado);
}

function tomarRetiro(id) {
  if (!params.vehiculoId) { mostrarToast('Sin vehículo asignado en el link', 'error'); return; }
  db.ref().update({
    [`remitos/${id}/vehiculoAsignado`]: {
      id:      params.vehiculoId,
      alias:   getAlias() || null,
      patente: (vehiculoInfo && vehiculoInfo.patente) || null,
      chofer:  getChofer() !== 'Transportista' ? getChofer() : null,
    }
  }).then(() => {
    mostrarToast('✓ Retiro asignado a tu vehículo', 'ok');
  }).catch(() => {
    mostrarToast('Error al asignar retiro', 'error');
  });
}

function confirmarCargaChofer() {
  if (seleccionados.size === 0) return;
  if (!params.vehiculoId) { mostrarToast('Sin vehículo asignado en el link', 'error'); return; }

  // Verificar sobrecarga
  const libresAll = remitosEnDepositoLibres();
  const kgSel = Array.from(seleccionados).reduce((sum, id) => {
    const r = libresAll.find(x => x.id === id);
    return sum + (r ? parseRemitoKg(r) : 0);
  }, 0);
  const kgBase = kgEnVehiculo();
  const kgMax  = getCapKg();
  if (kgMax > 0 && (kgBase + kgSel) > kgMax) {
    const totalStr = Math.round(kgBase + kgSel).toLocaleString('es-AR');
    const maxStr   = Math.round(kgMax).toLocaleString('es-AR');
    const ok = window.confirm(`La carga seleccionada (${totalStr} kg) supera la capacidad del vehículo (${maxStr} kg).\n¿Confirmar igual? (portaequipaje u otro espacio)`);
    if (!ok) return;
  }

  const alias  = getAlias();
  const chofer = getChofer();
  const updates = {};
  seleccionados.forEach(id => {
    updates[`remitos/${id}/estado`]      = 'cargando-ruta';
    updates[`remitos/${id}/vehiculoRuta`] = {
      id:     params.vehiculoId,
      alias:  alias || null,
      patente: (vehiculoInfo && vehiculoInfo.patente) || null,
      chofer: chofer !== 'Transportista' ? chofer : null,
    };
  });
  db.ref().update(updates).then(() => {
    mostrarToast(`✓ ${seleccionados.size} paquete${seleccionados.size !== 1 ? 's' : ''} confirmado${seleccionados.size !== 1 ? 's' : ''} para ruta`, 'ok');
    seleccionados = new Set();
    render();
  }).catch(e => {
    mostrarToast('Error al confirmar carga', 'error');
  });
}

function rendirSeleccionarGasto(tipo) {
  rendirGastoTipoActivo = rendirGastoTipoActivo === tipo ? null : tipo;
  rendirGastoMontoStr = '';
  render();
  if (rendirGastoTipoActivo) setTimeout(() => document.getElementById('rendir-gasto-input')?.focus(), 30);
}

function rendirConfirmarGasto() {
  const monto = parseFloat(rendirGastoMontoStr);
  if (!monto || isNaN(monto) || monto <= 0) return;
  rendirGastos.push({ tipo: rendirGastoTipoActivo, monto });
  rendirGastoTipoActivo = null;
  rendirGastoMontoStr = '';
  render();
}

function buildRendirModalHTML() {
  const paraRendir = getParaRendir(rendirModo);
  const mEf  = paraRendir.reduce((s, r) => s + (
    rendirModo === 'retiro'
      ? (r.formaPagoRetiro === 'efectivo' ? Number(r.montoCobradoRetiro || 0) : 0)
      : (r.formaPago === 'efectivo' ? Number(r.montoCobrado || 0) : 0)
  ), 0);
  const mDig = paraRendir.reduce((s, r) => s + (
    rendirModo === 'retiro'
      ? (r.formaPagoRetiro === 'digital' ? Number(r.montoCobradoRetiro || 0) : 0)
      : (r.formaPago === 'digital' ? Number(r.montoCobrado || 0) : 0)
  ), 0);
  const mGas = rendirGastos.reduce((s, g) => s + Number(g.monto || 0), 0);
  const neto = mEf + mDig - mGas;
  const tipoLabel = rendirModo === 'ruta' ? '🚛 Ruta' : '🏙 Ciudad';

  const gastosListHTML = rendirGastos.map((g, i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid #EEF1F4;">
      <span style="font-size:13px;color:#1A1A1A;">${GASTO_ICONS[g.tipo] || '🧾'} ${GASTO_LABELS[g.tipo] || g.tipo}</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:14px;font-weight:600;color:#A32D2D;">-$${Number(g.monto).toLocaleString('es-AR')}</span>
        <button onclick="rendirGastos.splice(${i},1);render()" style="background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;padding:0;line-height:1;">✕</button>
      </span>
    </div>`).join('');

  const tiposBtnsHTML = GASTO_TIPOS.map(t => {
    const activo = rendirGastoTipoActivo === t;
    return `<button onclick="rendirSeleccionarGasto('${t}')" style="background:${activo ? '#E1F5EE' : '#F0F4F8'};border:${activo ? '1.5px solid #0F6E56' : '1px solid #DDE3EA'};border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer;color:${activo ? '#085041' : '#1A1A1A'};white-space:nowrap;">${GASTO_ICONS[t]} ${GASTO_LABELS[t]}</button>`;
  }).join('');

  const inputGastoHTML = rendirGastoTipoActivo ? `
    <div style="background:#E1F5EE;border-radius:10px;padding:10px 12px;border:1px solid #9FE1CB;margin-top:10px;">
      <div style="font-size:12px;font-weight:700;color:#085041;margin-bottom:8px;">${GASTO_ICONS[rendirGastoTipoActivo]} ${GASTO_LABELS[rendirGastoTipoActivo]}</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="position:relative;flex:1;">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:#5A6A78;pointer-events:none;">$</span>
          <input id="rendir-gasto-input" type="number" inputmode="numeric"
            value="${rendirGastoMontoStr}"
            oninput="rendirGastoMontoStr=this.value"
            onkeydown="if(event.key==='Enter'){rendirConfirmarGasto();}"
            placeholder="0"
            style="width:100%;padding:11px 11px 11px 26px;border-radius:9px;border:1.5px solid #9FE1CB;font-size:16px;box-sizing:border-box;-webkit-appearance:none;background:#fff;"
            autofocus />
        </div>
        <button onclick="rendirConfirmarGasto()" style="background:#0F6E56;color:#fff;border:none;border-radius:9px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;">+ Agregar</button>
      </div>
    </div>` : '';

  return `
  <div onclick="if(event.target===this){rendirModalOpen=false;render();}" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;">
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;box-sizing:border-box;max-height:92vh;overflow-y:auto;">
      <div style="width:40px;height:4px;background:#DDE3EA;border-radius:2px;margin:0 auto 18px;"></div>
      <div style="font-size:17px;font-weight:700;color:#1A1A1A;margin-bottom:2px;">💰 Rendir turno</div>
      <div style="font-size:12px;color:#888;margin-bottom:18px;">${tipoLabel} · ${paraRendir.length} paquete${paraRendir.length !== 1 ? 's' : ''} · ${getChofer()}</div>

      <!-- Cobros -->
      <div style="background:#F0F4F8;border-radius:12px;padding:16px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
          <span style="font-size:13px;color:#5A6A78;">💵 Efectivo cobrado</span>
          <span style="font-size:15px;font-weight:700;color:#1A1A1A;">$${mEf.toLocaleString('es-AR')}</span>
        </div>
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:13px;color:#5A6A78;">📲 MP / transferencia</span>
          <span style="font-size:15px;font-weight:700;color:#1A1A1A;">$${mDig.toLocaleString('es-AR')}</span>
        </div>
      </div>

      <!-- Gastos -->
      <div style="margin-bottom:14px;">
        <div style="font-size:12px;font-weight:700;color:#5A6A78;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Gastos del turno</div>
        ${rendirGastos.length > 0 ? `<div style="margin-bottom:10px;">${gastosListHTML}</div>` : ''}
        <div style="display:flex;flex-wrap:wrap;gap:6px;">${tiposBtnsHTML}</div>
        ${inputGastoHTML}
      </div>

      <!-- Resumen neto -->
      <div style="background:#F0F4F8;border-radius:12px;padding:14px;margin-bottom:16px;">
        ${mGas > 0 ? `
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;color:#5A6A78;">Total gastos</span>
          <span style="font-size:14px;font-weight:600;color:#C44A0F;">-$${mGas.toLocaleString('es-AR')}</span>
        </div>` : ''}
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:14px;font-weight:700;color:#1A1A1A;">Neto a entregar</span>
          <span style="font-size:24px;font-weight:800;color:#0F6E56;">$${neto.toLocaleString('es-AR')}</span>
        </div>
      </div>

      <button onclick="confirmarRendicion()" style="width:100%;background:#0F6E56;color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;">
        ✓ Enviar rendición al transportista
      </button>
      <button onclick="rendirModalOpen=false;rendirGastoTipoActivo=null;rendirGastoMontoStr='';render()" style="width:100%;background:#F0F4F8;color:#5A6A78;border:1px solid #DDE3EA;border-radius:12px;padding:12px;font-size:14px;cursor:pointer;">
        Cancelar
      </button>
    </div>
  </div>`;
}

function renderDeposito() {
  const paraDepositar = remitosParaDepositar();
  const enDep         = remitosEnDeposito();
  const yaDepositados = remitos.filter(r =>
    r.estado === 'en-deposito' &&
    r.vehiculoAsignado && String(r.vehiculoAsignado.id) === String(params.vehiculoId)
  ).length;

  let html = '<div class="dep-fullscreen">';

  // Header depósito (dentro del fullscreen — no es sticky, siempre arriba)
  html += `
    <div class="header">
      <div class="header-top">
        <div class="header-logo">F</div>
        <div style="flex:1">
          <div class="header-title">Depósito · ${getChofer()}</div>
          <div class="header-sub">${getFecha()}${getAlias() ? ' · ' + getAlias() : ''}</div>
        </div>
        <button class="btn-deposito" onclick="vistaDeposito=false;aDepositar=new Set();render()">← Volver</button>
      </div>
      <div class="dep-tab-bar">
        <button class="dep-tab ${tabDeposito==='depositar' ? 'active' : (yaDepositados > 0 ? 'done' : '')}"
          onclick="tabDeposito='depositar';document.querySelector('.dep-body-scroll').scrollTop=0;render()">
          ${yaDepositados > 0 ? '✓ ' + yaDepositados + ' depositados' : '📦 Descargar en depósito'}
        </button>
        <button class="dep-tab ${tabDeposito==='cargar' ? 'active' : ''}"
          onclick="tabDeposito='cargar';seleccionados=new Set();document.querySelector('.dep-body-scroll').scrollTop=0;render()">
          🚛 Cargar para ruta
        </button>
      </div>
    </div>`;

  html += `<div class="dep-body-scroll">`;

  if (tabDeposito === 'depositar') {
    // ── TAB 1: Depositar — agrupado por ruta ──────────────────────────────────
    if (paraDepositar.length === 0) {
      html += `
        <div class="dep-nota azul">✓ Todos tus retiros ya fueron depositados. Pasá a la pestaña "Cargar para ruta".</div>
        <button class="btn-dep-grande verde" onclick="tabDeposito='cargar';render();document.querySelector('.dep-body-scroll')?.scrollTo(0,0)">
          🚛 Ver paquetes disponibles para ruta →
        </button>`;
    } else {
      const nADepositar = aDepositar.size;
      html += `<div class="dep-nota naranja">📋 Marcá los paquetes que dejás en depósito. Los desmarcados quedan en tu móvil.</div>`;
      html += renderCapacidadBar(kgEnVehiculo(), getCapKg(), 'Carga restante en móvil al depositar');

      const grupos = agruparPorRuta(paraDepositar);
      grupos.forEach(g => {
        const collapsed   = collapsedDep.has(g.key);
        const ids         = g.paquetes.map(r => r.id);
        const todosMarcados = ids.every(id => aDepositar.has(id));
        const algunoMarcado = ids.some(id => aDepositar.has(id));
        const nMarcados   = ids.filter(id => aDepositar.has(id)).length;
        const cDep = g.num != null ? RUTA_COLORS_C[(g.num - 1) % RUTA_COLORS_C.length] : RUTA_COLOR_SIN_C;

        html += `<div class="ruta-dep-card" style="border:2px solid ${cDep.dark};">`;
        // Cabecera de la card — fondo sólido por ruta
        const isSinRutaDep = g.num == null;
        const tituloRutaDep = g.origen && g.destino ? `${g.origen} → ${g.destino}` : (isSinRutaDep ? 'Sin ruta asignada' : null);
        html += `
          <div class="ruta-dep-header" style="background:${cDep.solid};" onclick="toggleColDep('${g.key}')">
            <span style="flex:1;font-size:15px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              ${g.label}${tituloRutaDep ? `<span style="font-weight:400;font-size:13px;margin-left:8px;opacity:0.82">${tituloRutaDep}</span>` : ''}
            </span>
            <span style="background:rgba(255,255,255,0.22);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;">${g.paquetes.length} paq.</span>
            <span style="font-size:17px;color:#fff;opacity:0.85;margin-left:2px;">${collapsed ? '›' : '⌄'}</span>
          </div>`;

        if (!collapsed) {
          // Fila "Depositar todos de Ruta X"
          html += `
            <div class="ruta-dep-todos" onclick="toggleTodosDep('${g.key}')">
              <div class="${todosMarcados ? 'ruta-dep-todos-check' : 'ruta-dep-todos-off'}">${todosMarcados ? '✓' : algunoMarcado ? '–' : ''}</div>
              <span style="font-size:13px;color:#1A1A1A;">Depositar todos de ${g.label}</span>
            </div>`;

          // Paquetes individuales
          g.paquetes.forEach(r => {
            const sel       = aDepositar.has(r.id);
            const kg        = parseRemitoKg(r);
            const kgTexto   = kg > 0 ? kg.toLocaleString('es-AR') + ' kg' : (r.envio?.peso || '');
            const mostrando = asignandoRuta === r.id;
            const esSinRutaDep = g.num == null;
            html += `
              <div>
                <div class="pkg-dep ${sel ? 'seleccionado' : ''}" onclick="toggleDepositar('${r.id}')">
                  <div class="pkg-dep-check">${sel ? '✓' : ''}</div>
                  <div class="pkg-dep-info">
                    <div class="pkg-dep-nombre">${r.remitente?.nombre || r.envio?.descripcion || 'Paquete'}</div>
                    <div class="pkg-dep-ruta">${r.remitente?.ciudad || '—'} → ${r.destinatario?.ciudad || '—'}${kgTexto ? ' · ' + kgTexto : ''}</div>
                  </div>
                  <button onclick="event.stopPropagation();toggleSelectorRuta('${r.id}')" style="flex-shrink:0;background:${mostrando ? '#E3F2FD' : '#F0F4F8'};color:${mostrando ? '#185FA5' : '#5A6A78'};border:1px solid ${mostrando ? '#B3D4F5' : '#DDE3EA'};border-radius:8px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;margin-right:6px;">${esSinRutaDep ? '📍 Ruta' : '✎ Ruta'}</button>
                  <span class="pkg-dep-tag" style="background:${sel ? '#FEF3EC' : '#E6F1FB'};color:${sel ? '#C44A0F' : '#185FA5'};">
                    ${sel ? '🏭 Depositar' : 'En móvil'}
                  </span>
                </div>
                ${mostrando ? `
                <div style="padding:0 12px 12px 12px;background:#F8FBFF;border-top:1px solid #E3F2FD;">
                  <div style="font-size:11px;color:#5A6A78;margin-bottom:8px;padding-top:8px;">${esSinRutaDep ? 'Asignar a ruta:' : 'Cambiar a:'}</div>
                  ${rutasChofer.length === 0 ? `<div style="font-size:12px;color:#aaa;padding:8px 0;">No hay rutas cargadas. Pedile al transportista que abra su app.</div>` :
                    rutasChofer.map((rt, i) => {
                      const num = rt.numero ?? i + 1;
                      const c = RUTA_COLORS_C[(num - 1) % RUTA_COLORS_C.length];
                      const esActual = !esSinRutaDep && r.rutaAsignada?.numero === num;
                      return `<button onclick="event.stopPropagation();guardarRutaManual('${r.id}',${num},'${rt.id || ''}','${(rt.ciudadOrigen||'').replace(/'/g,"\\'")}','${(rt.ciudadDestino||'').replace(/'/g,"\\'")}');toggleSelectorRuta('${r.id}')" style="display:block;width:100%;text-align:left;margin-bottom:6px;background:${esActual ? c.light : '#fff'};border:2px solid ${c.dark};border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:${c.dark};">
                        ${esActual ? '✓ ' : ''}Ruta ${num}${rt.ciudadOrigen && rt.ciudadDestino ? ` · ${rt.ciudadOrigen} → ${rt.ciudadDestino}` : ''}
                      </button>`;
                    }).join('')
                  }
                  ${!esSinRutaDep ? `<button onclick="event.stopPropagation();limpiarRutaChofer('${r.id}')" style="display:block;width:100%;text-align:left;margin-top:4px;background:#FFF0F0;border:1px solid #F5C1C1;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;color:#C44A0F;">✕ Sin ruta (desasignar)</button>` : ''}
                </div>` : ''}
              </div>`;
          });
        }

        html += `</div>`; // fin ruta-dep-card
      });

      html += `
        <button class="btn-dep-grande azul" ${nADepositar === 0 ? 'disabled' : ''} onclick="depositarSeleccionados()">
          🏭 Depositar ${nADepositar || ''} paquete${nADepositar !== 1 ? 's' : ''} seleccionado${nADepositar !== 1 ? 's' : ''}
        </button>
        <div class="dep-hint">Los paquetes desmarcados quedan en el móvil</div>`;
    }

  } else {
    // ── TAB 2: Cargar para ruta — el chofer elige autónomamente ──────────────
    const libres   = remitosEnDepositoLibres();   // en-deposito (seleccionables)
    const preAsig  = remitosPreAsignados();        // cargando-ruta ya confirmados
    const kgSel    = Array.from(seleccionados).reduce((sum, id) => {
      const r = libres.find(x => x.id === id);
      return sum + (r ? parseRemitoKg(r) : 0);
    }, 0);
    const kgBase   = kgEnVehiculo();
    const kgTotal  = kgBase + kgSel;

    if (libres.length === 0 && preAsig.length === 0) {
      html += `<div class="vacio"><div class="vacio-icon">📦</div><p style="font-weight:500">No hay paquetes en depósito</p><p style="font-size:12px;margin-top:4px;color:#aaa;">Cuando haya paquetes disponibles aparecerán acá.</p></div>`;
    } else {
      if (libres.length > 0) {
        html += `<div class="dep-nota naranja">📋 Seleccioná los paquetes que vas a cargar en tu móvil.</div>`;
        html += renderCapacidadBar(kgTotal, getCapKg(), 'Carga proyectada');

        const nSel = seleccionados.size;
        const grupos = agruparPorRuta(libres);
        grupos.forEach(g => {
          const collapsed     = collapsedCar.has(g.key);
          const ids           = g.paquetes.map(r => r.id);
          const todosMarcados = ids.every(id => seleccionados.has(id));
          const algunoMarcado = ids.some(id => seleccionados.has(id));
          const tituloRutaCar = g.origen && g.destino ? `${g.origen} → ${g.destino}` : (g.num == null ? 'Sin ruta asignada' : null);
          const cCar = g.num != null ? RUTA_COLORS_C[(g.num - 1) % RUTA_COLORS_C.length] : RUTA_COLOR_SIN_C;

          // Badge sentido ida/vuelta
          let sentidoBadge = null;
          if (g.num != null && g.paquetes.length > 0) {
            const rutaMatch = rutasChofer.find((r, i) => (r.numero ?? i + 1) === g.num);
            if (rutaMatch) {
              const allStops = [rutaMatch.ciudadOrigen, ...(rutaMatch.waypoints||[]).map(w=>w.ciudad), rutaMatch.ciudadDestino]
                .map(c => normStrC((c||'').split(',')[0]));
              const r0 = g.paquetes[0];
              const origNorm = normStrC((r0.remitente?.ciudad||'').split(',')[0]);
              const destNorm = normStrC((r0.destinatario?.ciudad||'').split(',')[0]);
              const origIdx = allStops.findIndex(s => s === origNorm);
              const destIdx = allStops.findIndex(s => s === destNorm);
              if (origIdx !== -1 && destIdx !== -1) {
                sentidoBadge = origIdx <= destIdx ? '→ Ida' : '← Vuelta';
              }
            }
          }

          html += `<div class="ruta-dep-card" style="border:2px solid ${cCar.dark};">`;
          html += `
            <div class="ruta-dep-header" style="background:${cCar.solid};" onclick="toggleColCar('${g.key}')">
              <span style="flex:1;font-size:15px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                ${g.label}${tituloRutaCar ? `<span style="font-weight:400;font-size:13px;margin-left:8px;opacity:0.82">${tituloRutaCar}</span>` : ''}
              </span>
              ${sentidoBadge ? `<span style="background:rgba(255,255,255,0.22);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;letter-spacing:.3px;">${sentidoBadge}</span>` : ''}
              <span style="background:rgba(255,255,255,0.22);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;">${g.paquetes.length} paq.</span>
              <span style="font-size:17px;color:#fff;opacity:0.85;margin-left:2px;">${collapsed ? '›' : '⌄'}</span>
            </div>`;

          if (!collapsed) {
            // Fila "Seleccionar todos de Ruta X"
            html += `
              <div class="ruta-dep-todos" onclick="toggleTodosCargar('${g.key}')">
                <div class="${todosMarcados ? 'ruta-dep-todos-check' : 'ruta-dep-todos-off'}">${todosMarcados ? '✓' : algunoMarcado ? '–' : ''}</div>
                <span style="font-size:13px;color:#1A1A1A;">Cargar todos de ${g.label}</span>
              </div>`;

            g.paquetes.forEach(r => {
              const sel     = seleccionados.has(r.id);
              const kg      = parseRemitoKg(r);
              const kgTexto = kg > 0 ? kg.toLocaleString('es-AR') + ' kg' : (r.envio?.peso || '');
              const bultos  = r.envio?.bultos;
              const esSinRuta = g.num == null;
              const mostrando = asignandoRuta === r.id;
              html += `
                <div style="border-top:1px solid #DDE3EA;background:${sel ? '#FAFFFE' : '#fff'};border-left:${sel ? '3px solid #0F6E56' : '3px solid transparent'};">
                  <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;cursor:pointer;" onclick="toggleSeleccionCargar('${r.id}')">
                    <div style="width:22px;height:22px;border-radius:5px;flex-shrink:0;margin-top:2px;border:2px solid ${sel ? '#0F6E56' : '#DDE3EA'};background:${sel ? '#0F6E56' : '#fff'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;">${sel ? '✓' : ''}</div>
                    <div style="flex:1;min-width:0;">
                      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;">
                        <span style="font-weight:600;font-size:13px;color:#1A1A1A;">${r.remitente?.ciudad || '—'} → ${r.destinatario?.ciudad || '—'}</span>
                        <span style="font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;background:#FFF8E1;color:#F57F17;">En depósito</span>
                      </div>
                      <div style="display:flex;gap:8px;font-size:11px;color:#5A6A78;flex-wrap:wrap;">
                        <span>🔢 ${r.id}</span>
                        ${r.destinatario?.nombre ? `<span>👤 ${r.destinatario.nombre}</span>` : ''}
                        ${r.flete ? `<span style="color:#0F6E56;font-weight:500;">💵 $${r.flete.toLocaleString('es-AR')}</span>` : ''}
                        ${kgTexto ? `<span>⚖️ ${kgTexto}</span>` : ''}
                        ${bultos ? `<span style="font-weight:${bultos > 1 ? 700 : 400};color:${bultos > 1 ? '#C44A0F' : '#5A6A78'};">📦 ${bultos} bulto${bultos !== 1 ? 's' : ''}</span>` : ''}
                      </div>
                    </div>
                    <button onclick="event.stopPropagation();toggleSelectorRuta('${r.id}')" style="flex-shrink:0;background:${mostrando ? '#E3F2FD' : '#F0F4F8'};color:${mostrando ? '#185FA5' : '#5A6A78'};border:1px solid ${mostrando ? '#B3D4F5' : '#DDE3EA'};border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;">${esSinRuta ? '📍 Ruta' : '✎ Ruta'}</button>
                  </div>
                  ${mostrando ? `
                  <div style="padding:0 12px 12px 12px;background:#F8FBFF;border-top:1px solid #E3F2FD;">
                    <div style="font-size:11px;color:#5A6A78;margin-bottom:8px;padding-top:8px;">${esSinRuta ? 'Asignar a ruta:' : 'Cambiar a:'}</div>
                    ${rutasChofer.length === 0 ? `<div style="font-size:12px;color:#aaa;padding:8px 0;">No hay rutas cargadas. Pedile al transportista que abra su app.</div>` :
                      rutasChofer.map((rt, i) => {
                        const num = rt.numero ?? i + 1;
                        const c = RUTA_COLORS_C[(num - 1) % RUTA_COLORS_C.length];
                        const esActual = !esSinRuta && r.rutaAsignada?.numero === num;
                        return `<button onclick="event.stopPropagation();guardarRutaManual('${r.id}',${num},'${rt.id || ''}','${(rt.ciudadOrigen||'').replace(/'/g,"\\'")}','${(rt.ciudadDestino||'').replace(/'/g,"\\'")}');toggleSelectorRuta('${r.id}')" style="display:block;width:100%;text-align:left;margin-bottom:6px;background:${esActual ? c.light : '#fff'};border:2px solid ${c.dark};border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:${c.dark};">
                          ${esActual ? '✓ ' : ''}Ruta ${num}${rt.ciudadOrigen && rt.ciudadDestino ? ` · ${rt.ciudadOrigen} → ${rt.ciudadDestino}` : ''}
                        </button>`;
                      }).join('')
                    }
                    ${!esSinRuta ? `<button onclick="event.stopPropagation();limpiarRutaChofer('${r.id}')" style="display:block;width:100%;text-align:left;margin-top:4px;background:#FFF0F0;border:1px solid #F5C1C1;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;color:#C44A0F;">✕ Sin ruta (desasignar)</button>` : ''}
                  </div>` : ''}
                </div>`;
            });
          }
          html += `</div>`; // fin ruta-dep-card
        });

        html += `
          <button class="btn-dep-grande azul" ${seleccionados.size === 0 ? 'disabled' : ''} onclick="confirmarCargaChofer()">
            🚛 Confirmar carga de ${seleccionados.size || ''} paquete${seleccionados.size !== 1 ? 's' : ''}
          </button>
          <div class="dep-hint">Los paquetes confirmados quedan asignados a tu móvil listos para salir a ruta</div>`;
      }

      // Paquetes ya confirmados (cargando-ruta) — solo lectura
      if (preAsig.length > 0) {
        html += `
          <div style="margin-top:${libres.length > 0 ? 18 : 0}px;margin-bottom:6px;font-size:13px;font-weight:700;color:#0F6E56;display:flex;align-items:center;gap:6px;">
            ✓ Ya confirmados para tu ruta
            <span style="background:#0F6E56;color:#fff;font-size:11px;padding:1px 7px;border-radius:8px;font-weight:700;">${preAsig.length}</span>
          </div>`;
        const gruposConf = agruparPorRuta(preAsig);
        gruposConf.forEach(g => {
          const cCar = g.num != null ? RUTA_COLORS_C[(g.num - 1) % RUTA_COLORS_C.length] : RUTA_COLOR_SIN_C;
          const tituloConf = g.origen && g.destino ? `${g.origen} → ${g.destino}` : null;
          html += `<div class="ruta-dep-card" style="border:2px solid ${cCar.dark};opacity:0.85;">`;
          html += `
            <div class="ruta-dep-header" style="background:${cCar.solid};" onclick="toggleColCar('conf-${g.key}')">
              <span style="flex:1;font-size:15px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                ${g.label}${tituloConf ? `<span style="font-weight:400;font-size:13px;margin-left:8px;opacity:0.82">${tituloConf}</span>` : ''}
              </span>
              <span style="background:rgba(255,255,255,0.22);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;">${g.paquetes.length} paq.</span>
              <span style="font-size:17px;color:#fff;opacity:0.85;margin-left:2px;">${!collapsedCar.has('conf-' + g.key) ? '⌄' : '›'}</span>
            </div>`;
          if (!collapsedCar.has('conf-' + g.key)) {
            g.paquetes.forEach(r => {
              const kg      = parseRemitoKg(r);
              const kgTexto = kg > 0 ? kg.toLocaleString('es-AR') + ' kg' : (r.envio?.peso || '');
              const bultos  = r.envio?.bultos;
              html += `
                <div style="border-top:1px solid #DDE3EA;background:#FAFFFE;border-left:3px solid #0F6E56;pointer-events:none;">
                  <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;">
                    <div style="width:22px;height:22px;border-radius:5px;flex-shrink:0;margin-top:2px;border:2px solid #0F6E56;background:#0F6E56;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;">✓</div>
                    <div style="flex:1;min-width:0;">
                      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;">
                        <span style="font-weight:600;font-size:13px;color:#1A1A1A;">${r.remitente?.ciudad || '—'} → ${r.destinatario?.ciudad || '—'}</span>
                        <span style="font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500;background:#E1F5EE;color:#0F6E56;">✓ Confirmado</span>
                      </div>
                      <div style="display:flex;gap:8px;font-size:11px;color:#5A6A78;flex-wrap:wrap;">
                        <span>🔢 ${r.id}</span>
                        ${r.destinatario?.nombre ? `<span>👤 ${r.destinatario.nombre}</span>` : ''}
                        ${r.flete ? `<span style="color:#0F6E56;font-weight:500;">💵 $${r.flete.toLocaleString('es-AR')}</span>` : ''}
                        ${kgTexto ? `<span>⚖️ ${kgTexto}</span>` : ''}
                        ${bultos ? `<span style="font-weight:${bultos > 1 ? 700 : 400};color:${bultos > 1 ? '#C44A0F' : '#5A6A78'};">📦 ${bultos} bulto${bultos !== 1 ? 's' : ''}</span>` : ''}
                      </div>
                    </div>
                  </div>
                </div>`;
            });
          }
          html += `</div>`;
        });

        html += `
          <button class="btn-dep-grande verde" onclick="salirARutaGlobal()">
            🚛 Salir a ruta con ${preAsig.length} paquete${preAsig.length !== 1 ? 's' : ''}
          </button>
          <div class="dep-hint">Al salir, los paquetes quedan en estado "En camino"</div>`;
      }
    }
  }

  html += `</div>`; // cierra dep-body-scroll

  html += `</div>`; // cierra dep-fullscreen

  // ── Modal: Rendir turno ────────────────────────────────────────────────────
  if (rendirModalOpen) html += buildRendirModalHTML();

  return html;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  const disponibles       = remitosDisponibles();
  const retirosPendientes = remitos.filter(r => r.esRetiro && r.estado === 'pendiente-retiro');
  const entregas          = remitos.filter(r => r.esEntrega || (!r.esRetiro && !r.esEntrega && r.estado !== 'entregado' && r.estado !== 'retirado' && r.estado !== 'pendiente-retiro' && r.estado !== 'en-deposito'));
  const completados       = remitos.filter(r => r.estado === 'entregado' || r.estado === 'retirado');
  const enCamino          = remitos.filter(r => r.estado === 'en-camino').length;

  let html = '';

  // Header
  html += `
    <div class="header">
      <div class="header-top">
        <div class="header-logo">F</div>
        <div style="flex:1">
          <div class="header-title">Manifiesto de viaje</div>
          <div class="header-sub">${getFecha()} · ${getChofer()}</div>
        </div>
        <div style="display:flex;gap:6px;">
          ${!scannerActivo ? `<button class="btn-scan" onclick="abrirScanner()">📷<span class="btn-lbl"> Escanear QR</span></button>` : ''}
          <button class="btn-deposito morado" onclick="abrirDepositoSucursal()">🏢<span class="btn-lbl"> Sucursales</span></button>
          <button class="btn-deposito" onclick="abrirDeposito()">🏭<span class="btn-lbl"> Depósito</span></button>
        </div>
      </div>
      ${getAlias() ? `
      <div class="header-vehiculo">
        <div class="header-vehiculo-nombre">🚛 ${getAlias()}</div>
        <div class="header-vehiculo-info">${retirosPendientes.length + entregas.length + completados.length} paquetes${disponibles.length > 0 ? ` · <span style="color:#FFB085;">📬 ${disponibles.length} disponible${disponibles.length !== 1 ? 's' : ''}</span>` : ''}</div>
      </div>` : ''}
    </div>`;

  // Panel escáner QR — aplica tanto al manifiesto como al depósito
  if (scannerActivo) {
    const titulo = vistaDeposito ? '📷 Escaneá el QR del paquete' : '📷 Escaneá el QR del remito';
    const subtitulo = vistaDeposito ? 'El QR está en el remito impreso' : 'Apuntá la cámara al QR del cliente';
    app.innerHTML = `
      <div class="header">
        <div class="header-top">
          <div class="header-logo">F</div>
          <div style="flex:1">
            <div class="header-title">${vistaDeposito ? 'Depósito · Escaneando' : 'Manifiesto · Escaneando'}</div>
            <div class="header-sub">${getChofer()}</div>
          </div>
        </div>
      </div>
      <div class="scanner-panel">
        <div class="scanner-header">
          <div>
            <div class="scanner-header-title">${titulo}</div>
            <div class="scanner-header-sub">${subtitulo}</div>
          </div>
          <button class="btn-cancelar-scan" onclick="cerrarScanner()">✕ Cancelar</button>
        </div>
        <div id="scanner-viewport"></div>
      </div>`;
    return;
  }

  // Vista depósito sucursales
  if (vistaSucDep) {
    try {
      app.innerHTML = renderDepositoSucursal();
    } catch(e) {
      console.error('Error renderDepositoSucursal:', e);
      vistaSucDep = false;
      mostrarToast('Error: ' + e.message, 'error');
    }
    return;
  }

  // Vista depósito
  if (vistaDeposito) {
    try {
      app.innerHTML = renderDeposito();
    } catch(e) {
      console.error('Error renderDeposito:', e);
      vistaDeposito = false;
      mostrarToast('Error al abrir depósito: ' + e.message, 'error');
    }
    return;
  }

  if (cargando) {
    html += `<div class="loading"><div class="spinner"></div><p>Cargando manifiesto...</p></div>`;
    app.innerHTML = html;
    return;
  }

  const retirosSinDepositar = remitos.filter(r => r.esRetiro && r.estado === 'retirado');
  if (disponibles.length + retirosPendientes.length + entregas.length === 0 && !verManifiesto) {
    const nDepositar = retirosSinDepositar.length;
    html += `
      <div style="padding:48px 24px 24px;text-align:center;">
        <div style="font-size:56px;margin-bottom:16px;">📦</div>
        <p style="font-size:17px;font-weight:600;color:#1A1A1A;margin-bottom:6px;">${nDepositar > 0 ? `${nDepositar} retiro${nDepositar > 1 ? 's' : ''} por depositar` : 'Sin envíos asignados'}</p>
