function RegistroDireccion({ datosPrevios, onDone }) {
  const [form, setForm] = useState({ calle: "", numero: "", piso: "", depto: "", portero: "", ciudad: "" });
  const [gpsStatus, setGpsStatus] = useState("idle"); // idle | loading | error
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  function usarUbicacion() {
    if (!navigator.geolocation) { setGpsStatus("error"); return; }
    setGpsStatus("loading");
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const { latitude, longitude } = pos.coords;
          const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=es`);
          const data = await resp.json();
          const a = data.address || {};
          setForm(f => ({
            ...f,
            calle:  capWords(a.road || a.pedestrian || a.path || ""),
            numero: a.house_number || "",
            ciudad: capWords(a.city || a.town || a.village || a.municipality || ""),
          }));
        } catch {}
        setGpsStatus("idle");
      },
      () => { setGpsStatus("error"); },
      { timeout: 10000, enableHighAccuracy: true }
    );
  }

  function buildDireccion() {
    const partes = [
      form.calle.trim(),
      form.numero.trim(),
      form.piso.trim()   ? `Piso ${form.piso.trim()}`   : "",
      form.depto.trim()  ? `Dpto ${form.depto.trim()}`  : "",
      form.portero.trim() ? `Portero: ${form.portero.trim()}` : "",
      form.ciudad.trim(),
    ].filter(Boolean);
    return partes.join(", ");
  }

  const tieneAlgo = Object.values(form).some(v => v.trim());

  return (
    <div style={{ minHeight: "100vh", background: "#f7f7f5", display: "flex", flexDirection: "column" }}>
      <div style={{ background: "#2C2C2A", padding: "14px 16px", display: "flex", alignItems: "center", gap: 12 }}>
        <FletarLogo size="sm" />
      </div>
      <div style={{ padding: "28px 20px", maxWidth: 480, width: "100%", boxSizing: "border-box" }}>
        <div style={{ fontSize: 36, marginBottom: 12 }}>🏭</div>
        <h2 style={{ fontSize: 18, fontWeight: 700, color: "#1A1A1A", marginBottom: 8 }}>¿Desde dónde despachás?</h2>
        <p style={{ fontSize: 13, color: "#888", marginBottom: 20 }}>Tu dirección habitual de despacho. Se va a pre-cargar cada vez que publiques un envío.</p>

        {/* GPS */}
        <button
          onClick={usarUbicacion}
          disabled={gpsStatus === "loading"}
          style={{ display: "flex", alignItems: "center", gap: 8, background: "#fff", border: "1px solid #ddd", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#555", cursor: gpsStatus === "loading" ? "default" : "pointer", marginBottom: 16, width: "100%" }}
        >
          <span style={{ fontSize: 16 }}>📍</span>
          {gpsStatus === "loading" ? "Buscando tu ubicación…" : "Usar mi ubicación actual"}
        </button>
        {gpsStatus === "error" && <p style={{ fontSize: 11, color: "#c0392b", marginBottom: 12 }}>No se pudo obtener la ubicación. Completá los campos manualmente.</p>}

        {/* Campos separados */}
        <label style={labelStyle}>Calle</label>
        <input style={inputStyle} value={form.calle} onChange={e => set("calle", capWords(e.target.value))} placeholder="Ej: Av. Quaranta" autoCapitalize="words" />
        <div style={{ marginBottom: 10 }} />

        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Número</label>
            <input style={{ ...inputStyle, marginBottom: 0 }} value={form.numero} onChange={e => set("numero", e.target.value)} placeholder="Ej: 1250" inputMode="numeric" />
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Piso</label>
            <input style={{ ...inputStyle, marginBottom: 0 }} value={form.piso} onChange={e => set("piso", e.target.value)} placeholder="Ej: 3" inputMode="numeric" />
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Depto</label>
            <input style={{ ...inputStyle, marginBottom: 0 }} value={form.depto} onChange={e => set("depto", e.target.value.toUpperCase())} placeholder="Ej: B" />
          </div>
        </div>

        <label style={labelStyle}>Portero / Referencia</label>
        <input style={inputStyle} value={form.portero} onChange={e => set("portero", e.target.value)} placeholder="Ej: tocar timbre 4 (opcional)" />
        <div style={{ marginBottom: 10 }} />

        <label style={labelStyle}>Ciudad</label>
        <input style={inputStyle} value={form.ciudad} onChange={e => set("ciudad", capWords(e.target.value))} placeholder="Ej: Posadas" autoCapitalize="words" />
        <div style={{ marginBottom: 24 }} />

        <button style={btnPrimary} onClick={() => onDone(buildDireccion())}>
          {tieneAlgo ? "Guardar y empezar" : "Empezar sin dirección habitual"}
        </button>
        <button style={btnSecondary} onClick={() => onDone("")}>Completar después</button>
      </div>
    </div>
  );
}

function RegistroFlow({ onDone }) {
  const [paso, setPaso] = useState("bienvenida");
  const [tipo, setTipo] = useState(null);
  const [datos, setDatos] = useState(null);

  if (paso === "bienvenida") {
    return <RegistroBienvenida onTipo={(t) => { setTipo(t); setPaso("datos"); }} />;
  }
  if (paso === "datos" && tipo === "empresa") {
    return <RegistroEmpresa onBack={() => setPaso("bienvenida")} onNext={(d) => { setDatos(d); setPaso("direccion"); }} />;
  }
  if (paso === "datos" && tipo === "persona") {
    return <RegistroPersona onBack={() => setPaso("bienvenida")} onNext={(d) => { setDatos(d); setPaso("direccion"); }} />;
  }
  if (paso === "direccion") {
    return <RegistroDireccion datosPrevios={datos} onDone={(dir) => onDone({ ...datos, direccion: dir })} />;
  }
  return null;
}

// ─── APP ROOT ────────────────────────────────────────────────────────────────
function App() {
  const [registrado, setRegistrado] = useState(!!USUARIO_CLIENTE);
  const [screen, setScreen] = useState("empresa-dashboard");
  const [cargaSeleccionada, setCargaSeleccionada] = useState(null);
  const [remitoActivo, setRemitoActivo] = useState(null);
  const [remitoACalificar, setRemitoACalificar] = useState(null);
  const [notifCount, setNotifCount] = useState(0);
  const [toastMsg, setToastMsg] = useState(null);
  const [notifPermission, setNotifPermission] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'granted');
  const [notifBannerCerrado, setNotifBannerCerrado] = useState(false);
  const toastTimerRef = useRef(null);
  const shownRating = useRef(new Set());
  const ofertasVistas = useRef(null);


  // Pedir permiso de notificaciones al abrir la app
  useEffect(() => { pedirPermisoNotificaciones(); }, []);

  async function activarNotificaciones() {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPermission(perm);
  }

  // Escuchar eventos de notificación para contador y toast
  useEffect(() => {
    const handler = (e) => {
      const { count, titulo, cuerpo } = e.detail;
      setNotifCount(count);
      if (count > 0 && titulo) {
        setToastMsg({ titulo, cuerpo });
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        toastTimerRef.current = setTimeout(() => setToastMsg(null), 4500);
      }
    };
    document.addEventListener('fletar-notif', handler);
    return () => document.removeEventListener('fletar-notif', handler);
  }, []);

  // Notificar cuando llega una oferta nueva para el cliente
  useEffect(() => {
    if (!registrado) return;
    return fbListen('ofertas', arr => {
      const misOfertas = arr.filter(o => o.clienteId === USUARIO_CLIENTE?.id || o.clienteNombre === USUARIO_CLIENTE?.nombre);
      if (ofertasVistas.current === null) {
        // Primera carga: registrar todo lo existente, sin notificar
        ofertasVistas.current = new Set(misOfertas.map(o => o.id));
        return;
      }
      misOfertas.forEach(o => {
        if (!ofertasVistas.current.has(o.id)) {
          ofertasVistas.current.add(o.id);
          mostrarNotificacion(
            '🚛 Nueva oferta recibida',
            `${o.transportistaNombre || 'Un transportista'} te hizo una oferta`
          );
        }
      });
    });
  }, [registrado]);

  // Hooks siempre al tope — no pueden ir después de un return condicional
  useEffect(() => {
    if (!registrado) return; // no escuchar hasta estar registrado
    return fbListen('remitos', arr => {
      const pendiente = arr.find(r =>
        r.empresaNombre === USUARIO_CLIENTE.nombre &&
        r.estado === "entregado" &&
        r.calificacionEmpresa == null &&
        !shownRating.current.has(r.id)
      );
      if (pendiente) {
        shownRating.current.add(pendiente.id);
        setRemitoACalificar(pendiente);
      }
    });
  }, [registrado]);

  function handleRegistroDone(perfil) {
    const id = 'cli-' + perfil.telefono.replace(/\D/g, '') + '-' + Date.now().toString(36);
    const perfilCompleto = { ...perfil, id };
    USUARIO_CLIENTE = perfilCompleto;
    storageSave(KEY_CLIENTE_PERFIL, perfilCompleto);
    const tel = perfil.telefono.replace(/\D/g, '');
    db.ref(`clientes/${tel}`).set({ ...perfilCompleto, creadoEn: Date.now() });
    setRegistrado(true);
  }

  if (!registrado) {
    return <RegistroFlow onDone={handleRegistroDone} />;
  }

  function handleCalificar(estrellas) {
    if (remitoACalificar) fbUpdate('remitos', remitoACalificar.id, { calificacionEmpresa: estrellas });
    setRemitoACalificar(null);
  }

  function handleOmitir() {
    if (remitoACalificar) fbUpdate('remitos', remitoACalificar.id, { calificacionEmpresa: 0 });
    setRemitoACalificar(null);
  }

  function handleNav(dest) {
    // Limpiar contador cuando el usuario va a ver sus pedidos/ofertas
    if (dest === "empresa-dashboard" || dest === "ver-ofertas") {
      setNotifCount(0);
      _badgeCount = 0;
      if ('clearAppBadge' in navigator) navigator.clearAppBadge().catch(() => {});
    }
    setScreen(dest);
  }

  const renderScreen = () => {
    switch (screen) {
      case "empresa-dashboard": return <EmpresaDashboard onNav={handleNav} onVerOfertas={(carga) => { setCargaSeleccionada(carga); handleNav("ver-ofertas"); }} onVerRemito={(r) => { setRemitoActivo(r); handleNav("remito"); }} />;
      case "historial-envios": return <HistorialEnvios onNav={handleNav} onVerOfertas={(carga) => { setCargaSeleccionada(carga); handleNav("ver-ofertas"); }} onVerSeguimiento={(c) => { setCargaSeleccionada(c); handleNav("seguimiento"); }} />;
      case "publicar-carga": return <NuevoEnvio onNav={handleNav} />;
      case "ver-ofertas": return <VerOfertas onNav={handleNav} cargaSeleccionada={cargaSeleccionada} onAceptar={(remito) => { setRemitoActivo(remito); handleNav("remito"); }} />;
      case "seguimiento": return <SeguimientoEnvio onNav={handleNav} cargaSeleccionada={cargaSeleccionada} onVerRemito={(r) => { setRemitoActivo(r); handleNav("remito"); }} />;
      case "remito": return <RemitoScreen onNav={handleNav} remito={remitoActivo || storageGet(KEY_REMITOS, []).slice(-1)[0] || null} />;
      case "chat": return <ChatScreen onNav={handleNav} />;
      default: return <EmpresaDashboard onNav={handleNav} />;
    }
  };

  return (
    <div>
      <Navbar onNav={handleNav} screen={screen} notifCount={notifCount} />
      {renderScreen()}
      {/* Banner: activar notificaciones */}
      {notifPermission !== 'granted' && !notifBannerCerrado && (
        <div style={{ position: "fixed", bottom: 16, left: 10, right: 10, zIndex: 9000, background: "#1A2E3B", color: "#fff", borderRadius: 12, padding: "12px 14px", display: "flex", alignItems: "center", gap: 10, boxShadow: "0 4px 24px rgba(0,0,0,0.4)" }}>
          <span onClick={activarNotificaciones} style={{ fontSize: 22, cursor: "pointer" }}>🔔</span>
          <div onClick={activarNotificaciones} style={{ flex: 1, cursor: "pointer" }}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Activar notificaciones</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginTop: 2 }}>Tocá acá para recibir alertas de nuevas ofertas</div>
          </div>
          <span onClick={activarNotificaciones} style={{ background: "#E85D20", color: "#fff", fontSize: 12, fontWeight: 700, padding: "5px 12px", borderRadius: 7, flexShrink: 0, cursor: "pointer" }}>Activar</span>
          <span onClick={() => setNotifBannerCerrado(true)} style={{ color: "rgba(255,255,255,0.5)", fontSize: 16, cursor: "pointer", padding: "0 2px", flexShrink: 0 }}>✕</span>
        </div>
      )}
      {/* Toast de notificación en pantalla */}
      {toastMsg && (
        <div style={{ position: "fixed", top: 60, left: 10, right: 10, zIndex: 9000, background: "#1A1A1A", color: "#fff", borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, boxShadow: "0 4px 24px rgba(0,0,0,0.4)" }}>
          <span style={{ fontSize: 22 }}>🚛</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{toastMsg.titulo}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)", marginTop: 2 }}>{toastMsg.cuerpo}</div>
          </div>
          <button onClick={() => setToastMsg(null)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", fontSize: 18, cursor: "pointer", padding: 0, lineHeight: 1 }}>✕</button>
        </div>
      )}
      {remitoACalificar && (
        <RatingModal
          remito={remitoACalificar}
          pregunta="¿Cómo fue el servicio de"
          nombre={remitoACalificar.transportistaNombre}
          onCalificar={handleCalificar}
          onOmitir={handleOmitir}
          accentColor="#E85D20"
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
