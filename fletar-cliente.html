const KEY_CLIENTE_PERFIL = 'fletar_cliente_perfil';
let _perfilGuardado = null;
try { const _v = localStorage.getItem(KEY_CLIENTE_PERFIL); if (_v) _perfilGuardado = JSON.parse(_v); } catch {}
let USUARIO_CLIENTE = _perfilGuardado; // null si nunca se registró

// Sync automático: si hay perfil en localStorage, también busca en Firebase
// para capturar actualizaciones hechas desde otro dispositivo o corregidas
if (USUARIO_CLIENTE) {
  const _tel = (USUARIO_CLIENTE.telefono || "").replace(/\D/g, '');
  if (_tel) {
    firebase.database().ref(`clientes/${_tel}`).get().then(snap => {
      if (snap.exists()) {
        const fb = snap.val();
        // Fusionar: Firebase tiene prioridad sobre localStorage para campos clave
        USUARIO_CLIENTE = { ...USUARIO_CLIENTE, ...fb };
        try { localStorage.setItem(KEY_CLIENTE_PERFIL, JSON.stringify(USUARIO_CLIENTE)); } catch {}
      }
    }).catch(() => {});
  }
}

// ─── FIREBASE HELPERS ─────────────────────────────────────────────────────────
// localStorage solo para datos privados por dispositivo
const KEY_FLOTA = "fletar_flota";
const KEY_CHAT = "fletar_chat";
const KEY_REMITOS = "fletar_remitos";
function storageGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function storageSave(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
}

// Firebase: convierte snapshot a array ordenado por id
function fbSnap(snap) {
  const val = snap.val();
  if (!val) return [];
  return Object.values(val).sort((a, b) => (a.id || 0) - (b.id || 0));
}
// Escribe un item en Firebase
function fbSetItem(path, item) {
  return db.ref(path + '/' + item.id).set(item);
}
// Actualiza campos de un item
function fbUpdate(path, id, changes) {
  return db.ref(path + '/' + id).update(changes);
}
// Escuchar cambios en tiempo real
function fbListen(path, callback) {
  const ref = db.ref(path);
  ref.on('value', snap => callback(fbSnap(snap)));
  return () => ref.off();
}

function pedirPermisoNotificaciones() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  // Limpiar badge cuando el usuario vuelve a la app
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      _badgeCount = 0;
      if ('clearAppBadge' in navigator) navigator.clearAppBadge().catch(() => {});
      document.dispatchEvent(new CustomEvent('fletar-notif', { detail: { count: 0 } }));
    }
  });
}

function tocarSonido() {
  _sonido.play();
}

function mostrarNotificacion(titulo, cuerpo) {
  tocarSonido();
  _badgeCount++;
  if ('setAppBadge' in navigator) navigator.setAppBadge(_badgeCount).catch(() => {});
  // Evento para contador visual y toast dentro de la app
  document.dispatchEvent(new CustomEvent('fletar-notif', { detail: { count: _badgeCount, titulo, cuerpo } }));
  // Notificación del sistema (barra de Android)
  if ('serviceWorker' in navigator && Notification.permission === 'granted') {
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification(titulo, {
        body: cuerpo,
        icon: '/icon-cliente-192.png',
        badge: '/icon-cliente-192.png',
        silent: true,
      });
    }).catch(() => {});
  }
}

  "Misiones|Formosa": 480,      "Misiones|Santa Fe": 970,

  "Misiones|Jujuy": 1600,       "Misiones|Mendoza": 1700,
  "Misiones|Neuquén": 1900,     "Misiones|Río Negro": 2000,
  "Misiones|La Pampa": 1400,    "Misiones|San Juan": 1800,
  "Misiones|San Luis": 1500,    "Misiones|La Rioja": 1600,
  "Misiones|Catamarca": 1650,   "Misiones|Santiago del Estero": 1200,
  "Corrientes|Buenos Aires": 1050, "Corrientes|Santa Fe": 760,
  "Corrientes|Córdoba": 960,    "Corrientes|Entre Ríos": 560,
  "Corrientes|Chaco": 200,      "Corrientes|Formosa": 370,
  "Corrientes|Tucumán": 1100,   "Corrientes|CABA": 1050,
  "Chaco|Buenos Aires": 1100,   "Chaco|Santa Fe": 720,
  "Chaco|Córdoba": 920,         "Chaco|Tucumán": 900,
  "Chaco|CABA": 1100,           "Formosa|Buenos Aires": 1250,
  "Formosa|CABA": 1250,         "Entre Ríos|Buenos Aires": 380,
  "Entre Ríos|CABA": 380,       "Entre Ríos|Santa Fe": 200,
  "Entre Ríos|Córdoba": 540,    "Santa Fe|Buenos Aires": 470,
  "Santa Fe|CABA": 470,         "Santa Fe|Córdoba": 340,
  "Córdoba|Buenos Aires": 710,  "Córdoba|CABA": 710,
  "Buenos Aires|CABA": 60,
};

function estimarKm(provOrigen, provDestino) {
  if (!provOrigen || !provDestino) return null;
  if (provOrigen === provDestino) return 120;
  const clave = `${provOrigen}|${provDestino}`;
  const claveRev = `${provDestino}|${provOrigen}`;
  return DISTANCIAS_KM[clave] || DISTANCIAS_KM[claveRev] || 900;
}

// Tarifas aproximadas 2026 para carga fraccionada (ARS por kg cobrable)
// Fuente: referencia mercado Misiones/NEA, actualizar periódicamente
function calcularEstimado(pesoCobrable, km) {
  if (!pesoCobrable || pesoCobrable <= 0 || !km) return null;
  let tarifaBase, minimoEnvio;
  if (km < 300) {
    tarifaBase = 380; minimoEnvio = 25000;
  } else if (km < 600) {
    tarifaBase = 650; minimoEnvio = 45000;
  } else if (km < 1000) {
    tarifaBase = 980; minimoEnvio = 70000;
  } else {
    tarifaBase = 1450; minimoEnvio = 100000;
  }
  const precioBase = Math.max(pesoCobrable * tarifaBase, minimoEnvio);
  return {
    min: Math.round(precioBase * 0.80 / 1000) * 1000,
    max: Math.round(precioBase * 1.25 / 1000) * 1000,
  };
}

function formatPesos(n) {
  return "$" + n.toLocaleString("es-AR");
}

// ─── CIUDAD AUTOCOMPLETE (GeoRef API oficial Argentina + GPS) ─────────────────
// GeoRef es la API oficial del gobierno argentino — misma que usa MercadoLibre/Despegar
// Cubre todas las localidades del país, búsqueda limpia, filtro por provincia
const GEOREF = 'https://apis.datos.gob.ar/georef/api';

// Lista estática de ciudades argentinas frecuentes — respuesta inmediata sin API
const CIUDADES_AR = [
  {ciudad:'Posadas',provincia:'Misiones'},{ciudad:'Puerto Iguazú',provincia:'Misiones'},
  {ciudad:'Oberá',provincia:'Misiones'},{ciudad:'Eldorado',provincia:'Misiones'},
  {ciudad:'Apóstoles',provincia:'Misiones'},{ciudad:'Bernardo de Irigoyen',provincia:'Misiones'},
  {ciudad:'San Vicente',provincia:'Misiones'},{ciudad:'Leandro N. Alem',provincia:'Misiones'},
  {ciudad:'Corrientes',provincia:'Corrientes'},{ciudad:'Goya',provincia:'Corrientes'},
  {ciudad:'Resistencia',provincia:'Chaco'},{ciudad:'Formosa',provincia:'Formosa'},
  {ciudad:'Buenos Aires',provincia:'CABA'},{ciudad:'Rosario',provincia:'Santa Fe'},
  {ciudad:'Córdoba',provincia:'Córdoba'},{ciudad:'Mendoza',provincia:'Mendoza'},
  {ciudad:'La Plata',provincia:'Buenos Aires'},{ciudad:'Mar del Plata',provincia:'Buenos Aires'},
  {ciudad:'San Miguel de Tucumán',provincia:'Tucumán'},{ciudad:'Salta',provincia:'Salta'},
  {ciudad:'Santa Fe',provincia:'Santa Fe'},{ciudad:'San Juan',provincia:'San Juan'},
  {ciudad:'Neuquén',provincia:'Neuquén'},{ciudad:'Bahía Blanca',provincia:'Buenos Aires'},
  {ciudad:'Paraná',provincia:'Entre Ríos'},{ciudad:'Concepción del Uruguay',provincia:'Entre Ríos'},
  {ciudad:'Concordia',provincia:'Entre Ríos'},{ciudad:'Paso de los Libres',provincia:'Corrientes'},
].map(c => ({ ...c, label: `${c.ciudad}, ${c.provincia}` }));

function normStr(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}
// GeoRef y Nominatim a veces devuelven el nombre oficial del municipio
// ("Municipio de Posadas") en vez del nombre de la ciudad a secas ("Posadas").
// Sacamos ese prefijo para que coincida con el resto de la app.
function limpiarCiudad(nombre) {
  return (nombre || '').replace(/^(Municipio|Comuna|Partido|Departamento) de /i, '').trim();
}
function normProvDisplay(nombre) {
  if (!nombre) return '';
  if (normStr(nombre).includes('autonoma') || normStr(nombre).includes('autónoma')) return 'CABA';
  return nombre.replace(/^Provincia de /i, '').trim();
}
function normProvGPS(raw) {
  // Normaliza lo que devuelve Nominatim en reverse geocoding
  return normProvDisplay((raw || '').replace(/ Province$/i, '').replace(/ \(Argentina\)$/i, '').trim());
}

function CiudadAutocomplete({ value = "", onChange, label, placeholder, mostrarGPS = false, required = false }) {
  const [inputVal, setInputVal]     = React.useState(value);
  const [sug, setSug]               = React.useState([]);
  const [busy, setBusy]             = React.useState(false);
  const [gpsLoad, setGpsLoad]       = React.useState(false);
  const [open, setOpen]             = React.useState(false);
  const [gpsProv, setGpsProv]       = React.useState(null); // provincia detectada por GPS
  const timer = React.useRef(null);
  const gpsProvincia = React.useRef(null); // ref para acceder en closure del timer
  const gpsDisponible = mostrarGPS && !!navigator.geolocation;

  function buscar(q) {
    clearTimeout(timer.current);
    if (q.length < 2) { setSug([]); setOpen(false); return; }
    const provinciaGPS = gpsProvincia.current;

    // Sugerencias inmediatas desde lista estática (sin esperar API)
    const qn = normStr(q);
    const inmediatas = CIUDADES_AR.filter(c => normStr(c.ciudad).includes(qn))
      .sort((a, b) => (normStr(a.ciudad).startsWith(qn) ? 0 : 1) - (normStr(b.ciudad).startsWith(qn) ? 0 : 1))
      .slice(0, 6);
    if (inmediatas.length > 0) { setSug(inmediatas); setOpen(true); }

    timer.current = setTimeout(() => {
      setBusy(true);
      const procesarResultados = (items) => {
        const seen = new Set();
        return items
          .map(loc => {
            const c = limpiarCiudad(loc.ciudad || loc.nombre || '');
            const p = loc.provincia || normProvDisplay(loc.provincia?.nombre || '');
            if (!c || !p) return null;
            const label = `${c}, ${p}`;
            return { label, ciudad: c, provincia: p };
          })
          .filter(r => {
            if (!r || !normStr(r.ciudad).includes(qn)) return false;
            if (seen.has(r.label)) return false;
            seen.add(r.label); return true;
          })
          .sort((a, b) => {
            if (provinciaGPS) {
              const aL = normStr(a.provincia) === normStr(provinciaGPS) ? 0 : 1;
              const bL = normStr(b.provincia) === normStr(provinciaGPS) ? 0 : 1;
              if (aL !== bL) return aL - bL;
            }
            return (normStr(a.ciudad).startsWith(qn) ? 0 : 1) - (normStr(b.ciudad).startsWith(qn) ? 0 : 1);
          });
      };

      const fallbackNominatim = () =>
        fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)},Argentina&format=json&limit=10&countrycodes=ar&addressdetails=1`)
          .then(r => r.json())
          .then(data => {
            const items = (data || []).map(d => ({
              ciudad: limpiarCiudad(d.address?.city || d.address?.town || d.address?.village || d.name || ''),
              provincia: normProvGPS(d.address?.state || ''),
            }));
            const res = procesarResultados(items);
            setSug(res.length > 0 ? res : inmediatas);
            setOpen(res.length > 0 || inmediatas.length > 0);
            setBusy(false);
          })
          .catch(() => { setSug(inmediatas); setOpen(inmediatas.length > 0); setBusy(false); });

      // GeoRef primero, Nominatim como fallback
      fetch(`${GEOREF}/localidades?nombre=${encodeURIComponent(q)}&max=15&campos=nombre,provincia`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          const locs = (data.localidades || []).map(loc => ({
            ciudad: loc.nombre || '',
            provincia: normProvDisplay(loc.provincia?.nombre || ''),
          }));
          const res = procesarResultados(locs);
          if (res.length > 0) { setSug(res); setOpen(true); setBusy(false); }
          else fallbackNominatim();
        })
        .catch(fallbackNominatim);
    }, 350);
  }

  function sel(item) {
    setInputVal(item.label);
    onChange(item.ciudad, item.provincia);
    setSug([]); setOpen(false);
  }

  function gps() {
    setGpsLoad(true);
    navigator.geolocation.getCurrentPosition(
      pos => {
        // Usamos Nominatim solo para reverse geocoding (obtener ciudad/provincia del punto GPS)
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&addressdetails=1`)
          .then(r => r.json())
          .then(d => {
            const a = d.address;
            const ciudad = limpiarCiudad(a.city || a.town || a.village || a.suburb || '');
            const prov = normProvGPS(a.state || '');
            // Guardar provincia detectada para priorizar en búsquedas futuras
            gpsProvincia.current = prov;
            setGpsProv(prov);
            if (ciudad) { setInputVal(`${ciudad}, ${prov}`); onChange(ciudad, prov); }
            setGpsLoad(false);
          })
          .catch(() => setGpsLoad(false));
      },
      () => { setGpsLoad(false); },
      { timeout: 10000, enableHighAccuracy: false }
    );
  }

  return (
    <div style={{ position: "relative" }}>
      {label && <label style={{ display:"block", fontWeight:500, marginBottom:5, fontSize:13, color:"#444" }}>{label}{required && " *"}</label>}
      <div style={{ display:"flex", gap:6 }}>
        <div style={{ position:"relative", flex:1 }}>
          <input
            value={inputVal}
            onChange={e => { setInputVal(e.target.value); buscar(e.target.value); }}
            onBlur={() => setTimeout(() => setOpen(false), 160)}
            onFocus={() => sug.length > 0 && setOpen(true)}
            placeholder={placeholder || "Escribí la ciudad..."}
            autoComplete="off"
            style={{ paddingRight: busy ? 30 : undefined }}
          />
          {busy && <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", fontSize:13, color:"#bbb", pointerEvents:"none" }}>🔍</span>}
        </div>
        {gpsDisponible && (
          <button type="button" onClick={gps} disabled={gpsLoad}
            title="Detectar mi ubicación actual"
            style={{ padding:"0 12px", background:gpsLoad?"#F5F5F5":"#EBF3FD", border:"1.5px solid #B5D4F4", borderRadius:8, cursor:gpsLoad?"wait":"pointer", color:"#0C447C", fontSize:18, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", minWidth:44 }}>
            {gpsLoad ? "⏳" : "📍"}
          </button>
        )}
      </div>
      {open && sug.length > 0 && (
        <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#fff", border:"1.5px solid #DDE3EA", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,0.11)", zIndex:500, marginTop:4, overflow:"hidden" }}>
          {sug.map((s,i) => (
            <div key={i}
              onMouseDown={e => { e.preventDefault(); sel(s); }}
              style={{ padding:"10px 14px", cursor:"pointer", fontSize:13, borderBottom:i<sug.length-1?"1px solid #F5F5F5":"none", display:"flex", alignItems:"center", gap:8 }}
              onMouseEnter={e => e.currentTarget.style.background="#F5F9FF"}
              onMouseLeave={e => e.currentTarget.style.background="#fff"}>
              <span style={{color:"#E85D20"}}>📍</span>
              <div>
                <span style={{fontWeight:500,color:"#1A1A1A"}}>{s.ciudad}</span>
                {s.provincia && <span style={{color:"#888",marginLeft:6,fontSize:12}}>{s.provincia}</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// helper: hora legible desde carga (usa publishedAt o deriva del id timestamp)
function horaPublicado(c) {
  if (c.publishedAt) return c.publishedAt;
  if (c.id && c.id > 1000000000000) {
    return new Date(c.id).toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
  }
  return null;
}
function fechaPublicado(c) {
  if (c.publishedDate) return c.publishedDate;
  if (c.id && c.id > 1000000000000) {
    return new Date(c.id).toLocaleDateString("es-AR");
  }
  return null;
}

// ─── HISTORIAL ENVÍOS ─────────────────────────────────────────────────────────
function HistorialEnvios({ onNav, onVerOfertas, onVerSeguimiento }) {
  const [cargas, setCargas] = useState([]);
  const [remitos, setRemitos] = useState([]);
  const [verHistorial, setVerHistorial] = useState(false);

  useEffect(() => {
    const unsubC = fbListen('cargas', arr => setCargas(arr));
    const unsubR = fbListen('remitos', arr => setRemitos(arr));
    return () => { unsubC(); unsubR(); };
  }, []);

  // Remitos de esta empresa
  const misRemitos = remitos.filter(r => r.empresaNombre === USUARIO_CLIENTE.nombre);
  const cargasConRemito = new Set(misRemitos.map(r => String(r.cargaId)));

  // Grupo 1: cargas publicadas sin remito aún (esperando/cotizando)
  const sorted = [...cargas].sort((a, b) => b.id - a.id);
  const cotizados = sorted.filter(c => (c.estado === "nueva" || c.estado === "activo") && !cargasConRemito.has(String(c.id)));

  // Grupo 2: remitos activos (en tránsito)
  const enCaminoList = [...misRemitos]
    .filter(r => r.estado !== "entregado")
    .sort((a, b) => b.id - a.id);

  // Historial: remitos entregados
  const pasados = [...misRemitos]
    .filter(r => r.estado === "entregado")
    .sort((a, b) => b.id - a.id);

  // Helper: tarjeta de carga reutilizable
  function CardCarga({ c, onClick, accion }) {
    const hora = horaPublicado(c);
    const fecha = fechaPublicado(c);
    return (
      <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={onClick}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
            <span style={{ fontWeight: 500, fontSize: 14 }}>{c.origen} → {c.destino}</span>
            <span className={`badge badge-${c.estado}`}>{c.estado === "en-camino" ? "En camino" : c.estado === "activo" ? "Con ofertas" : "Nueva"}</span>
            <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 6, background: c.tipoEnvio === "expres-local" ? "#E1F5EE" : "#EBF3FD", color: c.tipoEnvio === "expres-local" ? "#085041" : "#0C447C" }}>

            </span>
          </div>
          <div style={{ fontSize: 12, color: "#888" }}>
            {c.tipo} · Retiro {c.retiro}
            {hora && <span style={{ marginLeft: 8, background: "#F5F5F5", padding: "1px 6px", borderRadius: 4, color: "#666" }}>🕐 {hora}{fecha ? ` · ${fecha}` : ""}</span>}
          </div>
        </div>
        <div style={{ textAlign: "right", marginLeft: 12 }}>{accion}</div>
      </div>
    );
  }

  return (
    <PageWrapper titulo="Mis envíos">

      {/* ── Grupo 1: Cotizados / esperando ofertas ── */}
      {cotizados.length > 0 && (<>
        <h3 style={{ fontSize: 13, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 10 }}>Cotizados / esperando ofertas</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
          {cotizados.map(c => (
            <CardCarga key={c.id} c={c}

              accion={<>
                <div style={{ fontSize: 16, fontWeight: 600, color: c.ofertas > 0 ? "#E85D20" : "#ccc" }}>{c.ofertas}</div>
                <div style={{ fontSize: 11, color: "#888" }}>{c.ofertas === 1 ? "oferta" : "ofertas"}</div>
              </>}
            />
          ))}
        </div>
      </>)}

      {/* ── Grupo 2: Envíos activos ── */}
      {enCaminoList.length > 0 && (<>
        <h3 style={{ fontSize: 13, fontWeight: 600, color: "#F57F17", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 10 }}>📦 Envíos activos</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
          {enCaminoList.map(r => {
            const ec = estadoCliente(r.estado);
            const badgeLabel = ec === "en-camino" ? "En camino" : ec === "retirado" ? "Retirado" : "Retiro pendiente";
            const badgeClass = ec === "en-camino" ? "badge-en-camino" : ec === "retirado" ? "badge-activo" : "badge-nueva";
            return (
            <div key={r.id} className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}
              onClick={() => onVerSeguimiento ? onVerSeguimiento({ id: r.cargaId }) : onNav("seguimiento")}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                  <span style={{ fontWeight: 500, fontSize: 14 }}>{r.remitente?.ciudad} → {r.destinatario?.ciudad}</span>
                  <span className={`badge ${badgeClass}`}>{badgeLabel}</span>
                </div>
                <div style={{ fontSize: 12, color: "#888" }}>
                  {r.tipo || r.transportistaNombre} · Remito {r.id}
                </div>
              </div>
              <div style={{ marginLeft: 12 }}>
                <button className="btn-primary" style={{ fontSize: 12, padding: "6px 12px" }}
                  onClick={e => { e.stopPropagation(); onVerSeguimiento ? onVerSeguimiento({ id: r.cargaId }) : onNav("seguimiento"); }}>Ver estado</button>
              </div>
            </div>
          );})}
        </div>
      </>)}

      {/* ── Historial colapsable (remitos entregados) ── */}
      <button onClick={() => setVerHistorial(v => !v)} style={{
        width: "100%", background: verHistorial ? "#F5F5F5" : "#fff",
        border: "1.5px solid #E0E0E0", borderRadius: 10, padding: "12px 16px",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        cursor: "pointer", marginBottom: verHistorial ? 10 : 0
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18 }}>🗂️</span>
          <span style={{ fontWeight: 600, fontSize: 14 }}>Historial de envíos</span>
          <span style={{ fontSize: 12, background: "#E0E0E0", color: "#666", padding: "1px 8px", borderRadius: 8 }}>{pasados.length}</span>
        </div>
        <span style={{ fontSize: 18, color: "#aaa", transform: verHistorial ? "rotate(90deg)" : "none", transition: "transform 0.2s" }}>›</span>
      </button>
      {verHistorial && (

          {pasados.length === 0 && <div style={{ fontSize: 13, color: "#aaa", textAlign: "center", padding: 16 }}>Sin envíos entregados aún.</div>}
          {pasados.map(r => (
            <div key={r.id} className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 3 }}>{r.remitente?.ciudad} → {r.destinatario?.ciudad}</div>
                <div style={{ fontSize: 12, color: "#888" }}>{r.fecha} · {r.transportistaNombre}</div>
              </div>
              <span className="badge badge-entregado" style={{ marginLeft: 12, flexShrink: 0 }}>✓ Entregado</span>
            </div>
          ))}
        </div>
      )}
    </PageWrapper>
  );
}

// Comprime una imagen a JPEG < 200 KB usando Canvas — no requiere Firebase Storage
function comprimirImagen(file, maxPx = 900, quality = 0.70) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = evt => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = evt.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function PublicarEnvioExpres({ onNav, onVolverSelector }) {
  const [paso, setPaso] = useState(1);

  const LABELS_PASO = ["Qué mandás", "Retiro y entrega", "Fecha y hora"];

  const [form, setForm] = useState({
    tipo: "Muebles",
    descripcion: "",
    ciudad: "",
    provincia: "",
    direccionRetiro: USUARIO_CLIENTE?.direccion || "",
    mapsRetiro: "",
    direccionEntrega: "",
    mapsEntrega: "",
    fecha: "",
    hora: "",
  });
  const [enviado, setEnviado] = useState(false);

  function upd(k, v) { setForm(f => ({ ...f, [k]: v })); }

  function siguientePaso() {
    if (paso === 1 && !form.descripcion) { alert("Contanos brevemente qué mandás."); return; }
    if (paso === 2 && !form.ciudad) { alert("Seleccioná tu ciudad desde el listado de sugerencias."); return; }
    if (paso === 2 && (!form.direccionRetiro || !form.direccionEntrega)) { alert("Completá la dirección de retiro y de entrega."); return; }
    if (paso === 3) { handlePublicar(); return; }
    setPaso(p => p + 1);

  function pasoAnterior() {

    setPaso(p => p - 1);
    window.scrollTo(0, 0);

    const nuevaCarga = {
      id,
      tipoEnvio: "expres-local",

      origen: form.direccionRetiro,
      destino: form.direccionEntrega,
      tipo: form.tipo,
      peso: "—",
      retiro: form.fecha,

      descripcion: form.descripcion,
      especial: "normal",
      ciudad: form.ciudad,
      provincia: form.provincia,
      direccionRetiro: form.direccionRetiro,
      mapsRetiro: form.mapsRetiro,
      destinatario: {
        nombre: "",
        telefono: "",
        domicilio: form.direccionEntrega,

        maps: form.mapsEntrega,

      fechaDeseada: form.fecha,

        </p>
        <p style={{ color: "#aaa", fontSize: 12, marginTop: 10 }}>Redirigiendo...</p>

                <div key={t.val} onClick={() => upd('tipo', t.val)}
                  style={{ border: `2px solid ${form.tipo === t.val ? "#0F6E56" : "#E0E0E0"}`, borderRadius: 8, padding: "10px 8px", cursor: "pointer", background: form.tipo === t.val ? "#E1F5EE" : "#fff", textAlign: "center" }}>

          </div>
          <div className="form-group" style={{ marginBottom: 0 }}>

          </div>
        </div>}

        {/* ══ PASO 2: RETIRO Y ENTREGA ══ */}
        {paso === 2 && <div className="card" style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 16 }}>Retiro y entrega</h3>
          <div className="form-group">
            <CiudadAutocomplete
              label="Tu ciudad" required
              value={form.ciudad ? `${form.ciudad}${form.provincia ? ", " + form.provincia : ""}` : ""}
              onChange={(ciudad, prov) => { upd('ciudad', ciudad); upd('provincia', prov); }}
              mostrarGPS={true}
              placeholder="Ej: Posadas, Misiones"
            />
            <p style={{ fontSize: 11, color: "#888", marginTop: 4 }}>Así los fleteros de tu zona pueden ver el pedido.</p>
          </div>
          <div className="form-group">
            <label>Dirección de retiro</label>
            <input value={form.direccionRetiro} onChange={e => upd('direccionRetiro', e.target.value)} placeholder="Calle, número, ciudad" />
          </div>
          <div className="form-group">
            <label>Link de Google Maps del retiro (opcional)</label>
            <input value={form.mapsRetiro} onChange={e => upd('mapsRetiro', e.target.value)} placeholder="Pegá el link de tu ubicación" />
          </div>
          <div className="form-group">
            <label>Dirección de entrega</label>
            <input value={form.direccionEntrega} onChange={e => upd('direccionEntrega', e.target.value)} placeholder="Ej: Av. Mitre 540, Posadas" />
          </div>
          <div className="form-group" style={{ marginBottom: 0 }}>
            <label>Link de Google Maps de la entrega (opcional)</label>
            <input value={form.mapsEntrega} onChange={e => upd('mapsEntrega', e.target.value)} placeholder="Pegá el link de la ubicación" />
          </div>
        </div>}

        {/* ══ PASO 3: FECHA Y HORA ══ */}
        {paso === 3 && <div className="card" style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 16 }}>¿Cuándo lo retiramos?</h3>
          <div className="g2">
            <div className="form-group">
              <label>Fecha</label>
              <input type="date" value={form.fecha} onChange={e => upd('fecha', e.target.value)} />
            </div>
            <div className="form-group">
              <label>Hora</label>
              <input type="time" value={form.hora} onChange={e => upd('hora', e.target.value)} />
            </div>
          </div>
        </div>}

      </div>
      <BotonesNav labelContinuar={paso === 3 ? "Publicar pedido →" : "Continuar →"} />
    </div>
  );
}

function PublicarCarga({ onNav }) {
  const [paso, setPaso] = useState(1);
  const TOTAL_PASOS = 5;
  const LABELS_PASO = ["Ruta", "Qué mandás", "Medidas", "Destinatario", "Foto"];

  const [origenProv, setOrigenProv] = useState("");
  const [origenLoc, setOrigenLoc] = useState("");
  const [destinoProv, setDestinoProv] = useState("");
  const [destinoLoc, setDestinoLoc] = useState("");
  const [direccionRetiro, setDireccionRetiro] = useState(USUARIO_CLIENTE.direccion);
  const [form, setForm] = useState({ tipo: "General", especial: "normal", retiro: "", entrega: "", descripcion: "" });
  const [paquetes, setPaquetes] = useState([{ id: 1, largo: "", ancho: "", alto: "", peso: "", cantidad: "1" }]);
  const [destinatario, setDestinatario] = useState({ nombre: "", telefono: "", calle: "", numero: "", localidad: "", referencia: "", maps: "" });
  const [quienPaga, setQuienPaga] = useState("remitente");
  const [enviado, setEnviado] = useState(false);
  const [transportistasMatch, setTransportistasMatch] = useState([]);
  const [cantidadSobres, setCantidadSobres] = useState(1);
  const [fotos, setFotos] = useState([]); // [{ file: File, preview: string }]
  const inputCamaraRef = React.useRef(null);
  const inputGaleriaRef = React.useRef(null);
  const [subiendo, setSubiendo] = useState(false);

  function siguientePaso() {
    if (paso === 1 && (!origenLoc || !destinoLoc)) { alert("Seleccioná el origen y destino para continuar."); return; }
    if (paso === 3 && form.tipo === "Sobres" && (!cantidadSobres || cantidadSobres < 1)) {
      alert("Ingresá la cantidad de sobres."); return;
    }
    if (paso === 3 && !destinatario.localidad && destinoLoc) {
      setDestinatario(d => ({ ...d, localidad: destinoLoc }));
    }
    if (paso === 5) { handlePublicar(); return; }
    setPaso(p => p + 1);
    window.scrollTo(0, 0);
  }
  function pasoAnterior() {
    if (paso === 1) { onNav("empresa-dashboard"); return; }
    setPaso(p => p - 1);
    window.scrollTo(0, 0);
  }

  useEffect(() => {
    if (origenLoc && destinoLoc) {
      const matches = TRANSPORTISTAS_MOCK.filter(t =>
        t.rutas.some(r => r.toLowerCase().includes(origenProv.toLowerCase()) || r.toLowerCase().includes(origenLoc.toLowerCase()))
      );
      setTransportistasMatch(matches);
    } else {
      setTransportistasMatch([]);
    }
  }, [origenLoc, destinoLoc, origenProv]);

  // ── Gestión de paquetes ────────────────────────────────────────────────────
  function agregarPaquete() {
    setPaquetes(prev => [...prev, { id: Date.now(), largo: "", ancho: "", alto: "", peso: "", cantidad: "1" }]);
  }
  function eliminarPaquete(id) {
    if (paquetes.length === 1) return;
    setPaquetes(prev => prev.filter(p => p.id !== id));
  }
  function updatePaquete(id, field, value) {
    setPaquetes(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
  }

  // ── Cálculos del cotizador (por paquete y totales) ─────────────────────────
  const paquetesCalc = paquetes.map(p => {
    const l = parseFloat(p.largo) || 0;
    const a = parseFloat(p.ancho) || 0;
    const h = parseFloat(p.alto)  || 0;
    const w = parseFloat(p.peso)  || 0;
    const q = parseInt(p.cantidad) || 1;
    const volUnit  = (l > 0 && a > 0 && h > 0) ? parseFloat(((l * a * h) / 4000).toFixed(3)) : 0;
    const volTotal = parseFloat((volUnit * q).toFixed(2));
    const realTotal = parseFloat((w * q).toFixed(2));
    const cobrable  = parseFloat(Math.max(volTotal, realTotal).toFixed(2));
    const completo  = l > 0 && a > 0 && h > 0 && w > 0;
    return { ...p, l, a, h, w, q, volUnit, volTotal, realTotal, cobrable, completo };
  });

  const totalBultos    = paquetesCalc.reduce((s, p) => s + p.q, 0);
  const totalVolumen   = parseFloat(paquetesCalc.reduce((s, p) => s + p.volTotal, 0).toFixed(2));
  const totalPesoReal  = parseFloat(paquetesCalc.reduce((s, p) => s + p.realTotal, 0).toFixed(2));
  const totalCobrable  = parseFloat(Math.max(totalVolumen, totalPesoReal).toFixed(2));
  const hayPaquetes    = paquetesCalc.some(p => p.completo);

  const km = estimarKm(origenProv, destinoProv);
  const estimado = hayPaquetes && km ? calcularEstimado(totalCobrable, km) : null;

  async function handlePublicar() {
    if (!origenLoc || !origenProv) { alert("Seleccioná el origen desde el listado de sugerencias."); return; }
    if (!destinoLoc || !destinoProv) { alert("Seleccioná el destino desde el listado de sugerencias."); return; }
    if (!form.retiro) { alert("Completá la fecha de retiro."); return; }
    if (!destinatario.nombre || !destinatario.telefono) { alert("Completá el nombre y teléfono del destinatario."); return; }
    if (fotos.length === 0) { alert("La foto del paquete es obligatoria."); return; }
    setSubiendo(true);
    const id = Date.now();
    let fotosBase64 = [];
    try {
      fotosBase64 = await Promise.all(fotos.map(f => comprimirImagen(f.file)));
    } catch (err) {
      setSubiendo(false);
      alert("Error al procesar las fotos. Intentá con otra imagen.");
      return;
    }
    setSubiendo(false);
    const pesoTexto = hayPaquetes ? `${totalCobrable} kg cobrable` : "— kg";
    const nuevaCarga = {
      id,
      tipoEnvio: "larga-distancia",
      empresa: USUARIO_CLIENTE.nombre,
      origen: `${origenLoc}, ${origenProv}`,
      destino: `${destinoLoc}, ${destinoProv}`,
      tipo: form.tipo,
      peso: pesoTexto,
      retiro: form.retiro,
      entrega: form.entrega || "—",
      estado: "nueva",
      ofertas: 0,
      matchRuta: transportistasMatch.length > 0,
      descripcion: form.descripcion,
      especial: form.especial,
      cantidadSobres: form.tipo === "Sobres" ? cantidadSobres : null,
      observacionSistema: form.tipo === "Sobres" ? "Documentación importante — requiere manejo cuidadoso y entrega con firma." : null,
      direccionRetiro,
      destinatario: {
        nombre: destinatario.nombre,
        telefono: destinatario.telefono,
        domicilio: `${[destinatario.calle, destinatario.numero].filter(Boolean).join(' ')}${destinatario.localidad ? ", " + destinatario.localidad : ""}`,
        ciudad: `${destinoLoc}, ${destinoProv}`,
        referencia: destinatario.referencia,
        maps: destinatario.maps,
      },
      paquetes: hayPaquetes ? paquetesCalc.map(p => ({
        largo: p.l, ancho: p.a, alto: p.h, peso: p.w, cantidad: p.q,
        volUnit: p.volUnit, volTotal: p.volTotal, realTotal: p.realTotal, cobrable: p.cobrable
      })) : null,
      totalBultos: hayPaquetes ? totalBultos : null,
      totalVolumen: hayPaquetes ? totalVolumen : null,
      totalPesoReal: hayPaquetes ? totalPesoReal : null,
      totalCobrable: hayPaquetes ? totalCobrable : null,
      estimadoMin: estimado?.min || null,
      estimadoMax: estimado?.max || null,
      km,
      fotoBase64: fotosBase64[0] || null,
      fotosBase64,
      empresaId: USUARIO_CLIENTE.id,
      publishedAt: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }),
      publishedDate: new Date().toLocaleDateString("es-AR"),
      quienPaga,
    };
    fbSetItem('cargas', nuevaCarga);
    setEnviado(true);
    setTimeout(() => { onNav("empresa-dashboard"); }, 2200);
  }

  if (enviado) return (
    <div style={{ minHeight: "60vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ textAlign: "center", maxWidth: 400, padding: "0 20px" }}>
        <div style={{ fontSize: 56 }}>✅</div>
        <h2 style={{ marginTop: 12, fontSize: 22 }}>¡Carga publicada!</h2>
        <p style={{ color: "#555", marginTop: 10, fontSize: 15, lineHeight: 1.5 }}>
          Notificamos a <strong style={{ color: "#E85D20" }}>{transportistasMatch.length > 0 ? transportistasMatch.length : "los"} transportistas</strong> que hacen esta ruta.
        </p>
        {estimado && (
          <div style={{ marginTop: 16, padding: 14, background: "#FEF3EC", borderRadius: 10 }}>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>Precio estimado · {totalBultos} bulto{totalBultos > 1 ? "s" : ""} · {totalCobrable} kg cobrable</div>
            <div style={{ fontWeight: 700, fontSize: 22, color: "#E85D20" }}>{formatPesos(estimado.min)} – {formatPesos(estimado.max)}</div>
            <div style={{ fontSize: 11, color: "#999", marginTop: 4 }}>Referencia de mercado. Las ofertas reales varían.</div>
          </div>
        )}
        <div style={{ marginTop: 12, padding: 10, background: "#F5F5F5", borderRadius: 8, fontSize: 12, color: "#666" }}>
          El transportista va a ver la carga al recargar su app. 🔄
        </div>
        <p style={{ color: "#aaa", fontSize: 12, marginTop: 10 }}>Redirigiendo...</p>
      </div>
    </div>
  );

  // ── Estilos para la tabla de paquetes ─────────────────────────────────────
  const thStyle = { fontSize: 11, color: "#888", fontWeight: 600, padding: "6px 4px", textAlign: "center", borderBottom: "2px solid #E0E0E0", whiteSpace: "nowrap" };
  const tdStyle = { padding: "6px 3px", verticalAlign: "middle" };
  const inputTd = { fontSize: 13, textAlign: "center", padding: "7px 4px", width: "100%" };

  // ── Barra de progreso ──────────────────────────────────────────────────────
  const BarraProgreso = () => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0, marginBottom: 8 }}>
        {LABELS_PASO.map((label, i) => {
          const num = i + 1;
          const activo = num === paso;
          const completo = num < paso;
          return (
            <React.Fragment key={num}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: completo ? "#0F6E56" : activo ? "#E85D20" : "#E0E0E0", color: completo || activo ? "#fff" : "#999", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, transition: "all 0.2s" }}>
                  {completo ? "✓" : num}
                </div>
                <span style={{ fontSize: 10, color: activo ? "#E85D20" : completo ? "#0F6E56" : "#aaa", fontWeight: activo ? 600 : 400, whiteSpace: "nowrap" }}>{label}</span>
              </div>
              {i < LABELS_PASO.length - 1 && (
                <div style={{ width: TOTAL_PASOS > 4 ? 22 : 40, height: 2, background: completo ? "#0F6E56" : "#E0E0E0", marginBottom: 18, transition: "background 0.2s" }} />
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );

  // ── Botones de navegación ──────────────────────────────────────────────────
  const BotonesNav = ({ labelContinuar }) => (
    <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
      <button className="btn-secondary" onClick={pasoAnterior} style={{ flex: 1 }}>
        {paso === 1 ? "Cancelar" : "← Atrás"}
      </button>
      <button className="btn-primary" onClick={siguientePaso} style={{ flex: 2 }}>
        {labelContinuar || "Continuar →"}
      </button>
    </div>
  );

  return (
    <div style={{ maxWidth: 620, margin: "0 auto", padding: "16px 12px", width: "100%" }}>
      <BarraProgreso />
      <div>

        {/* ══ PASO 1: RUTA ══ */}
        {paso === 1 && <div className="card" style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 16 }}>Ruta</h3>
          <div className="form-group">
            <label>Dirección de retiro</label>
            <input value={direccionRetiro} onChange={e => setDireccionRetiro(e.target.value)} placeholder="Calle, número, ciudad" />
            {direccionRetiro === USUARIO_CLIENTE.direccion && (
              <p style={{ fontSize: 11, color: "#0F6E56", marginTop: 4 }}>✓ Usando tu dirección registrada</p>
            )}
          </div>
          <div className="g2" style={{ gap: 20 }}>
            <CiudadAutocomplete
              label="Origen" required
              value={origenLoc ? `${origenLoc}${origenProv ? ", " + origenProv : ""}` : ""}
              onChange={(ciudad, prov) => { setOrigenLoc(ciudad); setOrigenProv(prov); }}
              mostrarGPS={true}
              placeholder="Ej: Posadas, Misiones"
            />
            <CiudadAutocomplete
              label="Destino" required
              value={destinoLoc ? `${destinoLoc}${destinoProv ? ", " + destinoProv : ""}` : ""}
              onChange={(ciudad, prov) => { setDestinoLoc(ciudad); setDestinoProv(prov); }}
              placeholder="Ej: Puerto Iguazú, Misiones"
            />
          </div>
          {km && origenProv && destinoProv && (
            <div style={{ marginTop: 12, fontSize: 12, color: "#888" }}>
              📍 Distancia estimada: <strong style={{ color: "#1A1A1A" }}>{km.toLocaleString()} km</strong>
            </div>
          )}
          {origenLoc && destinoLoc && transportistasMatch.length > 0 && (
            <div style={{ marginTop: 12, padding: 10, background: "#F5F5F5", borderRadius: 8 }}>
              <div style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>
                {transportistasMatch.length} transportista{transportistasMatch.length > 1 ? "s hacen" : " hace"} esta ruta:
              </div>
              {transportistasMatch.map(t => (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: "1px solid #E8E8E8" }}>
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#2C2C2A", display: "flex", alignItems: "center", justifyContent: "center", color: "#E85D20", fontSize: 10, fontWeight: 700 }}>{t.foto}</div>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{t.nombre}</span>
                  {t.verificado && <span className="badge badge-verificado" style={{ fontSize: 10 }}>✓</span>}
                  <span style={{ fontSize: 12, color: "#E85D20", marginLeft: "auto" }}>★ {t.calificacion}</span>
                </div>
              ))}
            </div>
          )}
        </div>}

        {/* ══ PASO 2: QUÉ MANDÁS ══ */}
        {paso === 2 && <div className="card" style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 16 }}>¿Qué mandás?</h3>
          <div className="form-group">
            <label>Tipo de envío</label>
            <div className="g4">
              {[
                { val: "General", icon: "📦", desc: "Mercadería general" },
                { val: "Refrigerado", icon: "❄️", desc: "Necesita frío" },
                { val: "Granel", icon: "🏗️", desc: "Graneles o áridos" },
                { val: "Fruta/verdura", icon: "🥦", desc: "Perecederos" },
                { val: "Ganado", icon: "🐄", desc: "Animales" },
                { val: "Sobres", icon: "✉️", desc: "Documentos / sobres" },
                { val: "Pallets", icon: "🪵", desc: "Carga paletizada" },
                { val: "Otro", icon: "💬", desc: "Lo describo abajo" },
              ].map(t => (
                <div key={t.val} onClick={() => setForm({...form, tipo: t.val})}
                  style={{ border: `2px solid ${form.tipo === t.val ? "#E85D20" : "#E0E0E0"}`, borderRadius: 8, padding: "10px 8px", cursor: "pointer", background: form.tipo === t.val ? "#FEF3EC" : "#fff", textAlign: "center" }}>
                  <div style={{ fontSize: 20 }}>{t.icon}</div>
                  <div style={{ fontSize: 12, fontWeight: 500, marginTop: 4 }}>{t.val}</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>{t.desc}</div>
                </div>
              ))}
            </div>
          </div>
          {form.tipo === "Sobres" && (
            <div style={{ background: "#EBF3FD", border: "1px solid #B5D4F4", borderRadius: 8, padding: "10px 14px", marginBottom: 12, display: "flex", gap: 10, alignItems: "flex-start" }}>
              <span style={{ fontSize: 16, flexShrink: 0 }}>📋</span>
              <p style={{ fontSize: 13, color: "#0C447C", margin: 0, lineHeight: 1.5 }}>

          <div className="form-group">
            <label>¿Necesitás algo especial?</label>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {[{ val: "normal", label: "Normal" }, { val: "fragil", label: "⚠️ Frágil" }, { val: "refrigerado", label: "❄️ Refrigerado" }, { val: "contrareembolso", label: "💵 Contra reembolso" }].map(o => (

            <label>Descripción (opcional)</label>
            <input value={form.descripcion} onChange={e => setForm({...form, descripcion: e.target.value})} placeholder="Ej: ropa, repuestos, documentación..." />
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div>
              <h3 style={{ fontSize: 15, fontWeight: 600, color: "#E85D20" }}>📐 Cotizador automático</h3>
              <p style={{ fontSize: 12, color: "#888", marginTop: 2 }}>Ingresá las medidas de cada bulto. Se calcula el peso cobrable y el precio estimado.</p>
            </div>
            <span style={{ fontSize: 10, background: "#FEF3EC", color: "#C44A0F", padding: "3px 8px", borderRadius: 5, fontWeight: 600 }}>REFERENCIAL</span>
          </div>

          {/* Tabla */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: "#F9F9F9" }}>
                  <th style={{ ...thStyle, width: 32 }}>#</th>
                  <th style={thStyle}>Largo<br/><span style={{ fontWeight: 400, fontSize: 10 }}>cm</span></th>
                  <th style={thStyle}>Ancho<br/><span style={{ fontWeight: 400, fontSize: 10 }}>cm</span></th>
                  <th style={thStyle}>Alto<br/><span style={{ fontWeight: 400, fontSize: 10 }}>cm</span></th>
                  <th style={thStyle}>Peso real<br/><span style={{ fontWeight: 400, fontSize: 10 }}>kg</span></th>
                  <th style={thStyle}>Cant.</th>
                  <th style={{ ...thStyle, color: "#185FA5" }}>Vol. total<br/><span style={{ fontWeight: 400, fontSize: 10 }}>kg</span></th>
                  <th style={{ ...thStyle, color: "#E85D20" }}>Cobrable<br/><span style={{ fontWeight: 400, fontSize: 10 }}>kg</span></th>
                  <th style={{ ...thStyle, width: 28 }}></th>
                </tr>
              </thead>
              <tbody>
                {paquetesCalc.map((p, i) => (
                  <tr key={p.id} style={{ borderBottom: "1px solid #F0F0F0", background: i % 2 === 0 ? "#fff" : "#FAFAFA" }}>
                    <td style={{ ...tdStyle, textAlign: "center", color: "#999", fontWeight: 600 }}>{i + 1}</td>
                    {["largo", "ancho", "alto", "peso"].map(field => (
                      <td key={field} style={tdStyle}>
                        <input type="number" min="0" step="0.1" value={p[field]}
                          onChange={e => updatePaquete(p.id, field, e.target.value)}
                          placeholder="—"
                          style={{ ...inputTd, border: "1px solid #E0E0E0", borderRadius: 6, background: "#fff" }}
                        />
                      </td>
                    ))}
                    <td style={tdStyle}>
                      <input type="number" min="1" step="1" value={p.cantidad}
                        onChange={e => updatePaquete(p.id, "cantidad", e.target.value)}
                        placeholder="1"
                        style={{ ...inputTd, border: "1px solid #E0E0E0", borderRadius: 6, background: "#fff", width: 54 }}
                      />
                    </td>
                    <td style={{ ...tdStyle, textAlign: "center", color: p.completo ? "#185FA5" : "#ccc", fontWeight: p.completo ? 600 : 400 }}>
                      {p.completo ? p.volTotal : "—"}
                    </td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>
                      {p.completo ? (
                        <span style={{ background: p.volTotal > p.realTotal ? "#E6F1FB" : "#FEF3EC", color: p.volTotal > p.realTotal ? "#185FA5" : "#E85D20", borderRadius: 5, padding: "2px 7px", fontWeight: 700, fontSize: 13 }}>
                          {p.cobrable}
                        </span>
                      ) : <span style={{ color: "#ccc" }}>—</span>}
                    </td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>
                      {paquetes.length > 1 && (
                        <button onClick={() => eliminarPaquete(p.id)}
                          style={{ background: "none", border: "none", color: "#ccc", fontSize: 18, cursor: "pointer", lineHeight: 1, padding: "0 2px" }}
                          title="Eliminar este bulto">×</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Botón agregar */}
          <div style={{ marginTop: 10 }}>
            <button onClick={agregarPaquete}
              style={{ background: "#FEF3EC", color: "#E85D20", border: "1.5px dashed #E85D20", borderRadius: 8, padding: "7px 16px", fontSize: 13, fontWeight: 500, cursor: "pointer", width: "100%" }}>
              + Agregar otro bulto
            </button>
          </div>

          {/* Fórmula explicada */}
          <div style={{ marginTop: 12, padding: "6px 10px", background: "#FAFAFA", borderRadius: 6, fontSize: 11, color: "#aaa" }}>
            Peso volumétrico = (Largo × Ancho × Alto) ÷ 4.000 × Cantidad · Cobrable = el mayor entre vol. y real
          </div>

          {/* Totales y precio estimado */}
          {hayPaquetes && (
            <div style={{ marginTop: 14, borderRadius: 10, overflow: "hidden", border: "1px solid #E0E0E0" }}>
              <div className="g4" style={{ background: "#F9F9F9", padding: "12px 16px", borderBottom: "1px solid #E0E0E0" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "#888", marginBottom: 3 }}>Total bultos</div>
                  <div style={{ fontWeight: 700, fontSize: 18 }}>{totalBultos}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "#888", marginBottom: 3 }}>Peso real total</div>
                  <div style={{ fontWeight: 600, fontSize: 16 }}>{totalPesoReal} kg</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "#185FA5", marginBottom: 3, fontWeight: 600 }}>Peso vol. total</div>
                  <div style={{ fontWeight: 600, fontSize: 16, color: "#185FA5" }}>{totalVolumen} kg</div>
                </div>
                <div style={{ textAlign: "center", background: "#FEF3EC", borderRadius: 8, padding: "8px 4px" }}>
                  <div style={{ fontSize: 11, color: "#C44A0F", marginBottom: 3, fontWeight: 600 }}>⚠️ Total cobrable</div>
                  <div style={{ fontWeight: 800, fontSize: 20, color: "#E85D20" }}>{totalCobrable} kg</div>
                  <div style={{ fontSize: 10, color: "#999" }}>{totalVolumen > totalPesoReal ? "vol. mayor" : "real mayor"}</div>
                </div>
              </div>

              {estimado ? (
                <div style={{ padding: "16px", background: "#fff", textAlign: "center" }}>
                  <div style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>
                    Precio estimado para esta ruta (~{km?.toLocaleString()} km · {totalCobrable} kg cobrable)
                  </div>
                  <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 10 }}>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#0F6E56" }}>{formatPesos(estimado.min)}</div>
                    <div style={{ fontSize: 20, color: "#ddd" }}>–</div>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#E85D20" }}>{formatPesos(estimado.max)}</div>
                  </div>
                  <div style={{ fontSize: 11, color: "#999", marginTop: 6 }}>
                    Referencia de mercado NEA. Las ofertas reales de los transportistas pueden variar.
                  </div>
                </div>
              ) : (
                <div style={{ padding: "12px 16px", background: "#fff", textAlign: "center", color: "#999", fontSize: 13 }}>
                  Seleccioná origen y destino para ver el precio estimado.
                </div>
              )}
            </div>
          )}
        </div>}

        {/* ══ PASO 4: DESTINATARIO + FECHAS ══ */}
        {paso === 4 && <div className="card" style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 4 }}>👤 ¿A quién va el envío?</h3>
          <p style={{ fontSize: 12, color: "#888", marginBottom: 14 }}>Estos datos los usa el chofer para entregar y contactar al destinatario.</p>

          <div className="g2">
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Nombre completo *</label>
              <input value={destinatario.nombre} onChange={e => setDestinatario({...destinatario, nombre: e.target.value.replace(/(^|\s)\S/g, c => c.toUpperCase())})} autoCapitalize="words" placeholder="Ej: Juan García / Distribuidora Norte" />
            </div>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Teléfono / WhatsApp *</label>
              <input type="tel" value={destinatario.telefono} onChange={e => setDestinatario({...destinatario, telefono: e.target.value})} placeholder="Ej: 3764 123456" />
            </div>
          </div>

          <div className="g2-1" style={{ marginTop: 12 }}>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Calle y número</label>
              <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:8 }}>
                <input value={destinatario.calle} onChange={e => setDestinatario({...destinatario, calle: e.target.value.replace(/(^|\s)\S/g, c => c.toUpperCase())})} autoCapitalize="words" placeholder="Calle / Av." />
                <input value={destinatario.numero} onChange={e => setDestinatario({...destinatario, numero: e.target.value})} placeholder="Nro." inputMode="numeric" />
              </div>
            </div>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Localidad</label>
              <input value={destinatario.localidad} onChange={e => setDestinatario({...destinatario, localidad: e.target.value})} placeholder="Ej: Posadas" />
            </div>
          </div>

          <div className="form-group" style={{ marginTop: 12, marginBottom: 0 }}>
            <label>Referencia / aclaraciones <span style={{ fontWeight: 400, color: "#aaa" }}>(opcional)</span></label>
            <input value={destinatario.referencia} onChange={e => setDestinatario({...destinatario, referencia: e.target.value})} placeholder="Ej: Casa azul, portero 3B, entregar después de las 10hs..." />
          </div>

          <div className="form-group" style={{ marginTop: 12, marginBottom: 0 }}>
            <label>Link de Google Maps <span style={{ fontWeight: 400, color: "#aaa" }}>(opcional)</span></label>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={destinatario.maps} onChange={e => setDestinatario({...destinatario, maps: e.target.value})} placeholder="https://maps.google.com/..." />
              {destinatario.maps && (
                <a href={destinatario.maps} target="_blank" rel="noreferrer"
                  style={{ background: "#E85D20", color: "#fff", border: "none", borderRadius: 8, padding: "0 14px", fontSize: 16, display: "flex", alignItems: "center", textDecoration: "none", flexShrink: 0 }}>📍</a>
              )}
            </div>
          </div>
        </div>}

        {/* ── Quién paga el flete (solo paso 4) ── */}
        {paso === 4 && <div className="card" style={{ marginBottom: 16, marginTop: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 4 }}>💰 ¿Quién paga el flete?</h3>
          <p style={{ fontSize: 12, color: "#888", marginBottom: 14 }}>El transportista va a ver esto antes de ofertar.</p>
          <div style={{ display: "flex", gap: 10 }}>
            {[{ k: "remitente", l: "🏪 Yo pago ahora", d: "El flete se cobra al dejar el paquete." },
              { k: "destinatario", l: "📦 Paga al recibir", d: "El chofer cobra al hacer la entrega." }].map(op => (
              <div key={op.k} onClick={() => setQuienPaga(op.k)}
                style={{ flex: 1, padding: "12px 10px", border: quienPaga === op.k ? "2px solid #E85D20" : "1px solid #E0E0E0",
                  borderRadius: 10, cursor: "pointer", background: quienPaga === op.k ? "#FEF3EC" : "#fff", textAlign: "center" }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: quienPaga === op.k ? "#E85D20" : "#1A1A1A", marginBottom: 4 }}>{op.l}</div>
                <div style={{ fontSize: 11, color: "#888", lineHeight: 1.4 }}>{op.d}</div>
              </div>
            ))}
          </div>
        </div>}

        {/* ── Fechas + botón continuar (solo paso 4) ── */}
        {paso === 4 && <>
          <div className="card" style={{ marginBottom: 24 }}>
            <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 14 }}>Fechas</h3>
            <div className="g2">
              <div className="form-group" style={{ marginBottom: 0 }}>
                <label>Fecha de retiro deseada *</label>
                <input type="date" value={form.retiro} onChange={e => setForm({...form, retiro: e.target.value})} />
              </div>
              <div className="form-group" style={{ marginBottom: 0 }}>
                <label>Fecha de entrega deseada</label>
                <input type="date" value={form.entrega} onChange={e => setForm({...form, entrega: e.target.value})} />
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn-secondary" onClick={pasoAnterior} style={{ flex: 1 }}>← Atrás</button>
            <button className="btn-primary" onClick={siguientePaso} style={{ flex: 2 }}>Continuar →</button>
          </div>
        </>}

        {/* ══ PASO 5: FOTO ══ */}
        {paso === 5 && <div className="card" style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: 15, fontWeight: 500, marginBottom: 4 }}>Foto del paquete</h3>
          <p style={{ fontSize: 12, color: "#888", marginBottom: 16 }}>Hasta 4 fotos · se comprimen automáticamente</p>
          <input ref={inputCamaraRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
            onChange={e => { const f = e.target.files[0]; if (f) { if (fotos.length >= 4) return; if (f.size > 20*1024*1024) { alert("La foto no puede superar 20 MB."); return; } setFotos(prev => [...prev, { file: f, preview: URL.createObjectURL(f) }]); } e.target.value = ''; }} />
          <input ref={inputGaleriaRef} type="file" accept="image/*" style={{ display: "none" }}
            onChange={e => { const f = e.target.files[0]; if (f) { if (fotos.length >= 4) return; if (f.size > 20*1024*1024) { alert("La foto no puede superar 20 MB."); return; } setFotos(prev => [...prev, { file: f, preview: URL.createObjectURL(f) }]); } e.target.value = ''; }} />
          {fotos.length > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8, marginBottom: 10 }}>
              {fotos.map((f, i) => (
                <div key={i} style={{ position: "relative", aspectRatio: "1", borderRadius: 10, overflow: "hidden" }}>
                  <img src={f.preview} alt={`Foto ${i+1}`} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  <button onClick={() => setFotos(prev => prev.filter((_, j) => j !== i))}
                    style={{ position: "absolute", top: 6, right: 6, width: 24, height: 24, borderRadius: "50%", background: "rgba(0,0,0,0.55)", border: "none", color: "#fff", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "rgba(0,0,0,0.3)", padding: "3px 6px", fontSize: 10, color: "#fff" }}>Foto {i+1}</div>
                </div>
              ))}
            </div>
          )}
          {fotos.length < 4 && (
            <div style={{ display: "flex", gap: 8 }}>
              <div onClick={() => inputCamaraRef.current && inputCamaraRef.current.click()}
                style={{ flex: 1, border: "2px dashed #E85D20", borderRadius: 10, padding: "20px 8px", background: "#FEF3EC", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: "pointer" }}>
                <div style={{ fontSize: 30 }}>📷</div>
                <div style={{ fontSize: 11, color: "#E85D20", fontWeight: 500, textAlign: "center" }}>Tomar foto</div>
              </div>
              <div onClick={() => inputGaleriaRef.current && inputGaleriaRef.current.click()}
                style={{ flex: 1, border: "1.5px dashed #DDE3EA", borderRadius: 10, padding: "20px 8px", background: "#F8F9FA", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: "pointer" }}>
                <div style={{ fontSize: 30 }}>🖼️</div>
                <div style={{ fontSize: 11, color: "#888", fontWeight: 500, textAlign: "center" }}>Subir de galería</div>
              </div>
            </div>
          )}
          {fotos.length > 0 && (
            <div style={{ marginTop: 10, fontSize: 12, color: "#0F6E56", textAlign: "center" }}>
              ✓ {fotos.length} foto{fotos.length > 1 ? 's' : ''} · {4 - fotos.length > 0 ? `podés agregar ${4 - fotos.length} más` : 'máximo alcanzado'}
            </div>
          )}
        </div>}

        {/* ── Botón publicar paso 5 ── */}
        {paso === 5 && (
          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <button className="btn-secondary" onClick={pasoAnterior} style={{ flex: 1 }}>← Atrás</button>
            <button
              className="btn-primary"
              onClick={handlePublicar}
              disabled={fotos.length === 0 || subiendo}
              style={{ flex: 2, opacity: (fotos.length === 0 || subiendo) ? 0.55 : 1 }}
            >{subiendo ? "Procesando foto..." : "Publicar carga"}</button>
          </div>
        )}

        {/* ── Botones navegación pasos 1-3 ── */}
        {paso < 4 && <BotonesNav />}
      </div>
    </div>
  );
}

// ─── VER OFERTAS ──────────────────────────────────────────────────────────────
function VerOfertas({ onNav, cargaSeleccionada, onAceptar }) {
  const [cargas, setCargas] = useState([]);
  const [ofertas, setOfertas] = useState([]);
  const [remitos, setRemitos] = useState([]);
  const [aceptada, setAceptada] = useState(null);
  const [cerrado, setCerrado] = useState(false);
  const [procesando, setProcesando] = useState(false);
  const [ordenar, setOrdenar] = useState("precio");

  const carga = cargaSeleccionada || cargas.find(c => c.estado === "activo") || cargas[0] || null;

  useEffect(() => {
    const unsubC = fbListen('cargas', arr => setCargas(arr));
    const unsubO = fbListen('ofertas', arr => {
      const cargaId = cargaSeleccionada?.id || 1;
      setOfertas(arr.filter(o => o.cargaId === cargaId));
    });
    const unsubR = fbListen('remitos', arr => setRemitos(arr));
    return () => { unsubC(); unsubO(); unsubR(); };
  }, [cargaSeleccionada?.id]);

  // Calcula el promedio real de calificaciones de un transportista
  function ratingReal(nombreTransportista) {
    const califs = remitos
      .filter(r => r.transportistaNombre === nombreTransportista && r.calificacionTransportista > 0)
      .map(r => r.calificacionTransportista);
    if (califs.length === 0) return null;
    return parseFloat((califs.reduce((a, b) => a + b, 0) / califs.length).toFixed(1));
  }

  // Cuenta viajes completados de un transportista
  function viajesReales(nombreTransportista) {
    return remitos.filter(r => r.transportistaNombre === nombreTransportista && r.estado === "entregado").length;
  }

  const ofertasConRating = ofertas.map(o => ({
    ...o,
    ratingCalculado: ratingReal(o.transportistaNombre),
    viajesCalculados: viajesReales(o.transportistaNombre),
  }));

  const ofertasOrdenadas = [...ofertasConRating].sort((a, b) => {
    if (ordenar === "precio") return a.precio - b.precio;
    return (b.ratingCalculado || 0) - (a.ratingCalculado || 0);
  });

  function aceptarOferta(ofertaId) {
    if (procesando || cerrado) return;   // evitar doble tap
    setProcesando(true);
    const oferta = ofertas.find(o => o.id === ofertaId);
    if (!oferta) { setProcesando(false); return; }

    // Buscar perfil fresco de Firebase antes de crear el remito
    // Garantiza datos correctos sin importar qué haya en localStorage
    const _tel = (USUARIO_CLIENTE?.telefono || "").replace(/\D/g, '');
    const _crearRemito = (perfil) => {
      const remito = {
      id: "FL-" + (Date.now() % 900000 + 100000),
      fecha: new Date().toLocaleDateString("es-AR"),
      hora: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }),
      remitente: {
        nombre:      perfil.nombre      || USUARIO_CLIENTE.nombre,
        razonSocial: perfil.razonSocial || perfil.nombre || USUARIO_CLIENTE.nombre,
        cuit:        perfil.cuit        || "",
        telefono:    perfil.telefono    || "",
        domicilio:   carga.direccionRetiro || perfil.direccion || "",
        ciudad:      carga.origen,
      },
      destinatario: {
        nombre:     carga.destinatario?.nombre     || "",
        telefono:   carga.destinatario?.telefono   || "",
        domicilio:  carga.destinatario?.domicilio  || "",
        ciudad:     carga.destinatario?.ciudad     || carga.destino,
        referencia: carga.destinatario?.referencia || "",
        maps:       carga.destinatario?.maps       || "",
      },
      envio: { descripcion: carga.descripcion || carga.tipo, tipo: carga.tipo, peso: carga.peso, pesoCobrable: carga.totalCobrable || null, especial: carga.especial || "normal", bultos: carga.bultos || "1", pagaFlete: "remitente" },
      observacionSistema: carga.observacionSistema || null,
      transportista: { nombre: oferta.transportistaNombre, chofer: oferta.transportistaNombre, telefono: oferta.fleteroTelefono || "", vehiculo: oferta.vehiculo },
      flete: oferta.precio,
      estado: "pendiente-retiro",
      retiro: oferta.retiro,
      entregaEst: oferta.entrega,
      cargaId: carga.id,
      transportistaId: oferta.transportistaId,
      transportistaNombre: oferta.transportistaNombre,
      empresaNombre: perfil.nombre || USUARIO_CLIENTE.nombre,
      empresaId: USUARIO_CLIENTE.id,
      esFletero: !!oferta.esFletero,
      fleteroId: oferta.fleteroId || null,
      fleteroNombre: oferta.fleteroNombre || null,
      fotoUrl: (carga.fotosBase64 && carga.fotosBase64[0]) || carga.fotoBase64 || null,
      fotosUrl: carga.fotosBase64 || null,
      quienPaga: carga.quienPaga || 'remitente',
      };
      fbSetItem('remitos', remito);
      fbUpdate('cargas', carga.id, { estado: "en-camino", transportistaAsignado: oferta.transportistaNombre });
      setAceptada(ofertaId);
      setCerrado(true);
      setTimeout(() => { if (onAceptar) onAceptar(remito); }, 1800);
    }; // fin _crearRemito

    // Buscar perfil en Firebase para garantizar datos frescos
    if (_tel) {
      db.ref(`clientes/${_tel}`).get()
        .then(snap => _crearRemito(snap.exists() ? { ...USUARIO_CLIENTE, ...snap.val() } : USUARIO_CLIENTE))
        .catch(() => _crearRemito(USUARIO_CLIENTE));
    } else {
      _crearRemito(USUARIO_CLIENTE);
    }
  }

  const menorPrecio = ofertasConRating.length > 0 ? Math.min(...ofertasConRating.map(o => o.precio)) : 0;
  const maxRating   = ofertasConRating.length > 0 ? Math.max(...ofertasConRating.map(o => o.ratingCalculado || 0)) : 0;

  return (
    <PageWrapper titulo="Comparar ofertas" subtitulo={`${carga.origen} → ${carga.destino} · ${carga.tipo}`}>
      <div style={{ maxWidth: 700 }}>

// Estados internos completos (para el remito)
const ESTADOS_REMITO = [
  { id: "pendiente-retiro", label: "Pendiente de retiro" },
  { id: "retirado",         label: "Mercadería retirada" },
  { id: "en-deposito",      label: "En depósito" },
  { id: "cargando-ruta",    label: "Cargado en vehículo" },
  { id: "en-camino",        label: "En camino" },
  { id: "entregado",        label: "Entregado" },
];
// Solo 3 pasos visibles para el cliente
const ESTADOS_CLIENTE = [
  { id: "retirado",  label: "Retirado" },
  { id: "en-camino", label: "En camino" },
  { id: "entregado", label: "Entregado" },
];
function estadoCliente(estado) {
  if (["retirado", "en-deposito", "cargando-ruta"].includes(estado)) return "retirado";
  if (["en-camino", "en-sucursal"].includes(estado)) return "en-camino";
  if (estado === "entregado")  return "entregado";
  return null; // pendiente-retiro: ningún paso completado
}

function QRCode({ value, size = 120 }) {
  const [imgOk, setImgOk] = useState(true);
  const encoded = encodeURIComponent(value);
  const src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encoded}&color=2C2C2A&bgcolor=ffffff&margin=4`;
  if (!imgOk) {
    return (
      <div style={{ width: size, height: size, background: "#F5F5F5", border: "2px dashed #ccc", borderRadius: 8, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4, padding: 8 }}>
        <div style={{ fontSize: 28 }}>📱</div>
        <div style={{ fontSize: 9, color: "#888", textAlign: "center", lineHeight: 1.3 }}>QR disponible<br/>con internet</div>
      </div>
    );
  }
  return <img src={src} width={size} height={size} alt="QR del remito" style={{ display: "block", borderRadius: 6 }} onError={() => setImgOk(false)} />;
}

function SeguimientoEnvio({ onNav, cargaSeleccionada, onVerRemito }) {
  const [remito, setRemito] = useState(null);
  const [cargas, setCargas] = useState([]);

  useEffect(() => {
    const unsubC = fbListen('cargas', arr => setCargas(arr));
    const unsubR = fbListen('remitos', arr => {
      if (cargaSeleccionada) {
        setRemito(arr.find(r => r.cargaId === cargaSeleccionada.id) || null);
      } else {
        // 1) Activos de esta empresa (tienen empresaNombre + no entregado)
        const miActivo = arr.filter(r => r.empresaNombre === USUARIO_CLIENTE.nombre && r.estado !== "entregado");
        if (miActivo.length > 0) { setRemito(miActivo[miActivo.length - 1]); return; }
        // 2) Cualquier remito de esta empresa (aunque esté entregado)
        const mios = arr.filter(r => r.empresaNombre === USUARIO_CLIENTE.nombre);
        if (mios.length > 0) { setRemito(mios[mios.length - 1]); return; }
        // 3) Fallback: cualquier remito activo (para datos viejos sin empresaNombre)
        const activos = arr.filter(r => r.estado !== "entregado");
        setRemito(activos[activos.length - 1] || null);
      }
    });
    return () => { unsubC(); unsubR(); };
  }, [cargaSeleccionada?.id]);

  const carga = remito
    ? cargas.find(c => c.id === remito.cargaId) || { origen: remito.remitente?.ciudad, destino: remito.destinatario?.ciudad }
    : cargas.find(c => c.estado === "en-camino") || null;

  const estadoActual = remito?.estado || "en-camino";
  const estadoClienteActual = estadoCliente(estadoActual);
  const estadoIdx = ESTADOS_CLIENTE.findIndex(e => e.id === estadoClienteActual);

  return (
    <PageWrapper titulo="Seguimiento del envío" subtitulo={`${carga.origen} → ${carga.destino}`}>
      <div style={{ maxWidth: 600 }}>

        {remito && (
          <div style={{ marginBottom: 12, padding: "8px 12px", background: "#FEF3EC", borderRadius: 8, fontSize: 12, color: "#C44A0F" }}>
            🔄 Esta pantalla se actualiza automáticamente cuando el transportista cambia el estado.
          </div>
        )}

        <div className="card" style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h3 style={{ fontSize: 15, fontWeight: 500 }}>Estado actual</h3>
            <span className={`badge badge-${estadoClienteActual === "entregado" ? "entregado" : estadoClienteActual ? "en-camino" : "nueva"}`} style={{ fontSize: 13, padding: "5px 12px" }}>
              {estadoClienteActual === "entregado" ? "✓ Entregado" : estadoClienteActual === "en-camino" ? "🚛 En camino" : estadoClienteActual === "retirado" ? "📦 Retirado" : "⏳ Sin retirar"}
            </span>
          </div>
          <div>
            {ESTADOS_CLIENTE.map((paso, i) => {
              const done = estadoIdx >= 0 ? i < estadoIdx : false;
              const activo = i === estadoIdx;
              return (
                <div key={paso.id} style={{ display: "flex", alignItems: "flex-start", gap: 14, marginBottom: i < ESTADOS_CLIENTE.length - 1 ? 20 : 0 }}>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>

function ChatScreen({ onNav }) {
  const [mensajes, setMensajes] = useState([]);

  const bottomRef = useRef(null);

  useEffect(() => fbListen('chat', arr => setMensajes(arr.length > 0 ? arr : MENSAJES_SEMILLA)), []);

  function enviar() {
    if (!input.trim()) return;
    const msg = { id: Date.now(), de: "empresa", texto: input, hora: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }) };

  return (
    <PageWrapper titulo="Chat" subtitulo="Posadas → Buenos Aires · Transportes Norte SA">
