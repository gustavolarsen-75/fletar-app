    /* Toast de resultado */

    .toast.ok   { background: #0F6E56; color: #fff; }

<body>

<div id="app"></div>

<script>
// ─── PARÁMETROS DE URL ────────────────────────────────────────────────────────
function getParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    vehiculoId:   params.get('v') ? parseInt(params.get('v')) : null,
    vehiculoAlias: params.get('alias') || '',
    transportista: params.get('t') || '',
    fecha:         params.get('fecha') || new Date().toLocaleDateString('es-AR'),
    capacidadKg:   parseFloat(params.get('kg')) || 0,
    capacidadM3:   parseFloat(params.get('m3')) || 0,
  };
}

const params = getParams();

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let remitos = [];
let modalAbierto = null;         // { remitoId, tipo } 'entrega' | 'retiro'
let modalSucursalAbierto = null; // { remitoId } — picker de sucursal destino
let modalAutopickup     = null; // { remito } — paquete ajeno disponible para cargar
let formNombre = '';
let formDni = '';
let cargando = true;
let scannerActivo = false;
let html5QrScanner = null;
let sucursales = [];             // Lista de sucursales desde Firebase
// Estado depósito
let vistaDeposito = false;     // true = pantalla de depósito activa
let tabDeposito = 'depositar'; // 'depositar' | 'cargar'
let aDepositar    = new Set();   // Tab 1: IDs seleccionados para DEPOSITAR
let seleccionados = new Set();   // Tab 2 / Vuelta: IDs seleccionados para CARGAR a ruta
let verManifiesto = false;       // Override: mostrar manifiesto aunque todas estén entregadas

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
function cargarRemitos() {
  // Cargar sucursales para el modal "Dejé en sucursal"
  db.ref('sucursales').on('value', snap => {
    const val = snap.val();
    sucursales = val ? Object.values(val) : [];
  });

  db.ref('remitos').on('value', snap => {
    const val = snap.val();
    cargando = false;
    if (!val) { remitos = []; render(); return; }
    const todos = Object.values(val);

    remitos = todos
      .filter(r => {
        // Filtro por transportista
        if (params.transportista && r.transportistaNombre !== params.transportista) return false;
        if (!params.vehiculoId) return true;
        // Retiros: vehiculoAsignado para pickup
        const esRetiroVehiculo = r.vehiculoAsignado && r.vehiculoAsignado.id === params.vehiculoId;
        // Entregas: vehiculoRuta para ruta de entrega
        const esEntregaVehiculo = r.vehiculoRuta && r.vehiculoRuta.id === params.vehiculoId;
        // Sistema anterior: vehiculoId directo
        const delViaje = r.vehiculoId === params.vehiculoId;
        return esRetiroVehiculo || esEntregaVehiculo || delViaje;
      })
      .map(r => {
        if (!params.vehiculoId) return r;
        // Retiro: asignado a este vehículo para pickup, pendiente de retirar
        if (r.vehiculoAsignado && r.vehiculoAsignado.id === params.vehiculoId && r.estado === 'pendiente-retiro') {
          return { ...r, esRetiro: true };
        }
        // Entrega: asignado a este vehículo para ruta, en-camino o cargando
        if (r.vehiculoRuta && r.vehiculoRuta.id === params.vehiculoId &&
            (r.estado === 'cargando-ruta' || r.estado === 'en-camino')) {
          return { ...r, esEntrega: true };
        }
        return r;
      });

    render();
  });
}

function confirmarEntrega(remitoId, nombre, dni) {
  const ahora = new Date();
  db.ref('remitos/' + remitoId).update({
    estado: 'entregado',
    receptor: { nombre, dni },
    entregadoEn: ahora.toLocaleDateString('es-AR') + ' ' + ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
  });
}

function confirmarAutopickup(remito) {
  if (!params.vehiculoId) {
    mostrarToast('No se puede identificar tu vehículo', 'error');
    return;
  }
  const updates = {
    ['remitos/' + remito.id + '/estado']: 'cargando-ruta',
    ['remitos/' + remito.id + '/vehiculoRuta']: {
      id:    params.vehiculoId,
      alias: decodeURIComponent(params.vehiculoAlias || ''),
      patente: null,
      chofer: params.transportista || null,
    },
  };
  db.ref().update(updates).then(() => {
    mostrarToast('✓ Paquete cargado en tu móvil', 'ok');
    modalAutopickup = null;
    render();
  });
}

function abrirModalSucursal(remitoId) {
  modalAbierto = null;
  modalSucursalAbierto = { remitoId };
  render();
}

function confirmarEnSucursal(remitoId, sucursalId, sucursalNombre) {
  const ahora = new Date();
  db.ref('remitos/' + remitoId).update({
    estado: 'en-sucursal',
    sucursalEntrega: { id: sucursalId, nombre: sucursalNombre },
    entregadoEn: ahora.toLocaleDateString('es-AR') + ' ' + ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
  }).then(() => {
    mostrarToast('✓ Paquete dejado en ' + sucursalNombre, 'ok');
    modalSucursalAbierto = null;
    render();
  });
}

function salirARuta(remitoId) {
  db.ref('remitos/' + remitoId).update({ estado: 'en-camino' });
}

// ─── HELPERS CAPACIDAD ───────────────────────────────────────────────────────
// Parsea "1.200 kg cobrable" → 1200
function parseRemitoKg(r) {
  const texto = r.envio?.peso || '0';
  const limpio = texto.replace(/\./g, '').replace(',', '.').replace(/[^\d.]/g, '');
  return parseFloat(limpio) || 0;
}

// Kg actualmente en el vehículo: retirados que NO están en aDepositar + en-camino
function kgEnVehiculo() {
  return remitos
    .filter(r => (r.estado === 'retirado' && !aDepositar.has(r.id)) || r.estado === 'en-camino')
    .reduce((sum, r) => sum + parseRemitoKg(r), 0);
}

// Kg extra que agregarían los paquetes seleccionados del depósito (Tab 2)
function kgSeleccionadosDepot() {
  return remitosEnDeposito()
    .filter(r => seleccionados.has(r.id))
    .reduce((sum, r) => sum + parseRemitoKg(r
