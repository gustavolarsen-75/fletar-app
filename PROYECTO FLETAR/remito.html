<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remito Fletar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBIhZzpTRlNEG2x9dMdNTQ3ILvcRAaSJ-o",
      authDomain: "fletar-49e36.firebaseapp.com",
      databaseURL: "https://fletar-49e36-default-rtdb.firebaseio.com",
      projectId: "fletar-49e36",
      storageBucket: "fletar-49e36.firebasestorage.app",
      messagingSenderId: "698884616195",
      appId: "1:698884616195:web:c42078e969cdf5268e9e36"
    });
    const db = firebase.database();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }

    .navbar {
      background: #2C2C2A;
      width: 100%;
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .page {
      margin-top: 70px;
      width: 100%;
      max-width: 480px;
    }

    /* Estado de carga / error */
    .estado-carga {
      background: #fff;
      border-radius: 14px;
      padding: 48px 24px;
      text-align: center;
      border: 1px solid #DDE3EA;
    }
    .estado-carga .icono { font-size: 40px; margin-bottom: 12px; }
    .estado-carga p { color: #5A6A78; font-size: 14px; }

    /* Remito card */
    .remito-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #DDE3EA;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .remito-header {
      background: #2C2C2A;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .remito-header .comprobante {
      text-align: center;
    }
    .remito-header .comprobante-label {
      color: rgba(255,255,255,0.6);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .remito-header .remito-id {
      color: #E85D20;
      font-size: 20px;
      font-weight: 700;
    }
    .remito-header .fecha {
      text-align: right;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      line-height: 1.5;
    }

    /* QR destacado */
    .qr-section {
      background: #FFF8F5;
      border-bottom: 1px solid #F0E0D8;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-instruction {
      font-size: 13px;
      font-weight: 600;
      color: #E85D20;
      text-align: center;
    }
    .qr-sub {
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    .qr-img {
      border-radius: 10px;
      display: block;
    }

    /* Estado */
    .estado-badge {
      margin: 14px 18px 0;
      padding: 8px 14px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .estado-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Info block */
    .info-block {
      padding: 14px 18px;
    }

    .personas-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .persona-card {
      background: #F5F7FA;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .persona-titulo {
      font-size: 9px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .persona-fila {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .persona-label {
      font-size: 11px;
      color: #888;
    }
    .persona-valor {
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
      text-align: right;
      max-width: 55%;
    }

    .envio-card {
      background: #F5F7FA;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .envio-titulo {
      font-size: 9px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .envio-fila {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .envio-label {
      font-size: 11px;
      color: #888;
    }
    .envio-valor {
      font-size: 12px;
      font-weight: 500;
      color: #1A1A1A;
    }
    .envio-valor.precio {
      color: #E85D20;
      font-weight: 700;
    }

    /* Aviso chofer */
    .aviso-chofer {
      background: #E1F5EE;
      border: 1px solid #0F6E56;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 12px;
      color: #0A5040;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Footer */
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #bbb;
    }

    @media (max-width: 360px) {
      .personas-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <svg width="30" height="30" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <rect width="38" height="38" rx="9" fill="#E85D20"/>
      <text font-family="Montserrat, sans-serif" font-size="26" font-weight="900" x="7" y="28" fill="white">F</text>
      <polygon points="28,24 34,19 28,14 28,18 22,18 22,20 28,20" fill="white" opacity="0.9"/>
    </svg>
    <svg width="96" height="32" viewBox="0 0 110 36" xmlns="http://www.w3.org/2000/svg" style="margin-left:8px;flex-shrink:0;">
      <defs>
        <clipPath id="rem-cl-left"><polygon points="0,36 0,0 63.8,0 39.6,36"/></clipPath>
        <clipPath id="rem-cl-right"><polygon points="63.8,0 110,0 110,36 39.6,36"/></clipPath>
      </defs>
      <text font-family="Montserrat, sans-serif" font-size="32" font-weight="900" y="32" clip-path="url(#rem-cl-left)" fill="#E85D20">fletar</text>
      <text font-family="Montserrat, sans-serif" font-size="32" font-weight="900" y="32" clip-path="url(#rem-cl-right)" fill="white">fletar</text>
    </svg>
  </nav>

  <div class="page">
    <div id="root">
      <div class="estado-carga">
        <div class="icono">⏳</div>
        <p>Cargando remito...</p>
      </div>
    </div>
    <div class="footer">Fletar · Comprobante de envío</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const remitoId = params.get('id');
    const root = document.getElementById('root');

    const ESTADOS_LABEL = {
      'pendiente-retiro': 'Retiro programado',
      'retirado':         'Retirado',
      'en-deposito':      'En depósito',
      'en-sucursal':      'En sucursal',
      'cargando-ruta':    'Cargando ruta',
      'en-camino':        'En camino',
      'entregado':        '✓ Entregado'
    };

    function estadoColor(e) {
      if (e === 'entregado') return { bg: '#E1F5EE', border: '#0F6E56', text: '#0A5040', dot: '#0F6E56' };
      if (e === 'en-camino' || e === 'cargando-ruta') return { bg: '#FFF8E1', border: '#F9A825', text: '#7A5A00', dot: '#F9A825' };
      return { bg: '#FEF3EC', border: '#E85D20', text: '#C44A0F', dot: '#E85D20' };
    }

    function render(remito) {
      const base = window.location.href.split('/').slice(0, -1).join('/');
      const linkChofer = `${base}/fletar-chofer.html?remito=${remito.id}`;
      const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(linkChofer)}&color=2C2C2A&bgcolor=ffffff&margin=4`;
      const est = remito.estado || 'pendiente-retiro';
      const estLabel = ESTADOS_LABEL[est] || est;
      const col = estadoColor(est);

      const d = remito.destinatario || {};
      const r = remito.remitente || {};
      const envio = remito.envio || {};

      function fila(label, valor) {
        if (!valor || valor === '—') return '';
        return `<div class="persona-fila"><span class="persona-label">${label}</span><span class="persona-valor">${valor}</span></div>`;
      }
      function envioFila(label, valor, cls) {
        if (!valor || valor === '—' || valor === 'undefined') return '';
        return `<div class="envio-fila"><span class="envio-label">${label}</span><span class="envio-valor ${cls || ''}">${valor}</span></div>`;
      }

      root.innerHTML = `
        <div class="remito-card">

          <div class="remito-header">
            <div></div>
            <div class="comprobante">
              <div class="comprobante-label">Comprobante de envío</div>
              <div class="remito-id">${remito.id}</div>
            </div>
            <div class="fecha">
              <div>${remito.fecha || ''}</div>
              <div>${remito.hora ? remito.hora + ' hs' : ''}</div>
            </div>
          </div>

          <!-- QR GRANDE -->
          <div class="qr-section">
            <div class="qr-instruction">📱 Mostrá este QR al chofer</div>
            <img class="qr-img" src="${qrSrc}" width="200" height="200" alt="QR del remito" />
            <div class="qr-sub">El chofer lo escanea para confirmar la entrega</div>
          </div>

          <!-- Estado -->
          <div class="estado-badge" style="background:${col.bg}; border:1px solid ${col.border}; color:${col.text};">
            <div class="estado-dot" style="background:${col.dot};"></div>
            ${estLabel}
          </div>

          <!-- Info -->
          <div class="info-block">
            <div class="personas-grid">
              <div class="persona-card">
                <div class="persona-titulo">Remitente</div>
                ${fila('Nombre', r.nombre)}
                ${fila('Teléfono', r.telefono)}
                ${fila('Ciudad', r.ciudad)}
              </div>
              <div class="persona-card">
                <div class="persona-titulo">Destinatario</div>
                ${fila('Nombre', d.nombre)}
                ${fila('Teléfono', d.telefono)}
                ${fila('Domicilio', d.domicilio)}
                ${fila('Ciudad', d.ciudad)}
              </div>
            </div>

            <div class="envio-card">
              <div class="envio-titulo">Detalle del envío</div>
              ${envioFila('Mercadería', envio.descripcion || envio.tipo)}
              ${envioFila('Tipo', envio.tipo)}
              ${envioFila('Peso', envio.peso)}
              ${envioFila('Bultos', envio.bultos)}
              ${envioFila('Flete', remito.flete ? '$' + Number(remito.flete).toLocaleString('es-AR') : null, 'precio')}
              ${envioFila('Transportista', remito.transportista?.nombre || remito.transportistaNombre)}
              ${envioFila('Retiro est.', remito.retiro)}
              ${envioFila('Entrega est.', remito.entregaEst)}
            </div>

            <div class="aviso-chofer">
              🚛 Cuando el chofer llegue, mostrá el QR de arriba para que lo escanee y confirme la entrega.
            </div>
          </div>

        </div>
      `;
    }

    function mostrarError(msg) {
      root.innerHTML = `
        <div class="estado-carga">
          <div class="icono">❌</div>
          <p>${msg}</p>
        </div>
      `;
    }

    if (!remitoId) {
      mostrarError('No se encontró el ID del remito en el link.');
    } else {
      db.ref('remitos/' + remitoId).once('value')
        .then(snap => {
          const remito = snap.val();
          if (!remito) {
            mostrarError('Remito no encontrado. Verificá que el link esté completo.');
          } else {
            remito.id = remitoId;
            render(remito);
          }
        })
        .catch(err => {
          mostrarError('Error al cargar el remito. Intentá de nuevo.');
        });
    }
  </script>
</body>
</html>
