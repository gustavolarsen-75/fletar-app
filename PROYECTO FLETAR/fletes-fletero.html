firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

function fbListen(path, cb) {
  const ref = db.ref(path);
  ref.on('value', snap => {
    const val = snap.val();
    cb(val ? Object.entries(val).map(([id, v]) => ({ id, ...v })) : []);
  });
  return () => ref.off();
}
function fbSet(path, data) { return db.ref(path).set(data); }
function fbUpdate(path, data) { return db.ref(path).update(data); }
function fbPush(path, data) { return db.ref(path).push(data); }
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── LOGO ─────────────────────────────────────────────────────────────────────

  return (

      <svg width={iconSize} height={iconSize} viewBox="0 0 38 38">
        <rect width="38" height="38" rx="9" fill="#E85D20"/>
        <text fontFamily="Montserrat, sans-serif" fontSize="26" fontWeight="900" x="7" y="28" fill="white">F</text>
        <polygon points="28,24 34,19 28,14 28,18 22,18 22,20 28,20" fill="white" opacity="0.9"/>

}

const VEHICULOS = ['Camioneta / Trafic', 'Utilitario', 'Camión chico', 'Camión mediano', 'Pick-up', 'Otro'];

// ─── AUTH ────────────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [modo, setModo] = useState('login');
  const [form, setForm] = useState({ nombre: '', email: '', password: '', telefono: '', ciudad: '', vehiculo: 'Camioneta / Trafic' });
  const [error, setError] = useState('');
  const [cargando, setCargando] = useState(false);
  const [verPass, setVerPass] = useState(false);

  function upd(k, v) { setForm(f => ({ ...f, [k]: v })); }

  function mensajeError(code) {
    if (code === 'auth/email-already-in-use') return 'Ya existe una cuenta con ese email.';
    if (code === 'auth/invalid-email') return 'El email no es válido.';
    if (code === 'auth/weak-password') return 'La contraseña debe tener al menos 6 caracteres.';
    if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') return 'Email o contraseña incorrectos.';
    if (code === 'auth/operation-not-allowed') return 'El acceso con email no está habilitado. Contactá al administrador.';
    if (code === 'auth/too-many-requests') return 'Demasiados intentos. Esperá unos minutos.';
    if (code === 'auth/network-request-failed') return 'Sin conexión. Revisá tu internet.';
    return 'Error: ' + code;
  }

  async function handleLogin(e) {
    e.preventDefault();
    if (!form.email || !form.password) { setError('Completá email y contraseña.'); return; }
    setCargando(true); setError('');
    try {
      const cred = await auth.signInWithEmailAndPassword(form.email, form.password);
      const snap = await db.ref('flocales/fleteros/' + cred.user.uid).once('value');
      if (snap.val()) onAuth(cred.user, snap.val());
      else setError('No encontramos tu perfil de fletero. ¿Ya te registraste?');
    } catch {
      setError(mensajeError(err.code));
    }
    setCargando(false);
  }

  async function handleRegistro(e) {
    e.preventDefault();
    if (!form.nombre || !form.email || !form.password || !form.telefono || !form.ciudad) {
      setError('Completá todos los campos.'); return;
    }
    if (form.password.length < 6) { setError('La contraseña debe tener al menos 6 caracteres.'); return; }
    setCargando(true); setError('');
    try {
      const cred = await auth.createUserWithEmailAndPassword(form.email, form.password);
      const perfil = {
        nombre: form.nombre.trim(),
        email: form.email.trim(),
        telefono: form.telefono.trim(),
        ciudad: form.ciudad.trim(),
        vehiculo: form.vehiculo,
        creadoEn: Date.now(),
      };
      await fbSet('flocales/fleteros/' + cred.user.uid, perfil);
      onAuth(cred.user, perfil);
    } catch (err) {
      setError(mensajeError(err.code));
    }
    setCargando(false);
  }

  return (
    <div>
      <div style={{ background: "#2C2C2A", padding: "14px 18px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <FletarLogo />
          <span style={{ fontSize: 10, background: "#185FA5", color: "#fff", padding: "2px 7px", borderRadius: 5, fontWeight: 700 }}>FLETERO</span>
        </div>
        <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>{modo === 'login' ? 'Iniciá sesión' : 'Registrarme como fletero'}</div>
        <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 13, marginTop: 2 }}>{modo === 'login' ? 'Bienvenido de vuelta' : 'Empezá a recibir pedidos gratis'}</div>
      </div>
      <div className="screen">
        {modo === 'registro' && (
          <div className="fg"><label>Nombre y apellido</label><input placeholder="Juan Paredes" value={form.nombre} onChange={e => upd('nombre', e.target.value)}/></div>
        )}
        <div className="fg"><label>Email</label><input type="email" placeholder="juan@email.com" value={form.email} onChange={e => upd('email', e.target.value)}/></div>
        <div className="fg">
          <label>Contraseña</label>
          <div style={{ position: 'relative' }}>
            <input type={verPass ? 'text' : 'password'} placeholder="Mínimo 6 caracteres" value={form.password} onChange={e => upd('password', e.target.value)} style={{ width: '100%', paddingRight: 40 }}/>
            <button type="button" onClick={() => setVerPass(v => !v)} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', fontSize: 16, color: '#888', padding: 0 }}>
              {verPass ? '🙈' : '👁️'}
            </button>
          </div>
        </div>
        {modo === 'registro' && (
          <>
            <div className="fg"><label>Teléfono (WhatsApp)</label><input placeholder="+54 376 4000000" value={form.telefono} onChange={e => upd('telefono', e.target.value)}/></div>
            <div className="fg"><label>Ciudad donde trabajás</label><input placeholder="Posadas, Misiones" value={form.ciudad} onChange={e => upd('ciudad', e.target.value)}/></div>
            <div className="fg">
              <label>Tipo de vehículo</label>
              <select value={form.vehiculo} onChange={e => upd('vehiculo', e.target.value)}>
                {VEHICULOS.map(v => <option key={v}>{v}</option>)}
              </select>
            </div>
          </>
        )}
        {error && <div className="error-msg">{error}</div>}
        <div className="fg" style={{ marginTop: 4 }}>
          <button className="btn btn-primary" onClick={modo === 'login' ? handleLogin : handleRegistro} disabled={cargando}>
            {cargando ? 'Un momento...' : modo === 'login' ? 'Iniciar sesión' : 'Crear cuenta'}
          </button>
        </div>
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          {modo === 'login'
            ? <><span className="sm">¿No tenés cuenta? </span><button className="link-txt" onClick={() => { setModo('registro'); setError(''); }}>Registrate</button></>
            : <><span className="sm">¿Ya tenés cuenta? </span><button className="link-txt" onClick={() => { setModo('login'); setError(''); }}>Iniciá sesión</button></>
          }
        </div>
        <div style={{ marginTop: 20, textAlign: 'center' }}>
          <button className="link-txt sm" onClick={() => window.location.href = 'index.html'}>← Volver al inicio</button>
        </div>
      </div>
    </div>
  );
}

// ─── COTIZAR PEDIDO ──────────────────────────────────────────────────────────
function CotizarPedido({ pedido, perfil, uid, onVolver }) {
  const [precio, setPrecio] = useState('');
  const [nota, setNota]     = useState('');
  const [enviando, setEnviando] = useState(false);
  const [ok, setOk]         = useState(false);
  const [miCotiz, setMiCotiz] = useState(null);

  useEffect(() => {
    const unsub = fbListen('flocales/cotizaciones', arr => {
      const mia = arr.find(c => c.pedidoId === pedido.id && c.uid === uid);
      if (mia) { setMiCotiz(mia); setOk(true); }
    });
    return unsub;
  }, [pedido.id, uid]);

  async function enviar() {
    const p = parseFloat(precio.replace(/\./g, '').replace(',', '.'));
    if (!p || p <= 0) { alert('Ingresá un precio válido.'); return; }
    setEnviando(true);
    const cot = {
      pedidoId: pedido.id,
      uid,
      nombreFletero: perfil.nombre,
      telefonoFletero: perfil.telefono,
      vehiculo: perfil.vehiculo,
      precio: p,
      nota: nota.trim(),
      estado: 'pendiente',
      creadoEn: Date.now(),
    };
    await fbPush('flocales/cotizaciones', cot);
    // Si el pedido estaba en "nuevo", pasa a "con-cotizaciones"
    if (pedido.estado === 'nuevo') {
      await fbUpdate('flocales/pedidos/' + pedido.id, { estado: 'con-cotizaciones' });
    }
    setEnviando(false);
    setOk(true);
  }

  if (ok) return (
    <div>
      <div className="navbar">
        <button className="navbar-back" onClick={onVolver}>‹</button>
        <div className="navbar-title">Cotización enviada</div>
      </div>
      <div className="screen">
        <div style={{ textAlign: 'center', padding: '30px 0 20px' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
          <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 6 }}>Cotización enviada</div>
          <div className="sm">Si {pedido.nombrePersona?.split(' ')[0]} acepta tu propuesta,<br/>te avisamos aquí y coordinás por WhatsApp.</div>
        </div>
        <div className="card" style={{ background: '#F8F7F4' }}>
          <div className="sm" style={{ marginBottom: 4 }}>Tu cotización</div>
          <div style={{ fontSize: 24, fontWeight: 700, color: '#185FA5', marginBottom: 4 }}>
            ${(miCotiz?.precio || parseFloat(precio)).toLocaleString('es-AR')}
          </div>
          {(miCotiz?.nota || nota) && <div className="sm" style={{ fontStyle: 'italic' }}>"{miCotiz?.nota || nota}"</div>}
        </div>
        <button className="btn btn-secondary" style={{ marginTop: 10 }} onClick={onVolver}>Volver a pedidos</button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="navbar">
        <button className="navbar-back" onClick={onVolver}>‹</button>
        <div className="navbar-title">Cotizar pedido</div>
      </div>
      <div className="screen">
        <div className="card" style={{ background: '#F8F7F4', marginBottom: 20 }}>
          <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 6 }}>{pedido.tipo}</div>
          <div className="sm" style={{ marginBottom: 4 }}>{pedido.descripcion}</div>
          <div className="sm">📍 Retiro: {pedido.direccionRetiro}</div>
          <div className="sm">📍 Entrega: {pedido.direccionEntrega}</div>
          <div className="sm" style={{ marginTop: 4 }}>📅 {pedido.fecha} · {pedido.hora} hs</div>
          {pedido.mapsRetiro && (
            <a href={pedido.mapsRetiro} target="_blank" rel="noreferrer" className="maps-link" style={{ display: 'block', marginTop: 6 }}>
              Ver punto de retiro en Maps →
            </a>
          )}
          {pedido.mapsEntrega && (
            <a href={pedido.mapsEntrega} target="_blank" rel="noreferrer" className="maps-link" style={{ display: 'block', marginTop: 4 }}>
              Ver punto de entrega en Maps →
            </a>
          )}
        </div>
        <div className="fg">
          <label>Tu precio para este trabajo</label>
          <input
            className="precio-input"
            placeholder="$0"
            value={precio}
            onChange={e => setPrecio(e.target.value)}
            inputMode="numeric"
          />
        </div>
        <div className="fg">
          <label>Nota para el cliente (opcional)</label>
          <input placeholder="Ej: incluye ayudante, soy puntual..." value={nota} onChange={e => setNota(e.target.value)}/>
        </div>
        <button className="btn btn-primary" onClick={enviar} disabled={enviando}>
          {enviando ? 'Enviando...' : 'Enviar cotización'}
        </button>
      </div>
    </div>
  );
}

// ─── PEDIDOS DISPONIBLES ─────────────────────────────────────────────────────
function PedidosDisponibles({ perfil, uid, onCotizar }) {
  const [pedidos, setPedidos] = useState([]);
  const [cotizaciones, setCotizaciones] = useState([]);

  useEffect(() => {
    const u1 = fbListen('flocales/pedidos', arr => {
      const ciudad = (perfil.ciudad || '').toLowerCase().trim();
      setPedidos(
        arr
          .filter(p => (p.ciudad || '').toLowerCase().trim() === ciudad && p.estado !== 'confirmado')
          .sort((a, b) => b.creadoEn - a.creadoEn)
      );
    });
    const u2 = fbListen('flocales/cotizaciones', arr => {
      setCotizaciones(arr.filter(c => c.uid === uid));
    });
    return () => { u1(); u2(); };
  }, [uid, perfil.ciudad]);

  const yaCotice = (pedidoId) => cotizaciones.some(c => c.pedidoId === pedidoId);

  return (
    <div className="screen">
      <div className="section-title">Pedidos en {perfil.ciudad}</div>
      {pedidos.length === 0
        ? <div className="empty">No hay pedidos disponibles en tu ciudad por ahora.<br/>Volvé a revisar más tarde.</div>
        : pedidos.map(p => (
          <div key={p.id} className="card">
            <div className="card-row" style={{ marginBottom: 8 }}>
              <span className="badge badge-tipo">{p.tipo}</span>
              <span className="sm">{new Date(p.creadoEn).toLocaleDateString('es-AR')}</span>
            </div>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4, color: '#1A1A1A' }}>{p.descripcion?.substring(0, 80)}{p.descripcion?.length > 80 ? '…' : ''}</div>
            <div className="sm">📍 {p.direccionRetiro}</div>
            <div className="sm">📍 {p.direccionEntrega}</div>
            <div className="sm" style={{ marginTop: 4 }}>📅 {p.fecha} · {p.hora} hs</div>
            <div style={{ marginTop: 12 }}>
              {yaCotice(p.id)
                ? <span className="ya-cotice-badge">Ya cotizaste ✓</span>
                : <button className="btn btn-primary btn-sm" onClick={() => onCotizar(p)}>Cotizar este pedido</button>
              }
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ─── MIS TRABAJOS ─────────────────────────────────────────────────────────────
function MisTrabajos({ perfil, uid }) {
  const [cotizaciones, setCotizaciones] = useState([]);
  const [pedidos, setPedidos] = useState({});

  useEffect(() => {
    const u1 = fbListen('flocales/cotizaciones', arr => {
      setCotizaciones(arr.filter(c => c.uid === uid));
    });
    const u2 = fbListen('flocales/pedidos', arr => {
      const map = {};
      arr.forEach(p => { map[p.id] = p; });
      setPedidos(map);
    });
    return () => { u1(); u2(); };
  }, [uid]);

  const aceptadas = cotizaciones.filter(c => c.estado === 'aceptada');
  const pendientes = cotizaciones.filter(c => c.estado !== 'aceptada');

  function waLink(pedido) {
    const num = (pedido.telefonoPersona || '').replace(/\D/g, '');
    const txt = encodeURIComponent(`Hola ${pedido.nombrePersona?.split(' ')[0]}, soy ${perfil.nombre} el fletero de Flete Ya. Me aceptaste la cotización para el trabajo de ${pedido.tipo}. ¿Coordinamos?`);
    return `https://wa.me/${num}?text=${txt}`;
  }

  return (
    <div className="screen">
      {aceptadas.length > 0 && (
        <>
          <div className="section-title">Trabajos confirmados</div>
          {aceptadas.map(c => {
            const p = pedidos[c.pedidoId];
            if (!p) return null;
            return (
              <div key={c.id} className="card" style={{ borderColor: '#3B6D11' }}>
                <div className="card-row" style={{ marginBottom: 8 }}>
                  <span className="badge badge-confirm">Confirmado</span>
                  <span style={{ fontWeight: 700, color: '#185FA5' }}>${(c.precio || 0).toLocaleString('es-AR')}</span>
                </div>
                <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4, color: '#1A1A1A' }}>{p.tipo}</div>
                <div className="sm">📍 {p.direccionRetiro}</div>
                <div className="sm">📍 {p.direccionEntrega}</div>
                <div className="sm" style={{ marginTop: 4 }}>📅 {p.fecha} · {p.hora} hs</div>
                <div className="sm" style={{ marginTop: 4 }}>Cliente: {p.nombrePersona}</div>
                {p.mapsRetiro && <a href={p.mapsRetiro} target="_blank" rel="noreferrer" className="maps-link" style={{ display: 'block', marginTop: 6 }}>Ver punto de retiro →</a>}
                {p.mapsEntrega && <a href={p.mapsEntrega} target="_blank" rel="noreferrer" className="maps-link" style={{ display: 'block', marginTop: 4 }}>Ver punto de entrega →</a>}
                <a href={waLink(p)} target="_blank" rel="noreferrer" style={{ display: 'block', marginTop: 12 }}>
                  <button className="btn-wa">💬 Hablar con {p.nombrePersona?.split(' ')[0]} por WhatsApp</button>
                </a>
              </div>
            );
          })}
          <div className="divider"/>
        </>
      )}
      <div className="section-title">Cotizaciones enviadas</div>
      {pendientes.length === 0
        ? <div className="empty">Todavía no enviaste cotizaciones.<br/>Revisá los pedidos disponibles.</div>
        : pendientes.map(c => {
          const p = pedidos[c.pedidoId];
          if (!p) return null;
          return (
            <div key={c.id} className="card" style={{ background: '#F8F7F4' }}>
              <div className="card-row" style={{ marginBottom: 6 }}>
                <span className="badge badge-cotiz">Esperando respuesta</span>
                <span style={{ fontWeight: 700, color: '#185FA5' }}>${(c.precio || 0).toLocaleString('es-AR')}</span>
              </div>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 3, color: '#1A1A1A' }}>{p?.tipo}</div>
              <div className="sm">{p?.descripcion?.substring(0, 60)}</div>
              <div className="sm" style={{ marginTop: 4 }}>📅 {p?.fecha} · {p?.hora} hs</div>
            </div>
          );
        })
      }
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({ uid, perfil, onLogout }) {
  const [tab, setTab]       = useState('pedidos');
  const [cotizando, setCotizando] = useState(null);

  if (cotizando) return (
    <CotizarPedido pedido={cotizando} perfil={perfil} uid={uid} onVolver={() => setCotizando(null)}/>
  );

  return (
    <div>
      <nav style={{ background: "#2C2C2A", padding: "0 14px", display: "flex", alignItems: "center", height: 52, position: "sticky", top: 0, zIndex: 100 }}>
        <FletarLogo />
        <span style={{ fontSize: 10, background: "#185FA5", color: "#fff", padding: "2px 7px", borderRadius: 5, fontWeight: 700, marginLeft: 10 }}>FLETERO</span>
        <div style={{ flex: 1 }} />
        <div style={{ width: 30, height: 30, borderRadius: "50%", background: "#185FA5", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700 }}>
          {(perfil.nombre || '?')[0].toUpperCase()}
        </div>
      </nav>
      <div style={{ padding: "12px 18px 10px", borderBottom: "1px solid #F0EEE9" }}>
        <div style={{ fontWeight: 700, fontSize: 16 }}>Hola, {perfil.nombre.split(' ')[0]} 👋</div>
        <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{perfil.vehiculo} · {perfil.ciudad}</div>
      </div>

      <div className="tab-bar">
        <button className={'tab-btn' + (tab === 'pedidos' ? ' active' : '')} onClick={() => setTab('pedidos')}>Pedidos disponibles</button>
        <button className={'tab-btn' + (tab === 'trabajos' ? ' active' : '')} onClick={() => setTab('trabajos')}>Mis trabajos</button>
      </div>

      {tab === 'pedidos'  && <PedidosDisponibles perfil={perfil} uid={uid} onCotizar={p => setCotizando(p)}/>}
      {tab === 'trabajos' && <MisTrabajos perfil={perfil} uid={uid}/>}

      <div className="divider" style={{ margin: '8px 18px' }}/>
      <div style={{ padding: '4px 18px 20px', textAlign: 'center' }}>
        <button className="link-txt sm" onClick={onLogout}>Cerrar sesión</button>
        <span className="sm"> · </span>
        <button className="link-txt sm" onClick={() => window.location.href = 'index.html'}>Inicio</button>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('loading');
  const [user, setUser]   = useState(null);
  const [perfil, setPerfil] = useState(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      if (u) {
        const snap = await db.ref('flocales/fleteros/' + u.uid).once('value');
        if (snap.val()) {
          setUser(u); setPerfil(snap.val()); setAuthState('in');
        } else {
          setAuthState('out');
        }
      } else {
        setAuthState('out');
      }
    });
    return unsub;
  }, []);

  function handleAuth(u, p) { setUser(u); setPerfil(p); setAuthState('in'); }
  function handleLogout() { auth.signOut(); setUser(null); setPerfil(null); setAuthState('out'); }

  if (authState === 'loading') return <div className="spinner">Cargando...</div>;
  if (authState === 'out')     return <AuthScreen onAuth={handleAuth}/>;
  return <Home uid={user.uid} perfil={perfil} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
