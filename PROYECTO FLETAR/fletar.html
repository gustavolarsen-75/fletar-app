// ─── LOGO ─────────────────────────────────────────────────────────────────────

// ─── MAPS INPUT ──────────────────────────────────────────────────────────────

function MapsInput({ value, onChange }) {
  const [estado, setEstado] = useState("idle"); // idle | cargando | ok | error

  function obtenerUbicacion() {
    if (!navigator.geolocation) {
      alert("Tu navegador no soporta geolocalización.");
      return;
    }
    setEstado("cargando");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        const link = `https://www.google.com/maps?q=${latitude},${longitude}`;
        onChange(link);
        setEstado("ok");
      },
      (err) => {
        setEstado("error");
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  return (
    <div className="form-group">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
        <label style={{ margin: 0 }}>Link de Google Maps</label>
        <span style={{ fontSize: 11, color: "#888", background: "#F5F5F5", padding: "2px 8px", borderRadius: 4 }}>Opcional</span>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input
          value={value}
          onChange={e => { onChange(e.target.value); setEstado("idle"); }}
          placeholder="https://maps.google.com/..."
          style={{ flex: 1 }}
        />
        <button
          type="button"
          onClick={obtenerUbicacion}
          disabled={estado === "cargando"}
          style={{
            background: estado === "ok" ? "#0F6E56" : "#2C2C2A",
            color: "#fff", border: "none", borderRadius: 8,
            padding: "0 14px", fontSize: 18, cursor: "pointer",
            whiteSpace: "nowrap", flexShrink: 0,
            opacity: estado === "cargando" ? 0.6 : 1
          }}
          title="Usar mi ubicación actual"
        >
          {estado === "cargando" ? "⏳" : estado === "ok" ? "✓" : "📍"}
        </button>
      </div>
      {estado === "ok" && (
        <div style={{ marginTop: 5, display: "flex", alignItems: "center", gap: 8 }}>
          <p style={{ fontSize: 11, color: "#0F6E56", margin: 0 }}>✓ Ubicación actual detectada</p>
          <a href={value} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: "#185FA5" }}>Ver en Maps →</a>
        </div>
      )}
      {estado === "error" && (
        <p style={{ fontSize: 11, color: "#C44A0F", marginTop: 5 }}>No se pudo obtener la ubicación. Pegá el link manualmente.</p>
      )}
      {estado === "idle" && (
        <p style={{ fontSize: 11, color: "#888", marginTop: 5 }}>Tocá 📍 para usar tu ubicación actual o pegá el link manualmente.</p>
      )}
    </div>
  );
}

// ─── AUTH SCREENS ────────────────────────────────────────────────────────────

function AuthScreen({ onLogin }) {
  const [modo, setModo] = useState("login");
  const [tipo, setTipo] = useState(null);
  const [paso, setPaso] = useState(1);
  const [form, setForm] = useState({ email: "", password: "", nombre: "", empresa: "", cel: "", direccion: "", maps: "", logo: null, logoUrl: "", provinciaorigen: "" });
  const [provsDest, setProvsDest] = useState([]);
  const [localidades, setLocalidades] = useState({});
  const [error, setError] = useState("");

  const totalPasos = tipo === "transportista" ? 4 : 2;

  function toggleProv(p) {
    setProvsDest(prev => prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]);
    setLocalidades(prev => {
      if (prev[p]) { const n = {...prev}; delete n[p]; return n; }
      return prev;
    });
  }

  function toggleTodasProvs() {
    if (provsDest.length === PROVINCIAS.length) { setProvsDest([]); setLocalidades({}); }
    else setProvsDest([...PROVINCIAS]);
  }

  function toggleLoc(prov, loc) {
    setLocalidades(prev => {
      const locs = prev[prov] || [];
      return { ...prev, [prov]: locs.includes(loc) ? locs.filter(x => x !== loc) : [...locs, loc] };
    });
  }

  function toggleTodasLocs(prov) {
    const todas = PROVINCIAS_LOCALIDADES[prov] || [];
    const actuales = localidades[prov] || [];
    setLocalidades(prev => ({ ...prev, [prov]: actuales.length === todas.length ? [] : [...todas] }));
  }

  function handleLogo(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm(f => ({ ...f, logo: file, logoUrl: ev.target.result }));
    reader.readAsDataURL(file);
  }

  function siguiente() {
    if (paso === 1 && !tipo) { setError("Elegí el tipo de cuenta."); return; }
    if (paso === 2 && (!form.nombre || !form.cel || !form.direccion)) { setError("Completá nombre, celular y dirección."); return; }
    if (paso === 3 && provsDest.length === 0) { setError("Seleccioná al menos una provincia de destino."); return; }
    setError(""); setPaso(p => p + 1);
  }

  function handleSubmit() {
    if (!form.email || !form.password) { setError("Completá email y contraseña."); return; }
    if (form.email === "admin@fletar.com") { onLogin({ nombre: "Gustavo", email: form.email, tipo: "admin" }); return; }
    if (modo === "login") {
      if (form.email === "trans@test.com") { onLogin({ nombre: "Carlos Ramírez", email: form.email, tipo: "transportista" }); return; }
      onLogin({ nombre: "Mi Empresa", email: form.email, tipo: "empresa" }); return;
    }
    onLogin({ ...form, tipo, provsDest, localidades });
  }

  const PasoIndicador = () => (
    <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 20, justifyContent: "center" }}>
      {Array.from({ length: totalPasos }, (_, i) => (
        <React.Fragment key={i}>
          <div style={{ width: 28, height: 28, borderRadius: "50%", background: paso > i + 1 ? "#0F6E56" : paso === i + 1 ? "#E85D20" : "#E0E0E0", color: paso >= i + 1 ? "#fff" : "#999", fontSize: 12, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center" }}>
            {paso > i + 1 ? "✓" : i + 1}
          </div>
          {i < totalPasos - 1 && <div style={{ flex: 1, height: 2, background: paso > i + 1 ? "#0F6E56" : "#E0E0E0", maxWidth: 40 }} />}
        </React.Fragment>
      ))}
    </div>
  );

  const labelsPasos = tipo === "transportista"
    ? ["Mis datos", "Mis datos", "Provincias", "Rutas", "Acceso"]
    : ["Mis datos", "Mis datos", "Acceso"];

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#F5F5F5", padding: "20px 0" }}>
      <div style={{ width: "100%", maxWidth: modo === "registro" && paso >= 3 ? 600 : 440 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}>
            <div style={{ background: "#2C2C2A", borderRadius: 16, padding: "14px 24px", display: "inline-flex" }}>
              <FletarLogo size="lg" />
            </div>
          </div>
          <p style={{ fontSize: 14, color: "#666" }}>Más fletes, menos llamadas</p>
        </div>

        <div className="card" style={{ padding: 24 }}>
          {/* Tabs login/registro */}
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "#F5F5F5", borderRadius: 8, padding: 4 }}>
            {["login", "registro"].map(m => (
              <button key={m} onClick={() => { setModo(m); setPaso(1); setTipo(null); setError(""); }} style={{ flex: 1, padding: "8px", borderRadius: 6, background: modo === m ? "#fff" : "transparent", color: modo === m ? "#1A1A1A" : "#666", border: modo === m ? "1px solid #E0E0E0" : "none", fontWeight: modo === m ? 500 : 400, fontSize: 14, cursor: "pointer" }}>
                {m === "login" ? "Iniciar sesión" : "Registrarse"}
              </button>
            ))}
          </div>

          {/* LOGIN */}
          {modo === "login" && (<>
            <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="tu@email.com" /></div>

function MapsInputSimple({ value, onChange }) {
  const [estado, setEstado] = useState("idle");
  function obtener() {
    if (!navigator.geolocation) { alert("Tu navegador no soporta geolocalización."); return; }
    setEstado("cargando");
    navigator.geolocation.getCurrentPosition(
      pos => { const { latitude: lat, longitude: lng } = pos.coords; onChange(`https://www.google.com/maps?q=${lat},${lng}`); setEstado("ok"); },
      () => setEstado("error"),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }
  return (
    <div className="form-group">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
        <label style={{ margin: 0 }}>Link de Google Maps</label>
        <span style={{ fontSize: 11, color: "#888", background: "#F5F5F5", padding: "2px 8px", borderRadius: 4 }}>Opcional</span>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input value={value} onChange={e => { onChange(e.target.value); setEstado("idle"); }} placeholder="https://maps.google.com/..." style={{ flex: 1 }} />
        <button type="button" onClick={obtener} disabled={estado === "cargando"} style={{ background: estado === "ok" ? "#0F6E56" : "#2C2C2A", color: "#fff", border: "none", borderRadius: 8, padding: "0 14px", fontSize: 18, cursor: "pointer", flexShrink: 0, opacity: estado === "cargando" ? 0.6 : 1 }}>
          {estado === "cargando" ? "⏳" : estado === "ok" ? "✓" : "📍"}
        </button>
      </div>
      {estado === "ok" && <p style={{ fontSize: 11, color: "#0F6E56", marginTop: 4 }}>✓ Ubicación actual detectada</p>}
      {estado === "error" && <p style={{ fontSize: 11, color: "#C44A0F", marginTop: 4 }}>No se pudo obtener la ubicación. Pegá el link manualmente.</p>}
    </div>
  );
}

function PublicarCarga({ onNav, usuario, onPublicar }) {
  const [paso, setPaso] = useState(1);
  const TOTAL_PASOS = 4;

  const [origenProv, setOrigenProv] = useState("");
  const [origenLoc, setOrigenLoc] = useState("");
  const [destinoProv, setDestinoProv] = useState("");
  const [destinoLoc, setDestinoLoc] = useState("");
  const [direccionRetiro, setDireccionRetiro] = useState(usuario?.direccion || "");
  const [form, setForm] = useState({ tipo: "Paquete chico", especial: "normal", descripcion: "", retiro: "", horaRetiro: "", entrega: "", horaEntrega: "", pagaFlete: "remitente" });
  const [bultos, setBultos] = useState([{ id: 1, largo: "", ancho: "", alto: "", peso: "", cant: "1" }]);
  const [destinatario, setDestinatario] = useState({ nombre: "", telefono: "", calle: "", localidad: "", piso: "", depto: "", portero: "", referencia: "", maps: "", horarioFecha: "", horarioHora: "" });
  const [enviado, setEnviado] = useState(false);
  const [transportistasMatch, setTransportistasMatch] = useState([]);

  useEffect(() => {
    if (origenLoc && destinoLoc) {
      setTransportistasMatch(TRANSPORTISTAS_MOCK.filter(t => t.rutas.some(r => r.toLowerCase().includes(origenProv.toLowerCase()) || r.toLowerCase().includes(origenLoc.toLowerCase()))));
    } else setTransportistasMatch([]);
  }, [origenLoc, destinoLoc, origenProv]);

  function agregarBulto() { setBultos(prev => [...prev, { id: Date.now(), largo: "", ancho: "", alto: "", peso: "", cant: "1" }]); }
  function eliminarBulto(id) { if (bultos.length === 1) return; setBultos(prev => prev.filter(b => b.id !== id)); }
  function updateBulto(id, campo, val) { setBultos(prev => prev.map(b => b.id === id ? { ...b, [campo]: val } : b)); }

  function siguientePaso() {
    if (paso === 1 && (!origenLoc || !destinoLoc || !form.retiro)) { alert("Completá origen, destino y fecha de retiro."); return; }
    if (paso === 2) {
      const incompleto = bultos.some(b => !b.largo || !b.ancho || !b.alto || !b.peso);
      if (incompleto) { alert("Completá las dimensiones y peso de todos los bultos."); return; }
    }
    if (paso === 3 && (!destinatario.nombre || !destinatario.telefono || !destinatario.calle || !destinatario.localidad)) { alert("Completá nombre, teléfono, calle y localidad del destinatario."); return; }
    setPaso(p => p + 1);
  }

  function handlePublicar() {
    const pesoTotal = bultos.reduce((s, b) => s + (parseFloat(b.peso) || 0) * (parseInt(b.cant) || 1), 0);
    const newCarga = {
      id: Date.now(),
      empresa: usuario?.nombre || "Mi Empresa",
      origen: origenLoc ? `${origenLoc}, ${origenProv}` : (direccionRetiro || "Posadas, Misiones"),
      destino: destinoLoc ? `${destinoLoc}, ${destinoProv}` : "Destino",
      tipo: form.tipo,
      peso: pesoTotal > 0 ? `${pesoTotal} kg` : "—",
      retiro: form.retiro,
      entrega: form.entrega || "",
      estado: "nueva",
      ofertas: 0,
      matchRuta: true,
    };
    if (onPublicar) onPublicar(newCarga);
    setEnviado(true);
    setTimeout(() => onNav("empresa-dashboard"), 2500);
  }

  const divider = <div style={{ height: 1, background: "#E8E8E8", margin: "12px 0 16px" }} />;
  const optTag = <span style={{ fontSize: 10, background: "#F5F5F5", color: "#999", padding: "2px 7px", borderRadius: 4 }}>Opcional</span>;

  if (enviado) return (
    <div style={{ minHeight: "60vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ textAlign: "center", maxWidth: 340, padding: "0 20px" }}>
        <div style={{ fontSize: 56 }}>✅</div>
        <h2 style={{ marginTop: 12, fontSize: 22 }}>¡Carga publicada!</h2>
        <p style={{ color: "#555", marginTop: 10, fontSize: 15, lineHeight: 1.5 }}>
          Notificamos a <strong style={{ color: "#E85D20" }}>{transportistasMatch.length > 0 ? transportistasMatch.length : "los"} transportistas</strong> que hacen esta ruta. Solo vos vas a ver todos los precios para comparar.
        </p>
        <div style={{ marginTop: 16, padding: 12, background: "#F5F5F5", borderRadius: 8, fontSize: 13, color: "#666" }}>
          Mirá las ofertas en <strong>Últimos envíos</strong>.
        </div>
        <p style={{ color: "#aaa", fontSize: 12, marginTop: 12 }}>Redirigiendo...</p>
      </div>
    </div>
  );

  const pasoLabels = ["Ruta", "Qué mandás", "Destinatario", "Resumen"];

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "20px 14px" }}>

      {/* Barra de pasos */}
      <div style={{ display: "flex", alignItems: "center", marginBottom: 24 }}>
        {pasoLabels.map((lbl, i) => (
          <React.Fragment key={i}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
              <div style={{ width: 26, height: 26, borderRadius: "50%", fontSize: 11, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", background: paso > i + 1 ? "#0F6E56" : paso === i + 1 ? "#E85D20" : "#E0E0E0", color: paso >= i + 1 ? "#fff" : "#999" }}>
                {paso > i + 1 ? "✓" : i + 1}
              </div>
              <span style={{ fontSize: 9, color: paso === i + 1 ? "#E85D20" : "#999", fontWeight: paso === i + 1 ? 600 : 400, whiteSpace: "nowrap" }}>{lbl}</span>
            </div>
            {i < pasoLabels.length - 1 && <div style={{ flex: 1, height: 2, background: paso > i + 1 ? "#0F6E56" : "#E0E0E0", margin: "0 3px", marginBottom: 16 }} />}
          </React.Fragment>
        ))}
      </div>

      {/* ── PASO 1: RUTA ── */}
      {paso === 1 && (
        <div className="card">
          <h2 style={{ fontSize: 16, fontWeight: 600, marginBottom: 16 }}>¿A dónde va el envío?</h2>

          {/* Dirección retiro */}
          <div className="form-group">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
              <label style={{ margin: 0 }}>Dirección de retiro</label>
              {usuario?.maps && <a href={usuario.maps} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: "#185FA5", textDecoration: "none" }}>📍 Ver en Maps</a>}

            <div style={{ display: "flex", gap: 8 }}>
              <input value={direccionRetiro} onChange={e => setDireccionRetiro(e.target.value)} placeholder="Calle, número, ciudad" style={{ flex: 1 }} />
              <button type="button" onClick={() => { if (!navigator.geolocation) return; navigator.geolocation.getCurrentPosition(p => setDireccionRetiro(`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`)); }} style={{ background: "#2C2C2A", color: "#fff", border: "none", borderRadius: 8, padding: "0 12px", fontSize: 16, cursor: "pointer", flexShrink: 0 }}>📍</button>
            </div>
            {usuario?.direccion && direccionRetiro === usuario.direccion && <p style={{ fontSize: 11, color: "#0F6E56", marginTop: 4 }}>✓ Usando tu dirección registrada</p>}
            {usuario?.direccion && direccionRetiro !== usuario.direccion && <button onClick={() => setDireccionRetiro(usuario.direccion)} style={{ fontSize: 11, color: "#E85D20", background: "none", border: "none", cursor: "pointer", padding: "3px 0", marginTop: 2 }}>↩ Usar mi dirección registrada</button>}
          </div>

          {divider}

          <SelectorRuta label="Origen" provincia={origenProv} localidad={origenLoc} onProvincia={setOrigenProv} onLocalidad={setOrigenLoc} />
          <div style={{ marginTop: 10 }} />
          <SelectorRuta label="Destino" provincia={destinoProv} localidad={destinoLoc} onProvincia={setDestinoProv} onLocalidad={setDestinoLoc} />

          {divider}

          {/* Fechas retiro */}
          <div className="form-group">
            <label>Fecha de retiro *</label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <input type="date" value={form.retiro} onChange={e => setForm({...form, retiro: e.target.value})} />
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><span style={{ fontSize: 12, color: "#666" }}>Hora</span>{optTag}</div>
                <input type="time" value={form.horaRetiro} onChange={e => setForm({...form, horaRetiro: e.target.value})} />
              </div>
            </div>
          </div>

          {/* Fechas entrega */}
          <div className="form-group" style={{ marginBottom: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}><label style={{ margin: 0 }}>Fecha de entrega</label>{optTag}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <input type="date" value={form.entrega} onChange={e => setForm({...form, entrega: e.target.value})} />
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}><span style={{ fontSize: 12, color: "#666" }}>Hora</span>{optTag}</div>
                <input type="time" value={form.horaEntrega} onChange={e => setForm({...form, horaEntrega: e.target.value})} />
              </div>
            </div>

      )}

      {/* ── PASO 2: QUÉ MANDÁS ── */}
      {paso === 2 && (
        <div className="card">

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 7 }}>
              {[{ val: "Documento", icon: "📄", desc: "Papeles, facturas" }, { val: "Paquete chico", icon: "📦", desc: "Entra en moto" }, { val: "Paquete mediano", icon: "🗃️", desc: "Caja mediana" }, { val: "Caja grande", icon: "📫", desc: "Varios kilos" }, { val: "Varios bultos", icon: "🏗️", desc: "Más de una pieza" }, { val: "Otro", icon: "💬", desc: "Lo describo abajo" }].map(t => (
                <div key={t.val} onClick={() => setForm({...form, tipo: t.val})} style={{ border: `2px solid ${form.tipo === t.val ? "#E85D20" : "#E0E0E0"}`, borderRadius: 8, padding: "9px 6px", cursor: "pointer", background: form.tipo === t.val ? "#FEF3EC" : "#fff", textAlign: "center" }}>
                  <div style={{ fontSize: 18 }}>{t.icon}</div>

          {/* Especial */}

          </div>

          {divider}

          {/* Tabla bultos */}
          <div className="form-group" style={{ marginBottom: 0 }}>
            <label>Detalle de bultos *</label>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 340 }}>
                <thead>
                  <tr style={{ borderBottom: "1px solid #E8E8E8" }}>
                    {["#", "Largo cm", "Ancho cm", "Alto cm", "Peso kg", "Cant.", ""].map((h, i) => (
                      <th key={i} style={{ fontSize: 10, color: "#888", padding: "0 3px 8px", textAlign: "center", fontWeight: 500 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {bultos.map((b, i) => (
                    <tr key={b.id}>
                      <td style={{ fontSize: 12, color: "#999", textAlign: "center", padding: "4px 2px" }}>{i + 1}</td>

            <label>Horario de entrega preferido</label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 6 }}>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ fontSize: 12, color: "#666" }}>Fecha</span>{optTag}</div>

                <input type="time" value={destinatario.horarioHora} onChange={e => setDestinatario({...destinatario, horarioHora: e.target.value})} />
              </div>
            </div>
            <p style={{ fontSize: 11, color: "#999", marginTop: 5 }}>Si el destinatario tiene un horario específico para recibir, indicalo acá.</p>
          </div>
        </div>
      )}

      {/* ── PASO 4: RESUMEN ── */}
      {paso === 4 && (
        <div>
          <h2 style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Revisá tu pedido</h2>
          <p style={{ fontSize: 12, color: "#888", marginBottom: 16 }}>Confirmá los datos antes de publicar.</p>

          {/* Ruta */}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>

                  <div style={{ fontSize: 12, textAlign: "center" }}>{b.largo}cm</div>
                  <div style={{ fontSize: 12, textAlign: "center" }}>{b.ancho}cm</div>
                  <div style={{ fontSize: 12, textAlign: "center" }}>{b.alto}cm</div>
                  <div style={{ fontSize: 12, textAlign: "center" }}>{b.peso}kg</div>
                  <div style={{ fontSize: 12, textAlign: "center" }}>×{b.cant}</div>
                </div>
              ))}
            </div>
            {form.descripcion && <p style={{ fontSize: 12, color: "#666", marginTop: 8 }}>{form.descripcion}</p>}
          </div>

          {/* Destinatario */}
          <div className="card" style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>

              <button onClick={() => setPaso(3)} style={{ fontSize: 12, color: "#E85D20", background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>Editar</button>
            </div>
            <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 4 }}>{destinatario.nombre}</div>
            <div style={{ fontSize: 12, color: "#666", marginBottom: 2 }}>📞 {destinatario.telefono}</div>
            <div style={{ fontSize: 12, color: "#666", marginBottom: 2 }}>📍 {destinatario.calle}{destinatario.piso ? `, Piso ${destinatario.piso}` : ""}{destinatario.depto ? ` Dto ${destinatario.depto}` : ""} · {destinatario.localidad}</div>
            {destinatario.referencia && <div style={{ fontSize: 12, color: "#999", marginTop: 4 }}>💬 {destinatario.referencia}</div>}
            {destinatario.horarioFecha && <div style={{ fontSize: 12, color: "#555", marginTop: 4 }}>🕐 Entrega preferida: {destinatario.horarioFecha}{destinatario.horarioHora ? ` · ${destinatario.horarioHora}hs` : ""}</div>}
          </div>

          {/* Aviso transportistas */}
          <div style={{ background: "#FEF3EC", border: "1px solid #F5C4A0", borderRadius: 10, padding: "14px 16px", marginBottom: 16, display: "flex", gap: 12, alignItems: "flex-start" }}>
            <span style={{ fontSize: 20, flexShrink: 0 }}>📨</span>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500, color: "#C44A0F", marginBottom: 3 }}>
                {transportistasMatch.length > 0 ? `Se notifica a ${transportistasMatch.length} transportistas` : "Sin transportistas registrados aún para esta ruta"}
              </div>
              <div style={{ fontSize: 12, color: "#C44A0F", opacity: 0.85 }}>Cada uno cotiza por separado — solo vos ves todos los precios para comparar.</div>
            </div>
          </div>
        </div>
      )}

      {/* Botones */}
      <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
        {paso > 1
          ? <button className="btn-secondary" onClick={() => setPaso(p => p - 1)} style={{ flex: 1 }}>← Atrás</button>
          : <button className="btn-secondary" onClick={() => onNav("empresa-dashboard")} style={{ flex: 1 }}>Cancelar</button>
        }
        {paso < TOTAL_PASOS
          ? <button className="btn-primary" onClick={siguientePaso} style={{ flex: 2, padding: "12px" }}>Continuar →</button>
          : <button className="btn-primary" onClick={handlePublicar} style={{ flex: 2, padding: "13px", fontSize: 15 }}>Publicar carga</button>
        }
      </div>
    </div>
  );
}

function VerOfertas({ onNav, onAceptarOferta, cargas, ofertas }) {
  const cargasData = cargas || CARGAS_MOCK;
  const ofertasData = ofertas || OFERTAS_MOCK;
  const carga = cargasData.find(c => c.estado === 'activo') || cargasData[0] || CARGAS_MOCK[0];
  const [aceptada, setAceptada] = useState(null);
  const [cerrado, setCerrado] = useState(false);
  const [ordenar, setOrdenar] = useState("precio");

  const ofertasCarga = ofertasData.filter(o => o.cargaId === carga.id || !o.cargaId);
  const ofertasOrdenadas = [...ofertasCarga].sort((a, b) => {
    if (ordenar === "precio") return a.precio - b.precio;
    const ta = TRANSPORTISTAS_MOCK.find(t => t.id === a.transportistaId);
    const tb = TRANSPORTISTAS_MOCK.find(t => t.id === b.transportistaId);
    return (tb?.calificacion || 0) - (ta?.calificacion || 0);
  });

  function aceptarOferta(ofertaId) {
    const oferta = ofertasCarga.find(o => o.id === ofertaId) || ofertasData.find(o => o.id === ofertaId);
    const transportista = TRANSPORTISTAS_MOCK.find(t => t.id === oferta.transportistaId);
    const nuevoRemito = {
      id: generarNumeroRemito(),
      fecha: new Date().toLocaleDateString("es-AR"),
      hora: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }),
      remitente: { nombre: "Mi Empresa SRL", telefono: "3764 000000", domicilio: carga.empresa, ciudad: carga.origen },
      destinatario: { nombre: "Destinatario", telefono: "", domicilio: "", ciudad: carga.destino },
      envio: { descripcion: carga.tipo, tipo: carga.tipo, peso: carga.peso, especial: "normal", bultos: "1", pagaFlete: "remitente" },
      transportista: { nombre: transportista.nombre, chofer: "Chofer asignado", telefono: "", vehiculo: transportista.vehiculo },
      flete: oferta.precio,
      estado: "pendiente-retiro",
      retiro: oferta.retiro,
      entregaEst: oferta.entrega,
    };
    setAceptada(ofertaId);
    setCerrado(true);
    setTimeout(() => {
      if (onAceptarOferta) onAceptarOferta(nuevoRemito);
    }, 1500);
  }

  const menorPrecio = ofertasCarga.length > 0 ? Math.min(...ofertasCarga.map(o => o.precio)) : 0;

  return (
    <PageWrapper titulo="Comparar ofertas" subtitulo={`${carga.origen} → ${carga.destino} · ${carga.tipo}`}>
      <div style={{ maxWidth: 700 }}>

        {/* Resumen de la carga */}
        <div style={{ display: "flex", gap: 10, marginBottom: 20, padding: 14, background: "#fff", borderRadius: 10, border: "1px solid #E0E0E0" }}>
          <div style={{ flex: 1 }}><div style={{ fontSize: 11, color: "#888" }}>Retiro deseado</div><div style={{ fontWeight: 500, fontSize: 14 }}>{carga.retiro}</div></div>
          <div style={{ flex: 1 }}><div style={{ fontSize: 11, color: "#888" }}>Entrega deseada</div><div style={{ fontWeight: 500, fontSize: 14 }}>{carga.entrega}</div></div>
          <div style={{ flex: 1 }}><div style={{ fontSize: 11, color: "#888" }}>Respuestas recibidas</div><div style={{ fontWeight: 600, fontSize: 14, color: "#E85D20" }}>{ofertasCarga.length} transportistas</div></div>
        </div>

        {/* Aviso subasta cerrada */}
        {cerrado && (
          <div style={{ background: "#E1F5EE", border: "1px solid #0F6E56", borderRadius: 10, padding: 16, marginBottom: 20, textAlign: "center" }}>
            <div style={{ fontWeight: 500, color: "#0F6E56" }}>✓ Oferta aceptada — redirigiendo al seguimiento...</div>
          </div>
        )}

        {/* Ordenar */}
        {!cerrado && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <p style={{ fontSize: 13, color: "#666" }}>
              Los transportistas <strong>no ven los precios de los demás</strong>. Solo vos podés comparar.
            </p>
            <div style={{ display: "flex", gap: 4, background: "#F5F5F5", padding: 3, borderRadius: 8 }}>
              {[["precio", "Menor precio"], ["calificacion", "Mejor puntuación"]].map(([val, lbl]) => (
                <button key={val} onClick={() => setOrdenar(val)} style={{ padding: "5px 12px", borderRadius: 6, background: ordenar === val ? "#fff" : "transparent", color: ordenar === val ? "#1A1A1A" : "#888", border: ordenar === val ? "1px solid #E0E0E0" : "none", fontSize: 12, fontWeight: ordenar === val ? 500 : 400, cursor: "pointer" }}>{lbl}</button>
              ))}
            </div>
          </div>
        )}

        {/* Tarjetas de ofertas */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {ofertasOrdenadas.map((o, i) => {
            const t = TRANSPORTISTAS_MOCK.find(t => t.id === o.transportistaId);
            const esMasBarato = o.precio === menorPrecio;
            const esMejorPuntaje = t && t.calificacion === Math.max(...TRANSPORTISTAS_MOCK.filter(tr => ofertasCarga.find(of => of.transportistaId === tr.id)).map(tr => tr.calificacion));
            return (
              <div key={o.id} className="card" style={{ border: aceptada === o.id ? "2px solid #0F6E56" : o.matchRuta ? "2px solid #E85D20" : "1px solid #E0E0E0", position: "relative", opacity: cerrado && aceptada !== o.id ? 0.5 : 1 }}>

                {/* Badges destacados */}
                <div style={{ position: "absolute", top: 12, right: 14, display: "flex", gap: 6 }}>
                  {esMasBarato && <span style={{ background: "#E1F5EE", color: "#0F6E56", fontSize: 10, padding: "2px 8px", borderRadius: 5, fontWeight: 600 }}>💰 Más barato</span>}
                  {esMejorPuntaje && <span style={{ background: "#E6F1FB", color: "#185FA5", fontSize: 10, padding: "2px 8px", borderRadius: 5, fontWeight: 600 }}>⭐ Mejor puntuado</span>}
                  {o.matchRuta && <span style={{ background: "#FEF3EC", color: "#C44A0F", fontSize: 10, padding: "2px 8px", borderRadius: 5, fontWeight: 600 }}>Hace esta ruta</span>}
                </div>

                <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                  {/* Avatar */}
                  <div style={{ width: 44, height: 44, borderRadius: "50%", background: "#2C2C2A", display: "flex", alignItems: "center", justifyContent: "center", color: "#E85D20", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{t.foto}</div>

                  <div style={{ flex: 1, paddingTop: 2 }}>
                    {/* Nombre y puntaje */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, paddingRight: 100 }}>
                      <span style={{ fontWeight: 600, fontSize: 15 }}>{t.nombre}</span>
                      {t.verificado && <span className="badge badge-verificado" style={{ fontSize: 10 }}>✓ Verificado</span>}
                      <span style={{ color: "#E85D20", fontWeight: 500, fontSize: 13 }}>★ {t.calificacion}</span>
                      <span style={{ fontSize: 12, color: "#999" }}>{t.viajes} viajes</span>
                    </div>

                    {/* Datos de la oferta */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
                      <div style={{ background: "#F5F5F5", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 2 }}>Precio</div>
                        <div style={{ fontWeight: 700, fontSize: 18, color: esMasBarato ? "#0F6E56" : "#1A1A1A" }}>${o.precio.toLocaleString()}</div>
                      </div>
                      <div style={{ background: "#F5F5F5", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 2 }}>Retira</div>
                        <div style={{ fontWeight: 500, fontSize: 13 }}>{o.retiro}</div>
                      </div>
                      <div style={{ background: "#F5F5F5", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 2 }}>Entrega estimada</div>
                        <div style={{ fontWeight: 500, fontSize: 13 }}>{o.entrega}</div>
                      </div>
                      <div style={{ background: "#F5F5F5", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 2 }}>Vehículo</div>
                        <div style={{ fontWeight: 500, fontSize: 13 }}>{t.vehiculo}</div>
                      </div>
                    </div>

                    {o.nota && (
                      <p style={{ fontSize: 13, color: "#555", marginBottom: 12, fontStyle: "italic", background: "#FAFAFA", padding: "8px 10px", borderRadius: 6, borderLeft: "3px solid #E0E0E0" }}>
                        "{o.nota}"
                      </p>
                    )}

                    {!cerrado && (
                      <div style={{ display: "flex", gap: 8 }}>
                        <button className="btn-ghost" onClick={() => onNav("chat")} style={{ fontSize: 13, padding: "7px 14px" }}>Consultar</button>
                        <button className="btn-primary" onClick={() => aceptarOferta(o.id)} style={{ fontSize: 13, padding: "7px 20px" }}>
                          Elegir este transportista
                        </button>
                      </div>
                    )}

                    {aceptada === o.id && (
                      <div style={{ fontWeight: 500, color: "#0F6E56", fontSize: 14 }}>✓ Transportista elegido</div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Nota al pie */}
        {!cerrado && (
          <p style={{ fontSize: 12, color: "#aaa", marginTop: 20, textAlign: "center" }}>
            Podés seguir esperando más ofertas. Cuando estés listo, elegí el transportista que más te convenga.
          </p>
        )}
      </div>
    </PageWrapper>
  );
}

function storageGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function storageSave(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
}

function buscarVehiculos(texto) {
  if (!texto || texto.length < 2) return [];
  const q = texto.toLowerCase().trim();
  return DB_VEHICULOS.filter(v => v.nombre.toLowerCase().includes(q) || v.alias.some(a => a.includes(q))).slice(0, 6);
}

function SelectorVehiculo({ vehiculo, setVehiculo }) {
  const [texto, setTexto] = useState(vehiculo?.nombre || "");
  const [sugerencias, setSugerencias] = useState([]);
  const [abierto, setAbierto] = useState(false);
  const ref = React.useRef(null);

  useEffect(() => {
    function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setAbierto(false); }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  function handleChange(e) {
    const val = e.target.value;
    setTexto(val);
    setVehiculo(null);
    const res = buscarVehiculos(val);
    setSugerencias(res);
    setAbierto(res.length > 0);
  }

  function seleccionar(v) {
    setTexto(v.nombre);
    setVehiculo(v);
    setSugerencias([]);
    setAbierto(false);
  }

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <input value={texto} onChange={handleChange} placeholder="Ej: Sprinter, Camión 3/4, Kangoo..." onFocus={() => { if (sugerencias.length > 0) setAbierto(true); }} />
      {abierto && (
        <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #E0E0E0", borderRadius: 8, zIndex: 10, boxShadow: "0 4px 12px rgba(0,0,0,0.1)", overflow: "hidden" }}>
          {sugerencias.map((v, i) => (
            <div key={i} onClick={() => seleccionar(v)} style={{ padding: "10px 14px", cursor: "pointer", borderBottom: i < sugerencias.length - 1 ? "1px solid #F0F0F0" : "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}
              onMouseEnter={e => e.currentTarget.style.background = "#F5F5F5"} onMouseLeave={e => e.currentTarget.style.background = "#fff"}>
              <div>
                <div style={{ fontWeight: 500, fontSize: 14 }}>{v.nombre}</div>
                <div style={{ fontSize: 12, color: "#888" }}>{v.categoria}</div>
              </div>
              <div style={{ fontSize: 12, color: "#0F6E56", textAlign: "right" }}>
                {v.volumenM3 && <div>{v.volumenM3} m³</div>}
                <div>{v.cargaKg?.toLocaleString()} kg</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QRCode({ value, size = 120 }) {
  const [imgOk, setImgOk] = useState(true);
  const encoded = encodeURIComponent(value);
  const src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encoded}&color=2C2C2A&bgcolor=ffffff&margin=4`;

  if (!imgOk) {
    // Fallback si no hay internet: cuadro con el ID del remito
    return (
      <div style={{
        width: size, height: size, background: "#F5F5F5", border: "2px dashed #ccc",
        borderRadius: 8, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", gap: 4, padding: 8
      }}>
        <div style={{ fontSize: 28 }}>📱</div>
        <div style={{ fontSize: 9, color: "#888", textAlign: "center", lineHeight: 1.3 }}>QR disponible<br/>con internet</div>
      </div>
    );
  }

  return (
    <img
      src={src}
      width={size}
      height={size}
      alt="QR del remito"
      style={{ display: "block", borderRadius: 6 }}
      onError={() => setImgOk(false)}
    />
  );
}

    >
      <div style={{ maxWidth: 680 }} className="remito-print">

        {/* ─── HEADER DEL REMITO ─── */}
        <div className="remito-header">
          <FletarLogo size="sm" />
          <div style={{ textAlign: "center" }}>
            <div style={{ color: "#fff", fontSize: 11, opacity: 0.6 }}>COMPROBANTE DE ENVÍO</div>
            <div style={{ color: "#E85D20", fontSize: 18, fontWeight: 700 }}>{remito.id}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11 }}>{remito.fecha}</div>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11 }}>{remito.hora} hs</div>
          </div>
        </div>

        {/* ─── CUERPO ─── */}
        <div className="remito-body">

          {/* Estado actual */}
          <div className="remito-status">
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#E85D20", flexShrink: 0 }} />
            {ESTADOS_REMITO.find(e => e.id === estado)?.label || "Pendiente"}
          </div>

          {/* Remitente y Destinatario */}
          <div className="remito-grid-2">
            <div className="remito-seccion">
              <div className="remito-seccion-titulo">Remitente</div>
              <div className="remito-fila"><span className="remito-label">Nombre</span><span className="remito-val">{remito.remitente.nombre}</span></div>
              <div className="remito-fila"><span className="remito-label">Teléfono</span><span className="remito-val">{remito.remitente.telefono}</span></div>
              <div className="remito-fila"><span className="remito-label">Domicilio</span><span className="remito-val">{remito.remitente.domicilio}</span></div>
              <div className="remito-fila"><span className="remito-label">Ciudad</span><span className="remito-val">{remito.remitente.ciudad}</span></div>
            </div>
            <div className="remito-seccion">
              <div className="remito-seccion-titulo">Destinatario</div>
              <div className="remito-fila"><span className="remito-label">Nombre</span><span className="remito-val">{remito.destinatario.nombre}</span></div>
              <div className="remito-fila"><span className="remito-label">Teléfono</span><span className="remito-val">{remito.destinatario.telefono}</span></div>
              <div className="remito-fila"><span className="remito-label">Domicilio</span><span className="remito-val">{remito.destinatario.domicilio}</span></div>
              <div className="remito-fila"><span className="remito-label">Ciudad</span><span className="remito-val">{remito.destinatario.ciudad}</span></div>
            </div>
          </div>

          {/* Detalle del envío */}
          <div className="remito-seccion" style={{ marginBottom: 12 }}>
            <div className="remito-seccion-titulo">Detalle del envío</div>
            <div className="remito-grid-2" style={{ marginBottom: 0, gap: 6 }}>
              <div className="remito-fila"><span className="remito-label">Mercadería</span><span className="remito-val">{remito.envio.descripcion || "—"}</span></div>
              <div className="remito-fila"><span className="remito-label">Tipo</span><span className="remito-val">{remito.envio.tipo}</span></div>
              {remito.envio.peso && <div className="remito-fila"><span className="remito-label">Peso</span><span className="remito-val">{remito.envio.peso} kg</span></div>}
              {(remito.envio.alto && remito.envio.ancho && remito.envio.largo) && (
                <div className="remito-fila"><span className="remito-label">Dimensiones</span><span className="remito-val">{remito.envio.alto}×{remito.envio.ancho}×{remito.envio.largo} cm</span></div>
              )}
              <div className="remito-fila"><span className="remito-label">Bultos</span><span className="remito-val">{remito.envio.bultos}</span></div>
              {remito.envio.especial && remito.envio.especial !== "normal" && (
                <div className="remito-fila"><span className="remito-label">Especial</span><span className="remito-val">{especiales[remito.envio.especial] || remito.envio.especial}</span></div>
              )}
              <div className="remito-fila"><span className="remito-label">Flete</span><span className="remito-val naranja">${remito.flete.toLocaleString()}</span></div>
              <div className="remito-fila"><span className="remito-label">Paga</span><span className="remito-val">{remito.envio.pagaFlete === "destinatario" ? "Destinatario al recibir" : "Remitente"}</span></div>
            </div>
          </div>

          {/* QR + Transportista + Timeline */}
          <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
            {/* QR */}
            <div style={{ background: "#F5F5F5", borderRadius: 10, padding: 12, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flexShrink: 0 }}>
              <QRCode value={linkRemito} size={110} />
              <div style={{ fontSize: 11, fontWeight: 700, color: "#E85D20" }}>{remito.id}</div>
              <div style={{ fontSize: 10, color: "#888", textAlign: "center", maxWidth: 110 }}>Escaneá para ver el remito</div>
            </div>

            <div style={{ flex: 1 }}>
              {/* Transportista */}
              <div className="remito-seccion" style={{ marginBottom: 12 }}>
                <div className="remito-seccion-titulo">Transportista asignado</div>
                <div className="remito-fila"><span className="remito-label">Empresa</span><span className="remito-val">{remito.transportista.nombre}</span></div>
                <div className="remito-fila"><span className="remito-label">Chofer</span><span className="remito-val">{remito.transportista.chofer}</span></div>
                <div className="remito-fila"><span className="remito-label">Vehículo</span><span className="remito-val">{remito.transportista.vehiculo}</span></div>
                <div className="remito-fila"><span className="remito-label">Retira</span><span className="remito-val">{remito.retiro}</span></div>
                <div className="remito-fila"><span className="remito-label">Entrega est.</span><span className="remito-val">{remito.entregaEst}</span></div>
              </div>

              {/* Timeline */}
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>Estado del envío</div>
                {ESTADOS_REMITO.map((e, i) => {
                  const done = i < estadoIdx;
                  const activo = i === estadoIdx;
                  return (
                    <div key={e.id}>
                      <div className="remito-track-item">
                        <div className="remito-track-dot" style={{ background: done ? "#E85D20" : activo ? "#fff" : "#E0E0E0", border: activo ? "2px solid #E85D20" : done ? "none" : "2px solid #E0E0E0", boxShadow: activo ? "0 0 0 3px #FEF3EC" : "none" }} />
                        <span style={{ fontSize: 12, color: activo ? "#E85D20" : done ? "#1A1A1A" : "#aaa", fontWeight: activo ? 600 : 400 }}>{e.label}</span>
                      </div>
                      {i < ESTADOS_REMITO.length - 1 && <div className="remito-track-linea" />}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* ─── ACCIONES SEGÚN ROL ─── */}
          <div style={{ borderTop: "1px solid #E0E0E0", marginTop: 20, paddingTop: 16 }} className="no-print">

            {/* EMPRESA: WhatsApp + link chofer */}
            {esEmpresa && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <a
                    href={`https://wa.me/54${remito.destinatario.telefono.replace(/\D/g, "")}?text=${msgWhatsApp}`}
                    target="_blank"
                    rel="noreferrer"
                    style={{ background: "#25D366", color: "#fff", borderRadius: 8, padding: "10px 0", fontSize: 13, fontWeight: 500, textAlign: "center", textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}
                  >
                    💬 Enviar QR al destinatario
                  </a>
                  <button
                    onClick={() => setMostrarLinkChofer(v => !v)}
                    style={{ background: "#2C2C2A", color: "#fff", borderRadius: 8, padding: "10px 0", fontSize: 13, fontWeight: 500, border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}
                  >
                    🚛 Generar link para el chofer
                  </button>
                </div>
                {mostrarLinkChofer && (
                  <div style={{ background: "#F5F5F5", borderRadius: 8, padding: "12px 14px" }}>
                    <div style={{ fontSize: 12, color: "#666", marginBottom: 8 }}>Enviá este link al chofer por WhatsApp. Al abrirlo podrá confirmar retiro y entrega.</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input value={linkChofer} readOnly style={{ flex: 1, fontSize: 11, background: "#fff", color: "#444" }} />
                      <button
                        onClick={copiarLinkChofer}
                        style={{ background: linkChoferCopiado ? "#0F6E56" : "#E85D20", color: "#fff", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 12, cursor: "pointer", whiteSpace: "nowrap", fontWeight: 500 }}
                      >
                        {linkChoferCopiado ? "✓ Copiado" : "Copiar"}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TRANSPORTISTA / CHOFER: botones de acción */}
            {esTransportista && (
              <div>
                <div style={{ fontSize: 12, color: "#666", marginBottom: 10, background: "#FEF3EC", borderRadius: 8, padding: "8px 12px", borderLeft: "3px solid #E85D20" }}>
                  🔒 Solo vos podés cambiar el estado — sos el transportista asignado a este envío.
                </div>
                {estado === "pendiente-retiro" && (
                  <button onClick={() => avanzarEstado("retirado")} style={{ width: "100%", background: "#E85D20", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                    📦 Confirmar retiro del paquete
                  </button>
                )}
                {estado === "retirado" && (
                  <button onClick={() => avanzarEstado("en-camino")} style={{ width: "100%", background: "#185FA5", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                    🚛 Marcar en camino
                  </button>
                )}
                {estado === "en-camino" && (
                  <button onClick={() => avanzarEstado("entregado")} style={{ width: "100%", background: "#0F6E56", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                    ✅ Confirmar entrega
                  </button>
                )}
                {estado === "entregado" && (
                  <div style={{ textAlign: "center", padding: 16, background: "#E1F5EE", borderRadius: 10 }}>
                    <div style={{ fontSize: 32 }}>✅</div>
                    <div style={{ fontWeight: 600, color: "#0F6E56", marginTop: 8 }}>Entrega confirmada</div>
                  </div>
                )}
              </div>
            )}

            {/* DESTINATARIO (sin login): puede confirmar recepción */}
            {!usuario && (
              <div>
                <div style={{ fontSize: 12, color: "#555", marginBottom: 10 }}>Sos el destinatario de este envío. Cuando recibas el paquete podés confirmar la recepción.</div>
                {estado === "en-camino" && (
                  <button onClick={() => avanzarEstado("entregado")} style={{ width: "100%", background: "#0F6E56", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                    ✅ Confirmar que recibí el paquete
                  </button>
                )}
                {estado === "entregado" && (
                  <div style={{ textAlign: "center", padding: 16, background: "#E1F5EE", borderRadius: 10 }}>
                    <div style={{ fontWeight: 600, color: "#0F6E56" }}>✓ Entrega confirmada. ¡Gracias!</div>
                  </div>
                )}
                {estado !== "en-camino" && estado !== "entregado" && (
                  <div style={{ padding: "12px 14px", background: "#F5F5F5", borderRadius: 8, fontSize: 13, color: "#666" }}>
                    Tu paquete aún no está en camino. El botón de confirmación aparecerá cuando el transportista lo despache.
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      </div>
    </PageWrapper>
  );
}

// ─── APP ROOT ────────────────────────────────────────────────────────────────

function App() {
  const params = new URLSearchParams(window.location.search);
  const demo = params.get('demo');
  const usuarioInicial = demo === 'empresa'
    ? { nombre: 'Mi Empresa', email: 'empresa@test.com', tipo: 'empresa' }
    : demo === 'transportista'
    ? { nombre: 'Carlos Ramírez', email: 'trans@test.com', tipo: 'transportista' }
    : null;
  const screenInicial = demo === 'empresa' ? 'empresa-dashboard' : demo === 'transportista' ? 'trans-dashboard' : 'login';

  const [usuario, setUsuario] = useState(usuarioInicial);
  const [screen, setScreen] = useState(screenInicial);
  const [remitoActivo, setRemitoActivo] = useState(null);

  const [cargas, setCargas] = useState(() => {
    try { const s = localStorage.getItem('fletar_cargas'); return s ? JSON.parse(s) : CARGAS_MOCK; }
    catch { return CARGAS_MOCK; }
  });
  const [ofertas, setOfertas] = useState(() => {
    try { const s = localStorage.getItem('fletar_ofertas'); return s ? JSON.parse(s) : OFERTAS_MOCK; }
    catch { return OFERTAS_MOCK; }
  });

  useEffect(() => {
    const ch = new BroadcastChannel('fletar_sync');
    ch.onmessage = (e) => {
      if (e.data.type === 'cargas') { setCargas(e.data.data); localStorage.setItem('fletar_cargas', JSON.stringify(e.data.data)); }
      if (e.data.type === 'ofertas') { setOfertas(e.data.data); localStorage.setItem('fletar_ofertas', JSON.stringify(e.data.data)); }
    };
    return () => ch.close();
  }, []);

  function broadcast(type, data) {
    localStorage.setItem('fletar_' + type, JSON.stringify(data));
    const ch = new BroadcastChannel('fletar_sync');
    ch.postMessage({ type, data });
    ch.close();
  }

  function addCarga(carga) {
    setCargas(prev => {
      const nuevas = [carga, ...prev];
      broadcast('cargas', nuevas);
      return nuevas;
    });
  }

  function addOferta(oferta) {
    setOfertas(prev => {
      const nuevas = [...prev, oferta];
      broadcast('ofertas', nuevas);
      return nuevas;
    });
    setCargas(prev => {
      const nuevas = prev.map(c => c.id === oferta.cargaId ? { ...c, ofertas: (c.ofertas || 0) + 1, estado: 'activo' } : c);
      broadcast('cargas', nuevas);
      return nuevas;
    });
  }

  function handleLogin(u) {
    setUsuario(u);
    if (u.tipo === "admin") setScreen("admin-dashboard");
    else if (u.tipo === "transportista") setScreen("trans-dashboard");
    else setScreen("empresa-dashboard");
  }

  function handleNav(dest) {
    if (dest === "logout") { setUsuario(null); return; }
    setScreen(dest);
  }

  if (!usuario) return <AuthScreen onLogin={handleLogin} />;

  const renderScreen = () => {
    switch (screen) {
      case "empresa-dashboard": return <EmpresaDashboard onNav={handleNav} usuario={usuario} cargas={cargas} />;
      case "historial-envios": return <HistorialEnvios onNav={handleNav} cargas={cargas} />;
      case "publicar-carga": return <PublicarCarga onNav={handleNav} usuario={usuario} onPublicar={addCarga} />;
      case "ver-ofertas": return <VerOfertas onNav={handleNav} cargas={cargas} ofertas={ofertas} onAceptarOferta={(remito) => { setRemitoActivo(remito); handleNav("remito"); }} />;
      case "seguimiento": return <SeguimientoEnvio onNav={handleNav} onVerRemito={(r) => { setRemitoActivo(r); handleNav("remito"); }} />;
      case "remito": return <RemitoScreen onNav={handleNav} usuario={usuario} remitoData={remitoActivo} />;
      case "chat": return <ChatScreen usuario={usuario} onNav={handleNav} />;
      case "trans-dashboard": return <TransportistaDashboard onNav={handleNav} usuario={usuario} cargas={cargas} />;
      case "mis-rutas": return <MisRutas onNav={handleNav} />;
      case "mi-flota": return <MiFlota onNav={handleNav} />;
      case "hacer-oferta": return <HacerOferta onNav={handleNav} cargas={cargas} onOferta={addOferta} />;
      case "mis-viajes": return <MisViajes onNav={handleNav} onVerRemito={(r) => { setRemitoActivo(r); handleNav("remito"); }} />;
      case "admin-dashboard": return <AdminDashboard onNav={handleNav} />;
      case "admin-transportistas": return <AdminTransportistas />;
      default: return <EmpresaDashboard onNav={handleNav} />;
    }
  };

  return (
    <div>
      <Navbar usuario={usuario} onNav={handleNav} screen={screen} />
      {renderScreen()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
