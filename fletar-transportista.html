function MisRutas({ onNav }) {
  const [rutas, setRutas] = useState([]);
  const [form, setForm] = useState(null);
  const DIAS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const TIPOS = ["General","Refrigerado","Congelado","Granel","Fruta/verdura","Ganado","Maquinaria"];
  const rutaKey = USUARIO_TRANS.nombre.replace(/[.#$[\]]/g, '_');
  const rutasRef = db.ref('rutas/' + rutaKey);

  useEffect(() => {
    rutasRef.on('value', snap => {
      const val = snap.val();
      if (!val) { setRutas([]); return; }
      setRutas(Object.values(val).sort((a, b) => (a.id || 0) - (b.id || 0)));
    });
    return () => rutasRef.off();
  }, []);

  const [sugeridas, setSugeridas] = useState([]);
  const [loadingSug, setLoadingSug] = useState(false);

  function formVacio() {
    return { provinciaOrigen: "", ciudadOrigen: "", provinciaDestino: "", ciudadDestino: "", waypoints: [], paradas: [], dias: [], tipo: "General", sucursales: {} };
  }

  function toggleSucursalForm(ciudad) {
    if (!ciudad) return;
    const key = normStrTr(ciudad.split(',')[0]);
    setForm(prev => {
      const suc = { ...(prev.sucursales || {}) };
      suc[key] = !suc[key];
      return { ...prev, sucursales: suc };
    });
  }
  function sucursalActiva(ciudad) {
    if (!ciudad || !form) return false;
    const key = normStrTr(ciudad.split(',')[0]);
    return !!(form.sucursales && form.sucursales[key]);
  }

  function setF(key, val) { setForm(prev => ({ ...prev, [key]: val })); }

  function toggleDia(d) { setForm(prev => ({ ...prev, dias: prev.dias.includes(d) ? prev.dias.filter(x => x !== d) : [...prev.dias, d] })); }

  // Marcar/desmarcar una ciudad sugerida → actualiza form.paradas automáticamente
  function toggleSugerida(s) {
    setForm(prev => {
      const existe = (prev.paradas || []).some(p => normStrTr(p.ciudad) === normStrTr(s.ciudad));
      return {
        ...prev,
        paradas: existe
          ? prev.paradas.filter(p => normStrTr(p.ciudad) !== normStrTr(s.ciudad))
          : [...(prev.paradas || []), { ciudad: s.ciudad, provincia: s.provincia }]
      };
    });
  }

  function quitarParada(ciudad) {
    setForm(prev => ({ ...prev, paradas: prev.paradas.filter(p => normStrTr(p.ciudad) !== normStrTr(ciudad)) }));
  }

  function addWaypoint(ciudad, prov) {
    if (!ciudad.trim()) return;
    setForm(prev => {
      const wps = prev.waypoints || [];
      if (wps.some(w => normStrTr(w.ciudad) === normStrTr(ciudad))) return prev;
      return { ...prev, waypoints: [...wps, { ciudad, provincia: prov || '' }] };
    });
  }
  function removeWaypoint(ciudad) {
    setForm(prev => ({ ...prev, waypoints: (prev.waypoints || []).filter(w => normStrTr(w.ciudad) !== normStrTr(ciudad)) }));
  }

  function guardar() {
    if (!form.ciudadOrigen || !form.ciudadDestino || form.dias.length === 0) { alert("Completá origen, destino y al menos un día."); return; }
    const id = form.id || Date.now();
    const data = { id, provinciaOrigen: form.provinciaOrigen, ciudadOrigen: form.ciudadOrigen, provinciaDestino: form.provinciaDestino, ciudadDestino: form.ciudadDestino, waypoints: form.waypoints || [], paradas: form.paradas || [], dias: form.dias, tipo: form.tipo, sucursales: form.sucursales || {} };
    rutasRef.child(String(id)).set(data).then(() => { setForm(null); setSugeridas([]); });
  }

  function eliminar(id) {
    if (!confirm("¿Eliminar esta ruta?")) return;
    rutasRef.child(String(id)).remove();
  }

  function abrirEditar(r) {
    setForm({ ...r, waypoints: r.waypoints || [], paradas: r.paradas || [] });
    setSugeridas([]);
  }

  // Busca ciudades intermedias segmentando la ruta por waypoints opcionales
  async function buscarSugeridas(ciudadA, provA, ciudadB, provB, wps = []) {
    setLoadingSug(true);
    setSugeridas([]);
    try {
      const fetchCoords = (ciudad, prov) =>
        fetch(`${GEOREF_TR}/localidades?nombre=${encodeURIComponent(ciudad)}&provincia=${encodeURIComponent(prov)}&max=1&campos=nombre,centroide`)
          .then(r=>r.json()).then(d=>d.localidades?.[0]?.centroide||null).catch(()=>null);

      // Todos los puntos: origen + waypoints + destino
      const puntosBase = [
        { ciudad: ciudadA, prov: provA },
        ...(wps || []).map(w => ({ ciudad: w.ciudad, prov: w.provincia })),
        { ciudad: ciudadB, prov: provB }
      ];
      const coords = await Promise.all(puntosBase.map(p => fetchCoords(p.ciudad, p.prov)));
      const puntos = puntosBase.map((p, i) => ({ ...p, coord: coords[i] })).filter(p => p.coord);
      if (puntos.length < 2) { setLoadingSug(false); return; }

      const cA = puntos[0].coord;
      const tolerance = wps && wps.length > 0 ? 1.25 : 1.45;

      // Provincias de todos los segmentos
      const allProvs = new Set();
      for (let i = 0; i < puntos.length - 1; i++) {
        const { coord: cI, prov: pI } = puntos[i];
        const { coord: cJ, prov: pJ } = puntos[i+1];
        provinciasParaBuscar(cI.lat, cI.lon, cJ.lat, cJ.lon, pI, pJ).forEach(p => allProvs.add(p));
      }

      const todasLocs = (await Promise.all(
        [...allProvs].map(p => fetch(`${GEOREF_TR}/localidades?provincia=${encodeURIComponent(p)}&max=300&campos=nombre,provincia,centroide`)
          .then(r=>r.json()).then(d=>d.localidades||[]).catch(()=>[]))
      )).flat();

      const excludeNames = new Set(puntosBase.map(p => normStrTr(p.ciudad)));
      const seen = new Set();
      const cands = todasLocs
        .filter(loc => {
          const c = loc.centroide;
          if (!c) return false;
          const cn = normStrTr(loc.nombre);
          if (excludeNames.has(cn)) return false;
          const key = cn + '|' + normStrTr(loc.provincia?.nombre||'');
          if (seen.has(key)) return false;
          // La ciudad tiene que estar en al menos un segmento
          for (let i = 0; i < puntos.length - 1; i++) {
            const { coord: cI } = puntos[i];
            const { coord: cJ } = puntos[i+1];
            const segDist = distKm(cI.lat, cI.lon, cJ.lat, cJ.lon);
            if (distKm(cI.lat, cI.lon, c.lat, c.lon) + distKm(c.lat, c.lon, cJ.lat, cJ.lon) <= segDist * tolerance) {
              seen.add(key);
              return true;
            }
          }
          return false;
        })
        .map(loc => ({
          ciudad: loc.nombre,
          provincia: normProvDisplayTr(loc.provincia?.nombre||''),
          km: Math.round(distKm(cA.lat, cA.lon, loc.centroide.lat, loc.centroide.lon)),
        }))
        .sort((a,b) => a.km - b.km);
      setSugeridas(cands);
    } catch(e) {}
    setLoadingSug(false);
  }

  useEffect(() => {
    if (!form?.ciudadOrigen || !form?.ciudadDestino || !form?.provinciaOrigen || !form?.provinciaDestino) {
      setSugeridas([]);
      return;
    }
    buscarSugeridas(form.ciudadOrigen, form.provinciaOrigen, form.ciudadDestino, form.provinciaDestino, form.waypoints || []);
  }, [form?.ciudadOrigen, form?.provinciaOrigen, form?.ciudadDestino, form?.provinciaDestino, JSON.stringify(form?.waypoints)]);

  const numRuta = form ? (form.id ? rutas.findIndex(r => r.id === form.id) + 1 : rutas.length + 1) : null;

  return (
    <React.Fragment>
    <PageWrapper titulo="Mis rutas" subtitulo="Las empresas ven tus rutas antes de publicar una carga." accion={!form && <button className="btn-primary" onClick={() => setForm(formVacio())}>+ Agregar ruta</button>}>

      {/* ── Lista ── */}
      {!form && rutas.length === 0 && (
        <div className="card" style={{ textAlign: "center", padding: 32, color: "#5A6A78" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🗺️</div>
          <p style={{ fontWeight: 500 }}>Todavía no cargaste ninguna ruta</p>
          <p style={{ fontSize: 13, marginTop: 6 }}>Agregá tus rutas para que las empresas te encuentren más fácil.</p>
        </div>
      )}
      {!form && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
          {rutas.map((r, idx) => (
            <div key={r.id} className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ marginBottom: 4 }}>
                    <span style={{ background: "#E1F5EE", color: "#085041", fontSize: 10, fontWeight: 500, padding: "2px 8px", borderRadius: 20 }}>RUTA {idx + 1}</span>
                  </div>
                  <div style={{ fontWeight: 500, fontSize: 15, marginBottom: 3 }}>📍 {r.ciudadOrigen}, {r.provinciaOrigen} → {r.ciudadDestino}, {r.provinciaDestino}</div>
                  <div style={{ fontSize: 12, color: "#5A6A78", marginBottom: 7 }}>
                    {r.paradas && r.paradas.length > 0 ? `${r.paradas.length} parada${r.paradas.length !== 1 ? 's' : ''} intermedia${r.paradas.length !== 1 ? 's' : ''}` : 'Sin paradas intermedias'}
                    {r.sucursales && Object.values(r.sucursales).some(Boolean) && (
                      <span style={{ marginLeft:8, background:'#E1F5EE', color:'#0F6E56', fontSize:10, fontWeight:600, padding:'1px 7px', borderRadius:10 }}>
                        🏪 {Object.values(r.sucursales).filter(Boolean).length} sucursal{Object.values(r.sucursales).filter(Boolean).length !== 1 ? 'es' : ''}
                      </span>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                    {r.dias.map(d => <span key={d} style={{ background: "#E1F5EE", color: "#085041", fontSize: 11, padding: "2px 8px", borderRadius: 20, fontWeight: 500 }}>{d}</span>)}
                    <span style={{ background: "#F5F5F5", color: "#666", fontSize: 11, padding: "2px 8px", borderRadius: 20 }}>{r.tipo}</span>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 2, marginLeft: 8 }}>
                  <button onClick={() => abrirEditar(r)} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 15, color: "#5A6A78", padding: "2px 6px" }}>✏️</button>
                  <button onClick={() => eliminar(r.id)} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 18, color: "#ccc", padding: "2px 6px" }}>×</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── Formulario ── */}
      {form && (
        <div className="card" style={{ border: "1.5px solid #0F6E56" }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: "#0F6E56", marginBottom: 16 }}>
            {form.id ? `✏️ Editando RUTA ${numRuta}` : `Nueva ruta — RUTA ${numRuta}`}
          </div>

          {/* Origen */}
          <div style={{ fontSize: 11, fontWeight: 500, color: "#5A6A78", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Origen</div>
          <div style={{ marginBottom: 14 }}>
            <CiudadAutocomplete
              required
              value={form.ciudadOrigen ? `${form.ciudadOrigen}${form.provinciaOrigen ? ", " + form.provinciaOrigen : ""}` : ""}
              onChange={(ciudad, prov) => setForm(prev => ({ ...prev, ciudadOrigen: ciudad, provinciaOrigen: prov }))}
              mostrarGPS={true}
              placeholder="Ej: Posadas, Misiones"
            />
            {form.ciudadOrigen && (
              <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:5 }}>
                <div style={{ fontSize:12, color:'#0F6E56', fontWeight:500 }}>✓ {form.ciudadOrigen}{form.provinciaOrigen ? ', '+form.provinciaOrigen : ''}</div>
                <button onClick={() => toggleSucursalForm(form.ciudadOrigen)}
                  style={{ padding:'3px 9px', borderRadius:6, fontSize:11, fontWeight:600, cursor:'pointer',
                    background: sucursalActiva(form.ciudadOrigen) ? '#E1F5EE' : '#F0F4F8',
                    border: sucursalActiva(form.ciudadOrigen) ? '1px solid #0F6E56' : '1px solid #DDE3EA',
                    color: sucursalActiva(form.ciudadOrigen) ? '#0F6E56' : '#888' }}>
                  🏪 {sucursalActiva(form.ciudadOrigen) ? 'Con sucursal' : 'Sin sucursal'}
                </button>
              </div>
            )}
          </div>

          {/* Destino */}
          <div style={{ fontSize: 11, fontWeight: 500, color: "#5A6A78", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Destino</div>
          <div style={{ marginBottom: 14 }}>
            <CiudadAutocomplete
              required
              value={form.ciudadDestino ? `${form.ciudadDestino}${form.provinciaDestino ? ", " + form.provinciaDestino : ""}` : ""}
              onChange={(ciudad, prov) => setForm(prev => ({ ...prev, ciudadDestino: ciudad, provinciaDestino: prov }))}
              placeholder="Ej: Puerto Iguazú, Misiones"
            />
            {form.ciudadDestino && (
              <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:5 }}>
                <div style={{ fontSize:12, color:'#0F6E56', fontWeight:500 }}>✓ {form.ciudadDestino}{form.provinciaDestino ? ', '+form.provinciaDestino : ''}</div>
                <button onClick={() => toggleSucursalForm(form.ciudadDestino)}
                  style={{ padding:'3px 9px', borderRadius:6, fontSize:11, fontWeight:600, cursor:'pointer',
                    background: sucursalActiva(form.ciudadDestino) ? '#E1F5EE' : '#F0F4F8',
                    border: sucursalActiva(form.ciudadDestino) ? '1px solid #0F6E56' : '1px solid #DDE3EA',
                    color: sucursalActiva(form.ciudadDestino) ? '#0F6E56' : '#888' }}>
                  🏪 {sucursalActiva(form.ciudadDestino) ? 'Con sucursal' : 'Sin sucursal'}
                </button>
              </div>
            )}
          </div>

          {/* Ciudades de paso — Waypoints opcionales */}
          {form.ciudadOrigen && form.ciudadDestino && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ background: "#EDF9F3", border: "1px solid #9FE1CB", borderRadius: 10, padding: "10px 13px", marginBottom: 10, display: "flex", gap: 9, alignItems: "flex-start" }}>
                <span style={{ fontSize: 16, flexShrink: 0 }}>🛣️</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: "#085041", marginBottom: 2 }}>¿Por dónde hacés esta ruta?</div>
                  <div style={{ fontSize: 12, color: "#0F6E56", lineHeight: 1.5 }}>Cuantas más ciudades nos decís que pasás, te mostramos mejor las paradas disponibles.</div>
                </div>
              </div>
              {(form.waypoints || []).length > 0 && (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 8 }}>
                  {(form.waypoints || []).map((w, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, background: "#F8FAFB", border: "1px solid #DDE3EA", borderRadius: 8, padding: "8px 12px" }}>
                      <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#0F6E56", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        <span style={{ color: "white", fontSize: 10, fontWeight: 600 }}>{i+1}</span>
                      </div>
                      <span style={{ flex: 1, fontSize: 13, color: "#1A1A1A" }}>{w.ciudad}{w.provincia ? `, ${w.provincia}` : ''}</span>
                      <button onClick={() => toggleSucursalForm(w.ciudad)}
                        title="¿Hay sucursal en esta ciudad?"
                        style={{ padding:'2px 7px', borderRadius:5, fontSize:11, fontWeight:600, cursor:'pointer', border:'none',
                          background: sucursalActiva(w.ciudad) ? '#0F6E56' : '#E8EDF2',
                          color: sucursalActiva(w.ciudad) ? '#fff' : '#888' }}>
                        🏪
                      </button>
                      <button onClick={() => removeWaypoint(w.ciudad)} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 18, color: "#aaa", padding: "0 2px", lineHeight: 1 }}>×</button>
                    </div>
                  ))}
                </div>
              )}
              <CiudadAutocomplete
                  key={'wp-' + (form.waypoints || []).length}
                  value=""
                  onChange={addWaypoint}
                  placeholder="Agregar ciudad de paso..."
                />
            </div>
          )}

          {/* Paradas intermedias — detección automática */}
          <div style={{ fontSize: 11, fontWeight: 500, color: "#5A6A78", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>
            Paradas intermedias
            {form.paradas.length > 0 && <span style={{ background: "#0F6E56", color: "#fff", borderRadius: 20, fontSize: 10, padding: "1px 7px", marginLeft: 8, fontWeight: 600 }}>{form.paradas.length} seleccionadas</span>}
          </div>

          {form.ciudadOrigen && form.ciudadDestino ? (
            <div style={{ background: "#F8FAFB", border: "1px solid #E0E8EF", borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}>
              {loadingSug ? (
                <div style={{ textAlign: "center", padding: "10px 0", fontSize: 13, color: "#5A6A78" }}>🔍 Detectando ciudades en la ruta...</div>
              ) : sugeridas.length === 0 ? (
                <div style={{ fontSize: 13, color: "#5A6A78" }}>No se detectaron ciudades intermedias automáticamente.</div>
              ) : (
                <>
                  <div style={{ fontSize: 12, color: "#0F6E56", fontWeight: 500, marginBottom: 8 }}>
                    {sugeridas.length} ciudades detectadas en esta ruta — marcá las que cubrís:
                  </div>
                  <div style={{ display: "flex", flexDirection: "column" }}>
                    {sugeridas.map((s, i) => {
                      const checked = (form.paradas || []).some(p => normStrTr(p.ciudad) === normStrTr(s.ciudad));
                      return (
                        <label key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 6px", cursor: "pointer", borderRadius: 7, fontSize: 13, background: checked ? "#EDF9F3" : "transparent" }}>
                          <input type="checkbox" checked={checked} onChange={() => toggleSugerida(s)}
                            style={{ width: 16, height: 16, cursor: "pointer", accentColor: "#0F6E56", flexShrink: 0 }} />
                          <span style={{ flex: 1, color: checked ? "#085041" : "#3A4D5C", fontWeight: checked ? 500 : 400 }}>{s.ciudad}</span>
                          <span style={{ fontSize: 11, color: "#888" }}>{s.provincia}</span>
                          <span style={{ fontSize: 11, color: "#bbb", minWidth: 44, textAlign: "right" }}>{s.km} km</span>
                        </label>
                      );
                    })}
                  </div>
                </>
              )}
              {/* Sugerencia: si no aparece la ciudad, agregar waypoint */}
              {sugeridas.length > 0 && (
                <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #EEF1F5", fontSize: 12, color: "#8A9BAA", textAlign: "center" }}>
                  ¿Falta alguna ciudad? Agregá una ciudad de paso arriba ↑
                </div>
              )}
            </div>
          ) : (
            <div style={{ background: "#F8FAFB", border: "1px dashed #DDE3EA", borderRadius: 10, padding: "14px", marginBottom: 12, textAlign: "center", fontSize: 13, color: "#8A9BAA" }}>
              Completá origen y destino para ver las ciudades de la ruta
            </div>
          )}


          {/* Tipo */}
          <div className="form-group">
            <label>Tipo de carga</label>
            <select value={form.tipo} onChange={e => setF('tipo', e.target.value)}>
              {TIPOS.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>

          {/* Días */}
          <div className="form-group" style={{ marginBottom: 16 }}>
            <label>Días de la semana *</label>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
              {DIAS.map(d => (
                <button key={d} onClick={() => toggleDia(d)} style={{ padding: "6px 12px", borderRadius: 6, background: form.dias.includes(d) ? "#0F6E56" : "transparent", color: form.dias.includes(d) ? "#fff" : "#666", border: `1px solid ${form.dias.includes(d) ? "#0F6E56" : "#DDE3EA"}`, fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>{d}</button>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn-ghost" onClick={() => setForm(null)}>Cancelar</button>
            <button className="btn-primary" onClick={guardar}>{form.id ? "Guardar cambios" : "Guardar ruta"}</button>
          </div>
        </div>
      )}
    </PageWrapper>

    </React.Fragment>
  );
}

// ─── HACER OFERTA ─────────────────────────────────────────────────────────────
function HacerOferta({ onNav, cargaSeleccionada, rutas = [] }) {
  const carga = cargaSeleccionada || null;
  const [form, setForm] = useState({ precio: "", fechaRetiro: "", horaRetiro: "", fechaEntrega: "", horaEntrega: "", nota: "" });
  const [enviado, setEnviado] = useState(false);
  const rutaMatch = encontrarRuta(carga.destino, rutas);
  const col = rutaMatch ? rutaColor(rutaMatch.numero) : null;

  function enviarOferta() {
    if (!form.precio || !form.fechaRetiro) {
      alert("Completá el precio y la fecha de retiro.");
      return;
    }
    // Guardar oferta en Firebase
    const nuevaOferta = {
      id: Date.now(),
      transportistaId: USUARIO_TRANS.id,
      cargaId: carga.id,
      clienteId: carga.empresaId || null,
      clienteNombre: carga.empresa || null,
      transportistaNombre: USUARIO_TRANS.nombre,
      calificacion: USUARIO_TRANS.calificacion,
      viajes: USUARIO_TRANS.viajes,
      verificado: true,
      vehiculo: USUARIO_TRANS.vehiculo,
      foto: USUARIO_TRANS.foto,
      precio: parseInt(form.precio),
      retiro: form.horaRetiro ? `${form.fechaRetiro} ${form.horaRetiro}hs` : form.fechaRetiro,
      entrega: form.fechaEntrega ? `${form.fechaEntrega}${form.horaEntrega ? " " + form.horaEntrega + "hs" : ""}` : "A confirmar",
      nota: form.nota,
      matchRuta: !!rutaMatch,
      rutaAsignada: rutaMatch ? { numero: rutaMatch.numero, id: rutaMatch.id, ciudadOrigen: rutaMatch.ciudadOrigen || null, ciudadDestino: rutaMatch.ciudadDestino || null } : null,
    };
    fbSetItem('ofertas', nuevaOferta);
    // Actualizar contador con transacción atómica (evita race condition entre transportistas)
    db.ref('cargas/' + carga.id + '/ofertas').transaction(n => (n || 0) + 1);
    if (carga.estado === "nueva") fbUpdate('cargas', carga.id, { estado: "activo" });

    setEnviado(true);
    setTimeout(() => onNav("trans-dashboard"), 2500);
  }

  if (enviado) return (
    <div style={{ minHeight: "60vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ textAlign: "center", maxWidth: 360 }}>
        <div style={{ fontSize: 56 }}>🚛</div>
        <h2 style={{ marginTop: 12 }}>¡Cotización enviada!</h2>
        <p style={{ color: "#5A6A78", marginTop: 8 }}>La empresa va a ver tu oferta en su app. Te avisamos si te eligen.</p>
        <div style={{ marginTop: 16, padding: 12, background: "#E1F5EE", borderRadius: 8, fontSize: 13, color: "#0F6E56" }}>
          ✅ Tu oferta se guardó. La empresa puede verla al recargar su app.
        </div>
        <p style={{ color: "#aaa", fontSize: 13, marginTop: 12 }}>Volviendo a cargas disponibles...</p>
      </div>
    </div>
  );

  return (
    <PageWrapper titulo="Cotizar este flete">
      <div style={{ maxWidth: 560 }}>
        <div className="card" style={{ marginBottom: 20, borderLeft: "4px solid #0F6E56" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
            <div style={{ fontSize: 12, color: "#888" }}>PEDIDO DE FLETE</div>
            {rutaMatch && col && (
              <span style={{ fontSize: 10, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: col.bg, color: col.color, border: `1px solid ${col.border}` }}>
                RUTA {rutaMatch.numero} · {rutaMatch.ciudadOrigen} → {rutaMatch.ciudadDestino}
              </span>
            )}
          </div>
          <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6 }}>{carga.origen} → {carga.destino}</div>
          <div style={{ display: "flex", gap: 16, fontSize: 13, color: "#555", flexWrap: "wrap" }}>
            <span>📦 {carga.tipo}</span>
            {carga.peso && carga.peso !== "— kg" && <span>⚖️ {carga.peso}</span>}
            <span>📅 Retiro deseado: {carga.retiro}</span>
            {carga.entrega && carga.entrega !== "—" && <span>🎯 Entrega deseada: {carga.entrega}</span>}
          </div>
          {carga.tipo === "Sobres" && (
            <div style={{ marginTop: 10, background: "#EBF3FD", border: "1px solid #B5D4F4", borderRadius: 8, padding: "8px 12px", display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 14 }}>📋</span>
              <div>
                <span style={{ fontSize: 12, color: "#0C447C", fontWeight: 500 }}>Documentación importante — manejar con cuidado y entregar con firma.</span>

            ℹ️ Otros transportistas también recibieron este pedido, pero no pueden ver tus precios ni vos los de ellos. Solo la empresa compara.

// ─── MIS VIAJES ───────────────────────────────────────────────────────────────
function MisViajes({ onNav, onVerRemito }) {
  const [remitos, setRemitos] = useState([]);
  const [flota, setFlota] = useState(() => storageGet(KEY_FLOTA, FLOTA_SEMILLA));
  const PASOS = ["pendiente-retiro", "retirado", "en-deposito", "cargando-ruta", "en-camino", "entregado"];
  const ETIQUETAS = { "pendiente-retiro": "Por retirar", "retirado": "Retiré la carga", "en-deposito": "En depósito", "cargando-ruta": "Cargado en vehículo", "en-camino": "En camino", "entregado": "Entregué" };

  useEffect(() => {
    const unsub = fbListen('remitos', arr => {
      setRemitos(arr.filter(r => r.transportistaNombre === USUARIO_TRANS.nombre));
    });
    setFlota(storageGet(KEY_FLOTA, FLOTA_SEMILLA));
    return unsub;
  }, []);

  function asignarVehiculo(remitoId, vehiculoId) {
    const vehiculo = flota.find(v => v.id === parseInt(vehiculoId));
    const remito = remitos.find(r => r.id === remitoId);
    if (!remito) return;
    const dims = remito.envio?.dims;
    const m3Carga = dims ? parseFloat(((dims.largo * dims.ancho * dims.alto) / 1000000).toFixed(2)) : 0;
    const kgCarga = dims ? (dims.pesoCobrable || dims.pesoReal || 0) : parseFloat(remito.envio?.peso) || 0;
    // vehiculoRuta: mismo formato que usa el chofer (r.vehiculoRuta.id)
    const vehiculoRuta = vehiculo ? { id: vehiculo.id, alias: vehiculo.alias, patente: vehiculo.patente || null, chofer: vehiculo.chofer || null } : null;
    fbUpdate('remitos', remitoId, { vehiculoId: vehiculo?.id || null, vehiculoAlias: vehiculo?.alias || null, vehiculoRuta, m3Carga, kgCarga });
  }

  function actualizarEstado(remitoId, nuevoEstado) {
    fbUpdate('remitos', remitoId, { estado: nuevoEstado });
  }

  const viajesAMostrar = remitos;

  function generarLinkChofer(vehiculoId, vehiculoAlias) {
    const base = window.location.origin + '/fletar-chofer.html';
    const fecha = new Date().toLocaleDateString('es-AR');
    const v = flota.find(x => x.id === vehiculoId);
    const kg = v ? (v.capacidadKg || 0) : 0;
    const m3 = v ? (v.capacidadM3 || 0) : 0;
    const link = `${base}?v=${vehiculoId}&alias=${encodeURIComponent(vehiculoAlias)}&t=${encodeURIComponent(USUARIO_TRANS.nombre)}&fecha=${encodeURIComponent(fecha)}&kg=${kg}&m3=${m3}`;
    const texto = `🚛 Fletar — Manifiesto de viaje\n📅 ${fecha}\nChofer: ${USUARIO_TRANS.nombre}\n\n${link}`;
    const wa = `https://wa.me/?text=${encodeURIComponent(texto)}`;
    window.open(wa, '_blank');
  }

  // Obtener vehículos únicos con remitos activos
  const vehiculosConRemitos = flota.filter(v =>
    remitos.some(r => r.vehiculoId === v.id && r.estado !== 'entregado')
  );

  return (
    <PageWrapper titulo="Mis viajes" subtitulo="Actualizá el estado para que la empresa vea los cambios en tiempo real.">
      {/* Panel: generar link para chofer */}
      {vehiculosConRemitos.length > 0 && (
        <div className="card" style={{ marginBottom: 20, border: "2px solid #0F6E56" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <span style={{ fontSize: 22 }}>📲</span>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>Enviar manifiesto al chofer</div>
              <div style={{ fontSize: 12, color: "#5A6A78" }}>Generá el link y mandalo por WhatsApp. El chofer ve sus entregas y retiros del día.</div>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {vehiculosConRemitos.map(v => (
              <div key={v.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#F0F4F8", borderRadius: 8, padding: "10px 14px" }}>
                <div>
                  <div style={{ fontWeight: 500, fontSize: 13 }}>🚛 {v.alias}</div>
                  <div style={{ fontSize: 11, color: "#888" }}>
                    {remitos.filter(r => r.vehiculoId === v.id && r.estado !== 'entregado').length} paquetes pendientes
                  </div>
                </div>
                <button onClick={() => generarLinkChofer(v.id, v.alias)}
                  style={{ background: "#0F6E56", color: "#fff", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                  📲 WhatsApp
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {viajesAMostrar.length === 0 && (
        <div className="card" style={{ textAlign: "center", padding: 40, color: "#5A6A78" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🚛</div>
          <p style={{ fontWeight: 500 }}>No tenés viajes asignados todavía</p>
          <p style={{ fontSize: 13, marginTop: 6 }}>Cuando una empresa acepte tu oferta, el viaje aparece acá.</p>
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {viajesAMostrar.map(v => (
          <div key={v.id} className="card">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 15 }}>{v.remitente?.ciudad} → {v.destinatario?.ciudad}</div>
                <div style={{ fontSize: 13, color: "#5A6A78", marginTop: 2 }}>
                  {v.envio?.tipo} · ${v.flete?.toLocaleString()} · {v.fecha || v.retiro}
                </div>
                <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>Remito: {v.id}</div>
              </div>
              <span className={`badge badge-${v.estado === "entregado" ? "entregado" : v.estado === "pendiente-retiro" ? "nueva" : "en-camino"}`}>
                {v.estado === "entregado" ? "✓ Entregado" : v.estado === "en-camino" ? "🚛 En camino" : v.estado === "retirado" ? "📦 Retirado" : "⏳ Pendiente"}
              </span>
            </div>

            {/* Selector de vehículo */}
            <div style={{ marginBottom: 12 }}>
              <div className="divider" style={{ marginBottom: 10 }} />
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 12, color: "#5A6A78", whiteSpace: "nowrap" }}>🚛 Vehículo asignado:</span>
                {flota.length === 0 ? (
                  <button onClick={() => onNav("mi-flota")} style={{ fontSize: 12, background: "#E1F5EE", color: "#0F6E56", border: "1px solid #0F6E56", borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>
                    + Agregar vehículos en Mi Flota
                  </button>
                ) : (
                  <select
                    value={v.vehiculoId || ""}
                    onChange={e => asignarVehiculo(v.id, e.target.value)}
                    style={{ flex: 1, fontSize: 13, padding: "5px 8px", border: v.vehiculoId ? "1.5px solid #0F6E56" : "1.5px solid #E0E0E0", borderRadius: 6, background: v.vehiculoId ? "#E1F5EE" : "#fff" }}
                  >
                    <option value="">— Elegir vehículo —</option>
                    {flota.map(vh => (
                      <option key={vh.id} value={vh.id}>{vh.alias} ({vh.patente}) · {vh.tipo}</option>
                    ))}
                  </select>
                )}
              </div>
              {v.vehiculoId && (
                <div style={{ marginTop: 6, fontSize: 11, color: "#0F6E56" }}>
                  ✓ Asignado a <strong>{v.vehiculoAlias}</strong>
                  {v.m3Carga > 0 && ` · ocupa ${v.m3Carga} m³`}
                  {v.kgCarga > 0 && ` y ${v.kgCarga} kg`}
                </div>
              )}
            </div>

            {v.estado !== "entregado" && (
              <div>
                <div style={{ fontSize: 12, color: "#5A6A78", marginBottom: 8 }}>Actualizar estado (la empresa lo ve en tiempo real):</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {PASOS.filter(p => p !== "pendiente-retiro").map(p => (
                    <button key={p} onClick={() => actualizarEstado(v.id, p)}
                      style={{ padding: "7px 14px", borderRadius: 6, background: v.estado === p ? "#0F6E56" : "#F0F4F8", color: v.estado === p ? "#fff" : "#5A6A78", border: "none", fontSize: 12, cursor: "pointer", fontWeight: v.estado === p ? 500 : 400 }}>
                      {ETIQUETAS[p]}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
              <button className="btn-ghost" onClick={() => onNav("chat")} style={{ fontSize: 12 }}>Contactar empresa</button>
              {onVerRemito && (
                <button className="btn-secondary" onClick={() => onVerRemito(v)} style={{ fontSize: 12 }}>📄 Ver remito</button>
              )}
            </div>
          </div>
        ))}
      </div>
    </PageWrapper>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function ChatScreen({ onNav }) {
  const [mensajes, setMensajes] = useState(MENSAJES_SEMILLA);
  const [input, setInput] = useState("");
  const bottomRef = useRef(null);

  useEffect(() => fbListen('chat', arr => setMensajes(arr.length > 0 ? arr : MENSAJES_SEMILLA)), []);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [mensajes]);

  function enviar() {
    if (!input.trim()) return;
    const msg = { id: Date.now(), de: "transportista", texto: input, hora: new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" }) };
    fbSetItem('chat', msg);
    setInput("");
  }

  return (
    <PageWrapper titulo="Chat" subtitulo="Posadas → Buenos Aires · Mi Empresa SRL">
      <div style={{ maxWidth: 600 }}>
        <div style={{ marginBottom: 12, padding: "6px 10px", background: "#E1F5EE", borderRadius: 8, fontSize: 12, color: "#0F6E56" }}>
          💡 Los mensajes que enviés acá también van a aparecer en la app de la empresa.
        </div>
        <div className="card" style={{ height: 380, display: "flex", flexDirection: "column" }}>
          <div style={{ flex: 1, overflowY: "auto", padding: "4px 0" }}>
            {mensajes.map(m => {
              const esMio = m.de === "transportista";
              return (
                <div key={m.id} style={{ display: "flex", justifyContent: esMio ? "flex-end" : "flex-start", marginBottom: 10 }}>
                  <div style={{ maxWidth: "75%", background: esMio ? "#0F6E56" : "#F0F4F8", color: esMio ? "#fff" : "#1A1A1A", borderRadius: esMio ? "12px 12px 2px 12px" : "12px 12px 12px 2px", padding: "8px 12px" }}>
                    <p style={{ fontSize: 14, margin: 0 }}>{m.texto}</p>
                    <p style={{ fontSize: 10, marginTop: 4, opacity: 0.7, textAlign: "right" }}>{m.hora}</p>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>
          <div className="divider" style={{ margin: "8px 0" }} />
          <div style={{ display: "flex", gap: 8 }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && enviar()} placeholder="Escribí un mensaje..." />
            <button className="btn-primary" onClick={enviar} style={{ padding: "10px 16px", whiteSpace: "nowrap" }}>Enviar</button>
          </div>
        </div>
      </div>
    </PageWrapper>
  );
}

// ─── MI FLOTA ────────────────────────────────────────────────────────────────
const KEY_FLOTA_FB = `flota/${USUARIO_TRANS.id}`;

function guardarFlotaEnFB(nuevaFlota) {
  // Persiste en Firebase para sobrevivir cambios de URL en Vercel
  try {
    db.ref(KEY_FLOTA_FB).set(nuevaFlota);
    // Nodo plano vehiculos/{id} para que el chofer lea datos por ID (link permanente)
    nuevaFlota.forEach(v => {
      db.ref(`vehiculos/${v.id}`).set({
        id: v.id,
        alias: v.alias || null,
        tipo: v.tipo || null,
        patente: v.patente || null,
        chofer: v.chofer || null,
        telefono: v.telefono || null,
        capacidadKg: v.capacidadKg || 0,
        capacidadM3: v.capacidadM3 || 0,
        transportistaNombre: USUARIO_TRANS.nombre,
        transportistaId: USUARIO_TRANS.id,
      });
    });
  } catch {}
}

function MiFlota({ onNav }) {
  const [flota, setFlota] = useState(() => storageGet(KEY_FLOTA, FLOTA_SEMILLA));
  const [agregando, setAgregando] = useState(false);
  const [editandoId, setEditandoId] = useState(null);
  const [copiadoId, setCopiadoId] = useState(null);
  const FORM_VACIO = { alias: "", modelo: "", tipo: "Camión mediano", uso: "Ambos", patente: "", chofer: "", telefono: "", capacidadM3: "", capacidadKg: "" };
  const [form, setForm] = useState(FORM_VACIO);
  const [vehiculoModelo, setVehiculoModelo] = useState(null);

  // Si localStorage está vacío o tiene solo semilla, intentar restaurar desde Firebase
  useEffect(() => {
    const local = storageGet(KEY_FLOTA, null);
    const esSemilla = !local || (local.length <= 2 && local.every(v => v.id === 1 || v.id === 2));
    if (esSemilla) {
      db.ref(KEY_FLOTA_FB).get().then(snap => {
        const fbFlota = snap.val();
        if (fbFlota && Array.isArray(fbFlota) && fbFlota.length > 0) {
          storageSave(KEY_FLOTA, fbFlota);
          setFlota(fbFlota);
        }
      }).catch(() => {});
    }
  }, []);

  const TIPOS_VEHICULO = [
    "Utilitario chico",
    "Furgón mediano",
    "Furgón grande",
    "Pick-up",
    "Camión mediano",
    "Camión grande",
    "Semi / Acoplado",

  function guardar() {
    if (!form.patente || !form.chofer || !form.capacidadM3 || !form.capacidadKg) {
      alert("Completá patente, chofer y las capacidades."); return;
    }
    // Si no ingresaron número de móvil, se autogenera con modelo + patente
    const aliasFinal = form.alias.trim() || `${form.modelo || form.tipo} · ${form.patente}`;
    let nuevaFlota;
    const base = { ...form, alias: aliasFinal, capacidadM3: parseFloat(form.capacidadM3), capacidadKg: parseFloat(form.capacidadKg) };
    if (editandoId) {
      nuevaFlota = flota.map(v => v.id === editandoId ? { ...v, ...base } : v);
      setEditandoId(null);
    } else {
      nuevaFlota = [...flota, { ...base, id: Date.now() }];
    }
    storageSave(KEY_FLOTA, nuevaFlota);
    guardarFlotaEnFB(nuevaFlota);
    setFlota(nuevaFlota);
    setForm(FORM_VACIO);
    setVehiculoModelo(null);
    setAgregando(false);
  }

  function eliminar(id) {
    if (!confirm("¿Eliminar este vehículo?")) return;
    // Verificar que no tenga paquetes activos antes de borrar
    db.ref('remitos').orderByChild('vehiculoAsignado/id').equalTo(id).get().then(snap => {
      const ESTADOS_ACTIVOS = ['en-camino', 'cargando-ruta', 'pendiente-retiro'];
      const activos = snap.val()
        ? Object.values(snap.val()).filter(r => ESTADOS_ACTIVOS.includes(r.estado))
        : [];
      if (activos.length > 0) {
        alert(`No se puede eliminar: este vehículo tiene ${activos.length} paquete${activos.length > 1 ? 's' : ''} activo${activos.length > 1 ? 's' : ''} (${activos.map(r => r.estado).join(', ')}). Resolvalos primero.`);
        return;
      }
      const nueva = flota.filter(v => v.id !== id);
      storageSave(KEY_FLOTA, nueva);
      guardarFlotaEnFB(nueva);
      setFlota(nueva);
    }).catch(() => {
      // Si falla la consulta, igual permitir borrar (no bloquear por error de red)
      const nueva = flota.filter(v => v.id !== id);
      storageSave(KEY_FLOTA, nueva);
      guardarFlotaEnFB(nueva);
      setFlota(nueva);
    });

    setForm({ alias: v.alias, modelo: v.modelo || "", tipo: v.tipo, uso: v.uso || "Ambos", patente: v.patente, chofer: v.chofer, telefono: v.telefono || "", capacidadM3: String(v.capacidadM3), capacidadKg: String(v.capacidadKg) });

    setEditandoId(v.id);
    setAgregando(true);
  }

  // Calcular espacio ocupado (usa remitos del estado de MisViajes via Firebase)
  function espacioOcupado(vehiculoId) {
    // Los remitos se cargan en tiempo real via Firebase en MisViajes
    // Aquí devolvemos 0 hasta integrar el estado compartido
    return { m3: 0, kg: 0, n: 0 };
  }

  const iconosPorTipo = {
    "Utilitario chico": "🚐",
    "Furgón mediano": "🚐",
    "Furgón grande": "🚐",
    "Pick-up": "🛻",
    "Camión mediano": "🚛",
    "Camión grande": "🚛",
    "Semi / Acoplado": "🚚",
    "Otro": "🚗",

  return (
    <PageWrapper titulo="Mi flota" subtitulo="Cargá tus vehículos una vez y la app lleva el control de espacio disponible."

          <p style={{ fontSize: 13, marginTop: 6 }}>Agregá tus unidades para que la app calcule el espacio disponible.</p>
        </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
        {[...flota].sort((a, b) => { const n = alias => { const m = (alias||'').match(/\d+/); return m ? parseInt(m[0]) : 9999; }; return n(a.alias) - n(b.alias); }).map(v => {

          const libreKg = Math.max(v.capacidadKg - ocup.kg, 0).toLocaleString();

          return (
            <div key={v.id} className="card">
              {/* Header del vehículo */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 48, height: 48, borderRadius: 10, background: "#E1F5EE", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>

                    modelo: v.nombre,
                    tipo: v.categoria || f.tipo,

            />

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>

              <input value={form.alias} onChange={e => setForm({...form, alias: e.target.value})} placeholder="Ej: Móvil 01, Unidad Norte..." />

            </div>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Tipo de vehículo *</label>
              <select value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})}>
                {TIPOS_VEHICULO.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
          </div>

          {/* Uso del vehículo */}
          <div className="form-group">
            <label>¿Para qué usás este vehículo?</label>
            <div style={{ display: "flex", gap: 8 }}>
              {USOS.map(u => (
                <div key={u.val} onClick={() => setForm({...form, uso: u.val})}
                  style={{ flex: 1, border: `2px solid ${form.uso === u.val ? "#0F6E56" : "#DDE3EA"}`, borderRadius: 8, padding: "10px 8px", cursor: "pointer", background: form.uso === u.val ? "#E1F5EE" : "#fff", textAlign: "center" }}>
                  <div style={{ fontSize: 18 }}>{u.label.split(" ")[0]}</div>
                  <div style={{ fontSize: 12, fontWeight: form.uso === u.val ? 600 : 400, color: form.uso === u.val ? "#0F6E56" : "#1A1A1A", marginTop: 3 }}>{u.label.split(" ").slice(1).join(" ")}</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>{u.desc}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Patente *</label>
              <input value={form.patente} onChange={e => setForm({...form, patente: e.target.value.toUpperCase()})} placeholder="Ej: AB 123 CD" />
            </div>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Nombre del chofer *</label>
              <input value={form.chofer} onChange={e => setForm({...form, chofer: e.target.value})} placeholder="Ej: Juan García" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Teléfono chofer</label>
              <input value={form.telefono} onChange={e => setForm({...form, telefono: e.target.value})} placeholder="Ej: 3764 412345" />
            </div>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Capacidad en m³ *</label>
              <input type="number" min="0.5" step="0.5" value={form.capacidadM3} onChange={e => setForm({...form, capacidadM3: e.target.value})} placeholder="Ej: 40" />
              <p style={{ fontSize: 11, color: "#888", marginTop: 3 }}>Se precarga al elegir el modelo</p>
            </div>
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label>Capacidad en kg *</label>
              <input type="number" min="100" step="100" value={form.capacidadKg} onChange={e => setForm({...form, capacidadKg: e.target.value})} placeholder="Ej: 8000" />
              <p style={{ fontSize: 11, color: "#888", marginTop: 3 }}>Carga máxima del vehículo</p>
            </div>
          </div>

          <div style={{ background: "#E1F5EE", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#0F6E56", marginBottom: 16 }}>
            💡 Una vez guardado, cuando asignés una carga a este vehículo en "Mis viajes", la app va a descontar el espacio automáticamente.
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn-ghost" onClick={() => { setAgregando(false); setEditandoId(null); setForm(FORM_VACIO); }}>Cancelar</button>
            <button className="btn-primary" onClick={guardar} style={{ flex: 1 }}>{editandoId ? "Guardar cambios" : "Agregar vehículo"}</button>
          </div>
        </div>
      )}
    </PageWrapper>
  );
}

function QRCode({ value, size = 120 }) {
  const [imgOk, setImgOk] = useState(true);
  const src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}&color=2C2C2A&bgcolor=ffffff&margin=4`;
  if (!imgOk) return (
    <div style={{ width: size, height: size, background: "#F5F5F5", border: "2px dashed #ccc", borderRadius: 8, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4 }}>
      <div style={{ fontSize: 28 }}>📱</div>
      <div style={{ fontSize: 9, color: "#888", textAlign: "center" }}>QR con internet</div>
    </div>
  );
  return <img src={src} width={size} height={size} alt="QR" style={{ display: "block", borderRadius: 6 }} onError={() => setImgOk(false)} />;
}

// ─── GESTOR DE SUCURSALES (solo central) ────────────────────────────────────
function SucursalesManager({ onNav }) {
  const [sucursales, setSucursales] = useState([]);
  const [creando, setCreando] = useState(false);
  const [nombre, setNombre] = useState("");
  const [ciudadesSelec, setCiudadesSelec] = useState([]);
  const [editandoId, setEditandoId] = useState(null);
  const [copiado, setCopiado] = useState(null);
  const [ciudadCustomInput, setCiudadCustomInput] = useState("");

  useEffect(() => {
    const ref = db.ref('sucursales');
    ref.on('value', snap => {
      const val = snap.val();
      setSucursales(val ? Object.values(val) : []);
    });
    return () => ref.off();
  }, []);

  function toggleCiudad(c) {
    setCiudadesSelec(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  }

  function guardar() {
    if (!nombre.trim()) { alert("Ingresá un nombre para la sucursal."); return; }
    if (ciudadesSelec.length === 0) { alert("Seleccioná al menos una localidad."); return; }
    const id = editandoId || nombre.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
    const data = { id, nombre: nombre.trim(), ciudades: ciudadesSelec };
    db.ref('sucursales/' + id).set(data);
    setCreando(false); setEditandoId(null); setNombre(""); setCiudadesSelec([]);
  }

  function eliminar(id) {
    if (!confirm("¿Eliminar esta sucursal?")) return;
    db.ref('sucursales/' + id).remove();
  }

  function editarSucursal(s) {
    setEditandoId(s.id); setNombre(s.nombre); setCiudadesSelec(s.ciudades || []);
    setCreando(true);
  }

  function copiarLink(id) {
    const base = window.location.href.split('?')[0];
    const link = `${base}?sucursal=${id}`;
    navigator.clipboard.writeText(link).then(() => {
      setCopiado(id);
      setTimeout(() => setCopiado(null), 2000);
    }).catch(() => alert(link));
  }

  function compartirLink(s) {
    const base = window.location.href.split('?')[0];
    const link = `${base}?sucursal=${s.id}`;
    const texto = `App Fletar — ${s.nombre}:\n${link}`;
    if (navigator.share) {
      navigator.share({ title: `Fletar — ${s.nombre}`, url: link, text: texto }).catch(() => {});
    } else {
      copiarLink(s.id);
    }
  }

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "24px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 600, marginBottom: 2 }}>🏢 Sucursales</h1>
          <p style={{ fontSize: 13, color: "#5A6A78" }}>Cada sucursal recibe solo los pedidos de su zona.</p>
        </div>
        {!creando && (
          <button onClick={() => { setCreando(true); setEditandoId(null); setNombre(""); setCiudadesSelec([]); }}
            style={{ background: "#0F6E56", color: "#fff", border: "none", borderRadius: 9, padding: "9px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            + Nueva sucursal
          </button>
        )}
      </div>

      {creando && (
        <div style={{ background: "#fff", border: "1px solid #DDE3EA", borderRadius: 12, padding: 20, marginBottom: 20 }}>
          <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 14 }}>{editandoId ? "Editar sucursal" : "Nueva sucursal"}</h3>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 500, color: "#5A6A78", display: "block", marginBottom: 4 }}>Nombre de la sucursal</label>
            <input value={nombre} onChange={e => setNombre(e.target.value)} placeholder="Ej: Sucursal Oberá"
              style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #DDE3EA", fontSize: 14 }} />
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, fontWeight: 500, color: "#5A6A78", display: "block", marginBottom: 8 }}>
              Localidades que cubre <span style={{ color: "#0F6E56", fontWeight: 600 }}>({ciudadesSelec.length} seleccionadas)</span>
            </label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
              {LOCALIDADES_MISIONES.map(c => (
                <button key={c} onClick={() => toggleCiudad(c)}
                  style={{ padding: "5px 11px", borderRadius: 20, fontSize: 12, cursor: "pointer", fontWeight: ciudadesSelec.includes(c) ? 600 : 400,
                    background: ciudadesSelec.includes(c) ? "#0F6E56" : "#F0F4F8",
                    color: ciudadesSelec.includes(c) ? "#fff" : "#1A1A1A",
                    border: ciudadesSelec.includes(c) ? "none" : "1px solid #DDE3EA" }}>
                  {c}
                </button>
              ))}
              {/* Ciudades personalizadas ya agregadas */}
              {ciudadesSelec.filter(c => !LOCALIDADES_MISIONES.includes(c)).map(c => (
                <span key={c} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600, background: "#185FA5", color: "#fff" }}>
                  {c}
                  <button onClick={() => setCiudadesSelec(prev => prev.filter(x => x !== c))}
                    style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", fontSize: 13, lineHeight: 1, padding: 0, marginLeft: 2 }}>✕</button>
                </span>
              ))}
            </div>
            {/* Campo para agregar ciudad personalizada */}
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <input value={ciudadCustomInput} onChange={e => setCiudadCustomInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && ciudadCustomInput.trim()) {
                    const c = ciudadCustomInput.trim();
                    if (!ciudadesSelec.includes(c)) setCiudadesSelec(prev => [...prev, c]);
                    setCiudadCustomInput('');
                  }
                }}
                placeholder="Agregar ciudad que no está en la lista..."
                style={{ flex: 1, padding: "8px 11px", border: "1px solid #DDE3EA", borderRadius: 8, fontSize: 13 }} />
              <button onClick={() => {
                const c = ciudadCustomInput.trim();
                if (!c) return;
                if (!ciudadesSelec.includes(c)) setCiudadesSelec(prev => [...prev, c]);
                setCiudadCustomInput('');
              }} style={{ background: "#185FA5", color: "#fff", border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 18, cursor: "pointer" }}>+</button>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={guardar}
              style={{ flex: 1, background: "#0F6E56", color: "#fff", border: "none", borderRadius: 9, padding: 12, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              ✓ Guardar sucursal
            </button>
            <button onClick={() => { setCreando(false); setEditandoId(null); }}
              style={{ padding: "12px 20px", background: "#F0F4F8", color: "#5A6A78", border: "none", borderRadius: 9, fontSize: 14, cursor: "pointer" }}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {sucursales.length === 0 && !creando && (
        <div style={{ background: "#fff", border: "1px solid #DDE3EA", borderRadius: 12, padding: 40, textAlign: "center", color: "#5A6A78" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🏢</div>
          <p style={{ fontWeight: 500, marginBottom: 4 }}>Todavía no hay sucursales</p>
          <p style={{ fontSize: 13 }}>Creá la primera para generar su link.</p>
        </div>
      )}

      {sucursales.map(s => (
        <div key={s.id} style={{ background: "#fff", border: "1px solid #DDE3EA", borderRadius: 12, padding: 16, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>{s.nombre}</div>
              <div style={{ fontSize: 12, color: "#5A6A78", marginTop: 2 }}>{(s.ciudades || []).length} localidades asignadas</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => editarSucursal(s)}
                style={{ background: "#F0F4F8", border: "none", borderRadius: 7, padding: "6px 10px", fontSize: 12, cursor: "pointer", color: "#1A1A1A" }}>
                ✏️ Editar
              </button>
              <button onClick={() => eliminar(s.id)}
                style={{ background: "#FEF0ED", border: "none", borderRadius: 7, padding: "6px 10px", fontSize: 12, cursor: "pointer", color: "#C44A0F" }}>
                🗑️
              </button>
            </div>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 12 }}>
            {(s.ciudades || []).map(c => (
              <span key={c} style={{ background: "#E1F5EE", color: "#0F6E56", borderRadius: 20, padding: "3px 10px", fontSize: 11, fontWeight: 500 }}>{c}</span>
            ))}
          </div>
          <div style={{ background: "#F5F5F5", borderRadius: 8, padding: "8px 12px", fontFamily: "monospace", fontSize: 12, color: "#444", marginBottom: 10, wordBreak: "break-all" }}>
            {window.location.href.split('?')[0]}?sucursal={s.id}
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={() => window.open(`${window.location.href.split('?')[0]}?sucursal=${s.id}`, '_blank')}
              style={{ flex: 1, minWidth: 100, background: "#185FA5", color: "#fff", border: "none", borderRadius: 8, padding: "9px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              🏢 Ver pipeline
            </button>
            <button onClick={() => copiarLink(s.id)}
              style={{ flex: 1, minWidth: 100, background: copiado === s.id ? "#E1F5EE" : "#F0F4F8", color: copiado === s.id ? "#0F6E56" : "#1A1A1A", border: "none", borderRadius: 8, padding: "9px 14px", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
              {copiado === s.id ? "✓ Copiado" : "📋 Copiar link"}
            </button>
            <button onClick={() => compartirLink(s)}
              style={{ flex: 1, minWidth: 100, background: "#0F6E56", color: "#fff", border: "none", borderRadius: 8, padding: "9px 14px", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
              📤 Enviar
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── RECEPCIÓN EN MOSTRADOR ───────────────────────────────────────────────────
const CHIPS_INSTRUCCIONES = ['📦 Frágil','🚫 No apilar','🤝 Entregar en mano','💧 No mojar','⚡ Urgente','❄️ Requiere frío'];
const capWords = v => v ? v.replace(/(^|\s)\S/g, c => c.toUpperCase()) : v;

function RecepcionMostrador({ onNav, rutas, ciudadesRuta = {}, setRemitoActivo, ciudadOrigenDefault = '', sucursalActual = null }) {
  const [paso, setPaso]               = React.useState(1);
  const [guardando, setGuardando]     = React.useState(false);
  const [remitoCreado, setRemitoCreado] = React.useState(null);

  // Paso 1 – Remitente
  const [remNombre, setRemNombre]     = React.useState('');
  const [remTel, setRemTel]           = React.useState('');
  const [remDni, setRemDni]           = React.useState('');
  const [remCiudad, setRemCiudad]     = React.useState(ciudadOrigenDefault);

  // Paso 2 – Destinatario
  const [destNombre, setDestNombre]   = React.useState('');
  const [destTel, setDestTel]         = React.useState('');
  const [destDni, setDestDni]         = React.useState('');
  const [destCalle, setDestCalle]     = React.useState('');
  const [destNumero, setDestNumero]   = React.useState('');
  const [destCiudad, setDestCiudad]   = React.useState('');
  const [rutaDetectada, setRutaDetectada] = React.useState(null);
  const [mostrarPickerRuta, setMostrarPickerRuta] = React.useState(false);

  // Paso 3 – Paquete y precio
  const [tipo, setTipo]               = React.useState('Paquete');
  const [bultos, setBultos]           = React.useState('1');
  const [descripcion, setDescripcion] = React.useState('');
  const [modoPrec, setModoPrec]       = React.useState('manual');
  const [peso, setPeso]               = React.useState('');
  const [alto, setAlto]               = React.useState('');
  const [ancho, setAncho]             = React.useState('');
  const [largo, setLargo]             = React.useState('');
  const [tarifa, setTarifa]           = React.useState('');
  const [precioManual, setPrecioManual] = React.useState('');
  const [valorDeclarado, setValorDeclarado] = React.useState('');
  const [quienPaga, setQuienPaga]     = React.useState('remitente');
  const [formaPagoMostrador, setFormaPagoMostrador] = React.useState('efectivo');
  const [instruccionesSeleccionadas, setInstruccionesSeleccionadas] = React.useState([]);
  const [observacionesExtra, setObservacionesExtra] = React.useState('');
  const [foto, setFoto]               = React.useState(null);

  function toggleChip(chip) {
    setInstruccionesSeleccionadas(prev => prev.includes(chip) ? prev.filter(c => c !== chip) : [...prev, chip]);
  }

  const precioCalculado = React.useMemo(() => {
    if (modoPrec === 'manual') return parseFloat(precioManual) || 0;
    const t = parseFloat(tarifa) || 0;
    if (modoPrec === 'peso') return Math.round((parseFloat(peso) || 0) * t * 100) / 100;
    if (modoPrec === 'dimensiones') {
      const vol = ((parseFloat(alto)||0) * (parseFloat(ancho)||0) * (parseFloat(largo)||0)) / 5000;
      return Math.round(vol * t * 100) / 100;
    }
    return 0;
  }, [modoPrec, precioManual, peso, tarifa, alto, ancho, largo]);

  React.useEffect(() => {
    setRutaDetectada(destCiudad ? encontrarRuta(destCiudad, rutas, ciudadesRuta) : null);
    setMostrarPickerRuta(false);
  }, [destCiudad, rutas, ciudadesRuta]);

  function handleFoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 600;
        let w = img.width, h = img.height;
        if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
        else        { if (h > max) { w = Math.round(w * max / h); h = max; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        setFoto(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function guardarRemito() {
    setGuardando(true);
    const id = Date.now();
    const parseCP = str => { const p = (str||'').split(',').map(s=>s.trim()); return { ciudad: p[0]||'', provincia: p[1]||'' }; };
    const origen  = parseCP(remCiudad);
    const destino = parseCP(destCiudad);
    const ruta    = encontrarRuta(destCiudad, rutas, ciudadesRuta);
    const rutaAsignada = ruta ? { numero: ruta.numero, id: ruta.id, ciudadOrigen: ruta.ciudadOrigen, ciudadDestino: ruta.ciudadDestino } : null;
    // En sucursal: el paquete queda en-sucursal para que el chofer central lo retire
    const esSucursal = !ES_CENTRAL && !!SUCURSAL_ID;
    const item = {
      id,
      estado: esSucursal ? 'en-sucursal' : 'en-deposito',
      ...(esSucursal && sucursalActual ? { sucursalEntrega: { id: SUCURSAL_ID, nombre: sucursalActual.nombre } } : {}),
      transportistaNombre: USUARIO_TRANS.nombre,
      transportista: { nombre: USUARIO_TRANS.nombre, id: USUARIO_TRANS.id },
      remitente:    { nombre: remNombre, telefono: remTel, dni: remDni||null, ciudad: origen.ciudad, provincia: origen.provincia },
      destinatario: { nombre: destNombre, telefono: destTel, dni: destDni||null,
        domicilio: [destCalle, destNumero].filter(Boolean).join(' '),
        ciudad: destino.ciudad, provincia: destino.provincia },
      envio: {
        tipo, descripcion, bultos: parseInt(bultos)||1,
        peso: parseFloat(peso)||null, alto: parseFloat(alto)||null,
        ancho: parseFloat(ancho)||null, largo: parseFloat(largo)||null,
        valorDeclarado: parseFloat(valorDeclarado)||null,
      },
      flete: precioCalculado,
      quienPaga,
      observaciones: [...instruccionesSeleccionadas, observacionesExtra.trim()].filter(Boolean).join(' · ') || null,
      rutaAsignada,
      fecha: new Date().toLocaleDateString('es-AR'),
      hora:  new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
      origenMostrador: true,
      formaPagoMostrador: quienPaga === 'remitente' ? formaPagoMostrador : null,
      sucursalOrigen: SUCURSAL_ID || 'central',
      fotoUrl: foto || null,
    };
    await fbSetItem('remitos', item);
    setGuardando(false);
    if (setRemitoActivo) {
      setRemitoActivo(item);
      onNav('remito');
    } else {
      setRemitoCreado(item);
      setPaso(4);
    }
  }

            return allCities.some(c => normStrTr((c||'').split(',')[0]) === ciOrigen && suc[normStrTr((c||'').split(',')[0])]);
          });
          if (!ciOrigen || rutasSuc.length === 0) return null;
          const destinos = [];
          const seen = new Set([ciOrigen]);
          rutasSuc.forEach(r => {
            const stops = [
              { ciudad: r.ciudadOrigen, prov: r.provinciaOrigen, ruta: r },
              ...(r.waypoints||[]).map(w => ({ ciudad: w.ciudad, prov: w.provincia, ruta: r })),
              { ciudad: r.ciudadDestino, prov: r.provinciaDestino, ruta: r },
            ];
            stops.forEach(s => {
              const key = normStrTr((s.ciudad||'').split(',')[0]);

            });

          return (
