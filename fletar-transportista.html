  const val = snap.val();

    v.alias.some(a => a.includes(q))
  ).slice(0, 6);
}

// ─── SELECTOR DE VEHÍCULO con autocompletado ──────────────────────────────────
function SelectorVehiculo({ vehiculo, setVehiculo }) {
  const [texto, setTexto] = useState(vehiculo?.nombre || "");
  const [sugerencias, setSugerencias] = useState([]);
  const [abierto, setAbierto] = useState(false);
  const ref = React.useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setAbierto(false);
    }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  function handleTexto(val) {
    setTexto(val);
    const res = buscarVehiculos(val);
    setSugerencias(res);
    setAbierto(res.length > 0);
    if (!val) setVehiculo(null);
  }

  function seleccionar(v) {
    setTexto(v.nombre);
    setVehiculo(v);
    setSugerencias([]);
    setAbierto(false);
  }

  const COLORES_CAT = {
    "Utilitario chico": { bg: "#E1F5EE", color: "#0F6E56" },
    "Furgón mediano":   { bg: "#E6F1FB", color: "#185FA5" },
    "Furgón grande":    { bg: "#F3E5F5", color: "#6A1B9A" },
    "Pick-up":          { bg: "#FFF8E1", color: "#F57F17" },
    "Camión mediano":   { bg: "#FEF3EC", color: "#C44A0F" },
    "Camión grande":    { bg: "#FDECEA", color: "#B71C1C" },
    "Semi / Acoplado":  { bg: "#F3E8FF", color: "#5B21B6" },
  };

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <div style={{ position: "relative" }}>
        <input
          value={texto}
          onChange={e => handleTexto(e.target.value)}
          onFocus={() => { if (sugerencias.length) setAbierto(true); }}
          placeholder="Ej: Kangoo, Sprinter, camión 3/4..."
          style={{ paddingRight: 32 }}
        />
        {texto && (
          <button onClick={() => { setTexto(""); setVehiculo(null); setSugerencias([]); }}
            style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#ccc", fontSize: 16, cursor: "pointer", padding: 0 }}>×</button>
        )}
      </div>

      {/* Dropdown de sugerencias */}
      {abierto && sugerencias.length > 0 && (
        <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #DDE3EA", borderRadius: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.10)", zIndex: 200, marginTop: 4, overflow: "hidden" }}>
          {sugerencias.map(v => {
            const cat = COLORES_CAT[v.categoria] || { bg: "#F5F5F5", color: "#555" };
            return (
              <div key={v.nombre} onClick={() => seleccionar(v)}
                style={{ padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #F5F5F5" }}
                onMouseEnter={e => e.currentTarget.style.background = "#F5F8FB"}
                onMouseLeave={e => e.currentTarget.style.background = "#fff"}>
                <div>
                  <div style={{ fontWeight: 500, fontSize: 14 }}>{v.nombre}</div>
                  <span style={{ fontSize: 10, background: cat.bg, color: cat.color, padding: "1px 6px", borderRadius: 4, fontWeight: 600 }}>{v.categoria}</span>
                </div>
                <div style={{ textAlign: "right", fontSize: 12, color: "#5A6A78" }}>
                  {v.volumenM3 && <div>{v.volumenM3} m³</div>}
                  <div style={{ fontWeight: 600, color: "#0F6E56" }}>{v.cargaKg.toLocaleString()} kg</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Datos precargados del vehículo seleccionado */}
      {vehiculo && (
        <div style={{ marginTop: 10, padding: "10px 14px", background: "#E1F5EE", borderRadius: 8, display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ fontSize: 12, color: "#0F6E56", fontWeight: 600 }}>✅ Datos del fabricante</div>
          {vehiculo.volumenM3 && (
            <div style={{ fontSize: 13 }}>
              <span style={{ color: "#888" }}>Volumen: </span>
              <strong>{vehiculo.volumenM3} m³</strong>
            </div>
          )}
          <div style={{ fontSize: 13 }}>
            <span style={{ color: "#888" }}>Carga máx.: </span>
            <strong>{vehiculo.cargaKg.toLocaleString()} kg</strong>
          </div>
          <div style={{ fontSize: 11, color: "#888", fontStyle: "italic" }}>Datos de fabricante — podés editarlos si tu configuración difiere</div>
        </div>
      )}
    </div>
  );
}

const GASTO_ICONS  = { peaje:'🚧', combustible:'⛽', viatico:'🏨', comida:'🍽', gomeria:'🔧', otro:'🧾' };

function TransportistaDashboard({ onNav, setCargaSeleccionada, setRemitoActivo, ciudadesSucursal, rutas = [] }) {
  const [cargas,  setCargas]  = useState([]);
  const [ofertas, setOfertas] = useState([]);
  const [remitos, setRemitos] = useState([]);
  const [etapa,   setEtapa]   = useState(null); // null = vista grilla general
  const [flota,   setFlota]   = useState(() => storageGet(KEY_FLOTA, FLOTA_SEMILLA));
  const [asignandoId,  setAsignandoId]  = useState(null);
  const [vehiculoSel,  setVehiculoSel]  = useState(null);
  const [horaRetiro,   setHoraRetiro]   = useState("");
  const [notaChofer,   setNotaChofer]   = useState("");
  const [depositandoId, setDepositandoId] = useState(null);
  const [vehiculoRuta,  setVehiculoRuta]  = useState(null);
  const [collapsedDepTr, setCollapsedDepTr] = useState(new Set());
  const [selDepTrans,    setSelDepTrans]    = useState(new Set());
  const [vehiculoGrupo,  setVehiculoGrupo]  = useState({});
  const [collapsedSucDep, setCollapsedSucDep] = useState(new Set());
  const [collapsedPed,   setCollapsedPed]   = useState(new Set());
  const [collapsedCot,   setCollapsedCot]   = useState(new Set());
  const [collapsedCam,   setCollapsedCam]   = useState(new Set());
  const [ciudadesRuta,   setCiudadesRuta]   = useState({});
  const [viajesData,     setViajesData]     = useState({});
  const [modalGasto,     setModalGasto]     = useState(null); // { viajeId } | null
  const [gastoTipo,      setGastoTipo]      = useState('peaje');
  const [gastoMonto,     setGastoMonto]     = useState('');
  const [gastoDesc,      setGastoDesc]      = useState('');
  const [rendGastoTipo,      setRendGastoTipo]      = useState('peaje');
  const [rendGastoMonto,     setRendGastoMonto]     = useState('');
  const [collapsedVehiculos, setCollapsedVehiculos] = useState(new Set()); // 'v-{key}' = card collapsed, 'h-{key}' = historial expanded
  const [mostradorModal,    setMostradorModal]    = useState(false);
  const [mostradorEfectivo, setMostradorEfectivo] = useState('');
  const [mostradorDigital,  setMostradorDigital]  = useState('');
  const [mostradorGastos,   setMostradorGastos]   = useState({});
  const [histTurnoAbierto,  setHistTurnoAbierto]  = useState(null); // turnoId abierto en historial
  const [mostradorMetodo,   setMostradorMetodo]   = useState(''); // 'sobre' | 'transferencia' | 'semanal'
  const [mostradorNumOp,    setMostradorNumOp]    = useState('');
  const [turnosSucursales,  setTurnosSucursales]  = useState([]);
  const [gastosConfigOpen,  setGastosConfigOpen]   = useState(false);
  const [gastosConfig,      setGastosConfig]       = useState({ combustible: true, peaje: true, comida: false, embalaje: true, reparacion: false, limpieza: false });
  const [gastosCustom,      setGastosCustom]       = useState([]);
  const [gastosCustomInput, setGastosCustomInput]  = useState('');

  // Registrar función de reset para que "Inicio" del nav pueda volver a la grilla
  useEffect(() => {
    window.__resetDashboard = () => setEtapa(null);
    return () => { window.__resetDashboard = null; };
  }, []);

  useEffect(() => {
    const unC  = fbListen('cargas',  arr => setCargas(arr));
    const unO  = fbListen('ofertas', arr => setOfertas(arr));
    const unR  = fbListen('remitos', arr => setRemitos(arr));
    const crRef = db.ref(`ciudadesRuta/${USUARIO_TRANS.id}`);
    const crCb  = crRef.on('value', snap => setCiudadesRuta(snap.val() || {}));
    const vjRef = db.ref('viajes');
    const vjCb  = vjRef.on('value', snap => setViajesData(snap.val() || {}));
    const tmRef = db.ref('turnosMostrador');
    const tmCb  = tmRef.on('value', snap => {
      const val = snap.val() || {};
      setTurnosSucursales(Object.entries(val).map(([id, t]) => ({ ...t, id })).filter(t => t.sucursalId));
    });
    setFlota(storageGet(KEY_FLOTA, FLOTA_SEMILLA));
    db.ref('config/gastosConfig').once('value', snap => {
      const val = snap.val();
      if (val) {
        if (val.toggles) setGastosConfig(val.toggles);
        if (val.custom)  setGastosCustom(val.custom || []);
      }
    });
    return () => { unC(); unO(); unR(); crRef.off('value', crCb); vjRef.off('value', vjCb); };
  }, []);

  // Re-leer flota desde localStorage cada vez que el usuario entra a En Depósito
  // Garantiza que vehículos agregados en Mi Flota aparezcan en el selector
  useEffect(() => {
    if (etapa === "enDeposito") {
      const local = storageGet(KEY_FLOTA, null);
      if (local && local.length > 0) {
        setFlota(local);
      } else {
        // Si localStorage está vacío, intentar recuperar desde Firebase
        db.ref(KEY_FLOTA_FB).get().then(snap => {
          const fbFlota = snap.val();
          if (fbFlota && Array.isArray(fbFlota) && fbFlota.length > 0) {
            storageSave(KEY_FLOTA, fbFlota);
            setFlota(fbFlota);
          }
        }).catch(() => {});
      }
    }
  }, [etapa]);

  // Filtrar por zona de sucursal (si aplica)
  function enZona(carga) {
    if (ES_CENTRAL || !ciudadesSucursal || ciudadesSucursal.length === 0) return true;
    const origen  = (carga.origen  || "").toLowerCase();
    const destino = (carga.destino || "").toLowerCase();
    return ciudadesSucursal.some(c => origen.includes(c.toLowerCase()) || destino.includes(c.toLowerCase()));
  }
  function remitoEnZona(r) {
    if (ES_CENTRAL || !ciudadesSucursal || ciudadesSucursal.length === 0) return true;
    const orig = (r.remitente?.ciudad || "").toLowerCase();
    const dest = (r.destinatario?.ciudad || "").toLowerCase();
    return ciudadesSucursal.some(c => orig.includes(c.toLowerCase()) || dest.includes(c.toLowerCase()));
  }
  // Opción A: filtra depósito por punto de origen (sucursalOrigen guardado en el remito)
  function remitoOriginaMiSede(r) {
    if (ES_CENTRAL) return !r.sucursalOrigen || r.sucursalOrigen === 'central';
    return r.sucursalOrigen === SUCURSAL_ID;
  }

  function abrirPanel(r) {
    setAsignandoId(r.id);
    setVehiculoSel(r.vehiculoAsignado ? flota.find(v => v.id === r.vehiculoAsignado.id) || null : null);
    setHoraRetiro(r.horaRetiro || "");
    setNotaChofer(r.notaChofer || "");
  }

  function confirmarAsignacion(remitoId) {
    if (!vehiculoSel) { alert("Seleccioná un vehículo."); return; }
    fbUpdate('remitos', remitoId, {
      vehiculoAsignado: { id: vehiculoSel.id, alias: vehiculoSel.alias, patente: vehiculoSel.patente, chofer: vehiculoSel.chofer || null },
      horaRetiro: horaRetiro || null,
      notaChofer: notaChofer || null,
    });
    setAsignandoId(null);
    setVehiculoSel(null);
    setHoraRetiro("");
    setNotaChofer("");
  }

  function confirmarRetiro(remitoId) {
    const rem = misRemitos.find(r => String(r.id) === String(remitoId));
    const veh = rem?.vehiculoAsignado;
    const updates = { estado: 'retirado' };
    if (veh?.id != null && !rem?.viajeId) {
      const ahora = new Date();
      const fechaStr = ahora.toISOString().slice(0, 10).replace(/-/g, '');
      updates.viajeId    = `ret-${veh.id}-${fechaStr}`;
      updates.vehiculoRuta = veh;
    }
    fbUpdate('remitos', remitoId, updates);
  }

  function abrirPanelRuta(r) {
    setDepositandoId(r.id);
    setVehiculoRuta(r.vehiculoRuta ? flota.find(v => v.id === r.vehiculoRuta.id) || null : null);
  }

  function confirmarCargaRuta(remitoId) {
    if (!vehiculoRuta) { alert("Seleccioná un vehículo de ruta."); return; }
    const updates = {
      estado: 'cargando-ruta',
      vehiculoRuta: { id: vehiculoRuta.id, alias: vehiculoRuta.alias, patente: vehiculoRuta.patente, chofer: vehiculoRuta.chofer || null },
    };
    fbUpdate('remitos', remitoId, updates);
    setDepositandoId(null); setVehiculoRuta(null);
  }

  function saltarDeposito(remitoId, vehiculo) {
    const cambios = { estado: 'cargando-ruta' };
    if (vehiculo) cambios.vehiculoRuta = { id: vehiculo.id, alias: vehiculo.alias, patente: vehiculo.patente, chofer: vehiculo.chofer || null };
    fbUpdate('remitos', remitoId, cambios);
  }

  function cerrarTurnoMostrador(metodoEnvio, numeroOperacion) {
    const pendMostrador = misRemitos.filter(r => r.origenMostrador && r.quienPaga === 'remitente' && !r.turnoMostradorId && remitoOriginaMiSede(r));
    if (pendMostrador.length === 0) return;
    const turnoId = 'mos-' + Date.now().toString(36);
    const ahora = new Date();
    const fechaStr = ahora.toLocaleDateString('es-AR');
    const horaStr  = ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    const todosGastos = [...GASTOS_MOSTRADOR_DEFAULT, ...gastosCustom];
    const gastosEntries = Object.entries(mostradorGastos)
      .filter(([, v]) => parseFloat(v) > 0)
      .map(([id, monto]) => ({ id, label: (todosGastos.find(g => g.id === id) || {}).label || id, monto: parseFloat(monto) }));
    const totalGastosMostr = gastosEntries.reduce((s, g) => s + g.monto, 0);
    const updates = {};
    pendMostrador.forEach(r => {
      updates['remitos/' + r.id + '/turnoMostradorId']    = turnoId;
      updates['remitos/' + r.id + '/turnoMostradorFecha'] = fechaStr;
      updates['remitos/' + r.id + '/turnoMostradorHora']  = horaStr;
    });
    const ef = parseFloat(mostradorEfectivo) || 0;
    const dg = parseFloat(mostradorDigital) || 0;
    const neto = Math.max(0, ef - totalGastosMostr);
    updates['turnosMostrador/' + turnoId] = {
      fecha: fechaStr, hora: horaStr,
      efectivo: ef, digital: dg, neto,
      gastos: gastosEntries, totalGastos: totalGastosMostr,
      sucursalId: SUCURSAL_ID || null,
      metodoEnvio: metodoEnvio || null,
      numeroOperacion: numeroOperacion || null,
      estado: SUCURSAL_ID ? 'pendiente' : 'confirmado',
    };
    db.ref().update(updates).then(() => {
      setMostradorModal(false);
      setMostradorEfectivo('');
      setMostradorDigital('');
      setMostradorGastos({});
      setMostradorMetodo('');
      setMostradorNumOp('');
    });
  }

  function toggleGastoConfig(id) {
    const nuevo = { ...gastosConfig, [id]: !gastosConfig[id] };
    setGastosConfig(nuevo);
    db.ref('config/gastosConfig/toggles').set(nuevo);
  }
  function agregarGastoCustom() {
    if (!gastosCustomInput.trim()) return;
    const newId = 'c_' + Date.now();
    const nuevo = [...gastosCustom, { id: newId, label: gastosCustomInput.trim() }];
    setGastosCustom(nuevo);
    setGastosCustomInput('');
    db.ref('config/gastosConfig/custom').set(nuevo);
    const nuevoConfig = { ...gastosConfig, [newId]: true };
    setGastosConfig(nuevoConfig);
    db.ref('config/gastosConfig/toggles').set(nuevoConfig);
  }
  function eliminarGastoCustom(id) {
    const nuevo = gastosCustom.filter(g => g.id !== id);
    setGastosCustom(nuevo);
    db.ref('config/gastosConfig/custom').set(nuevo.length ? nuevo : null);
    const nuevoConfig = { ...gastosConfig };
    delete nuevoConfig[id];
    setGastosConfig(nuevoConfig);
    db.ref('config/gastosConfig/toggles').set(nuevoConfig);
  }

  const misOfertas       = ofertas.filter(o => o.transportistaNombre === USUARIO_TRANS.nombre);
  const cargasConOferta  = new Set(misOfertas.map(o => o.cargaId));
  const misRemitos       = remitos.filter(r => r.transportistaNombre === USUARIO_TRANS.nombre && remitoEnZona(r));
  // Para en-sucursal: central ve TODOS los paquetes (de cualquier sucursal/transportista)
  // Una sucursal solo ve los suyos
  const enSucursalRemitos = ES_CENTRAL
    ? remitos.filter(r => r.estado === "en-sucursal")
    : misRemitos.filter(r => r.estado === "en-sucursal");
  const cargasFiltradas  = cargas.filter(enZona);

  const counts = {
    pedidos:     cargasFiltradas.filter(c => (c.estado === "nueva" || c.estado === "activo") && !cargasConOferta.has(c.id)).length,
    cotizados:   misOfertas.filter(o => { const cg = cargas.find(c => c.id === o.cargaId); return cg && cg.estado !== "en-camino" && cg.estado !== "entregado"; }).length,
    aceptados:   misRemitos.filter(r => r.estado === "pendiente-retiro").length,
    enDeposito:  misRemitos.filter(r => (r.estado === "retirado" || r.estado === "en-deposito" || r.estado === "cargando-ruta") && remitoOriginaMiSede(r)).length,
    enCamino:    misRemitos.filter(r => r.estado === "en-camino").length,
    enSucursal:  enSucursalRemitos.length,
    entregados:  misRemitos.filter(r => r.estado === "entregado").length,
    viajes:      (() => { const vids = new Set(misRemitos.filter(r => r.viajeId).map(r => r.viajeId)); return [...vids].filter(vid => { const rd = viajesData[vid]?.rendicion; return rd?.creadaPorChofer && !rd?.verificado; }).length; })(),
  };

  const ETAPAS = [
    { id: "pedidos",    emoji: "📋", label: "Pedidos",     sub: "Sin cotizar"        },
    { id: "cotizados",  emoji: "💬", label: "Cotizados",   sub: "Esperando resp."    },
    { id: "aceptados",  emoji: "✅", label: "Aceptados",   sub: "Por retirar"        },
    { id: "enDeposito", emoji: "📦", label: "En depósito", sub: "Depósito/Cargado"   },
    { id: "enCamino",   emoji: "🚛", label: "En camino",   sub: "En ruta"            },
    { id: "enSucursal", emoji: "🏢", label: "En sucursal", sub: "Listo para retirar" },
    { id: "entregados", emoji: "☑️", label: "Entregados",  sub: "Completados"        },
    { id: "viajes",     emoji: "📊", label: "Rendiciones", sub: "Cobros del chofer"  },
  ];

  // helper: hora legible desde item (usa publishedAt o deriva del id timestamp)
  function horaItem(item) {
    if (item.publishedAt) return item.publishedAt;
    const id = item.id || item.cargaId;
    if (id && id > 1000000000000) return new Date(id).toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
    return null;
  }
  function fechaItem(item) {
    if (item.publishedDate) return item.publishedDate;
    const id = item.id || item.cargaId;
    if (id && id > 1000000000000) return new Date(id).toLocaleDateString("es-AR");
    return null;
  }

  function getItems() {
    const desc = arr => [...arr].sort((a, b) => (b.id || 0) - (a.id || 0));
    switch (etapa) {
      case "pedidos":
        return desc(cargasFiltradas.filter(c => (c.estado === "nueva" || c.estado === "activo") && !cargasConOferta.has(c.id)));
      case "cotizados":
        return desc(misOfertas
          .filter(o => { const cg = cargasFiltradas.find(c => c.id === o.cargaId); return cg && cg.estado !== "en-camino" && cg.estado !== "entregado"; })
          .map(o => ({ ...o, _carga: cargasFiltradas.find(c => c.id === o.cargaId) })));
      case "aceptados":   return desc(misRemitos.filter(r => r.estado === "pendiente-retiro"));
      case "enDeposito":  return desc(misRemitos.filter(r => (r.estado === "retirado" || r.estado === "en-deposito" || r.estado === "cargando-ruta") && remitoOriginaMiSede(r)));
      case "enCamino":    return desc(misRemitos.filter(r => r.estado === "en-camino"));
      case "enSucursal":  return desc(enSucursalRemitos);
      case "entregados":  return desc(misRemitos.filter(r => r.estado === "entregado"));
      default: return [];
    }
  }

  const items = getItems();
  const etapaActual = etapa ? ETAPAS.find(e => e.id === etapa) : null;

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "20px 12px", width: "100%" }}>

      {/* ── BANNER RECEPCIÓN EN MOSTRADOR ── */}
      {!etapa && (
        <button onClick={() => onNav('recibir-mostrador')} style={{
          width:'100%', marginBottom:12, padding:'14px 16px',
          background:'linear-gradient(135deg, #0F6E56 0%, #1A9E7A 100%)',
          border:'none', borderRadius:12, cursor:'pointer',
          display:'flex', alignItems:'center', gap:12, textAlign:'left',
        }}>
          <span style={{ fontSize:26 }}>🏪</span>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:'#fff' }}>Recepción en mostrador</div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.75)' }}>Registrar paquete traído por un cliente</div>
          </div>
          <span style={{ marginLeft:'auto', color:'rgba(255,255,255,0.6)', fontSize:18 }}>→</span>
        </button>
      )}

      {/* ── VISTA GRILLA (etapa === null) ── */}
      {!etapa && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
          {ETAPAS.map(e => {
            const n = counts[e.id];
            const activa = n > 0 || e.id === "entregados";
            const bg      = activa ? "#E1F5EE" : "#F8F9FA";
            const border  = activa ? "1.5px solid #0F6E56" : "1px solid #EFEFEF";
            const numCol  = activa ? "#085041" : "#ccc";
            const lblCol  = activa ? "#0F6E56" : "#bbb";
            const subCol  = activa ? "#3a9e7a" : "#ccc";
            return (
              <button key={e.id} onClick={() => setEtapa(e.id)} style={{
                background: bg, border, borderRadius: 12, padding: "14px 8px",
                textAlign: "center", cursor: "pointer",
                transition: "background 0.1s, transform 0.1s",
              }}
              onMouseEnter={e2 => e2.currentTarget.style.background = activa ? "#d0f0e4" : "#F0F4F8"}
              onMouseLeave={e2 => e2.currentTarget.style.background = bg}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{e.emoji}</div>
                <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1, color: numCol }}>{n}</div>
                <div style={{ fontSize: 13, fontWeight: 500, marginTop: 4, color: lblCol }}>{e.label}</div>
                <div style={{ fontSize: 11, marginTop: 2, color: subCol }}>{e.sub}</div>
              </button>
            );
          })}
        </div>
      )}

      {/* ── VISTA DETALLE (etapa !== null) ── */}
      {etapa && etapaActual && (
        <>
          {/* Cabecera con botón volver */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <button onClick={() => setEtapa(null)} style={{
              background: "#F0F4F8", border: "none", borderRadius: 8,
              padding: "7px 14px", fontSize: 13, fontWeight: 500,
              color: "#5A6A78", cursor: "pointer", flexShrink: 0,
            }}>← Volver</button>
            <span style={{ fontSize: 20 }}>{etapaActual.emoji}</span>
            <h2 style={{ fontSize: 17, fontWeight: 600, color: "#1A1A1A", flex: 1 }}>{etapaActual.label}</h2>
            <span style={{ fontSize: 12, background: "#E1F5EE", color: "#0F6E56",
              padding: "3px 10px", borderRadius: 10, fontWeight: 600 }}>{items.length}</span>
          </div>

          {/* Lista vacía (excepto enSucursal que tiene su propio empty state) */}
          {items.length === 0 && etapa !== "enSucursal" && (
            <div className="card" style={{ textAlign: "center", padding: "32px 20px", color: "#aaa" }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>📭</div>
              <p style={{ fontWeight: 500, color: "#888" }}>No hay {etapaActual.label.toLowerCase()} en este momento</p>
            </div>
          )}
        </>
      )}

      {/* ── Pedidos: cargas sin cotizar ── */}
      {etapa === "pedidos" && (() => {
        const grupos = {};
        items.forEach(c => {
          const m = encontrarRuta(c.destino, rutas);
          const key = m ? `r${m.numero}` : '__sin__';
          if (!grupos[key]) grupos[key] = { key, match: m, items: [] };
          grupos[key].items.push(c);
        });
        const lista = Object.values(grupos).sort((a, b) => (a.match?.numero ?? 999) - (b.match?.numero ?? 999));
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {lista.map(g => {
              const { key, match: m, items: gs } = g;
              const col = m ? rutaColor(m.numero) : null;
              const collapsed = collapsedPed.has(key);
              const toggle = () => setCollapsedPed(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });
              return (
                <div key={key} style={{ border: `0.5px solid ${m ? col.border : "#DDE3EA"}`, borderRadius: 12, overflow: "hidden" }}>
                  <div onClick={toggle} style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px", background: m ? col.bg : "#F0F4F8", cursor: "pointer", userSelect: "none" }}>
                    <span style={{ background: m ? col.badge : "#5A6A78", color: "#fff", fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, flexShrink: 0 }}>
                      {m ? `Ruta ${m.numero}` : "Sin ruta"}
                    </span>
                    <span style={{ fontSize: 15, fontWeight: 500, flex: 1, color: m ? col.color : "#5A6A78", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {m ? `${m.ciudadOrigen} → ${m.ciudadDestino}` : "Sin ruta asignada"}
                    </span>
                    <span style={{ background: "#E24B4A", color: "#fff", fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, flexShrink: 0 }}>
                      {gs.length} nuevo{gs.length !== 1 ? "s" : ""}
                    </span>
                    <span style={{ fontSize: 16, color: m ? col.color : "#5A6A78" }}>{collapsed ? "›" : "⌄"}</span>
                  </div>
                  {!collapsed && gs.map(c => (
                    <div key={c.id} style={{ borderTop: `0.5px solid ${m ? col.border : "#DDE3EA"}`, padding: "12px 16px", background: "#fff", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 5, color: "#1A1A1A" }}>{c.origen} → {c.destino}</div>
                        <div style={{ display: "flex", gap: 10, fontSize: 13, color: "#5A6A78", flexWrap: "wrap" }}>
                          <span>📦 {c.tipo}</span>
                          {c.tipo === "Sobres" && <span style={{ background: "#EBF3FD", color: "#0C447C", fontWeight: 500, fontSize: 11, padding: "1px 8px", borderRadius: 6 }}>📋 Documentación</span>}
                          {c.totalCobrable && <span style={{ color: "#0F6E56", fontWeight: 500 }}>⚖️ {c.totalCobrable} kg cob.</span>}
                          <span>📅 {c.retiro}</span>
                        </div>
                        {c.estimadoMin && c.estimadoMax && (
                          <div style={{ marginTop: 5, fontSize: 12, background: "#FEF3EC", color: "#C44A0F", padding: "2px 8px", borderRadius: 5, display: "inline-block" }}>
                            Ref. ${c.estimadoMin.toLocaleString()} – ${c.estimadoMax.toLocaleString()}
                          </div>
                        )}
                        <div style={{ marginTop: 4 }}>
                          <span style={{ fontSize: 11, color: "#aaa" }}>{c.empresa}</span>
                          {horaItem(c) && <span style={{ fontSize: 11, background: "#F5F5F5", color: "#666", padding: "1px 6px", borderRadius: 4, marginLeft: 6 }}>🕐 {horaItem(c)}{fechaItem(c) ? ` · ${fechaItem(c)}` : ""}</span>}
                        </div>
                      </div>
                      <button className="btn-primary" onClick={() => { setCargaSeleccionada(c); onNav("hacer-oferta"); }} style={{ fontSize: 13, flexShrink: 0 }}>
                        Cotizar
                      </button>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ── Cotizados: mis ofertas enviadas ── */}
      {etapa === "cotizados" && (() => {
        const grupos = {};
        items.forEach(o => {
          const m = encontrarRuta(o._carga?.destino || '', rutas);
          const key = m ? `r${m.numero}` : '__sin__';
          if (!grupos[key]) grupos[key] = { key, match: m, items: [] };
          grupos[key].items.push(o);
        });
        const lista = Object.values(grupos).sort((a, b) => (a.match?.numero ?? 999) - (b.match?.numero ?? 999));
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {lista.map(g => {
              const { key, match: m, items: gs } = g;
              const col = m ? rutaColor(m.numero) : null;
              const collapsed = collapsedCot.has(key);
              const toggle = () => setCollapsedCot(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });
              return (
                <div key={key} style={{ border: `0.5px solid ${m ? col.border : "#DDE3EA"}`, borderRadius: 12, overflow: "hidden" }}>
                  <div onClick={toggle} style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px", background: m ? col.bg : "#F0F4F8", cursor: "pointer", userSelect: "none" }}>
                    <span style={{ background: m ? col.badge : "#5A6A78", color: "#fff", fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, flexShrink: 0 }}>
                      {m ? `Ruta ${m.numero}` : "Sin ruta"}
                    </span>
                    <span style={{ fontSize: 15, fontWeight: 500, flex: 1, color: m ? col.color : "#5A6A78", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {m ? `${m.ciudadOrigen} → ${m.ciudadDestino}` : "Sin ruta asignada"}
                    </span>
                    <span style={{ background: m ? col.bg : "#F0F4F8", color: m ? col.color : "#5A6A78", fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, border: `0.5px solid ${m ? col.border : "#DDE3EA"}`, flexShrink: 0 }}>
                      {gs.length} cotizado{gs.length !== 1 ? "s" : ""}
                    </span>
                    <span style={{ fontSize: 16, color: m ? col.color : "#5A6A78" }}>{collapsed ? "›" : "⌄"}</span>
                  </div>
                  {!collapsed && gs.map(o => (
                    <div key={o.id} style={{ borderTop: `0.5px solid ${m ? col.border : "#DDE3EA"}`, padding: "12px 16px", background: "#fff", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 4, color: "#1A1A1A" }}>
                          {o._carga?.origen || "—"} → {o._carga?.destino || "—"}
                        </div>
                        <div style={{ display: "flex", gap: 12, fontSize: 13, color: "#5A6A78", flexWrap: "wrap" }}>
                          <span>📦 {o._carga?.tipo}</span>
                          <span>📅 Retiro {o.retiro}</span>
                          <span>🎯 Entrega {o.entrega}</span>
                        </div>
                        {o.nota && <div style={{ fontSize: 12, color: "#888", marginTop: 4, fontStyle: "italic" }}>"{o.nota}"</div>}
                        {horaItem(o) && <div style={{ fontSize: 11, background: "#F5F5F5", color: "#666", padding: "1px 6px", borderRadius: 4, marginTop: 4, display: "inline-block" }}>🕐 {horaItem(o)}{fechaItem(o) ? ` · ${fechaItem(o)}` : ""}</div>}
                      </div>
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ fontSize: 18, fontWeight: 500, color: "#0F6E56" }}>${o.precio?.toLocaleString()}</div>
                        <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>Mi oferta</div>
                        <div style={{ marginTop: 6, fontSize: 11, background: "#E6F1FB", color: "#185FA5", padding: "2px 8px", borderRadius: 10, fontWeight: 500 }}>Esperando cliente</div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ── Aceptados: asignación de móvil ── */}
      {etapa === "aceptados" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {items.map(r => {
            const abierto  = asignandoId === r.id;
            const asignado = r.vehiculoAsignado;
            return (
              <div key={r.id} className="card" style={{ border: abierto ? "1.5px solid #9FE1CB" : "1px solid #DDE3EA" }}>
                {/* Fila principal */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: (abierto || asignado) ? 10 : 0 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                      <span style={{ fontWeight: 600, fontSize: 14 }}>{r.remitente?.ciudad || "—"} → {r.destinatario?.ciudad || "—"}</span>
                      <span style={{ fontSize: 11, background: "#FEF3EC", color: "#C44A0F", padding: "2px 8px", borderRadius: 5, fontWeight: 500 }}>Por retirar</span>
                    </div>
                    <div style={{ display: "flex", gap: 10, fontSize: 12, color: "#5A6A78", flexWrap: "wrap" }}>
                      <span>🔢 {r.id}</span>
                      {r.destinatario?.nombre && <span>👤 {r.destinatario.nombre}</span>}
                      {r.flete && <span style={{ color: "#0F6E56", fontWeight: 500 }}>💵 ${r.flete.toLocaleString()}</span>}
                    </div>
                    {asignado && !abierto && (
                      <div style={{ marginTop: 6, display: "flex", gap: 5, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 11, background: "#E1F5EE", color: "#0F6E56", padding: "2px 8px", borderRadius: 5, fontWeight: 500 }}>🚐 {asignado.alias}</span>
                        {r.horaRetiro && <span style={{ fontSize: 11, background: "#E1F5EE", color: "#0F6E56", padding: "2px 8px", borderRadius: 5 }}>🕐 {r.horaRetiro}</span>}
                        {asignado.chofer && <span style={{ fontSize: 11, color: "#5A6A78" }}>· {asignado.chofer}</span>}
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "flex-end", flexShrink: 0 }}>
                    {abierto ? (
                      <button onClick={() => setAsignandoId(null)} style={{ background: "transparent", border: "none", fontSize: 20, color: "#aaa", cursor: "pointer", lineHeight: 1, padding: "2px 4px" }}>✕</button>
                    ) : asignado ? (
                      <>
                        <button className="btn-secondary" onClick={() => abrirPanel(r)} style={{ fontSize: 11, padding: "5px 10px" }}>Cambiar</button>
                        <button className="btn-ghost" onClick={() => { setRemitoActivo(r); onNav("remito"); }} style={{ fontSize: 11, padding: "5px 10px" }}>Ver remito</button>
                        <button onClick={() => confirmarRetiro(r.id)} style={{ background: "#E85D20", color: "#fff", border: "none", borderRadius: 7, padding: "6px 10px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>📦 Retiré →</button>
                      </>
                    ) : (
                      <button className="btn-primary" onClick={() => abrirPanel(r)} style={{ fontSize: 12 }}>Asignar móvil</button>
                    )}
                  </div>
                </div>

                {/* Panel de asignación inline */}
                {abierto && (
                  <div style={{ background: "#F0FBF7", borderRadius: 10, padding: 12, border: "0.5px solid #9FE1CB" }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: "#0F6E56", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Elegir vehículo</div>
                    {flota.length === 0 ? (
                      <div style={{ fontSize: 13, color: "#aaa", marginBottom: 8 }}>No hay vehículos en Mi Flota. Agregá uno primero.</div>
                    ) : flota.map(v => (
                      <div key={v.id} onClick={() => setVehiculoSel(v)}
                        style={{ display: "flex", alignItems: "center", gap: 9, padding: "8px 10px", borderRadius: 8, marginBottom: 5, cursor: "pointer",
                          border: vehiculoSel?.id === v.id ? "1.5px solid #0F6E56" : "1px solid #DDE3EA",
                          background: vehiculoSel?.id === v.id ? "#E1F5EE" : "#fff" }}>
                        <div style={{ width: 32, height: 32, borderRadius: 7, background: "#E1F5EE", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>🚐</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, fontWeight: 500 }}>{v.alias}</div>
                          <div style={{ fontSize: 11, color: "#5A6A78" }}>{v.chofer || "Sin chofer asignado"}</div>
                        </div>
                        {vehiculoSel?.id === v.id && <span style={{ color: "#0F6E56", fontSize: 16, flexShrink: 0 }}>✓</span>}
                      </div>
                    ))}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, margin: "10px 0" }}>
                      <div>
                        <div style={{ fontSize: 11, color: "#5A6A78", marginBottom: 3 }}>Hora de retiro (opcional)</div>
                        <input type="time" value={horaRetiro} onChange={e => setHoraRetiro(e.target.value)}
                          style={{ fontSize: 13, padding: "7px 10px", borderRadius: 7, border: "1px solid #DDE3EA", width: "100%", background: "#fff" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 11, color: "#5A6A78", marginBottom: 3 }}>Nota al chofer (opcional)</div>
                        <input type="text" value={notaChofer} onChange={e => setNotaChofer(e.target.value)} placeholder="Ej: Timbre 2, portón azul"
                          style={{ fontSize: 13, padding: "7px 10px", borderRadius: 7, border: "1px solid #DDE3EA", width: "100%", background: "#fff" }} />
                      </div>
                    </div>
                    <button className="btn-primary" onClick={() => confirmarAsignacion(r.id)} style={{ width: "100%", fontSize: 13 }}>
                      Confirmar y notificar al chofer →
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── En depósito: retirado + en-deposito + cargando-ruta ── */}
      {etapa === "enDeposito" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {(() => {
            // Agrupar por ruta
            const sorted = (rutas && rutas.length > 0)
              ? [...items].sort((a, b) => {
                  const ra = encontrarRuta(a.destinatario?.ciudad || '', rutas, ciudadesRuta);
                  const rb = encontrarRuta(b.destinatario?.ciudad || '', rutas, ciudadesRuta);
                  return (ra ? ra.numero : 999) - (rb ? rb.numero : 999);
                })
              : items;

            // Construir grupos
            const grupos = [];
            const keysSeen = {};
            sorted.forEach(r => {
              const matchDetectado = encontrarRuta(r.destinatario?.ciudad || '', rutas, ciudadesRuta);
              // sinRuta=true significa que el usuario desasignó explícitamente → siempre sin ruta
              // rutaAsignada con número → usar ese, buscar objeto de rutas
              // si no → detectar por ciudad (solo display, no escribe a Firebase)
              const match = r.rutaAsignada?.sinRuta
                ? null
                : r.rutaAsignada?.numero != null
                  ? rutas.find((rt, i) => (rt.numero ?? i + 1) === r.rutaAsignada.numero) || matchDetectado
                  : matchDetectado;
              const key = match ? `r${match.numero ?? rutas.indexOf(match) + 1}` : '__sin__';
              if (!keysSeen[key]) {
                keysSeen[key] = true;
                grupos.push({ key, match, paquetes: [] });
              }
              grupos[grupos.findIndex(g => g.key === key)].paquetes.push(r);
            });

            return grupos.map((grupo, gi) => {
              const { key, match, paquetes } = grupo;
              const numRuta = match ? (match.numero ?? rutas.indexOf(match) + 1) : null;
              const col = numRuta != null ? rutaColor(numRuta) : RUTA_COLOR_SIN;
              const collapsed = !collapsedDepTr.has(key);
              const toggleCol = () => setCollapsedDepTr(prev => {
                const next = new Set(prev); next.has(key) ? next.delete(key) : next.add(key); return next;
              });
              const routeSub = match ? `${match.ciudadOrigen} → ${match.ciudadDestino}` : null;

              // Opción B: calcular sentido ida/vuelta para este grupo
              let sentidoBadge = null;
              if (match && paquetes.length > 0) {
                const allStops = [match.ciudadOrigen, ...(match.waypoints||[]).map(w=>w.ciudad), match.ciudadDestino]
                  .map(c => normStrTr((c||'').split(',')[0]));
                const r0 = paquetes[0];
                const origNorm = normStrTr((r0.remitente?.ciudad||'').split(',')[0]);
                const destNorm = normStrTr((r0.destinatario?.ciudad||'').split(',')[0]);
                const origIdx = allStops.findIndex(s => s === origNorm);
                const destIdx = allStops.findIndex(s => s === destNorm);
                if (origIdx !== -1 && destIdx !== -1) {
                  sentidoBadge = origIdx <= destIdx ? '→ Ida' : '← Vuelta';
                }
              }

              // Multi-select por grupo
              const selEnGrupo = paquetes.filter(r => selDepTrans.has(r.id));
              const todosSeleccionados = paquetes.length > 0 && paquetes.every(r => selDepTrans.has(r.id));
              const algunoSeleccionado = paquetes.some(r => selDepTrans.has(r.id));
              const vGrupo = vehiculoGrupo[key] || null;
              const kgSel = selEnGrupo.reduce((s, r) => s + (parseFloat(r.envio?.peso) || 0), 0);
              const kgMax = parseFloat(vGrupo?.capacidadKg) || 0;
              const sobrepasa = kgMax > 0 && kgSel > kgMax;

              function toggleTodosGrupo() {
                setSelDepTrans(prev => {
                  const next = new Set(prev);
                  if (todosSeleccionados) { paquetes.forEach(r => next.delete(r.id)); }
                  else { paquetes.forEach(r => next.add(r.id)); }
                  return next;
                });
              }

              function confirmarCargaGrupo() {
                if (!vGrupo) { alert("Seleccioná un vehículo primero."); return; }
                if (selEnGrupo.length === 0) { alert("Marcá al menos un paquete."); return; }
                if (sobrepasa) {
                  const ok = window.confirm(`La carga seleccionada (${kgSel.toFixed(1)} kg) supera la capacidad del vehículo (${kgMax} kg).\n¿Confirmar igual? (portaequipaje u otro espacio)`);
                  if (!ok) return;
                }
                const updates = {};
                selEnGrupo.forEach(r => {
                  updates[`remitos/${r.id}/estado`] = 'cargando-ruta';
                  updates[`remitos/${r.id}/vehiculoRuta`] = { id: vGrupo.id, alias: vGrupo.alias, patente: vGrupo.patente || null, chofer: vGrupo.chofer || null };
                });
                db.ref().update(updates);
                setSelDepTrans(prev => { const next = new Set(prev); selEnGrupo.forEach(r => next.delete(r.id)); return next; });
              }

              return (
                <div key={key} style={{ border: `2px solid ${col.dark}`, borderRadius: 10, overflow: "hidden", marginBottom: gi < grupos.length - 1 ? 6 : 0 }}>
                  {/* Cabecera colapsable */}
                  <div onClick={toggleCol}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px",
                      background: col.solid, cursor: "pointer", userSelect: "none" }}>
                    <span style={{ fontSize: 15, fontWeight: 700, flex: 1, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {match ? `Ruta ${match.numero ?? rutas.indexOf(match) + 1}` : 'Sin ruta'}
                      {routeSub && <span style={{ fontWeight: 400, fontSize: 13, marginLeft: 8, opacity: 0.82 }}>{routeSub}</span>}
                    </span>
                    {sentidoBadge && (
                      <span style={{ background: "rgba(0,0,0,0.18)", color: "#fff", fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 20, flexShrink: 0, letterSpacing: ".02em" }}>
                        {sentidoBadge}
                      </span>
                    )}
                    <span style={{ background: "rgba(255,255,255,0.22)", color: "#fff", fontSize: 12, fontWeight: 600, padding: "3px 10px", borderRadius: 20, flexShrink: 0 }}>
                      {paquetes.length} paq.
                    </span>
                    <span style={{ fontSize: 17, color: "#fff", opacity: 0.85, marginLeft: 2 }}>{collapsed ? '›' : '⌄'}</span>
                  </div>

                  {!collapsed && (
                    <div>
                      {/* Selector de vehículo (nivel grupo) */}
                      <div style={{ padding: "10px 16px", borderTop: "1px solid #DDE3EA", background: "#FAFBFC" }}>
                        <div style={{ fontSize: 11, fontWeight: 600, color: "#5A6A78", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 6 }}>Vehículo de ruta</div>
                        {flota.length === 0 ? (
                          <div style={{ fontSize: 13, color: "#aaa" }}>Sin vehículos en Mi Flota.</div>
                        ) : (
                          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            {flota.map(v => (
                              <button key={v.id} onClick={e => { e.stopPropagation(); setVehiculoGrupo(prev => ({ ...prev, [key]: vGrupo?.id === v.id ? null : v })); }}
                                style={{ padding: "6px 12px", fontSize: 12, fontWeight: 500, borderRadius: 8, cursor: "pointer",
                                  border: vGrupo?.id === v.id ? "1.5px solid #0F6E56" : "1px solid #DDE3EA",
                                  background: vGrupo?.id === v.id ? "#E1F5EE" : "#fff",
                                  color: vGrupo?.id === v.id ? "#0F6E56" : "#1A1A1A" }}>
                                🚚 {v.alias}{vGrupo?.id === v.id ? " ✓" : ""}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>

                      {/* Seleccionar todos */}
                      <div onClick={e => { e.stopPropagation(); toggleTodosGrupo(); }}
                        style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", borderTop: "1px solid #DDE3EA",
                          cursor: "pointer", background: algunoSeleccionado ? "#F0FBF7" : "#F8F9FA", userSelect: "none" }}>
                        <div style={{ width: 20, height: 20, borderRadius: 5, flexShrink: 0,
                          border: `2px solid ${todosSeleccionados ? '#0F6E56' : algunoSeleccionado ? '#9FE1CB' : '#DDE3EA'}`,
                          background: todosSeleccionados ? "#0F6E56" : algunoSeleccionado ? "#E1F5EE" : "#fff",
                          display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {todosSeleccionados && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}
                          {!todosSeleccionados && algunoSeleccionado && <span style={{ color: "#0F6E56", fontSize: 14, fontWeight: 700, lineHeight: 1 }}>–</span>}
                        </div>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1A1A" }}>
                          {todosSeleccionados ? "Deseleccionar todos" : `Seleccionar todos (${paquetes.length})`}
                        </span>
                      </div>

                      {/* Paquetes con checkbox */}
                      {paquetes.map(r => {
                        const sel = selDepTrans.has(r.id);
                        const esRetirado = r.estado === "retirado";
                        return (
                          <div key={r.id} style={{ borderTop: "1px solid #DDE3EA" }}>
                            <div className="card" style={{ border: "none", borderRadius: 0, margin: 0,
                              borderLeft: sel ? `3px solid #0F6E56` : `3px solid transparent`,
                              background: sel ? "#FAFFFE" : "#fff" }}>
                              <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                                <div onClick={e => { e.stopPropagation(); setSelDepTrans(prev => { const next = new Set(prev); sel ? next.delete(r.id) : next.add(r.id); return next; }); }}
                                  style={{ width: 22, height: 22, borderRadius: 5, flexShrink: 0, marginTop: 2, cursor: "pointer",
                                    border: `2px solid ${sel ? '#0F6E56' : '#DDE3EA'}`, background: sel ? "#0F6E56" : "#fff",
                                    display: "flex", alignItems: "center", justifyContent: "center" }}>
                                  {sel && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}
                                </div>
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 6 }}>
                                    <div style={{ flex: 1 }}>
                                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                                        <span style={{ fontWeight: 600, fontSize: 14 }}>{r.remitente?.ciudad || "—"} → {r.destinatario?.ciudad || "—"}</span>
                                        <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 5, fontWeight: 500,
                                          background: r.estado === "cargando-ruta" ? "#E1F5EE" : esRetirado ? "#E6F1FB" : "#FFF8E1",
                                          color:      r.estado === "cargando-ruta" ? "#0F6E56" : esRetirado ? "#185FA5" : "#F57F17" }}>
                                          {r.estado === "cargando-ruta" ? `🚛 Cargado · ${r.vehiculoRuta?.alias || ''}` : esRetirado ? "Retirado" : "En depósito"}
                                        </span>
                                      </div>
                                      <div style={{ display: "flex", gap: 10, fontSize: 12, color: "#5A6A78", flexWrap: "wrap" }}>
                                        <span>🔢 {r.id}</span>
                                        {r.destinatario?.nombre && <span>👤 {r.destinatario.nombre}</span>}
                                        {r.flete && <span style={{ color: "#0F6E56", fontWeight: 500 }}>💵 ${r.flete.toLocaleString()}</span>}
                                        {r.envio?.peso && <span>⚖️ {r.envio.peso} kg</span>}
                                        {r.envio?.bultos && <span style={{ fontWeight: r.envio.bultos > 1 ? 700 : 400, color: r.envio.bultos > 1 ? '#C44A0F' : '#5A6A78' }}>📦 {r.envio.bultos} bulto{r.envio.bultos !== 1 ? 's' : ''}</span>}
                                      </div>
                                      {r.vehiculoAsignado && <div style={{ fontSize: 11, color: "#0F6E56", marginTop: 3 }}>🚐 Retiro: {r.vehiculoAsignado.alias}</div>}
                                      {(() => {
                                        const ciudad = r.destinatario?.ciudad || '';
                                        const destStr = ciudad + (r.destinatario?.provincia ? ', ' + r.destinatario.provincia : '');
                                        const selectRuta = (label, mostrarDesasignar = false) => rutas.length > 0 ? (
                                          <select onChange={e => {
                                            const val = e.target.value;
                                            if (val === '__clear__') {
                                              db.ref(`remitos/${r.id}/rutaAsignada`).set({ sinRuta: true, numero: null });
                                              return;
                                            }
                                            const idx = parseInt(val);
                                            if (isNaN(idx)) return;
                                            const ruta = { ...rutas[idx], numero: idx + 1 };
                                            guardarCiudadEnRuta(destStr, ruta).then(() =>
                                              db.ref(`remitos/${r.id}/rutaAsignada`).set({ numero: ruta.numero, id: ruta.id, ciudadOrigen: ruta.ciudadOrigen, ciudadDestino: ruta.ciudadDestino })
                                            );
                                          }} defaultValue="" style={{ fontSize:11, padding:'3px 6px', border:'1px solid #DDE3EA', borderRadius:5, color:'#5A6A78', background:'#F8F9FA' }}>
                                            <option value="" disabled>{label}</option>
                                            {rutas.map((rt, i) => <option key={rt.id || i} value={i}>Ruta {i+1} — {rt.ciudadOrigen} → {rt.ciudadDestino}</option>)}
                                            {mostrarDesasignar && <option value="__clear__">✕ Sin ruta (desasignar)</option>}
                                          </select>
                                        ) : null;
                                        if (key === '__sin__') {
                                          const sugerida = sugerirRutaPorProvincia(destStr, rutas);
                                          return (
                                            <div style={{ marginTop: 6 }}>
                                              {sugerida ? (
                                                <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
                                                  <span style={{ fontSize:11, color:'#5A6A78' }}>📍 ¿Ruta {sugerida.numero} ({sugerida.ciudadOrigen} → {sugerida.ciudadDestino})?</span>
                                                  <button onClick={() => guardarCiudadEnRuta(destStr, sugerida).then(() =>
                                                    db.ref(`remitos/${r.id}/rutaAsignada`).set({ numero: sugerida.numero, id: sugerida.id, ciudadOrigen: sugerida.ciudadOrigen, ciudadDestino: sugerida.ciudadDestino })
                                                  )} style={{ fontSize:11, padding:'3px 8px', background:'#E1F5EE', color:'#0F6E56', border:'none', borderRadius:5, cursor:'pointer', fontWeight:600 }}>
                                                    ✓ Confirmar
                                                  </button>
                                                  {selectRuta('📍 Otra ruta...')}
                                                </div>
                                              ) : selectRuta('📍 Asignar a ruta...')}
                                            </div>
                                          );
                                        }
                                        return <div style={{ marginTop: 4 }}>{selectRuta('✎ Cambiar ruta...', true)}</div>;
                                      })()}
                                      {esRetirado && (
                                        <button onClick={() => fbUpdate('remitos', r.id, { estado: 'en-deposito' })}
                                          style={{ marginTop: 6, padding: "5px 10px", background: "#E6F1FB", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 600, color: "#185FA5", cursor: "pointer" }}>
                                          📦 Depositar
                                        </button>
                                      )}
                                      {r.estado === "cargando-ruta" && (
                                        <button onClick={() => { const u = {}; u[`remitos/${r.id}/estado`] = 'en-deposito'; u[`remitos/${r.id}/vehiculoRuta`] = null; db.ref().update(u); }}
                                          style={{ marginTop: 6, padding: "5px 10px", background: "#FEF3EC", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 600, color: "#C44A0F", cursor: "pointer" }}>
                                          ↩ Desasignar vehículo
                                        </button>
                                      )}
                                    </div>
                                    <button className="btn-ghost" onClick={() => { setRemitoActivo(r); onNav("remito"); }} style={{ fontSize: 11, padding: "5px 10px", flexShrink: 0 }}>Ver remito</button>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}

                      {/* Footer: capacidad + confirmar */}
                      {algunoSeleccionado && (
                        <div style={{ padding: "12px 16px", borderTop: "1px solid #DDE3EA", background: "#F0FBF7" }}>
                          {kgMax > 0 && (
                            <div style={{ marginBottom: 10 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#5A6A78", marginBottom: 4 }}>
                                <span>Carga seleccionada</span>
                                <span style={{ fontWeight: 600, color: sobrepasa ? "#C0392B" : "#0F6E56" }}>{kgSel.toFixed(1)} / {kgMax} kg</span>
                              </div>
                              <div style={{ height: 6, background: "#DDE3EA", borderRadius: 3, overflow: "hidden" }}>
                                <div style={{ width: `${Math.min((kgSel/kgMax)*100, 100)}%`, height: "100%", borderRadius: 3, background: sobrepasa ? "#C0392B" : "#0F6E56" }} />
                              </div>
                              {sobrepasa && <div style={{ fontSize: 11, color: "#C0392B", marginTop: 4 }}>⚠️ Supera capacidad — podés igualmente confirmar</div>}
                            </div>
                          )}
                          <button onClick={confirmarCargaGrupo}
                            style={{ width: "100%", background: "#0F6E56", color: "#fff", border: "none", borderRadius: 8, padding: "11px 12px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                            🚛 Cargar {selEnGrupo.length} paquete{selEnGrupo.length !== 1 ? 's' : ''}{vGrupo ? ` en ${vGrupo.alias}` : ''} →
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            });
          })()}
        </div>
      )}

      {/* ── En sucursal: cards colapsables agrupadas por sucursal ── */}
      {etapa === "enSucursal" && (() => {
        if (items.length === 0) return (
          <div style={{ background: "#fff", border: "1px solid #DDE3EA", borderRadius: 12, padding: 40, textAlign: "center", color: "#5A6A78" }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>🏢</div>
            <p style={{ fontWeight: 500 }}>No hay paquetes en sucursal en este momento</p>
          </div>
        );

        // Agrupar por sucursal
        const grupos = {};
        items.forEach(r => {
          const sid  = r.sucursalEntrega?.id   || 'sin-sucursal';
          const snombre = r.sucursalEntrega?.nombre || 'Sin sucursal asignada';
          if (!grupos[sid]) grupos[sid] = { id: sid, nombre: snombre, paquetes: [] };
          grupos[sid].paquetes.push(r);
        });
        const gruposList = Object.values(grupos).sort((a, b) =>
          a.id === 'sin-sucursal' ? 1 : b.id === 'sin-sucursal' ? -1 : a.nombre.localeCompare(b.nombre)
        );

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {gruposList.map((g, gIdx) => {
              const c = sucursalDepColor(gIdx);
              const collapsed = collapsedSucDep.has(g.id);
              const toggleCollapse = () => setCollapsedSucDep(prev => {
                const next = new Set(prev);
                next.has(g.id) ? next.delete(g.id) : next.add(g.id);
                return next;
              });
              return (
                <div key={g.id} style={{ border: `2px solid ${c.dark}`, borderRadius: 10, overflow: "hidden" }}>
                  {/* Header de sucursal */}
                  <div onClick={toggleCollapse} style={{ background: c.solid, padding: "13px 16px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none" }}>
                    <span style={{ flex: 1, fontSize: 15, fontWeight: 700, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      🏢 {g.nombre}
                    </span>
                    <span style={{ background: "rgba(255,255,255,0.22)", color: "#fff", fontSize: 12, fontWeight: 600, padding: "3px 10px", borderRadius: 20, flexShrink: 0 }}>
                      {g.paquetes.length} paq.
                    </span>
                    <span style={{ fontSize: 17, color: "#fff", opacity: 0.85 }}>{collapsed ? "›" : "⌄"}</span>
                  </div>

                  {/* Paquetes */}
                  {!collapsed && g.paquetes.map(r => {
                    const abierto = depositandoId === r.id;
                    const sentido = sentidoDeRemito(r, rutas);
                    return (
                      <div key={r.id} style={{ borderTop: "1px solid #DDE3EA", background: "#fff", padding: "12px 14px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: abierto ? 0 : 10 }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                              <span style={{ fontWeight: 600, fontSize: 13, color: "#1A1A1A" }}>{r.remitente?.ciudad || "—"} → {r.destinatario?.ciudad || "—"}</span>
                              {sentido && (
                                <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: c.light, color: c.dark, letterSpacing: ".3px" }}>{sentido}</span>
                              )}
                            </div>
                            <div style={{ display: "flex", gap: 8, fontSize: 11, color: "#5A6A78", flexWrap: "wrap" }}>
                              <span>🔢 {r.id}</span>
                              {r.destinatario?.nombre && <span>👤 {r.destinatario.nombre}</span>}
                              {r.flete && <span style={{ color: "#0F6E56", fontWeight: 500 }}>💵 ${r.flete.toLocaleString()}</span>}
                              {r.entregadoEn && <span style={{ color: "#aaa" }}>🕐 {r.entregadoEn}</span>}
                            </div>
                          </div>
                          {abierto
                            ? <button onClick={() => setDepositandoId(null)} style={{ background: "transparent", border: "none", fontSize: 20, color: "#aaa", cursor: "pointer" }}>✕</button>
                            : <button className="btn-ghost" onClick={() => { setRemitoActivo(r); onNav("remito"); }} style={{ fontSize: 11, padding: "5px 10px", flexShrink: 0 }}>Ver</button>
                          }
                        </div>

                        {!abierto && (
                          <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
                            <button onClick={() => fbUpdate('remitos', r.id, { estado: 'entregado' })}
                              style={{ flex: 1, background: "#0F6E56", color: "#fff", border: "none", borderRadius: 8, padding: "8px 10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                              ✅ Cliente retiró
                            </button>
                            <button onClick={() => abrirPanelRuta(r)}
                              style={{ flex: 1, background: "#185FA5", color: "#fff", border: "none", borderRadius: 8, padding: "8px 10px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                              🚛 Asignar vehículo →
                            </button>
                          </div>
                        )}

                        {abierto && (
                          <div style={{ background: "#F0FBF7", borderRadius: 10, padding: 12, border: "0.5px solid #9FE1CB", marginTop: 10 }}>
                            <div style={{ fontSize: 11, fontWeight: 600, color: "#0F6E56", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Asignar vehículo de ruta</div>
                            {flota.length === 0
                              ? <div style={{ fontSize: 13, color: "#aaa", marginBottom: 8 }}>No hay vehículos en Mi Flota.</div>
                              : flota.map(v => (
                                <div key={v.id} onClick={() => setVehiculoRuta(v)}
                                  style={{ display: "flex", alignItems: "center", gap: 9, padding: "8px 10px", borderRadius: 8, marginBottom: 5, cursor: "pointer",
                                    border: vehiculoRuta?.id === v.id ? "1.5px solid #0F6E56" : "1px solid #DDE3EA",
                                    background: vehiculoRuta?.id === v.id ? "#E1F5EE" : "#fff" }}>
                                  <div style={{ width: 32, height: 32, borderRadius: 7, background: "#E1F5EE", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>🚚</div>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ fontSize: 13, fontWeight: 500 }}>{v.alias}</div>
                                    <div style={{ fontSize: 11, color: "#5A6A78" }}>{v.uso === "Ruta" || v.uso === "Ambos" ? "✓ Apto para ruta" : v.uso} · {v.chofer || "Sin chofer"}</div>
                                  </div>
                                  {vehiculoRuta?.id === v.id && <span style={{ color: "#0F6E56", fontSize: 16 }}>✓</span>}
                                </div>
                              ))
                            }
                            <button onClick={() => confirmarCargaRuta(r.id)}
                              style={{ width: "100%", background: "#0F6E56", color: "#fff", border: "none", borderRadius: 8, padding: "9px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer", marginTop: 8 }}>
                              Confirmar asignación →
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ── En camino / Entregados: remitos ── */}
      {/* ── Viajes: una card colapsable por vehículo de la flota ── */}
      {etapa === "viajes" && (() => {
        // Construir mapa de viajes desde remitos
        const viajesMap = {};
        misRemitos.forEach(r => {
          if (!r.viajeId) return;
          if (!viajesMap[r.viajeId]) {
            viajesMap[r.viajeId] = {
              viajeId: r.viajeId,
              vehiculo: r.vehiculoRuta || r.vehiculoAsignado,
              remitos: [],
              activo: false,
              esCiudad: r.viajeId.startsWith('ret-'),
            };
          }
          viajesMap[r.viajeId].remitos.push(r);
          if (r.estado === 'en-camino') viajesMap[r.viajeId].activo = true;
        });

        // Agrupar viajes por vehículo. Siempre incluir todos los vehículos de la flota.
        const porVehiculo = {};
        flota.forEach(v => {
          const k = String(v.id);
          porVehiculo[k] = { vehiculo: v, key: k, pendientes: [], historial: [] };
        });
        Object.values(viajesMap).forEach(viaje => {
          const vid = viaje.vehiculo?.id;
          const k = vid != null ? String(vid) : ('x-' + (viaje.vehiculo?.alias || viaje.viajeId));
          if (!porVehiculo[k]) {
            porVehiculo[k] = { vehiculo: viaje.vehiculo || { alias: 'Vehículo' }, key: k, pendientes: [], historial: [] };
          }
          const rendicion = (viajesData[viaje.viajeId] || {}).rendicion;
          const esPorVerificar = rendicion?.creadaPorChofer && !rendicion?.verificado;
          if (esPorVerificar) porVehiculo[k].pendientes.push(viaje);
          else if (rendicion?.verificado) porVehiculo[k].historial.push(viaje);
          else if (!rendicion && !viaje.activo) porVehiculo[k].pendientes.push(viaje);
          // viaje.activo (en-camino) = viaje en curso, no aparece en Rendiciones
        });

        const aliasNum = alias => { const m = (alias || '').match(/\d+/); return m ? parseInt(m[0]) : 9999; };
        const lista = Object.values(porVehiculo)
          .sort((a, b) => aliasNum(a.vehiculo?.alias) - aliasNum(b.vehiculo?.alias));

        // Función auxiliar: renderiza la card de un viaje individual
        const renderViajeCard = (viaje) => {
          const { viajeId, esCiudad } = viaje;
          const rems = viaje.remitos;
          const total = rems.length;
          const compN = rems.filter(r => ['entregado','retirado','en-sucursal'].includes(r.estado)).length;
          const pendN = rems.filter(r => r.estado === 'en-camino').length;

          const retEfectivo = rems.filter(r => r.cobranzaRetiroConfirmada && r.formaPagoRetiro === 'efectivo').reduce((s, r) => s + (r.montoCobradoRetiro || 0), 0);
          const retDigital  = rems.filter(r => r.cobranzaRetiroConfirmada && r.formaPagoRetiro === 'digital').reduce((s, r) => s + (r.montoCobradoRetiro || 0), 0);
          const entEfectivo = rems.filter(r => r.cobranzaConfirmada && r.formaPago === 'efectivo').reduce((s, r) => s + (r.montoCobrado || 0), 0);
          const entDigital  = rems.filter(r => r.cobranzaConfirmada && r.formaPago === 'digital').reduce((s, r) => s + (r.montoCobrado || 0), 0);
          const pendRet = rems.filter(r => r.quienPaga === 'remitente' && !r.cobranzaRetiroConfirmada && ['retirado','en-camino','entregado'].includes(r.estado));
          const pendEnt = rems.filter(r => r.quienPaga === 'destinatario' && !r.cobranzaConfirmada && r.estado === 'entregado');

          const vData = viajesData[viajeId] || {};
          const gastos = vData.gastos ? Object.values(vData.gastos) : [];
          const totalGastos = gastos.reduce((s, g) => s + (g.monto || 0), 0);
          const gastosTransp = vData.gastosTransportista ? Object.values(vData.gastosTransportista) : [];
          const totalGastosTransp = gastosTransp.reduce((s, g) => s + (g.monto || 0), 0);
          const rendicion = vData.rendicion || null;
          const digitalConfirmado = !!vData.digitalConfirmado;

          const totalEfectivo = retEfectivo + entEfectivo;
          const totalDigital  = retDigital  + entDigital;
          const efectivoARendir = Math.max(0, totalEfectivo - totalGastos);
          const tieneCobros = totalEfectivo > 0 || totalDigital > 0 || pendRet.length > 0 || pendEnt.length > 0;
          const fechaStr = (() => { const r0 = rems.find(r => r.entregadoEn || r.retiradoEn); return (r0?.entregadoEn || r0?.retiradoEn || '').split(' ')[0] || ''; })();
          const labelTipo = esCiudad ? '🏙 Ciudad' : '🚛 Ruta';
          const colorTipo = esCiudad ? '#185FA5' : '#C44A0F';
          const bgCard = rendicion ? '#F8FAFF' : (viaje.activo ? '#F0FAF6' : '#F8F9FA');
          const brdCard = rendicion ? '0.5px solid #C8DCFA' : (viaje.activo ? '0.5px solid #B8EDD8' : '0.5px solid #E0E5EA');

          return (
            <div key={viajeId} style={{ background: bgCard, border: brdCard, borderRadius: 10, padding: '10px 12px' }}>
              {/* Tipo + estado del viaje */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: colorTipo, textTransform: 'uppercase', letterSpacing: '.4px' }}>{labelTipo}</span>
                {rendicion?.creadaPorChofer && !rendicion?.verificado
                  ? <span style={{ background: '#E85D20', color: '#fff', fontSize: 10, padding: '2px 7px', borderRadius: 8, fontWeight: 600 }}>⏳ Por verificar</span>
                  : rendicion
                  ? <span style={{ background: '#0F6E56', color: '#fff', fontSize: 10, padding: '2px 7px', borderRadius: 8, fontWeight: 600 }}>✓ Rendido {rendicion.fecha}</span>
                  : viaje.activo
                    ? <span style={{ background: '#1D9E75', color: '#fff', fontSize: 10, padding: '2px 7px', borderRadius: 8, fontWeight: 600 }}>EN CURSO</span>
                    : <span style={{ fontSize: 11, color: '#888' }}>{fechaStr} ✓</span>
                }
              </div>
              <div style={{ fontSize: 11, color: '#5A6A78', marginBottom: 8 }}>
                {total} paq. · {compN} completado{compN !== 1 ? 's' : ''}{pendN > 0 ? ` · ${pendN} en camino` : ''}
              </div>

              {/* Cobranzas / Resumen rendición */}
              <div style={{ background: '#fff', borderRadius: 8, padding: '9px 11px', border: '0.5px solid #E0E0E0', marginBottom: 8 }}>
                {rendicion?.creadaPorChofer && !rendicion?.verificado ? (
                  /* ── Por verificar: rendicion declarada por el chofer ── */
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 600, color: '#E85D20', textTransform: 'uppercase', letterSpacing: '.4px', marginBottom: 8 }}>
                      📋 Declarado por {rendicion.chofer || 'el chofer'} · {rendicion.fecha} {rendicion.hora}
                    </div>
                    {/* Lista unificada de gastos: chofer + transportista */}
                    {((rendicion.gastos || []).length > 0 || gastosTransp.length > 0) && (
                      <div style={{ marginBottom: 8 }}>
                        {(rendicion.gastos || []).map((g, i) => (
                          <div key={'ch-' + i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 2 }}>
                            <span style={{ color: '#5A6A78' }}>{GASTO_ICONS[g.tipo] || '🧾'} {GASTO_LABELS[g.tipo] || g.tipo}{g.desc ? ' — ' + g.desc : ''}</span>
                            <span style={{ color: '#A32D2D' }}>-${(g.monto || 0).toLocaleString('es-AR')}</span>
                          </div>
                        ))}
                        {gastosTransp.map((g, i) => (
                          <div key={'tr-' + i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 2 }}>
                            <span style={{ color: '#185FA5' }}>{GASTO_ICONS[g.tipo] || '🧾'} {GASTO_LABELS[g.tipo] || g.tipo}</span>
                            <span style={{ color: '#0C447C' }}>-${(g.monto || 0).toLocaleString('es-AR')}</span>
                          </div>
                        ))}
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, fontWeight: 600, color: '#A32D2D', borderTop: '0.5px solid #eee', paddingTop: 4, marginTop: 3, marginBottom: 6 }}>
                          <span>Total gastos</span><span>-${((rendicion.totalGastos || 0) + totalGastosTransp).toLocaleString('es-AR')}</span>
                        </div>
                      </div>
                    )}
                    {/* Formulario para agregar gasto desde el transportista */}
                    <div style={{ background: '#F0F4F8', borderRadius: 8, padding: '8px 10px', marginBottom: 8 }}>
                      <div style={{ fontSize: 10, color: '#5A6A78', fontWeight: 600, marginBottom: 6 }}>+ Agregar gasto</div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 6 }}>
                        {GASTO_TIPOS.map(t => (
                          <button key={t} onClick={() => setRendGastoTipo(t)}
                            style={{ background: rendGastoTipo === t ? '#185FA5' : '#fff', color: rendGastoTipo === t ? '#fff' : '#5A6A78',
                              border: '0.5px solid ' + (rendGastoTipo === t ? '#185FA5' : '#C0C8D4'),
                              borderRadius: 6, fontSize: 10, padding: '3px 7px', cursor: 'pointer' }}>
                            {GASTO_ICONS[t]} {GASTO_LABELS[t]}
                          </button>
                        ))}
                      </div>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <input
                          type="text" inputMode="numeric" placeholder="$0"
                          value={rendGastoMonto}
                          onChange={e => setRendGastoMonto(e.target.value.replace(/\D/g, ''))}
                          onFocus={e => { if (e.target.value === '0') setRendGastoMonto(''); }}
                          style={{ flex: 1, border: '0.5px solid #C0C8D4', borderRadius: 6, padding: '5px 8px', fontSize: 12, minWidth: 0 }}
                        />
                        <button onClick={() => {
                          const m = parseInt(rendGastoMonto) || 0;
                          if (m <= 0) return;
                          db.ref('viajes/' + viajeId + '/gastosTransportista').push({ tipo: rendGastoTipo, monto: m });
                          setRendGastoMonto('');
                        }} style={{ background: '#185FA5', color: '#fff', border: 'none', borderRadius: 6, padding: '5px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                          + Agregar
                        </button>
                      </div>
                    </div>
                    {(rendicion.montoDigital || 0) > 0 && (
                      <div style={{ background: digitalConfirmado ? '#EAF3DE' : '#FCEBEB', borderRadius: 8, padding: '8px 10px', marginBottom: 6, border: `0.5px solid ${digitalConfirmado ? '#97C459' : '#F09595'}` }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: digitalConfirmado ? 0 : 7 }}>
                          <span style={{ fontSize: 12, color: digitalConfirmado ? '#27500A' : '#A32D2D' }}>
                            📲 MP / transf. {digitalConfirmado ? '✓ Comprobante recibido' : '⚠ Sin confirmar'}
                          </span>
                          <span style={{ fontSize: 14, fontWeight: 700, color: digitalConfirmado ? '#173404' : '#A32D2D' }}>${(rendicion.montoDigital).toLocaleString('es-AR')}</span>
                        </div>
                        {!digitalConfirmado && (
                          <button
