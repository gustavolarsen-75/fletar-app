              {[{k:'efectivo',l:'💵 Efectivo'},{k:'digital',l:'📲 MP / transf.'}].map(op=>(
                <button key={op.k} onClick={()=>setFormaPagoMostrador(op.k)}
                  style={{ flex:1, padding:'9px 6px', fontSize:12, fontWeight:600, cursor:'pointer', borderRadius:8,
                    border:formaPagoMostrador===op.k?'2px solid #0F6E56':'1px solid #DDE3EA',
                    background:formaPagoMostrador===op.k?'#E1F5EE':'#fff',
                    color:formaPagoMostrador===op.k?'#0F6E56':'#5A6A78' }}>{op.l}</button>
              ))}
            </div>
          </div>
        )}

        <div style={{ marginBottom:14 }}>
          <label style={lbl}>Valor declarado del contenido (opcional)</label>
          <div style={{ position:'relative' }}><span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'#888', fontSize:14, pointerEvents:'none' }}>$</span><input style={{...inp, paddingLeft:22}} type="number" min="0" value={valorDeclarado} onChange={e=>setValorDeclarado(e.target.value)} placeholder="Ej: 50000" /></div>
        </div>

        <div>
          <label style={lbl}>Instrucciones especiales (opcional)</label>
          <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:10 }}>
            {CHIPS_INSTRUCCIONES.map(chip => {
              const sel = instruccionesSeleccionadas.includes(chip);
              return (
                <button key={chip} onClick={()=>toggleChip(chip)} style={{
                  padding:'7px 12px', fontSize:13, borderRadius:20, cursor:'pointer',
                  border: sel ? '2px solid #0F6E56' : '1px solid #DDE3EA',
                  background: sel ? '#E1F5EE' : '#F4F7FA',
                  color: sel ? '#0F6E56' : '#5A6A78', fontWeight: sel ? 700 : 400,
                }}>{chip}</button>
              );
            })}
          </div>
          <input style={inp} value={observacionesExtra} onChange={e=>setObservacionesExtra(e.target.value)} placeholder="Otras indicaciones..." />
        </div>
      </div>

      {nextBtn(guardando||precioCalculado<=0, guardarRemito, guardando?'Guardando...':'✅ Registrar envío')}
    </div>
  );

  // ── PASO 4 – REMITO GENERADO ──
  if (paso === 4 && remitoCreado) {
    const r   = remitoCreado;
    const rc  = r.rutaAsignada ? rutaColor(r.rutaAsignada.numero) : null;
    const tel = (r.destinatario?.telefono||'').replace(/\D/g,'');
    const waMsg = `Hola ${r.destinatario?.nombre}, te enviaron un paquete con ${USUARIO_TRANS.nombre}. Seguí tu envío aquí: ${window.location.origin.replace(/\/$/, '')}/remito.html?id=${r.id}`;
    const waUrl = tel ? `https://wa.me/549${tel}?text=${encodeURIComponent(waMsg)}` : null;
    return (
      <div style={{ maxWidth:480, margin:'0 auto', padding:'20px 12px' }}>
        <div style={{ background:'#0F2D26', borderRadius:14, padding:'20px 20px 16px', marginBottom:12, color:'#fff' }}>
          <div style={{ fontSize:12, color:'#7BE8C4', marginBottom:4, fontWeight:500 }}>✅ Envío registrado en depósito</div>
          <div style={{ fontSize:22, fontWeight:800, letterSpacing:0.5, marginBottom:10 }}>#{String(r.id).slice(-6)}</div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            <span style={{ background:'#0F6E56', borderRadius:20, padding:'3px 12px', fontSize:12, fontWeight:600 }}>En depósito</span>
            {r.rutaAsignada
              ? <span style={{ background:rc.badge, borderRadius:20, padding:'3px 12px', fontSize:12, fontWeight:600 }}>Ruta {r.rutaAsignada.numero}</span>
              : <span style={{ background:'#7D5C00', borderRadius:20, padding:'3px 12px', fontSize:12, fontWeight:600 }}>Sin ruta</span>}
            {r.quienPaga==='destinatario' && <span style={{ background:'#7B4500', borderRadius:20, padding:'3px 12px', fontSize:12, fontWeight:600 }}>Flete a cobrar</span>}
          </div>
        </div>

        <div className="card" style={{ padding:20, marginBottom:12 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
            <div>
              <div style={{ fontSize:11, color:'#999', textTransform:'uppercase', fontWeight:600 }}>De</div>
              <div style={{ fontSize:14, fontWeight:600, color:'#1A1A1A' }}>{r.remitente?.nombre}</div>
              <div style={{ fontSize:12, color:'#666' }}>{r.remitente?.ciudad}</div>
              {r.remitente?.dni && <div style={{ fontSize:11, color:'#aaa' }}>DNI {r.remitente.dni}</div>}
            </div>
            <div>
              <div style={{ fontSize:11, color:'#999', textTransform:'uppercase', fontWeight:600 }}>Para</div>
              <div style={{ fontSize:14, fontWeight:600, color:'#1A1A1A' }}>{r.destinatario?.nombre}</div>
              <div style={{ fontSize:12, color:'#666' }}>{r.destinatario?.ciudad}</div>
              {r.destinatario?.domicilio && <div style={{ fontSize:12, color:'#888' }}>{r.destinatario.domicilio}</div>}
            </div>
          </div>
          <div style={{ borderTop:'1px solid #F0F0F0', paddingTop:12, display:'flex', gap:16 }}>
            <div>
              <div style={{ fontSize:11, color:'#999', textTransform:'uppercase', fontWeight:600 }}>Flete</div>
              <div style={{ fontSize:18, fontWeight:700, color:'#0F6E56' }}>${(r.flete||0).toLocaleString('es-AR')}</div>
            </div>
            <div>
              <div style={{ fontSize:11, color:'#999', textTransform:'uppercase', fontWeight:600 }}>Pago</div>
              <div style={{ fontSize:13, fontWeight:600, color:'#1A1A1A' }}>{r.quienPaga==='destinatario'?'Al recibir':'Pagado'}</div>
            </div>
            {r.envio?.valorDeclarado && <div>
              <div style={{ fontSize:11, color:'#999', textTransform:'uppercase', fontWeight:600 }}>Val. declarado</div>
              <div style={{ fontSize:13, fontWeight:600, color:'#1A1A1A' }}>${r.envio.valorDeclarado.toLocaleString('es-AR')}</div>
            </div>}
          </div>
          {r.observaciones && (
            <div style={{ marginTop:10, background:'#FFF8E1', borderRadius:8, padding:'8px 12px', fontSize:12, color:'#7D5C00' }}>📝 {r.observaciones}</div>
          )}
          {r.fotoUrl && (
            <img src={r.fotoUrl} alt="Foto del paquete" style={{ marginTop:10, width:'100%', borderRadius:8, maxHeight:180, objectFit:'cover' }} />
          )}
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {waUrl && (
            <a href={waUrl} target="_blank" rel="noopener noreferrer"
              style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, background:'#25D366', color:'#fff',
                padding:'12px 0', borderRadius:10, textDecoration:'none', fontWeight:600, fontSize:14 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Enviar por WhatsApp al destinatario
            </a>
          )}
          <button onClick={()=>window.open(`remito.html?id=${r.id}`, '_blank')}
            style={{ padding:'12px 0', background:'#EFF6FF', border:'2px solid #3B82F6', borderRadius:10, fontSize:14, fontWeight:600, color:'#1D4ED8', cursor:'pointer' }}>
            🔗 Ver remito del destinatario
          </button>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            <button onClick={()=>window.print()} style={{ padding:'11px 0', background:'#F0F4F8', border:'none', borderRadius:10, fontSize:13, fontWeight:600, color:'#1A1A1A', cursor:'pointer' }}>🖨️ Imprimir remito</button>
            <button onClick={()=>imprimirEtiqueta(r)} style={{ padding:'11px 0', background:'#F0F4F8', border:'none', borderRadius:10, fontSize:13, fontWeight:600, color:'#1A1A1A', cursor:'pointer' }}>🏷️ Imprimir etiqueta</button>
          </div>
          <button onClick={resetForm} style={{ padding:'12px 0', background:'#fff', border:'2px solid #0F6E56', borderRadius:10, fontSize:14, fontWeight:600, color:'#0F6E56', cursor:'pointer' }}>
            + Registrar otro envío
          </button>
          <button onClick={()=>onNav('trans-dashboard')} style={{ padding:'10px 0', background:'transparent', border:'none', fontSize:13, color:'#aaa', cursor:'pointer' }}>
            Volver al inicio
          </button>
        </div>
      </div>
    );
  }

  return null;
}

// ─── RATING MODAL ─────────────────────────────────────────────────────────────
function RatingModal({ remito, pregunta, nombre, onCalificar, onOmitir, accentColor }) {
  const [estrellas, setEstrellas] = useState(0);
  const [hover, setHover] = useState(0);
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: "24px 20px", width: "100%", maxWidth: 340, textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>🎉</div>
        <div style={{ fontWeight: 600, fontSize: 16, color: "#1A1A1A", marginBottom: 4 }}>¡Entrega confirmada!</div>
        <div style={{ fontSize: 13, color: "#888", marginBottom: 16 }}>{remito.remitente?.ciudad || "—"} → {remito.destinatario?.ciudad || "—"}</div>
        <div style={{ borderTop: "1px solid #f0f0f0", paddingTop: 16 }}>
          <div style={{ fontSize: 14, color: "#444", marginBottom: 12 }}>{pregunta} <strong>{nombre}</strong>?</div>
          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 16 }}>
            {[1,2,3,4,5].map(n => (
              <span key={n} onClick={() => setEstrellas(n)} onMouseEnter={() => setHover(n)} onMouseLeave={() => setHover(0)}
                style={{ fontSize: 34, cursor: "pointer", color: n <= (hover || estrellas) ? accentColor : "#ddd", userSelect: "none" }}>★</span>
            ))}
          </div>
          <button disabled={estrellas === 0} onClick={() => onCalificar(estrellas)}
            style={{ background: estrellas > 0 ? accentColor : "#ccc", color: "#fff", border: "none", borderRadius: 8, padding: "10px 0", fontSize: 14, fontWeight: 500, cursor: estrellas > 0 ? "pointer" : "default", width: "100%", marginBottom: 8 }}>
            Enviar calificación
          </button>
          <button onClick={onOmitir} style={{ background: "transparent", border: "none", color: "#bbb", fontSize: 12, cursor: "pointer" }}>Omitir</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("trans-dashboard");
  const [cargaSeleccionada, setCargaSeleccionada] = useState(null);
  const [remitoActivo, setRemitoActivo] = useState(null);
  const [sucursales, setSucursales] = useState([]);
  const [rutasTransportista, setRutasTransportista] = useState([]);
  const [ciudadesRuta, setCiudadesRuta] = useState({});
  const [remitoACalificar, setRemitoACalificar] = useState(null);
  const [ratingPromedio, setRatingPromedio] = useState(USUARIO_TRANS.calificacion);
  const shownRating = useRef(new Set());
  const initialLoadDone = useRef(false);
  const cargasVistas = useRef(null);       // null = primera carga todavía no procesada
  const remitosAceptadosVistos = useRef(null);

  // Pedir permiso de notificaciones al abrir la app
  useEffect(() => { pedirPermisoNotificaciones(); }, []);

  // Notificar nuevo pedido Y oferta aceptada — un solo listener eficiente
  useEffect(() => {
    return fbListen('cargas', arr => {
      // Nuevo pedido: 'nueva' o 'activo' (nunca 'publicada' — ese estado no existe)
      const disponibles = arr.filter(c => ['nueva', 'activo'].includes(c.estado)).map(c => c.id);
      if (cargasVistas.current === null) {
        cargasVistas.current = new Set(disponibles);
      } else {
        disponibles.forEach(id => {
          if (!cargasVistas.current.has(id)) {
            cargasVistas.current.add(id);
            const carga = arr.find(c => c.id === id);
            mostrarNotificacion(
              '📦 Nuevo pedido disponible',
              `${carga?.origen || ''} → ${carga?.destino || ''}`,
              '/icon-chofer-192.png'
            );
          }
        });
      }

      // Oferta aceptada: carga pasó a 'en-camino' con este transportista
      const aceptadas = arr
        .filter(c => c.estado === 'en-camino' && c.transportistaAsignado === USUARIO_TRANS.nombre)
        .map(c => c.id);
      if (remitosAceptadosVistos.current === null) {
        remitosAceptadosVistos.current = new Set(aceptadas);
      } else {
        aceptadas.forEach(id => {
          if (!remitosAceptadosVistos.current.has(id)) {
            remitosAceptadosVistos.current.add(id);
            const carga = arr.find(c => c.id === id);
            mostrarNotificacion(
              '✅ ¡Oferta aceptada!',
              `${carga?.origen || ''} → ${carga?.destino || ''}`,
              '/icon-chofer-192.png'
            );
          }
        });
      }
    });
  }, []);

  useEffect(() => {
    const ref = db.ref('sucursales');
    ref.on('value', snap => {
      const val = snap.val();
      setSucursales(val ? Object.values(val) : []);
    });
    return () => ref.off();
  }, []);

  useEffect(() => {
    const crRef = db.ref(`ciudadesRuta/${USUARIO_TRANS.id}`);
    crRef.on('value', snap => setCiudadesRuta(snap.val() || {}));
    return () => crRef.off();
  }, []);

  useEffect(() => {
    const key = USUARIO_TRANS.nombre.replace(/[.#$[\]]/g, '_');
    const ref = db.ref('rutas/' + key);
    ref.on('value', snap => {
      const val = snap.val();
      setRutasTransportista(val ? Object.values(val).sort((a, b) => (a.id || 0) - (b.id || 0)) : []);
    });
    return () => ref.off();
  }, []);

  useEffect(() => {
    return fbListen('remitos', arr => {
      const mios = arr.filter(r => r.transportistaNombre === USUARIO_TRANS.nombre);
      // Promedio en vivo
      const califs = mios.filter(r => r.calificacionEmpresa > 0).map(r => r.calificacionEmpresa);
      if (califs.length > 0) setRatingPromedio(parseFloat((califs.reduce((a, b) => a + b, 0) / califs.length).toFixed(1)));
      // En la primera carga: marcar todos los entregados existentes como ya vistos
      // así el modal solo aparece cuando un remito PASA a entregado mientras la app está abierta
      if (!initialLoadDone.current) {
        mios.filter(r => r.estado === "entregado").forEach(r => shownRating.current.add(r.id));
        initialLoadDone.current = true;
        return;
      }
      const pendiente = mios.find(r =>
        r.estado === "entregado" &&
        r.calificacionTransportista == null &&
        !shownRating.current.has(r.id)
      );
      if (pendiente) {
        shownRating.current.add(pendiente.id);
        setRemitoACalificar(pendiente);
      }
    });
  }, []);

  function handleCalificar(estrellas) {
    if (remitoACalificar) fbUpdate('remitos', remitoACalificar.id, { calificacionTransportista: estrellas });
    setRemitoACalificar(null);
  }

  function handleOmitir() {
    if (remitoACalificar) fbUpdate('remitos', remitoACalificar.id, { calificacionTransportista: 0 });
    setRemitoACalificar(null);
  }

  const sucursalActual = SUCURSAL_ID ? sucursales.find(s => s.id === SUCURSAL_ID) : null;
  const ciudadesSucursal = sucursalActual?.ciudades || [];

  function handleNav(dest) {
    if (dest === "sucursales" && !ES_CENTRAL) return;
    // Si el usuario pide ir a inicio desde una sub-vista del dashboard, resetear etapa
    if (dest === "trans-dashboard" && window.__resetDashboard) window.__resetDashboard();
    setScreen(dest);
  }

  const renderScreen = () => {
    switch (screen) {
      case "trans-dashboard": return <TransportistaDashboard onNav={handleNav} setCargaSeleccionada={setCargaSeleccionada} setRemitoActivo={setRemitoActivo} ciudadesSucursal={ciudadesSucursal} rutas={rutasTransportista} />;
      case "mis-rutas": return <MisRutas onNav={handleNav} />;
      case "hacer-oferta": return <HacerOferta onNav={handleNav} cargaSeleccionada={cargaSeleccionada} rutas={rutasTransportista} />;
      case "mis-viajes": return <MisViajes onNav={handleNav} onVerRemito={(r) => { setRemitoActivo(r); handleNav("remito"); }} />;
      case "mi-flota": return <MiFlota onNav={handleNav} />;
      case "remito": return <RemitoTransportista onNav={handleNav} remito={remitoActivo} />;
      case "chat": return <ChatScreen onNav={handleNav} />;
      case "recibir-mostrador": return <RecepcionMostrador onNav={handleNav} rutas={rutasTransportista} ciudadesRuta={ciudadesRuta} setRemitoActivo={setRemitoActivo} ciudadOrigenDefault={ciudadesSucursal[0] || ''} sucursalActual={sucursalActual} />;
      case "sucursales": return ES_CENTRAL ? <SucursalesManager onNav={handleNav} /> : null;
      default: return <TransportistaDashboard onNav={handleNav} setCargaSeleccionada={setCargaSeleccionada} setRemitoActivo={setRemitoActivo} ciudadesSucursal={ciudadesSucursal} rutas={rutasTransportista} />;
    }
  };

  return (
    <div>
      <Navbar onNav={handleNav} screen={screen} sucursalNombre={sucursalActual?.nombre} rating={ratingPromedio} />
      {renderScreen()}
      {remitoACalificar && (
        <RatingModal
          remito={remitoACalificar}
          pregunta="¿Cómo fue trabajar con"
          nombre={remitoACalificar.empresaNombre || remitoACalificar.empresa || remitoACalificar.remitente?.nombre || "el cliente"}
          onCalificar={handleCalificar}
          onOmitir={handleOmitir}
          accentColor="#0F6E56"
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
