                            onClick={() => db.ref('viajes/' + viajeId + '/digitalConfirmado').set(true)}
                            style={{ width: '100%', background: '#A32D2D', color: '#fff', border: 'none', borderRadius: 6, padding: '7px', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                            ✓ Confirmar comprobante recibido
                          </button>
                        )}
                      </div>
                    )}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#E6F1FB', borderRadius: 7, padding: '8px 10px' }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: '#0C447C' }}>💵 Efectivo a recibir</span>
                      <span style={{ fontSize: 18, fontWeight: 700, color: '#042C53' }}>${Math.max(0, (rendicion.montoEfectivo || 0) - (rendicion.totalGastos || 0) - totalGastosTransp).toLocaleString('es-AR')}</span>
                    </div>
                  </div>
                ) : rendicion ? (
                  /* ── Vista historial: datos guardados al momento de rendir ── */
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: '.4px', marginBottom: 8 }}>Resumen de rendición</div>

                    {/* Gastos */}
                    {((rendicion.gastos?.length > 0) || gastosTransp.length > 0) && (
                      <div style={{ marginBottom: 8 }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: '#5A6A78', marginBottom: 4 }}>Gastos del viaje</div>
                        {(rendicion.gastos || []).map((g, i) => (
                          <div key={'ch-' + i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 2 }}>
                            <span style={{ color: '#5A6A78' }}>{GASTO_ICONS[g.tipo] || '🧾'} {GASTO_LABELS[g.tipo] || g.tipo}{g.desc ? ' — ' + g.desc : ''}</span>
                            <span style={{ color: '#A32D2D' }}>-${(g.monto || 0).toLocaleString('es-AR')}</span>
                          </div>
                        ))}
                        {gastosTransp.map((g, i) => (
                          <div key={'tr-' + i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 2 }}>
                            <span style={{ color: '#185FA5' }}>{GASTO_ICONS[g.tipo] || '🧾'} {GASTO_LABELS[g.tipo] || g.tipo}</span>
                            <span style={{ color: '#0C447C' }}>-${(g.monto || 0).toLocaleString('es-AR')}</span>
                          </div>
                        ))}
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, fontWeight: 600, color: '#A32D2D', borderTop: '0.5px solid #eee', paddingTop: 4, marginTop: 3 }}>
                          <span>Total gastos</span>
                          <span>-${((rendicion.totalGastos || 0) + totalGastosTransp).toLocaleString('es-AR')}</span>
                        </div>
                      </div>
                    )}

                    {/* MP / transf */}
                    {(rendicion.montoDigital || 0) > 0 && (
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#E8F5E9', borderRadius: 7, padding: '7px 10px', marginBottom: 6 }}>
                        <span style={{ fontSize: 11, color: '#1B5E20' }}>📲 MP / transf. acreditado</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: '#1B5E20' }}>${(rendicion.montoDigital).toLocaleString('es-AR')}</span>
                      </div>
                    )}

                    {/* Efectivo rendido (neto) */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#E6F1FB', borderRadius: 7, padding: '8px 10px' }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: '#0C447C' }}>💵 Efectivo rendido</span>
                      <span style={{ fontSize: 18, fontWeight: 700, color: '#042C53' }}>${Math.max(0, (rendicion.montoEfectivo || 0) - (rendicion.totalGastos || 0) - totalGastosTransp).toLocaleString('es-AR')}</span>
                    </div>
                  </div>
                ) : (
                  /* ── Vista pendiente: cobranzas en vivo + gastos + botón confirmar ── */
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: '.4px', marginBottom: 7 }}>Cobranzas</div>

                    {esCiudad && (retEfectivo > 0 || retDigital > 0 || pendRet.length > 0) && (
                      <div style={{ marginBottom: 7 }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: '#5A6A78', marginBottom: 3 }}>Retiros (remitente)</div>
                        {retEfectivo > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 2 }}><span style={{ color: '#5A6A78' }}>💵 Efectivo</span><span style={{ fontWeight: 500 }}>${retEfectivo.toLocaleString('es-AR')}</span></div>}
                        {retDigital  > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 2 }}><span style={{ color: '#5A6A78' }}>📲 MP / transf.</span><span style={{ fontWeight: 600, color: digitalConfirmado ? '#1B5E20' : '#C0392B' }}>${retDigital.toLocaleString('es-AR')}</span></div>}
                        {pendRet.length > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11 }}><span style={{ background: '#FFF3CD', color: '#7B4500', borderRadius: 4, padding: '1px 5px' }}>⏳ {pendRet.length} pend.</span><span style={{ color: '#7B4500' }}>${pendRet.reduce((s,r)=>s+(r.flete||0),0).toLocaleString('es-AR')}</span></div>}
                      </div>
                    )}
                    {!esCiudad && (entEfectivo > 0 || entDigital > 0 || pendEnt.length > 0) && (
                      <div style={{ marginBottom: 7 }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: '#5A6A78', marginBottom: 3 }}>Entregas (destinatario)</div>
                        {entEfectivo > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 2 }}><span style={{ color: '#5A6A78' }}>💵 Efectivo</span><span style={{ fontWeight: 500 }}>${entEfectivo.toLocaleString('es-AR')}</span></div>}
                        {entDigital  > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 2 }}><span style={{ color: '#5A6A78' }}>📲 MP / transf.</span><span style={{ fontWeight: 600, color: digitalConfirmado ? '#1B5E20' : '#C0392B' }}>${entDigital.toLocaleString('es-AR')}</span></div>}
                        {pendEnt.length > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11 }}><span style={{ background: '#FFF3CD', color: '#7B4500', borderRadius: 4, padding: '1px 5px' }}>⏳ {pendEnt.length} pend.</span><span style={{ color: '#7B4500' }}>${pendEnt.reduce((s,r)=>s+(r.flete||0),0).toLocaleString('es-AR')}</span></div>}
                      </div>
                    )}
                    {!tieneCobros && <div style={{ fontSize: 11, color: '#aaa', textAlign: 'center', padding: '2px 0 5px' }}>Sin cobros registrados</div>}

                    {/* Gastos */}
                    <div style={{ borderTop: '0.5px solid #eee', paddingTop: 7, marginTop: tieneCobros ? 3 : 0 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: gastos.length > 0 ? 5 : 3 }}>
                        <span style={{ fontSize: 10, fontWeight: 600, color: '#5A6A78' }}>Gastos del viaje</span>
                        <button onClick={() => { setGastoTipo('peaje'); setGastoMonto(''); setGastoDesc(''); setModalGasto({ viajeId }); }}
                          style={{ fontSize: 11, padding: '2px 7px', borderRadius: 6, background: 'transparent', border: '0.5px solid #DDE3EA', cursor: 'pointer', color: '#5A6A78' }}>+ Cargar</button>
                      </div>
                      {gastos.length === 0 && <div style={{ fontSize: 11, color: '#aaa' }}>Sin gastos</div>}
                      {gastos.map((g, i) => (
                        <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 2 }}>
                          <span style={{ color: '#5A6A78' }}>{GASTO_ICONS[g.tipo] || '🧾'} {GASTO_LABELS[g.tipo] || g.tipo}{g.desc ? ' — ' + g.desc : ''}</span>
                          <span style={{ color: '#A32D2D' }}>-${(g.monto || 0).toLocaleString('es-AR')}</span>
                        </div>
                      ))}
                    </div>

                    {/* Resumen efectivo a rendir */}
                    <div style={{ borderTop: '0.5px solid #eee', marginTop: 7, paddingTop: 7 }}>
                      {totalDigital > 0 && (
                        <div style={{ background: digitalConfirmado ? '#E8F5E9' : '#FFEBEE', borderRadius: 8, padding: '8px 11px', marginBottom: 7 }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span style={{ fontSize: 11, color: digitalConfirmado ? '#1B5E20' : '#C0392B' }}>
                              📲 MP / transf. {digitalConfirmado ? '✓ Acreditado' : '⚠ Pendiente verificación'}
                            </span>
                            <span style={{ fontSize: 14, fontWeight: 700, color: digitalConfirmado ? '#1B5E20' : '#C0392B' }}>${totalDigital.toLocaleString('es-AR')}</span>
                          </div>
                          {!digitalConfirmado && (
                            <button onClick={() => db.ref('viajes/' + viajeId + '/digitalConfirmado').set(true)}
                              style={{ marginTop: 6, width: '100%', padding: '5px', borderRadius: 6, fontSize: 11, fontWeight: 600,
                                background: '#E8F5E9', color: '#0F6E56', border: '1px solid #9FE1CB', cursor: 'pointer' }}>
                              ✓ Confirmar depósito recibido
                            </button>
                          )}
                        </div>
                      )}
                      <div style={{ background: '#E6F1FB', borderRadius: 8, padding: '9px 11px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ fontSize: 12, fontWeight: 600, color: '#0C447C' }}>💵 Efectivo a rendir</span>
                        <span style={{ fontSize: 20, fontWeight: 700, color: '#042C53' }}>${efectivoARendir.toLocaleString('es-AR')}</span>
                      </div>
                      {totalGastos > 0 && (
                        <div style={{ fontSize: 10, color: '#888', textAlign: 'right', marginTop: 2 }}>
                          ${totalEfectivo.toLocaleString('es-AR')} cobrado − ${totalGastos.toLocaleString('es-AR')} gastos
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* Botón / badge rendición */}
              {rendicion?.creadaPorChofer && !rendicion?.verificado ? (
                <button
                  onClick={() => {
                    db.ref('viajes/' + viajeId + '/rendicion/verificado').set(true);
                    if ((rendicion.montoDigital || 0) > 0) db.ref('viajes/' + viajeId + '/digitalConfirmado').set(true);
                    const remsVerif = {};
                    rems.forEach(r => { remsVerif['remitos/' + r.id + '/rendicionVerificada'] = true; });
                    if (Object.keys(remsVerif).length > 0) db.ref().update(remsVerif);
                  }}
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer', background: '#FEF3EC', color: '#C44A0F', border: '1px solid #FAC775' }}
                >
                  ✅ Confirmar recibo de efectivo y cerrar rendición
                </button>
              ) : !rendicion ? (
                <button
                  onClick={() => {
                    const ahora = new Date();
                    db.ref('viajes/' + viajeId + '/rendicion').set({
                      fecha: ahora.toLocaleDateString('es-AR'),
                      hora: ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
                      montoEfectivo: efectivoARendir,
                      montoDigital: totalDigital,
                      totalGastos,
                      verificado: true,
                    });
                  }}
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer', background: '#E1F5EE', color: '#0F6E56', border: '1px solid #9FE1CB' }}
                >
                  ✅ Confirmar rendición
                </button>
              ) : (
                <div style={{ fontSize: 11, color: '#0F6E56', textAlign: 'center', padding: '3px 0' }}>
                  ✓ Rendido el {rendicion.fecha} a las {rendicion.hora} · ${(rendicion.montoEfectivo || 0).toLocaleString('es-AR')} en efectivo
                </div>
              )}
            </div>
          );
        };

        const VEHICLE_COLORS = [
          { header: '#DCEEFF', border: '#6AAEE8', text: '#1565C0' },
          { header: '#FFE0B2', border: '#FFA040', text: '#BF360C' },
          { header: '#EDD5F5', border: '#B07CC6', text: '#6A1B9A' },
          { header: '#C8EBE9', border: '#5BB8B0', text: '#00695C' },
          { header: '#FFCDD2', border: '#E57373', text: '#B71C1C' },
          { header: '#D5D9F0', border: '#7986CB', text: '#283593' },
          { header: '#FFF9C4', border: '#F9A825', text: '#F57F17' },
          { header: '#C8E6C9', border: '#66BB6A', text: '#1B5E20' },
        ];
        const getVehicleColor = (k) => {
          const n = parseInt(k);
          const idx = !isNaN(n) ? n : k.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) & 0xFFFF, 0);
          return VEHICLE_COLORS[((idx % VEHICLE_COLORS.length) + VEHICLE_COLORS.length) % VEHICLE_COLORS.length];
        };

        // ── Turno mostrador ──
        const pendMostrador = misRemitos.filter(r => r.origenMostrador && r.quienPaga === 'remitente' && !r.turnoMostradorId && remitoOriginaMiSede(r));
        const histMostrador = misRemitos.filter(r => r.origenMostrador && r.quienPaga === 'remitente' && !!r.turnoMostradorId && remitoOriginaMiSede(r));
        const totalPendMostrador = pendMostrador.reduce((s, r) => s + (r.flete || 0), 0);
        const histPorTurno = {};
        histMostrador.forEach(r => {
          if (!histPorTurno[r.turnoMostradorId]) histPorTurno[r.turnoMostradorId] = { rems: [], fecha: r.turnoMostradorFecha || r.turnoMostradorId };
          histPorTurno[r.turnoMostradorId].rems.push(r);
        });

        const gastosActivosMostrador = [
          ...GASTOS_MOSTRADOR_DEFAULT.filter(g => gastosConfig[g.id] !== false),
          ...gastosCustom.filter(g => gastosConfig[g.id] !== false),
        ];

        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>

            {/* ── Header Rendiciones + ⚙️ ── */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: 4 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: '#5A6A78' }}>Rendiciones</span>
              <button onClick={() => setGastosConfigOpen(o => !o)}
                style={{ background: gastosConfigOpen ? '#E6F1FB' : 'transparent', border: '1px solid #DDE3EA', borderRadius: 7, padding: '4px 10px', fontSize: 12, color: gastosConfigOpen ? '#185FA5' : '#5A6A78', cursor: 'pointer' }}>
                ⚙️ Gastos permitidos
              </button>
            </div>

            {/* ── Panel config gastos ── */}
            {gastosConfigOpen && (
              <div style={{ background: '#F8FAFF', border: '1px solid #C8DCFA', borderRadius: 12, padding: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#1A1A1A', marginBottom: 4 }}>Gastos que puede registrar el operador al cerrar turno</div>
                <div style={{ fontSize: 11, color: '#5A6A78', marginBottom: 12 }}>Activá solo los que aplican a tu operación. Los desactivados no aparecen en el cierre de turno.</div>
                {GASTOS_MOSTRADOR_DEFAULT.map(g => (
                  <div key={g.id} onClick={() => toggleGastoConfig(g.id)}
                    style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 0', borderBottom: '0.5px solid #E8EDF2', cursor: 'pointer' }}>
                    <span style={{ fontSize: 13, color: '#1A1A1A' }}>{g.label}</span>
                    <div style={{ width: 36, height: 20, borderRadius: 10, background: gastosConfig[g.id] ? '#0F6E56' : '#DDE3EA', position: 'relative', flexShrink: 0, transition: 'background .15s' }}>
                      <div style={{ position: 'absolute', width: 16, height: 16, borderRadius: '50%', background: '#fff', top: 2, left: gastosConfig[g.id] ? 18 : 2, transition: 'left .15s' }} />
                    </div>
                  </div>
                ))}
                {gastosCustom.map(g => (
                  <div key={g.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '0.5px solid #E8EDF2' }}>
                    <span style={{ fontSize: 13, color: '#185FA5' }}>{g.label}</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div onClick={() => toggleGastoConfig(g.id)}
                        style={{ width: 42, height: 24, borderRadius: 12, background: gastosConfig[g.id] !== false ? '#0F6E56' : '#CDD5E0', cursor: 'pointer', position: 'relative', transition: 'background .2s', flexShrink: 0 }}>
                        <div style={{ position: 'absolute', top: 3, left: gastosConfig[g.id] !== false ? 21 : 3, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left .2s' }} />
                      </div>
                      <button onClick={() => eliminarGastoCustom(g.id)} style={{ background: 'none', border: 'none', color: '#A32D2D', cursor: 'pointer', fontSize: 14 }}>✕</button>
                    </div>
                  </div>
                ))}
                <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                  <input value={gastosCustomInput} onChange={e => setGastosCustomInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && agregarGastoCustom()}
                    placeholder="Agregar categoría personalizada..." style={{ flex: 1, padding: '8px 11px', border: '1px solid #DDE3EA', borderRadius: 8, fontSize: 13, outline: 'none' }} />
                  <button onClick={agregarGastoCustom} style={{ background: '#185FA5', color: '#fff', border: 'none', borderRadius: 8, padding: '8px 14px', fontSize: 18, cursor: 'pointer' }}>+</button>
                </div>
              </div>
            )}

            {/* ── Panel Rendiciones Sucursales (solo central) ── */}
            {ES_CENTRAL && turnosSucursales.length > 0 && (() => {
              const pendSuc = turnosSucursales.filter(t => t.estado === 'pendiente');
              const confSuc = turnosSucursales.filter(t => t.estado === 'confirmado');
              const METODO_LABEL = { sobre: '📦 Sobre con móvil', transferencia: '🏦 Transferencia', semanal: '📅 Semanal' };
              return (
                <div style={{ border: '1.5px solid #185FA5', borderRadius: 14, background: '#fff', boxShadow: '0 1px 6px rgba(0,0,0,.06)', marginBottom: 4 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', background: '#E6F1FB', borderRadius: '12px 12px 0 0' }}>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: '#185FA5' }}>🏪 Rendiciones de Sucursales</div>
                      {pendSuc.length > 0 && <div style={{ fontSize: 12, color: '#185FA5', opacity: 0.8, marginTop: 2 }}>{pendSuc.length} pendiente{pendSuc.length !== 1 ? 's' : ''} de confirmar</div>}
                    </div>
                    {pendSuc.length > 0
                      ? <span style={{ background: '#FEF3EC', color: '#C44A0F', fontSize: 11, fontWeight: 700, padding: '3px 9px', borderRadius: 10 }}>⏳ {pendSuc.length} pend.</span>
                      : <span style={{ background: '#E1F5EE', color: '#0F6E56', fontSize: 11, fontWeight: 600, padding: '3px 9px', borderRadius: 10 }}>✓ Al día</span>
                    }
                  </div>
                  <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {pendSuc.map(t => (
                      <div key={t.id} style={{ padding: '10px 12px', borderRadius: 10, background: '#FFFBF0', border: '1px solid #FAC775' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 6 }}>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: '#1A1A1A' }}>🏪 Suc. {t.sucursalId}</div>
                            <div style={{ fontSize: 11, color: '#5A6A78', marginTop: 2 }}>📅 {t.fecha} · {t.hora}</div>
                            {t.metodoEnvio && <div style={{ fontSize: 11, color: '#185FA5', marginTop: 2 }}>{METODO_LABEL[t.metodoEnvio] || t.metodoEnvio}</div>}
                            {t.numeroOperacion && <div style={{ fontSize: 11, color: '#5A6A78' }}>Nro. op.: {t.numeroOperacion}</div>}
                          </div>
                          <div style={{ textAlign: 'right', flexShrink: 0 }}>
                            <div style={{ fontSize: 11, color: '#5A6A78' }}>Efectivo neto</div>
                            <div style={{ fontSize: 16, fontWeight: 800, color: '#042C53' }}>${(t.neto || 0).toLocaleString('es-AR')}</div>
                            {t.digital > 0 && <div style={{ fontSize: 11, color: '#0F6E56' }}>+ MP ${t.digital.toLocaleString('es-AR')}</div>}
                          </div>
                        </div>
                        <button onClick={() => db.ref(`turnosMostrador/${t.id}/estado`).set('confirmado')}
                          style={{ width: '100%', background: '#0F6E56', color: '#fff', border: 'none', borderRadius: 8, padding: '9px 12px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
                          ✓ Confirmar recibo
                        </button>
                      </div>
                    ))}
                    {confSuc.length > 0 && (
                      <div style={{ borderTop: pendSuc.length > 0 ? '0.5px solid #DDE3EA' : 'none', paddingTop: pendSuc.length > 0 ? 8 : 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: '#5A6A78', marginBottom: 6 }}>📚 Confirmados</div>
                        {confSuc.slice().reverse().slice(0, 5).map(t => (
                          <div key={t.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', borderBottom: '0.5px solid #EEF1F4' }}>
                            <div>
                              <span style={{ fontSize: 12, fontWeight: 600, color: '#3D4F5C' }}>Suc. {t.sucursalId}</span>
                              <span style={{ fontSize: 11, color: '#aaa', marginLeft: 8 }}>{t.fecha}</span>
                            </div>
                            <span style={{ fontSize: 13, fontWeight: 700, color: '#0F6E56' }}>${(t.neto || 0).toLocaleString('es-AR')}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── Card Turno Mostrador ── */}
            {(pendMostrador.length > 0 || histMostrador.length > 0) && (
              <div style={{ border: '1.5px solid #0F6E56', borderRadius: 14, background: '#fff', boxShadow: '0 1px 6px rgba(0,0,0,.06)' }}>
                {/* Header */}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', background: '#E1F5EE', borderRadius: '12px 12px 0 0' }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: '#0F6E56' }}>🏪 Turno Mostrador</div>
                    {pendMostrador.length > 0 && <div style={{ fontSize: 12, color: '#0F6E56', opacity: 0.75, marginTop: 2 }}>{pendMostrador.length} cobro{pendMostrador.length !== 1 ? 's' : ''} pendiente{pendMostrador.length !== 1 ? 's' : ''} de rendir</div>}
                  </div>
                  {pendMostrador.length > 0
                    ? <span style={{ background: '#FEF3EC', color: '#C44A0F', fontSize: 11, fontWeight: 700, padding: '3px 9px', borderRadius: 10 }}>⏳ {pendMostrador.length} pend.</span>
                    : <span style={{ background: '#E1F5EE', color: '#0F6E56', fontSize: 11, fontWeight: 600, padding: '3px 9px', borderRadius: 10 }}>✓ Al día</span>
                  }
                </div>

                <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {/* Pendientes */}
                  {pendMostrador.length > 0 && (
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 600, color: '#888', textTransform: 'uppercase', letterSpacing: '.4px', marginBottom: 8 }}>Cobros del turno actual</div>
                      {pendMostrador.map(r => (
                        <div key={r.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', borderBottom: '0.5px solid #EEF1F4' }}>
                          <div>
                            <div style={{ fontSize: 12, color: '#1A1A1A' }}>{r.remitente?.nombre || '—'} → {r.destinatario?.ciudad || '—'}</div>
                            {r.formaPagoMostrador && (
                              <span style={{ fontSize: 10, background: r.formaPagoMostrador === 'efectivo' ? '#E6F1FB' : '#E1F5EE', color: r.formaPagoMostrador === 'efectivo' ? '#0C447C' : '#085041', borderRadius: 10, padding: '1px 7px', fontWeight: 600, display: 'inline-block', marginTop: 2 }}>
                                {r.formaPagoMostrador === 'efectivo' ? '💵 Efectivo' : '📲 MP / transf.'}
                              </span>
                            )}
                          </div>
                          <span style={{ fontSize: 13, fontWeight: 600, color: '#0F6E56' }}>${(r.flete || 0).toLocaleString('es-AR')}</span>
                        </div>
                      ))}
                      {/* Total */}
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 10, padding: '10px 12px', background: '#E6F1FB', borderRadius: 9 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: '#0C447C' }}>Total cobrado</span>
                        <span style={{ fontSize: 20, fontWeight: 800, color: '#042C53' }}>${totalPendMostrador.toLocaleString('es-AR')}</span>
                      </div>
                      {/* Formulario cierre de turno */}
                      {mostradorModal ? (
                        <div style={{ marginTop: 12, background: '#F8FAFF', borderRadius: 10, padding: 14, border: '1px solid #C8DCFA' }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: '#1A1A1A', marginBottom: 10 }}>¿Cómo se cobró?</div>
                          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 11, color: '#5A6A78', marginBottom: 4 }}>💵 Efectivo</div>
                              <div style={{ position: 'relative' }}>
                                <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: '#888', fontSize: 14, pointerEvents: 'none', zIndex: 1 }}>$</span>
                                <input type="number" value={mostradorEfectivo} onChange={e => setMostradorEfectivo(e.target.value)}
                                  placeholder="0" style={{ width: '100%', padding: '8px 10px 8px 22px', borderRadius: 7, border: '1px solid #DDE3EA', fontSize: 14, boxSizing: 'border-box', background: '#fff' }} />
                              </div>
                            </div>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 11, color: '#5A6A78', marginBottom: 4 }}>📲 MP / transf.</div>
                              <div style={{ position: 'relative' }}>
                                <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: '#888', fontSize: 14, pointerEvents: 'none', zIndex: 1 }}>$</span>
                                <input type="number" value={mostradorDigital} onChange={e => setMostradorDigital(e.target.value)}
                                  placeholder="0" style={{ width: '100%', padding: '8px 10px 8px 22px', borderRadius: 7, border: '1px solid #DDE3EA', fontSize: 14, boxSizing: 'border-box', background: '#fff' }} />
                              </div>
                            </div>
                          </div>
                          {gastosActivosMostrador.length > 0 && (
                            <div style={{ marginBottom: 12 }}>
                              <div style={{ fontSize: 11, fontWeight: 600, color: '#5A6A78', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '.3px' }}>Gastos del turno (opcional)</div>
                              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                                {gastosActivosMostrador.map(g => (
                                  <div key={g.id}>
                                    <div style={{ fontSize: 11, color: '#5A6A78', marginBottom: 4 }}>{g.label}</div>
                                    <div style={{ position: 'relative' }}>
                                      <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: '#888', fontSize: 14, pointerEvents: 'none', zIndex: 1 }}>$</span>
                                      <input type="number" value={mostradorGastos[g.id] || ''} onChange={e => setMostradorGastos(prev => ({ ...prev, [g.id]: e.target.value }))}
                                        placeholder="0" style={{ width: '100%', padding: '8px 10px 8px 22px', borderRadius: 7, border: '1px solid #DDE3EA', fontSize: 14, boxSizing: 'border-box', background: '#fff' }} />
                                    </div>
                                  </div>
                                ))}
                              </div>
                              {(() => {
                                const totalG = Object.values(mostradorGastos).reduce((s, v) => s + (parseFloat(v) || 0), 0);
                                const neto = Math.max(0, (parseFloat(mostradorEfectivo) || 0) - totalG);
                                return totalG > 0 ? (
                                  <div style={{ marginTop: 8, background: '#E6F1FB', borderRadius: 8, padding: '8px 11px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span style={{ fontSize: 12, color: '#0C447C' }}>Efectivo neto a rendir</span>
                                    <span style={{ fontSize: 14, fontWeight: 700, color: '#042C53' }}>${neto.toLocaleString('es-AR')}</span>
                                  </div>
                                ) : null;
                              })()}
                            </div>
                          )}
                          {/* Selector método envío (solo sucursal) */}
                          {!ES_CENTRAL && (
                            <div style={{ marginBottom: 12 }}>
                              <div style={{ fontSize: 11, fontWeight: 600, color: '#5A6A78', textTransform: 'uppercase', letterSpacing: '.3px', marginBottom: 8 }}>¿Cómo enviás el efectivo a central?</div>
                              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                                {[
                                  { id: 'sobre',         emoji: '📦', label: 'Sobre con móvil',       desc: 'Lo enviás en el próximo móvil que pase' },
                                  { id: 'transferencia', emoji: '🏦', label: 'Transferencia bancaria', desc: 'Ya transferiste o lo harás hoy' },
                                  { id: 'semanal',       emoji: '📅', label: 'Rendición semanal',      desc: 'Se acumula hasta el cierre semanal' },
                                ].map(op => (
                                  <div key={op.id} onClick={() => setMostradorMetodo(op.id)}
                                    style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderRadius: 8, cursor: 'pointer',
                                      border: mostradorMetodo === op.id ? '1.5px solid #0F6E56' : '1px solid #DDE3EA',
                                      background: mostradorMetodo === op.id ? '#E1F5EE' : '#fff' }}>
                                    <span style={{ fontSize: 18 }}>{op.emoji}</span>
                                    <div style={{ flex: 1 }}>
                                      <div style={{ fontSize: 13, fontWeight: 600, color: mostradorMetodo === op.id ? '#0F6E56' : '#1A1A1A' }}>{op.label}</div>
                                      <div style={{ fontSize: 11, color: '#888' }}>{op.desc}</div>
                                    </div>
                                    {mostradorMetodo === op.id && <span style={{ color: '#0F6E56', fontSize: 16 }}>✓</span>}
                                  </div>
                                ))}
                              </div>
                              {mostradorMetodo === 'transferencia' && (
                                <input value={mostradorNumOp} onChange={e => setMostradorNumOp(e.target.value)}
                                  placeholder="Nro. de operación (opcional)"
                                  style={{ marginTop: 8, width: '100%', padding: '8px 11px', border: '1px solid #DDE3EA', borderRadius: 8, fontSize: 13, boxSizing: 'border-box' }} />
                              )}
                            </div>
                          )}
                          <div style={{ display: 'flex', gap: 8 }}>
                            <button onClick={() => {
                              if (!ES_CENTRAL && !mostradorMetodo) { alert('Elegí cómo enviás el efectivo a central.'); return; }
                              cerrarTurnoMostrador(mostradorMetodo, mostradorNumOp);
                            }}
                              style={{ flex: 2, background: !ES_CENTRAL && !mostradorMetodo ? '#aaa' : '#0F6E56', color: '#fff', border: 'none', borderRadius: 8, padding: '10px 14px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
                              ✓ {ES_CENTRAL ? 'Cerrar y rendir turno' : 'Confirmar rendición'}
                            </button>
                            <button onClick={() => { setMostradorModal(false); setMostradorGastos({}); setMostradorMetodo(''); setMostradorNumOp(''); }}
                              style={{ flex: 1, background: '#F0F4F8', color: '#5A6A78', border: '1px solid #DDE3EA', borderRadius: 8, padding: '10px 14px', fontSize: 12, cursor: 'pointer' }}>
                              Cancelar
                            </button>
                          </div>
                        </div>
                      ) : (
                        <button onClick={() => {
                          const ef = pendMostrador.filter(r => r.formaPagoMostrador !== 'digital').reduce((s, r) => s + (r.flete || 0), 0);
                          const dg = pendMostrador.filter(r => r.formaPagoMostrador === 'digital').reduce((s, r) => s + (r.flete || 0), 0);
                          setMostradorEfectivo(String(ef));
                          setMostradorDigital(String(dg));
                          setMostradorModal(true);
                        }}
                          style={{ width: '100%', marginTop: 10, background: '#FEF3EC', color: '#C44A0F', border: '1px solid #FAC775', borderRadius: 8, padding: '10px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
                          💰 Cerrar turno y rendir
                        </button>
                      )}
                    </div>
                  )}

                  {/* Historial de turnos */}
                  {Object.keys(histPorTurno).length > 0 && (
                    <div style={{ borderTop: pendMostrador.length > 0 ? '0.5px solid #E8ECF0' : 'none', paddingTop: pendMostrador.length > 0 ? 8 : 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: '#5A6A78', marginBottom: 6 }}>📚 Historial de turnos</div>
                      {Object.entries(histPorTurno).reverse().map(([turnoId, { rems, fecha }]) => {
                        const total = rems.reduce((s, r) => s + (r.flete || 0), 0);
                        const totalEf = rems.filter(r => r.formaPagoMostrador !== 'digital').reduce((s, r) => s + (r.flete || 0), 0);
                        const totalMp = rems.filter(r => r.formaPagoMostrador === 'digital').reduce((s, r) => s + (r.flete || 0), 0);
                        const abierto = histTurnoAbierto === turnoId;
                        return (
                          <div key={turnoId} style={{ borderRadius: 8, background: '#F4F6F8', border: '0.5px solid #DDE3EA', marginBottom: 5, overflow: 'hidden' }}>
                            <div onClick={() => setHistTurnoAbierto(abierto ? null : turnoId)}
                              style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 11px', cursor: 'pointer', userSelect: 'none' }}>
                              <div>
                                <span style={{ fontSize: 12, fontWeight: 600, color: '#3D4F5C' }}>📅 {fecha}</span>
                                <div style={{ fontSize: 11, color: '#888', marginTop: 1 }}>{rems.length} cobro{rems.length !== 1 ? 's' : ''} · ✓ Rendido</div>
                              </div>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <span style={{ fontSize: 13, fontWeight: 700, color: '#0F6E56' }}>${total.toLocaleString('es-AR')}</span>
                                <span style={{ fontSize: 16, color: '#888' }}>{abierto ? '⌄' : '›'}</span>
                              </div>
                            </div>
                            {abierto && (
                              <div style={{ padding: '0 11px 10px', borderTop: '0.5px solid #DDE3EA' }}>
                                <div style={{ display: 'flex', gap: 10, padding: '8px 0', marginBottom: 6 }}>
                                  {totalEf > 0 && <span style={{ fontSize: 11, background: '#E6F1FB', color: '#0C447C', borderRadius: 8, padding: '3px 8px', fontWeight: 600 }}>💵 Efectivo ${totalEf.toLocaleString('es-AR')}</span>}
                                  {totalMp > 0 && <span style={{ fontSize: 11, background: '#E1F5EE', color: '#085041', borderRadius: 8, padding: '3px 8px', fontWeight: 600 }}>📲 MP ${totalMp.toLocaleString('es-AR')}</span>}
                                </div>
                                {rems.map(r => (
                                  <div key={r.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '5px 0', borderBottom: '0.5px solid #EEF1F4' }}>
                                    <div>
                                      <div style={{ fontSize: 12, color: '#1A1A1A' }}>{r.remitente?.nombre || '—'} → {r.destinatario?.ciudad || '—'}</div>
                                      {r.formaPagoMostrador && (
                                        <span style={{ fontSize: 10, background: r.formaPagoMostrador === 'efectivo' ? '#E6F1FB' : '#E1F5EE', color: r.formaPagoMostrador === 'efectivo' ? '#0C447C' : '#085041', borderRadius: 10, padding: '1px 6px', fontWeight: 600, display: 'inline-block', marginTop: 1 }}>
                                          {r.formaPagoMostrador === 'efectivo' ? '💵 Efectivo' : '📲 MP'}
                                        </span>
                                      )}
                                    </div>
                                    <span style={{ fontSize: 12, fontWeight: 600, color: '#0F6E56' }}>${(r.flete || 0).toLocaleString('es-AR')}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {ES_CENTRAL && lista.map(({ vehiculo, key, pendientes, historial }) => {
              const alias = vehiculo?.alias || vehiculo?.patente || 'Vehículo';
              const chofer = vehiculo?.chofer || '';
              const tienePend = pendientes.length > 0;
              const vCollapsed = collapsedVehiculos.has('v-' + key);
              const hExpanded  = collapsedVehiculos.has('h-' + key);
              const vColor = getVehicleColor(key);

              const toggleV = () => setCollapsedVehiculos(prev => {
                const n = new Set(prev); n.has('v-' + key) ? n.delete('v-' + key) : n.add('v-' + key); return n;
              });
              const toggleH = (e) => {
                e.stopPropagation();
                setCollapsedVehiculos(prev => {
                  const n = new Set(prev); n.has('h-' + key) ? n.delete('h-' + key) : n.add('h-' + key); return n;
                });
              };

              return (
                <div key={key} style={{
                  border: '1.5px solid ' + vColor.border,
                  borderRadius: 14, overflow: 'hidden', background: '#fff',
                  boxShadow: '0 1px 6px rgba(0,0,0,.06)'
                }}>
                  {/* ── Header del vehículo ── */}
                  <div onClick={toggleV} style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '14px 16px',
                    background: vColor.header,
                    cursor: 'pointer', userSelect: 'none'
                  }}>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: vColor.text }}>🚐 {alias}</div>
                      {chofer && <div style={{ fontSize: 12, color: vColor.text, opacity: 0.75, marginTop: 2 }}>👤 {chofer}</div>}
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      {tienePend
                        ? <span style={{ background: '#FEF3EC', color: '#C44A0F', fontSize: 11, fontWeight: 700, padding: '3px 9px', borderRadius: 10 }}>
                            ⏳ {pendientes.length} pend.
                          </span>
                        : historial.length > 0
                          ? <span style={{ background: '#E1F5EE', color: '#0F6E56', fontSize: 11, fontWeight: 600, padding: '3px 9px', borderRadius: 10 }}>✓ Al día</span>
                          : <span style={{ fontSize: 12, color: '#aaa' }}>Sin viajes</span>
                      }
                      <span style={{ fontSize: 20, color: '#888', lineHeight: 1 }}>{vCollapsed ? '›' : '⌄'}</span>
                    </div>
                  </div>

                  {/* ── Contenido ── */}
                  {!vCollapsed && (
                    <div style={{ padding: '12px', display: 'flex', flexDirection: 'column', gap: 10 }}>
                      {pendientes.length === 0 && historial.length === 0 && (
                        <div style={{ textAlign: 'center', color: '#aaa', fontSize: 13, padding: '20px 0' }}>
                          Sin viajes registrados aún
                        </div>
                      )}

                      {/* Pendientes de rendición */}
                      {pendientes.map(viaje => renderViajeCard(viaje))}

                      {/* Historial */}
                      {historial.length > 0 && (() => {
                        // Agrupar por fecha de rendición, más reciente primero
                        const porFecha = {};
                        historial.forEach(viaje => {
                          const fecha = (viajesData[viaje.viajeId] || {}).rendicion?.fecha || 'Sin fecha';
                          if (!porFecha[fecha]) porFecha[fecha] = [];
                          porFecha[fecha].push(viaje);
                        });
                        const parseDate = f => { const [d,m,y] = (f||'').split('/'); return new Date(y,m-1,d); };
                        const fechasSorted = Object.keys(porFecha).sort((a,b) => parseDate(b) - parseDate(a));
                        const totalViajes = historial.length;

                        return (
                          <div style={{ borderTop: pendientes.length > 0 ? '0.5px solid #E8ECF0' : 'none', paddingTop: pendientes.length > 0 ? 8 : 0 }}>
                            {/* Encabezado "Historial" */}
                            <div onClick={toggleH} style={{
                              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                              padding: '6px 2px', cursor: 'pointer', userSelect: 'none', marginBottom: hExpanded ? 8 : 0
                            }}>
                              <span style={{ fontSize: 12, fontWeight: 600, color: '#5A6A78' }}>📚 Historial ({totalViajes} rendición{totalViajes !== 1 ? 'es' : ''})</span>
                              <span style={{ fontSize: 18, color: '#888' }}>{hExpanded ? '⌄' : '›'}</span>
                            </div>

                            {hExpanded && (
                              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                                {fechasSorted.map(fecha => {
                                  const viajes = porFecha[fecha];
                                  const dKey = 'd-' + key + '-' + fecha;
                                  const dExpanded = collapsedVehiculos.has(dKey);
                                  const toggleD = (e) => {
                                    e.stopPropagation();
                                    setCollapsedVehiculos(prev => {
                                      const n = new Set(prev); n.has(dKey) ? n.delete(dKey) : n.add(dKey); return n;
                                    });
                                  };
                                  return (
                                    <div key={fecha}>
                                      <div onClick={toggleD} style={{
                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                        padding: '8px 11px', borderRadius: 8,
                                        background: dExpanded ? '#EEF2F6' : '#F4F6F8',
                                        border: '0.5px solid #DDE3EA',
                                        cursor: 'pointer', userSelect: 'none',
                                        marginBottom: dExpanded ? 8 : 0
                                      }}>
                                        <span style={{ fontSize: 12, fontWeight: 700, color: '#3D4F5C', textTransform: 'uppercase', letterSpacing: '.5px' }}>
                                          📅 Rendición día {fecha}
                                        </span>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                          <span style={{ fontSize: 11, color: '#888' }}>{viajes.length} viaje{viajes.length !== 1 ? 's' : ''}</span>
                                          <span style={{ fontSize: 18, color: '#888', lineHeight: 1 }}>{dExpanded ? '⌄' : '›'}</span>
                                        </div>
                                      </div>
                                      {dExpanded && (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                          {[...viajes].sort((a, b) => {
                                            const ha = ((viajesData[a.viajeId]||{}).rendicion?.hora||'');
                                            const hb = ((viajesData[b.viajeId]||{}).rendicion?.hora||'');
                                            return hb.localeCompare(ha);
                                          }).map(viaje => renderViajeCard(viaje))}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })()}

      {["enCamino", "entregados"].includes(etapa) && (() => {
        const estadoBadgeMap = {
          "cargando-ruta": { bg: "#FEF3EC", color: "#C44A0F", label: "Cargando en ruta" },
          "en-camino":     { bg: "#FFF8E1", color: "#F57F17", label: "En camino" },
          "entregado":     { bg: "#E1F5EE", color: "#0F6E56", label: "Entregado ✓" },
        };
        const grupos = {};
        items.forEach(r => {
          const m = encontrarRuta(r.destinatario?.ciudad || '', rutas);
          const key = m ? `r${m.numero}` : '__sin__';
          if (!grupos[key]) grupos[key] = { key, match: m, items: [] };
          grupos[key].items.push(r);
        });
        const lista = Object.values(grupos).sort((a, b) => (a.match?.numero ?? 999) - (b.match?.numero ?? 999));
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {lista.map(g => {
              const { key, match: m, items: gs } = g;
              const col = m ? rutaColor(m.numero) : null;
              const collapsed = collapsedCam.has(key);
              const toggle = () => setCollapsedCam(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });
              return (
                <div key={key} style={{ border: `0.5px solid ${m ? col.border : "#DDE3EA"}`, borderRadius: 12, overflow: "hidden" }}>
                  <div onClick={toggle} style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px", background: m ? col.bg : "#F0F4F8", cursor: "pointer", userSelect: "none" }}>
                    <span style={{ background: m ? col.badge : "#5A6A78", color: "#fff", fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, flexShrink: 0 }}>
                      {m ? `Ruta ${m.numero}` : "Sin ruta"}
                    </span>
                    <span style={{ fontSize: 15, fontWeight: 500, flex: 1, color: m ? col.color : "#5A6A78", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {m ? `${m.ciudadOrigen} → ${m.ciudadDestino}` : "Sin ruta asignada"}
                    </span>
                    <span style={{ background: m ? col.bg : "#F0F4F8", color: m ? col.color : "#5A6A78", fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, border: `0.5px solid ${m ? col.border : "#DDE3EA"}`, flexShrink: 0 }}>
                      {gs.length} paq.
                    </span>
                    <span style={{ fontSize: 16, color: m ? col.color : "#5A6A78" }}>{collapsed ? "›" : "⌄"}</span>
                  </div>
                  {!collapsed && gs.map(r => {
                    const badge = estadoBadgeMap[r.estado] || {};
                    return (
                      <div key={r.id} style={{ borderTop: `0.5px solid ${m ? col.border : "#DDE3EA"}`, padding: "12px 16px", background: "#fff" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                              <span style={{ fontWeight: 500, fontSize: 14, color: "#1A1A1A" }}>{r.remitente?.ciudad || "—"} → {r.destinatario?.ciudad || "—"}</span>
                              <span style={{ fontSize: 11, background: badge.bg, color: badge.color, padding: "2px 8px", borderRadius: 5, fontWeight: 500 }}>{badge.label}</span>
                            </div>
                            <div style={{ display: "flex", gap: 12, fontSize: 12, color: "#5A6A78", flexWrap: "wrap" }}>
                              <span>🔢 {r.id}</span>
                              {r.destinatario?.nombre && <span>👤 {r.destinatario.nombre}</span>}
                              {r.flete && <span style={{ color: "#0F6E56", fontWeight: 500 }}>💵 ${r.flete.toLocaleString()}</span>}
                            </div>
                            {r.vehiculoRuta ? (
                              <div style={{ fontSize: 11, color: "#5A6A78", marginTop: 4 }}>🚚 Ruta: {r.vehiculoRuta.alias}</div>
                            ) : r.vehiculoAsignado ? (
                              <div style={{ fontSize: 11, color: "#5A6A78", marginTop: 4 }}>🚐 {r.vehiculoAsignado.alias}</div>
                            ) : null}
                          </div>
                          <button className="btn-secondary" onClick={() => { setRemitoActivo(r); onNav("remito"); }}
                            style={{ fontSize: 12, padding: "7px 14px", flexShrink: 0 }}>
                            Ver remito
                          </button>
                        </div>
                        {etapa === "enCamino" && r.estado === "en-camino" && (
                          <button onClick={() => fbUpdate('remitos', r.id, { estado: 'entregado' })}
                            style={{ marginTop: 10, width: "100%", background: "#0F6E56", color: "#fff", border: "none", borderRadius: 8, padding: "9px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                            ✅ Confirmar entrega
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      })()}
      {/* ── Modal: Cargar gasto ── */}
      {modalGasto && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 1000, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
          onClick={e => { if (e.target === e.currentTarget) setModalGasto(null); }}>
          <div style={{ background: '#fff', borderRadius: '16px 16px 0 0', padding: '20px 16px 28px', width: '100%', maxWidth: 480 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: '#1A1A1A', marginBottom: 14 }}>🧾 Cargar gasto del viaje</div>

            {/* Tipo de gasto */}
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#5A6A78', marginBottom: 6 }}>Tipo de gasto</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {GASTO_TIPOS.map(t => (
                  <button key={t} onClick={() => setGastoTipo(t)}
                    style={{ padding: '5px 10px', borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                      background: gastoTipo === t ? '#E6F1FB' : '#F0F4F8',
                      color: gastoTipo === t ? '#185FA5' : '#5A6A78',
                      border: gastoTipo === t ? '1.5px solid #185FA5' : '1px solid #DDE3EA' }}>
                    {GASTO_ICONS[t]} {GASTO_LABELS[t]}
                  </button>
                ))}
              </div>
            </div>

            {/* Monto */}
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#5A6A78', marginBottom: 6 }}>Monto ($)</div>
              <div style={{ position: 'relative' }}>
                <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: '#888', fontWeight: 500, fontSize: 15 }}>$</span>
                <input
                  type="number" min="0" placeholder="0" value={gastoMonto}
                  onChange={e => setGastoMonto(e.target.value)}
                  style={{ width: '100%', padding: '10px 12px 10px 26px', borderRadius: 8, border: '1px solid #DDE3EA', fontSize: 16, fontWeight: 600, boxSizing: 'border-box' }}
                />
              </div>
              {gastoMonto && Number(gastoMonto) > 0 && (
                <div style={{ marginTop: 8, background: '#E8F5E9', borderRadius: 8, padding: '9px 13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: 13, color: '#2E7D32' }}>Total gasto</span>
                  <span style={{ fontSize: 18, fontWeight: 700, color: '#1B5E20' }}>${Number(gastoMonto).toLocaleString('es-AR')}</span>
                </div>
              )}
            </div>

            {/* Descripción opcional */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#5A6A78', marginBottom: 6 }}>Descripción (opcional)</div>
              <input
                type="text" placeholder="Ej: Autopista Rosario-Córdoba" value={gastoDesc}
                onChange={e => setGastoDesc(e.target.value)}
                style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '1px solid #DDE3EA', fontSize: 13, boxSizing: 'border-box' }}
              />
            </div>

            {/* Botones */}
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setModalGasto(null)}
                style={{ flex: 1, padding: '11px 0', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer', background: '#F0F4F8', color: '#5A6A78', border: '1px solid #DDE3EA' }}>
                Cancelar
              </button>
              <button
                disabled={!gastoMonto || Number(gastoMonto) <= 0}
                onClick={() => {
                  const monto = Number(gastoMonto);
                  if (!monto || monto <= 0) return;
                  db.ref('viajes/' + modalGasto.viajeId + '/gastos').push({
                    tipo: gastoTipo,
                    monto,
                    desc: gastoDesc || null,
                    cargadoEn: new Date().toLocaleDateString('es-AR') + ' ' + new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
                  });
                  setModalGasto(null);
                }}
                style={{ flex: 2, padding: '11px 0', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer',
                  background: (!gastoMonto || Number(gastoMonto) <= 0) ? '#C9D6E0' : '#185FA5',
                  color: '#fff', border: 'none' }}>
                Guardar gasto
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── DATOS GEOGRÁFICOS ───────────────────────────────────────────────────────
const PROVINCIAS_CIUDADES = {
  "Buenos Aires":        ["La Plata","Mar del Plata","Bahía Blanca","Tandil","Olavarría","Junín","Pergamino","San Nicolás","Zárate","Campana","Luján","Azul","Necochea","Tres Arroyos","Chivilcoy","9 de Julio","Bragado","Lincoln","Trenque Lauquen","Pehuajó","San Pedro","Ramallo","Dolores","Pinamar","Villa Gesell"],
  "CABA":                ["Buenos Aires (CABA)"],
  "Catamarca":           ["San Fernando del Valle de Catamarca","Andalgalá","Belén","Tinogasta","Santa María"],
  "Chaco":               ["Resistencia","Sáenz Peña","Villa Ángela","Charata","Las Breñas","General San Martín","Quitilipi","Machagai"],
  "Chubut":              ["Rawson","Comodoro Rivadavia","Trelew","Puerto Madryn","Esquel","Rada Tilly"],

// Sentido ida/vuelta de un remito dado el array de rutas
function sentidoDeRemito(r, rutas) {
  const num = r.rutaAsignada?.numero;
  if (!num || !rutas || rutas.length === 0) return null;
  const ruta = rutas.find((rt, i) => (rt.numero ?? i + 1) === num);
  if (!ruta) return null;
  const allStops = [ruta.ciudadOrigen, ...(ruta.waypoints||[]).map(w=>w.ciudad), ruta.ciudadDestino]
    .map(c => normStrTr((c||'').split(',')[0]));
  const origNorm = normStrTr((r.remitente?.ciudad||'').split(',')[0]);
  const destNorm = normStrTr((r.destinatario?.ciudad||'').split(',')[0]);
  const oIdx = allStops.findIndex(s => s === origNorm);
  const dIdx = allStops.findIndex(s => s === destNorm);
  if (oIdx === -1 || dIdx === -1) return null;
  return oIdx <= dIdx ? '→ Ida' : '← Vuelta';
}

function encontrarRuta(destino, rutas, ciudadesRutaMap) {
  if (!destino || !rutas || rutas.length === 0) return null;
  // 0. Buscar en mapa guardado por el transportista (tiene precedencia absoluta)
  if (ciudadesRutaMap) {
    const ciudadKey = normStrTr(destino.split(',')[0] || '');
    const saved = ciudadesRutaMap[ciudadKey];
    if (saved) {
      const ruta = rutas.find(r => r.id === saved.rutaId);
      // Guard: no usar el mapa si el destino ES la ciudad origen de la ruta
      // (ej: paquete a "Posadas" no debe ir a Ruta "Posadas → BsAs")
      const origenNorm = normStrTr((ruta?.ciudadOrigen || '').split(',')[0]);
      if (ruta && ciudadKey !== origenNorm) return { ...ruta, numero: saved.rutaNumero };
    }
  }
  // Separar ciudad y provincia del string "Ciudad, Provincia"
  const partes = destino.split(',').map(s => s.trim().toLowerCase());
  const ciudadDest = partes[0] || '';
  const provDest   = partes[1] || '';

  function ciudadMatch(candidato) {
    if (!candidato) return false;
    const c = candidato.toLowerCase().trim();
    return c === ciudadDest || (provDest && c === provDest);
  }
  function ciudadMatchParcial(candidato) {
    if (!candidato) return false;
    const c = candidato.toLowerCase().trim();
    return ciudadDest.includes(c) || c.includes(ciudadDest);
  }

  // 1. Match exacto por ciudad
  for (const [i, r] of rutas.entries()) {
    if (ciudadMatch(r.ciudadDestino)) return { ...r, numero: i + 1 };
    if ((r.paradas  || []).some(p => ciudadMatch(p.ciudad))) return { ...r, numero: i + 1 };
    if ((r.waypoints || []).some(w => ciudadMatch(w.ciudad))) return { ...r, numero: i + 1 };
  }
  // 2. Match parcial por ciudad
  for (const [i, r] of rutas.entries()) {
    if (ciudadMatchParcial(r.ciudadDestino)) return { ...r, numero: i + 1 };
    if ((r.paradas  || []).some(p => ciudadMatchParcial(p.ciudad))) return { ...r, numero: i + 1 };
    if ((r.waypoints || []).some(w => ciudadMatchParcial(w.ciudad))) return { ...r, numero: i + 1 };
  }
  // 3. Fallback por provincia: si la ciudad no está cargada como parada pero la ruta cubre esa provincia
  if (provDest) {
    function provMatch(candidato) {
      if (!candidato) return false;
      const p = candidato.toLowerCase().trim();
      return p === provDest || p.includes(provDest) || provDest.includes(p);
    }
    const provFromCity = c => (c || '').split(',')[1]?.trim().toLowerCase() || '';
    for (const [i, r] of rutas.entries()) {
      if (provMatch(r.provinciaDestino)) return { ...r, numero: i + 1 };
      if ((r.paradas  || []).some(p => provMatch(p.provincia))) return { ...r, numero: i + 1 };
      if ((r.waypoints || []).some(w => provMatch(w.provincia))) return { ...r, numero: i + 1 };
      // Extraer provincia de ciudadDestino/paradas/waypoints si no hay campo explícito
      if (provMatch(provFromCity(r.ciudadDestino))) return { ...r, numero: i + 1 };
      if ((r.paradas  || []).some(p => provMatch(provFromCity(p.ciudad)))) return { ...r, numero: i + 1 };
      if ((r.waypoints || []).some(w => provMatch(provFromCity(w.ciudad)))) return { ...r, numero: i + 1 };
    }
  }
  return null;
}

// Sugiere la ruta más probable por provincia cuando encontrarRuta() devuelve null
function sugerirRutaPorProvincia(destino, rutas) {
  if (!destino || !rutas || rutas.length === 0) return null;
  const prov = normStrTr((destino.split(',')[1] || '').trim());
  if (!prov) return null;
  const pm = c => { const n = normStrTr(c||''); return n && (n.includes(prov) || prov.includes(n)); };
  for (const [i, r] of rutas.entries()) {
    if (pm(r.provinciaDestino)) return { ...r, numero: i + 1 };
    if ((r.waypoints||[]).some(w => pm(w.provincia))) return { ...r, numero: i + 1 };
    if ((r.paradas||[]).some(p => pm(p.provincia))) return { ...r, numero: i + 1 };
    if (pm((r.ciudadDestino||'').split(',')[1])) return { ...r, numero: i + 1 };
    // ⚠️ NO matchear ciudadOrigen: un paquete que va A Posadas no pertenece a la ruta "Posadas → BsAs"
  }
  return null;
}

// Guarda permanentemente la asignación ciudad → ruta en Firebase
function guardarCiudadEnRuta(ciudad, ruta) {
  const key = normStrTr((ciudad||'').split(',')[0].trim());
  if (!key || !ruta) return Promise.resolve();
  return db.ref(`ciudadesRuta/${USUARIO_TRANS.id}/${key}`).set({
    rutaId:        ruta.id,
    rutaNumero:    ruta.numero,
    ciudadOrigen:  ruta.ciudadOrigen  || null,
    ciudadDestino: ruta.ciudadDestino || null,
  });
}

const GEOREF_TR = 'https://apis.datos.gob.ar/georef/api';

function normStrTr(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}
function normProvDisplayTr(nombre) {
  if (!nombre) return '';
  if (normStrTr(nombre).includes('autonoma') || normStrTr(nombre).includes('autónoma')) return 'CABA';
  return nombre.replace(/^Provincia de /i, '').trim();
}
function normProvGPSTr(raw) {
  return normProvDisplayTr((raw || '').replace(/ Province$/i, '').replace(/ \(Argentina\)$/i, '').trim());
}

function CiudadAutocomplete({ value = "", onChange, label, placeholder, mostrarGPS = false, required = false }) {
  const [inputVal, setInputVal]     = React.useState(value);
  const [sug, setSug]               = React.useState([]);
  const [busy, setBusy]             = React.useState(false);
  const [gpsLoad, setGpsLoad]       = React.useState(false);
  const [open, setOpen]             = React.useState(false);
  const [gpsProv, setGpsProv]       = React.useState(null);
  const timer = React.useRef(null);
  const gpsProvincia = React.useRef(null);
  const gpsDisponible = mostrarGPS && !!navigator.geolocation;

  function buscar(q) {
    clearTimeout(timer.current);
    if (q.length < 2) { setSug([]); setOpen(false); return; }
    const provinciaGPS = gpsProvincia.current;
    timer.current = setTimeout(() => {
      setBusy(true);
      const qn = normStrTr(q);
      fetch(`${GEOREF_TR}/localidades?nombre=${encodeURIComponent(q)}&max=15&campos=nombre,provincia`)
        .then(r => r.json())
        .then(data => {
          const seen = new Set();
          const res = (data.localidades || [])
            .map(loc => {
              const c = loc.nombre || '';
              const p = normProvDisplayTr(loc.provincia?.nombre || '');
              if (!c || !p) return null;
              return { label: `${c}, ${p}`, ciudad: c, provincia: p };
            })
            .filter(r => {
              if (!r) return false;
              if (seen.has(r.label)) return false;
              seen.add(r.label);
              return normStrTr(r.ciudad).includes(qn);
            })
            .sort((a, b) => {
              if (provinciaGPS) {
                const aL = normStrTr(a.provincia) === normStrTr(provinciaGPS) ? 0 : 1;
                const bL = normStrTr(b.provincia) === normStrTr(provinciaGPS) ? 0 : 1;
                if (aL !== bL) return aL - bL;
              }
              return (normStrTr(a.ciudad).startsWith(qn) ? 0 : 1) - (normStrTr(b.ciudad).startsWith(qn) ? 0 : 1);
            });
          setSug(res); setOpen(res.length > 0); setBusy(false);
        })
        .catch(() => { setSug([]); setOpen(false); setBusy(false); });
    }, 350);
  }

  function sel(item) {
    setInputVal(item.label);
    onChange(item.ciudad, item.provincia);
    setSug([]); setOpen(false);
  }

  function gps() {
    setGpsLoad(true);
    navigator.geolocation.getCurrentPosition(
      pos => {
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&addressdetails=1`)
          .then(r => r.json())
          .then(d => {
            const a = d.address;
            const ciudad = a.city || a.town || a.village || a.suburb || '';
            const prov = normProvGPSTr(a.state || '');
            gpsProvincia.current = prov;
            setGpsProv(prov);
            if (ciudad) { setInputVal(`${ciudad}, ${prov}`); onChange(ciudad, prov); }
            setGpsLoad(false);
          })
          .catch(() => setGpsLoad(false));
      },
      () => { setGpsLoad(false); },
      { timeout: 10000, enableHighAccuracy: false }
    );
  }

  return (
    <div style={{ position: "relative" }}>
      {label && <label style={{ display:"block", fontWeight:500, marginBottom:5, fontSize:13, color:"#444" }}>{label}{required && " *"}</label>}
      <div style={{ display:"flex", gap:6 }}>
        <div style={{ position:"relative", flex:1 }}>
          <input
            value={inputVal}
            onChange={e => { setInputVal(e.target.value); buscar(e.target.value); }}
            onKeyDown={e => { if (e.key === 'Enter' && sug.length > 0) { e.preventDefault(); sel(sug[0]); } }}
            onBlur={() => setTimeout(() => setOpen(false), 160)}
            onFocus={() => sug.length > 0 && setOpen(true)}
            placeholder={placeholder || "Escribí la ciudad..."}
            autoComplete="off"
            style={{ paddingRight: busy ? 30 : undefined }}
          />
          {busy && <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", fontSize:13, color:"#bbb", pointerEvents:"none" }}>🔍</span>}
        </div>
        {gpsDisponible && (
          <button type="button" onClick={gps} disabled={gpsLoad}
            title="Detectar mi ubicación actual"
            style={{ padding:"0 12px", background:gpsLoad?"#F5F5F5":"#EBF3FD", border:"1.5px solid #B5D4F4", borderRadius:8, cursor:gpsLoad?"wait":"pointer", color:"#0C447C", fontSize:18, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", minWidth:44 }}>
            {gpsLoad ? "⏳" : "📍"}
          </button>
        )}
      </div>
      {open && sug.length > 0 && (
        <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#fff", border:"1.5px solid #DDE3EA", borderRadius:10, boxShadow:"0 8px 24px rgba(0,0,0,0.11)", zIndex:500, marginTop:4, overflow:"hidden" }}>
          {sug.map((s,i) => (
            <div key={i}
              onMouseDown={e => { e.preventDefault(); sel(s); }}
              style={{ padding:"10px 14px", cursor:"pointer", fontSize:13, borderBottom:i<sug.length-1?"1px solid #F5F5F5":"none", display:"flex", alignItems:"center", gap:8 }}
              onMouseEnter={e => e.currentTarget.style.background="#F5F9FF"}
              onMouseLeave={e => e.currentTarget.style.background="#fff"}>
              <span style={{color:"#E85D20"}}>📍</span>
              <div>
                <span style={{fontWeight:500,color:"#1A1A1A"}}>{s.ciudad}</span>
                {s.provincia && <span style={{color:"#888",marginLeft:6,fontSize:12}}>{s.provincia}</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── HELPERS GEOGRÁFICOS (detección automática de ciudades intermedias) ────────
function distKm(lat1, lon1, lat2, lon2) {
  const R = 6371, r = Math.PI/180;
  const dLat = (lat2-lat1)*r, dLon = (lon2-lon1)*r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const PROV_CENT = {
  'Buenos Aires':{lat:-36.6,lon:-60.3},'CABA':{lat:-34.6,lon:-58.4},
  'Catamarca':{lat:-27.3,lon:-66.9},'Chaco':{lat:-26.0,lon:-60.4},
  'Chubut':{lat:-44.1,lon:-67.8},'Córdoba':{lat:-31.4,lon:-64.2},
  'Corrientes':{lat:-28.8,lon:-58.0},'Entre Ríos':{lat:-31.7,lon:-60.0},
  'Formosa':{lat:-24.2,lon:-61.7},'Jujuy':{lat:-23.2,lon:-65.3},
  'La Pampa':{lat:-36.9,lon:-65.4},'La Rioja':{lat:-29.7,lon:-67.0},
  'Mendoza':{lat:-34.6,lon:-69.0},'Misiones':{lat:-27.0,lon:-55.0},
  'Neuquén':{lat:-38.9,lon:-68.1},'Río Negro':{lat:-40.8,lon:-67.0},
  'Salta':{lat:-24.8,lon:-65.4},'San Juan':{lat:-31.1,lon:-68.8},
  'San Luis':{lat:-33.3,lon:-66.4},'Santa Cruz':{lat:-49.9,lon:-68.5},
  'Santa Fe':{lat:-31.6,lon:-60.7},'Santiago del Estero':{lat:-28.0,lon:-63.3},
  'Tierra del Fuego, Antártida e Islas del Atlántico Sur':{lat:-54.0,lon:-67.6},
  'Tucumán':{lat:-26.8,lon:-65.2},
};
function provinciasParaBuscar(latA, lonA, latB, lonB, provA, provB) {
  const dAB = distKm(latA, lonA, latB, lonB);
  const provs = new Set([provA, provB]);
  for (const [prov, c] of Object.entries(PROV_CENT)) {
    if (prov === provA || prov === provB) continue;
    if (distKm(latA,lonA,c.lat,c.lon) + distKm(c.lat,c.lon,latB,lonB) <= dAB * 1.6) provs.add(prov);
  }
  return [...provs];
}
